function majorityOn(c,col){ const mine=c.agents[col]||0; if(mine<=0) return false;
  for(const k in c.agents){ if(k!==col&&c.agents[k]>=mine) return false; } return true; }
function doSecure(c){
  const me=G.players[G.actor]; const col=me.color.key; let captured=0;
  for(const k in c.agents){ if(k!==col&&c.agents[k]>0){ const rp=G.players.find(p=>p.color.key===k); rp.supply.agents+=c.agents[k]; captured+=c.agents[k]; } }
  me.captives+=captured; me.supply.agents+=(c.agents[col]||0);
  const idx=G.court.indexOf(c); G.court.splice(idx,1);
  if(G.courtDeck.length) G.court.splice(idx,0,G.courtDeck.pop());
  const base=`${pname(G.actor)} 收纳「${c.name}」，俘获 ${captured} 名敌方密探`;
  if(c.t==='vox'){            // 帝国之声：触发"获得时"效果后弃置（不保留）
    logMsg(base,'act'); runVoxEffect(c); return;   // runVoxEffect 负责后续 consumeAction
  }
  (me.guildCards=me.guildCards||[]).push(c);
  if(G._freePrelude) c._freshlySecured=true; // 规则书 p.20：序幕中收纳的卡，本次序幕不能再用其序幕能力
  if(c.eff&&c.eff.startsWith('cartel:')){ const r=c.eff.split(':')[1];
    logMsg(`「${c.name}」就位：此后每章计分结束时，所有对手须弃光${RESOURCES[r].name}`,'sys'); }
  else if(c.eff==='guardian'){ logMsg('「宣誓守护者」就位：对手无法偷取你的资源与公会卡','sys'); }
  else if(c.eff==='gatedice'){ logMsg('「星门守备部队」就位：你在星门发起战斗 +2 骰','sys'); }
  else if(c.eff==='secretorder'){ logMsg('「隐秘结社」就位：宣告守护/共情时此牌点数不归零','sys'); }
  consumeAction(base);
}
// 帝国之声(Vox)卡"获得时"效果；done() 触发结束行动（默认 consumeAction；洗劫等场景可传入自定义续作）
function runVoxEffect(c, done){
  const me=G.players[G.actor];
  done = done || (()=>consumeAction(null));
  if(c.eff==='vox_uprising'){
    openModal(m=>{
      m.appendChild(el('h2',null,'星火燎原 · 选择星团'));
      m.appendChild(el('div','hintbox','在所选星团的每个星系各放置 1 艘你的星舰（受供应限制）。'));
      for(let cl=1;cl<=6;cl++){
        const sysIds=['G'+cl,cl+'A',cl+'B',cl+'C'].filter(id=>G.map[id]&&!G.map[id].outOfPlay);
        const b=el('button','btn'); b.style.cssText='display:block;width:100%;margin:6px 0';
        b.textContent=`星团 ${cl}（${sysIds.length} 个星系）`;
        b.onclick=()=>{ closeModal(); let placed=0;
          sysIds.forEach(id=>{ if(me.supply.ships>0){ addShips(id,me,1); placed++; } });
          logMsg(`${pname(G.actor)} 星火燎原：在星团 ${cl} 放置 ${placed} 艘星舰`,'act'); done(); };
        m.appendChild(b);
      }
      const cc=el('button','btn ghost','放弃效果'); cc.onclick=()=>{closeModal(); done();}; m.appendChild(cc);
    });
  } else if(c.eff==='vox_declare'){
    if(G.markersAvailable.length===0){ toast('已无可用雄心标记'); done(); return; }
    openModal(m=>{
      m.appendChild(el('h2',null,'民众呼声 · 宣告野心'));
      m.appendChild(el('div','hintbox','立即宣告任意 1 个野心（取走当前最高标记放入对应雄心盒）。'));
      AMB_ORDER.forEach(k=>{ const b=el('button','btn',`${AMBITIONS[k].icon} ${AMBITIONS[k].name}`); b.style.cssText='display:block;width:100%;margin:6px 0';
        b.onclick=()=>{ closeModal(); const mk=takeTopMarker(); if(mk){ G.ambitionBox[k].push(mk); G.declaredThisChapter[k]=true;
          logMsg(`${pname(G.actor)} 民众呼声：宣告 <b>${AMBITIONS[k].name}</b>（标记 ${mk.f}/${mk.s}）`,'act'); } done(); };
        m.appendChild(b); });
      const cc=el('button','btn ghost','不宣告'); cc.onclick=()=>{closeModal(); done();}; m.appendChild(cc);
    });
  } else if(c.eff==='vox_draw'){
    let card=null;
    if(G.discard.length) card=G.discard.shift();
    else if(G.actionDeck.length) card=G.actionDeck.pop();
    if(card){ me.hand.push(card); sortHand(me); logMsg(`${pname(G.actor)} 呼吁行动：抽取 1 张行动牌`,'act'); }
    else logMsg('呼吁行动：无牌可抽','sys');
    done();
  } else if(c.eff==='vox_outrage'){
    openModal(m=>{ m.appendChild(el('h2',null,'揭竿而起 · 选择资源'));
      m.appendChild(el('div','hintbox','所有玩家（含你）就该资源爆发民愤：各自弃光该类型资源与公会卡（忠诚卡保留），并覆盖民愤图标。'));
      RES_ORDER.forEach(r=>{ const b=el('button','btn',RESOURCES[r].name); b.style.cssText='display:block;width:100%;margin:6px 0';
        b.onclick=()=>{ closeModal();
          G.players.forEach(p=>{ const msg=provokeOutrage(p,r); logMsg(`　${p.name}：${msg||'无可弃'}`,'sys'); });
          logMsg(`${pname(G.actor)} 揭竿而起：所有玩家就 ${RESOURCES[r].name} 爆发民愤`,'act'); done(); }; m.appendChild(b); });
      const skip=el('button','btn ghost','放弃效果'); skip.onclick=()=>{ closeModal(); done(); }; m.appendChild(skip);
    });
  } else if(c.eff==='vox_song'){
    const col=me.color.key;
    const finish=()=>{ c.agents={}; G.courtDeck.push(c); shuffle(G.courtDeck); logMsg('自由之歌：本牌洗回议会牌堆','sys'); done(); };
    const opts=[];
    for(const id in G.map){ const s=G.map[id]; if(s.outOfPlay||s.kind!=='planet'||controllerOf(id)!==col) continue;
      s.pieces.buildings.forEach(b=>{ if(b.type==='city'&&b.owner!==col) opts.push({id,owner:G.players.find(p=>p.color.key===b.owner)}); }); }
    if(!opts.length){ logMsg('自由之歌：没有你控制的对手城市，效果跳过','sys'); finish(); return; }
    openModal(m=>{ m.appendChild(el('h2',null,'自由之歌 · 取走对手城市'));
      m.appendChild(el('div','hintbox','取走 1 座你控制的对手城市归还其拥有者；若如此做可夺取先攻。'));
      opts.forEach(o=>{ const b=el('button','btn',`${o.id}（${o.owner.name} 的城市）`); b.style.cssText='display:block;width:100%;margin:6px 0';
        b.onclick=()=>{ closeModal(); const s=G.map[o.id]; const bi=s.pieces.buildings.findIndex(x=>x.type==='city'&&x.owner===o.owner.color.key);
          if(bi>=0){ s.pieces.buildings.splice(bi,1); o.owner.supply.cities++; }
          logMsg(`${pname(G.actor)} 自由之歌：取走 ${o.id} 的 ${o.owner.name} 城市并归还`,'act');
          if(G.seizedBy===null){ G.seizedBy=G.actor; logMsg(`${pname(G.actor)} 夺取先攻`,'sys'); }
          finish(); }; m.appendChild(b); });
      const skip=el('button','btn ghost','不取走'); skip.onclick=()=>{ closeModal(); finish(); }; m.appendChild(skip);
    });
  } else if(c.eff==='vox_struggle'){
    const reshuffle=()=>{ const guilds=G.courtDiscard.filter(x=>x.t==='guild'); G.courtDiscard=G.courtDiscard.filter(x=>x.t!=='guild');
      guilds.forEach(x=>{ x.agents={}; G.courtDeck.push(x); }); shuffle(G.courtDeck);
      if(guilds.length) logMsg(`勾心斗角：${guilds.length} 张弃置公会卡洗回议会牌堆`,'sys'); done(); };
    const victims=rivalsOf(me).filter(p=>stealableGuildCards(p).length>0);
    if(!victims.length){ reshuffle(); return; }
    openModal(m=>{ m.appendChild(el('h2',null,'勾心斗角 · 偷取公会卡'));
      m.appendChild(el('div','hintbox','可从一名对手偷取 1 张公会卡（或放弃）。随后弃置的公会卡洗回议会牌堆。'));
      victims.forEach(opp=>{ const b=el('button','btn',opp.name); b.style.cssText='display:block;width:100%;margin:6px 0;background:'+opp.color.css;
        b.onclick=()=>{ closeModal(); pickFromList('选择偷取的公会卡',stealableGuildCards(opp).map(gc=>({label:gc.name,val:gc})),gc=>{
          const got=takeStolenGuildCard(opp,me,gc);
          logMsg(`${pname(G.actor)} 勾心斗角：从 ${opp.name} ${got?`偷取「${gc.name}」`:`触发「${gc.name}」守护——置于议会牌堆底`}`,'act'); reshuffle(); }); }; m.appendChild(b); });
      const skip=el('button','btn ghost','不偷取'); skip.onclick=()=>{ closeModal(); reshuffle(); }; m.appendChild(skip);
    });
  } else {
    logMsg(`「${c.name}」获得时效果需按卡面手动执行`,'sys'); done();
  }
}
/* ================= 议会卡能力：序幕一次性 / 行动型 / 持续面板 =================
   正式规则中多数为「序幕阶段」能力；本简化引擎没有独立序幕，统一作为
   玩家回合内可主动激活的能力，通过行动栏「议会卡能力」面板调用。
   - 序幕一次性：免费，使用后弃置该公会卡（移入 courtDiscard）
   - 行动型：消耗 1 次行动
   - g24 文物贩子：每回合一次，不弃卡                                          */
function rivalsOf(me){ return G.players.filter(p=>p!==me); }
function ownsCardId(p,id){ return (p.guildCards||[]).some(c=>c.id===id); }
function weaponIcons(p){ return (p.res.weapon|0) + guildIcons(p,'weapon'); } // 武器标志 = 武器资源 + 武器图标公会卡（规则书 p.18）
function controlledSystems(p){ const out=[]; for(const id in G.map){ const s=G.map[id]; if(!s.outOfPlay && controllerOf(id)===p.color.key) out.push(id); } return out; }
function gatesInPlay(){ const out=[]; for(let cl=1;cl<=6;cl++){ const id='G'+cl; if(G.map[id]&&!G.map[id].outOfPlay) out.push(id); } return out; }
function stealableGuildCards(victim){ const cards=(victim.guildCards||[]); const guard=cards.find(c=>c.eff==='guardian'); return guard?[guard]:cards.slice(); }
// 偷取一张对手公会卡：宣誓守护者(g22)被偷时不归偷取者，而是置于议会牌堆底（规则书）。返回 true=归入偷取者麾下；false=置底。
// 议会牌堆以 .pop() 取顶 → 数组末为顶、首为底；故置底用 unshift。
function takeStolenGuildCard(opp,me,card){ const i=(opp.guildCards||[]).indexOf(card); if(i>=0) opp.guildCards.splice(i,1);
  if(card.eff==='guardian'){ card.agents={}; G.courtDeck.unshift(card); return false; }
  (me.guildCards=me.guildCards||[]).push(card); return true; }
function discardGuildCard(owner,card){
  if((card.stash|0)>0 && typeof card.eff==='string' && card.eff.startsWith('cartel:')){ const rt=card.eff.split(':')[1]; G.resSupply[rt]+=card.stash; card.stash=0; } // 垄断卡离场：堆置资源归还供应
  const arr=owner.guildCards||[]; const i=arr.indexOf(card); if(i>=0) arr.splice(i,1); G.courtDiscard.push(card); }
// 通用选择器
function pickPlayer(title,list,cb){ if(list.length===1){ cb(list[0]); return; }
  openModal(m=>{ m.appendChild(el('h2',null,title));
    list.forEach(p=>{ const b=el('button','btn',p.name); b.style.cssText='display:block;width:100%;margin:6px 0;background:'+p.color.css; b.onclick=()=>{ closeModal(); cb(p); }; m.appendChild(b); });
    const cc=el('button','btn ghost','取消'); cc.onclick=()=>closeModal(); m.appendChild(cc); }); }
function pickResource(title,types,cb){ openModal(m=>{ m.appendChild(el('h2',null,title));
    if(!types.length) m.appendChild(el('div','hintbox','无可选资源。'));
    types.forEach(r=>{ const b=el('button','btn',RESOURCES[r].name); b.style.cssText='display:block;width:100%;margin:6px 0'; b.onclick=()=>{ closeModal(); cb(r); }; m.appendChild(b); });
    const cc=el('button','btn ghost','取消'); cc.onclick=()=>closeModal(); m.appendChild(cc); }); }
function pickSystem(title,ids,cb){ openModal(m=>{ m.appendChild(el('h2',null,title));
    if(!ids.length) m.appendChild(el('div','hintbox','无合法目标。'));
    ids.forEach(id=>{ const b=el('button','btn',id); b.style.cssText='display:block;width:100%;margin:6px 0'; b.onclick=()=>{ closeModal(); cb(id); }; m.appendChild(b); });

function pickFromList(title,items,cb){ if(items.length===1){ cb(items[0].val); return; }
  openModal(m=>{ m.appendChild(el('h2',null,title));
    if(!items.length) m.appendChild(el('div','hintbox','无可选项。'));

    const cc=el('button','btn ghost','取消'); cc.onclick=()=>closeModal(); m.appendChild(cc); }); }
// 能力收尾
function finishAbility(me,card,meta){ meta=meta||{};
  if(meta.discard&&card) discardGuildCard(me,card);
  if(meta.oncePerTurn) (me._abil=me._abil||{})[meta.oncePerTurn]=true;
  if(meta.log) logMsg(meta.log,'act');
  if(meta.action) consumeAction(null); else render(); }

function abPlace3(me,card){ const ids=controlledSystems(me); if(!ids.length){ toast('你没有控制的星系'); return; }
  pickSystem('放置 3 艘星舰 · 选择你控制的星系',ids,id=>{ const n=Math.min(3,me.supply.ships); for(let k=0;k<n;k++) addShips(id,me,1);
    finishAbility(me,card,{discard:true,log:`${pname(me.idx)} 序幕「${card.name}」：在 ${id} 放置 ${n} 艘星舰，弃置该卡`}); }); }
function abFillSlots(me,card,rtype){ const SLOTS=6; let need=Math.max(0,SLOTS-totalRes(me)); let got=0,stolen=0;
  while(need>0 && G.resSupply[rtype]>0){ gainResource(me,rtype); need--; got++; }
  if(need>0){ for(const opp of rivalsOf(me)){ while(need>0 && opp.res[rtype]>0 && !ownsEff(opp,'guardian')){ opp.res[rtype]--; me.res[rtype]++; need--; got++; stolen++; } if(need<=0) break; } }
  finishAbility(me,card,{discard:true,log:`${pname(me.idx)} 序幕「${card.name}」：以${RESOURCES[rtype].name}填满空槽 +${got}${stolen?`（夺取 ${stolen}）`:''}，弃置该卡`}); }
function abStealRes(me,card,rtype){ const victims=rivalsOf(me).filter(p=>p.res[rtype]>0 && !ownsEff(p,'guardian'));
  if(!victims.length){ toast(`没有可偷取${RESOURCES[rtype].name}的对手`); return; }
  pickPlayer(`偷取 1 ${RESOURCES[rtype].name} · 选择对手`,victims,opp=>{ opp.res[rtype]--; me.res[rtype]++;
    finishAbility(me,card,{discard:true,log:`${pname(me.idx)} 序幕「${card.name}」：从 ${opp.name} 偷取 1 ${RESOURCES[rtype].name}，弃置该卡`}); }); }
// 垄断联盟（g03/g06）：把你的 1 个对应资源堆置于本牌——视为你所有（计入大亨），但此后不可动用/被偷/被劫/被民愤。非行动、可反复。
function abCartelStash(me,card){ const rt=(card.eff||'').split(':')[1]; if(!rt){ return; }
  if((me.res[rt]|0)<=0){ toast(`你没有可堆置的${RESOURCES[rt].name}`); return; }
  me.res[rt]--; card.stash=(card.stash|0)+1;
  logMsg(`${pname(me.idx)} 「${card.name}」：堆置 1 ${RESOURCES[rt].name}于本牌（计入大亨、不可动用），现 ${card.stash} 个`,'act');
  closeModal(); render(); }
function abGateShips(me,card){ let placed=0; gatesInPlay().forEach(id=>{ if(me.supply.ships>0){ addShips(id,me,1); placed++; } });
  finishAbility(me,card,{discard:true,log:`${pname(me.idx)} 序幕「星门守备部队」：在 ${placed} 个星门各放 1 舰，弃置该卡`}); }
function abSeize(me,card){ if(G.seizedBy!==null){ toast('本轮先攻已被夺取'); return; } G.seizedBy=me.idx;
  finishAbility(me,card,{discard:true,log:`${pname(me.idx)} 序幕「脑叶间谍部门」：夺取先攻，弃置该卡`}); }
function abRecurCard(me,card,suit){ const mine=G.played.filter(pl=>pl.playerIdx===me.idx && pl.card.suit===suit && pl.mode!=='copy' && pl._return==null);
  if(!mine.length){ toast('你本回合没有正面打出该花色行动卡'); return; } const pl=mine[0]; pl._return=me.idx;
  finishAbility(me,card,{discard:true,log:`${pname(me.idx)} 序幕「${card.name}」：回合末将 ${SUITS[suit].name}${pl.card.number} 收回手牌，弃置该卡`}); }
function abFarseerDraw(me,card){ openCountModal('先知教团 · 连同本牌弃几张手牌？',0,me.hand.length,n=>{
    for(let k=0;k<n;k++){ let li=0; for(let j=1;j<me.hand.length;j++) if(cardRank(me.hand[j])<cardRank(me.hand[li])) li=j; G.discard.push(me.hand.splice(li,1)[0]); }
    const draw=n+1; let got=0; for(let k=0;k<draw;k++){ let c=null; if(G.discard.length) c=G.discard.shift(); else if(G.actionDeck.length) c=G.actionDeck.pop(); if(c){ me.hand.push(c); got++; } } sortHand(me);
    finishAbility(me,card,{discard:true,log:`${pname(me.idx)} 序幕「先知教团」：弃 ${n} 手牌+本牌，从弃牌堆底抽 ${got} 张`}); }); }
function abFarseerSwap(me,card){ const victims=rivalsOf(me).filter(p=>p.hand.length>0); if(!victims.length){ toast('没有有手牌的对手'); return; } if(!me.hand.length){ toast('你没有手牌可交换'); return; }
  pickPlayer('先知教团 · 查看对手手牌',victims,opp=>{
    pickFromList(`${opp.name} 的手牌（拿取 1 张）`,opp.hand.map(c=>({label:`${SUITS[c.suit].name}${c.number}`,val:c})),tc=>{
      pickFromList('给出你的 1 张手牌',me.hand.map(c=>({label:`${SUITS[c.suit].name}${c.number}`,val:c})),mc=>{
        opp.hand.splice(opp.hand.indexOf(tc),1); me.hand.splice(me.hand.indexOf(mc),1); me.hand.push(tc); opp.hand.push(mc); sortHand(me); sortHand(opp);
        finishAbility(me,card,{log:`${pname(me.idx)} 先知教团：与 ${opp.name} 交换 1 张手牌`}); }); }); }); }
function abStealGuildCard(me,card){ const victims=rivalsOf(me).filter(p=>stealableGuildCards(p).length>0); if(!victims.length){ toast('没有可偷取的公会卡'); return; }
  pickPlayer('偷取公会卡 · 选择对手',victims,opp=>{ pickFromList('选择偷取的公会卡',stealableGuildCards(opp).map(c=>({label:c.name,val:c})),c=>{
    const got=takeStolenGuildCard(opp,me,c);
    finishAbility(me,card,{discard:!!card,log:`${pname(me.idx)} 「${card?card.name:'勾心斗角'}」：从 ${opp.name} ${got?`偷取公会卡「${c.name}」`:`触发「${c.name}」守护——该卡置于议会牌堆底`}${card?'，弃置该卡':''}`}); }); }); }
function abStealAnyRes(me,card){ const victims=rivalsOf(me).filter(p=>totalRes(p)>0 && !ownsEff(p,'guardian')); if(!victims.length){ toast('没有可偷取资源的对手'); return; }
  pickPlayer('偷取资源 · 选择对手',victims,opp=>{ pickResource('选择偷取的资源',RES_ORDER.filter(r=>opp.res[r]>0),r=>{ opp.res[r]--; me.res[r]++;
    finishAbility(me,card,{discard:!!card,log:`${pname(me.idx)} 「${card?card.name:''}」：从 ${opp.name} 偷取 1 ${RESOURCES[r].name}${card?'，弃置该卡':''}`}); }); }); }
function abSilverTongue(me,card){ openModal(m=>{ m.appendChild(el('h2',null,'巧舌欺诈师 · 偷取目标'));
    const b1=el('button','btn','偷取 1 张公会卡'); b1.style.cssText='display:block;width:100%;margin:6px 0'; b1.onclick=()=>{ closeModal(); abStealGuildCard(me,card); };
    const b2=el('button','btn','偷取 1 个资源'); b2.style.cssText='display:block;width:100%;margin:6px 0'; b2.onclick=()=>{ closeModal(); abStealAnyRes(me,card); };
    m.appendChild(b1); m.appendChild(b2); const cc=el('button','btn ghost','取消'); cc.onclick=()=>closeModal(); m.appendChild(cc); }); }
function abBrokerGain(me,card){ ['material','fuel','weapon'].forEach(r=>gainResource(me,r));
  finishAbility(me,card,{discard:true,log:`${pname(me.idx)} 序幕「牙行行老」：获得 物资/燃料/武器 各 1，弃置该卡`}); }
function abRelicFence(me,card){ if((me._abil||{}).g24){ toast('「文物贩子」本回合已使用'); return; } const types=RES_ORDER.filter(r=>me.res[r]>0); if(!types.length){ toast('你没有可弃置的资源'); return; }
  pickResource('文物贩子 · 弃 1 资源换 1 遗物',types,r=>{ spendResource(me,r); gainResource(me,'relic',true);
    finishAbility(me,card,{oncePerTurn:'g24',log:`${pname(me.idx)} 「文物贩子」：弃置 1 ${RESOURCES[r].name}，获得 1 遗物`}); }); }
function abForcedLabor(me,card){ if(G.actionsLeft<=0){ toast('没有剩余行动'); return; } if(me.captives<=0){ toast('你没有俘虏'); return; }
  openCountModal('强制劳动 · 返还多少俘虏？',1,me.captives,n=>{ me.captives-=n; let left=n;
    const gainOne=()=>{ if(left<=0){ finishAbility(me,card,{action:true,log:`${pname(me.idx)} 强制劳动：返还 ${n} 俘虏，换取 ${n} 资源`}); return; }
      const types=RES_ORDER.filter(r=>G.resSupply[r]>0); if(!types.length){ finishAbility(me,card,{action:true,log:`${pname(me.idx)} 强制劳动：返还 ${n} 俘虏（资源供应不足）`}); return; }
      pickResource(`选择资源（剩余 ${left}）`,types,r=>{ gainResource(me,r); left--; gainOne(); }); };
    gainOne(); }); }
function abExecute(me,card){ if(G.actionsLeft<=0){ toast('没有剩余行动'); return; } if(me.captives<=0){ toast('你没有俘虏'); return; }
  openCountModal('处决 · 将多少俘虏移入战利品？',1,me.captives,n=>{ me.captives-=n; me.trophies+=n;
    finishAbility(me,card,{action:true,log:`${pname(me.idx)} 处决：${n} 名俘虏 → 战利品`}); }); }
function abKidnap(me,card){ if(G.actionsLeft<=0){ toast('没有剩余行动'); return; } const w=weaponIcons(me); const col=me.color.key; const opts=[];
  G.court.forEach(c=>{ for(const k in c.agents){ if(k!==col && c.agents[k]>0 && c.agents[k]<w) opts.push({card:c,col:k,n:c.agents[k]}); } });
  if(!opts.length){ toast(`没有可绑架目标（需对手密探数 < 你的武器标志 ${w}）`); return; }
  pickFromList('绑架 · 选择目标',opts.map(o=>{ const pl=G.players.find(p=>p.color.key===o.col); return {label:`「${o.card.name}」上 ${pl.name} 的 ${o.n} 密探`,val:o}; }),o=>{
    const victim=G.players.find(p=>p.color.key===o.col); victim.supply.agents+=o.n; me.captives+=o.n; delete o.card.agents[o.col];
    finishAbility(me,card,{action:true,log:`${pname(me.idx)} 绑架：俘获「${o.card.name}」上 ${victim.name} 的 ${o.n} 名密探`}); }); }
function abTrade(me,card){ if(G.actionsLeft<=0){ toast('没有剩余行动'); return; } const col=me.color.key; const opts=[];
  for(const id in G.map){ const s=G.map[id]; if(s.outOfPlay||s.kind!=='planet'||controllerOf(id)!==col) continue;
    s.pieces.buildings.forEach(b=>{ if(b.type==='city'&&b.owner!==col){ opts.push({id,owner:G.players.find(p=>p.color.key===b.owner),res:s.resource}); } }); }
  if(!opts.length){ toast('没有你控制的对手城市'); return; }
  pickFromList('交易 · 选择对手城市',opts.map(o=>({label:`${o.id}（${o.owner.name} 城市·产${RESOURCES[o.res].name}）`,val:o})),o=>{
    const giveTypes=RES_ORDER.filter(r=>me.res[r]>0 && (o.owner.res[r]||0)===0);
    if(!giveTypes.length){ toast('你没有「对方所没有的资源」可给'); return; }
    pickResource('给出一个对方没有的资源',giveTypes,gr=>{ me.res[gr]--; o.owner.res[gr]++; gainResource(me,o.res,true);
      finishAbility(me,card,{action:true,log:`${pname(me.idx)} 交易：给 ${o.owner.name} 1 ${RESOURCES[gr].name}，换得 1 ${RESOURCES[o.res].name}`}); }); }); }

function hasGuildAbilities(p){ return (p.guildCards||[]).some(c=>ACTIVE_ABILITIES[c.id]); }
function openGuildAbilities(){ const me=G.players[G.actor]; const list=[];
  (me.guildCards||[]).forEach(c=>{ const defs=ACTIVE_ABILITIES[c.id]; if(defs) defs.forEach(d=>list.push({c,d})); });
  openModal(m=>{ m.appendChild(el('h2',null,'议会卡能力'));
    m.appendChild(el('div','hintbox','序幕能力＝弃置该卡的一次性效果；行动型能力消耗 1 次行动。'));
    if(!list.length) m.appendChild(el('div','hintbox','你当前没有可主动使用的议会卡能力。'));
    list.forEach(({c,d})=>{ const isAction=(d.kind==='action'); const used=(d.run===abRelicFence&&(me._abil||{}).g24);
      const stashTag=(typeof c.eff==='string'&&c.eff.startsWith('cartel:')&&(c.stash|0)>0)?` <span style="color:var(--gold)">[已堆置 ${c.stash}，计入大亨]</span>`:'';
      const b=el('button','btn'); b.style.cssText='display:block;width:100%;margin:6px 0;text-align:left';
      const freshBlocked=(!d.kind&&c._freshlySecured); // 规则书 p.20：序幕中收纳的卡，不能在同一序幕窗口使用其序幕(一次性)能力
      b.innerHTML=`<b>${c.name}</b> · ${d.label}${stashTag}${freshBlocked?' <span style="opacity:.55;font-size:12px">（本序幕不可用）</span>':''}`;
      b.disabled=(isAction&&G.actionsLeft<=0)||used||freshBlocked;
      b.onclick=()=>{ closeModal(); d.run(me,c); }; m.appendChild(b); });
    const cc=el('button','btn ghost','关闭'); cc.onclick=()=>closeModal(); m.appendChild(cc); }); }

function openCountModal(title,min,max,cb){
  let v=max;
  openModal(m=>{ m.appendChild(el('h2',null,title));
    const row=el('div','row'); const val=el('span',null,''+v); val.style.cssText='font-size:24px;font-weight:800;min-width:36px;text-align:center';
    const minus=el('button','btn ghost','−'),plus=el('button','btn ghost','＋');
    minus.onclick=()=>{ v=Math.max(min,v-1); val.textContent=v; }; plus.onclick=()=>{ v=Math.min(max,v+1); val.textContent=v; };
    row.appendChild(minus); row.appendChild(val); row.appendChild(plus); m.appendChild(row);
    const ok=el('button','btn gold','确定'); ok.onclick=()=>{closeModal(); cb(v);}; m.appendChild(ok);
    const cc=el('button','btn ghost','取消'); cc.onclick=()=>closeModal(); m.appendChild(cc);
  });
}

function showStartScreen(){

    m.innerHTML='';

    const sg=el('div','seg');

    seg.appendChild(sg); m.appendChild(seg);
    for(let i=0;i<np;i++){
      const r=el('div','row');

    }

  draw();
}

    + sec('🎲 战斗骰', `<b style="color:#3b7fe2">突袭</b>(蓝)：6面有3面命中，稳定、无自损。<br><b style="color:#d6564f">强攻</b>(红)：高伤（含双命中）但多自损，含 1 面「拦截」。<br><b style="color:#d59a3e">劫掠</b>(橙)：命中建筑/用钥匙抢资源；可用条件：敌方在本系统有建筑，或敌方全图无任何建筑。<br>结算顺序：自损 → 拦截（受守方鲜活舰船数限制）→ 命中（先船后建筑）→ 建筑命中 → 钥匙抢资源。每击毁 1 艘敌舰得 1 <b>战利品</b>。`)
    + sec('🏆 雄心与计分', `主导/跟随打出数字 <b>2–6</b> 可声明对应雄心（4人局「7」可任选，「1」不可声明），取走<b>面值最高的未用标记</b>放入该雄心盒，并把该牌点数视为 0。<br>每章末按各<b>已声明</b>的雄心盒结算：该项数量<b>最多者得首位分</b>，次多者得次位分；并列首位各得次位分。<br>初始标记面值（声明越早拿到面值越高）：<b>5/3、3/2、2/0</b>；每章末翻面升级最低一枚（翻后最终为 9/5、6/4、4/2）。首位额外加成：建有 ≥4 城市 +2、≥5 城市 +5。<br>雄心项：${ambRows}。`)
    + sec('🧹 章节清理', `结算后：若本章结算过<b>军阀</b>，全体返还战利品；结算过<b>暴君</b>，全体返还俘虏。标记复位、重洗牌库、每人发 6 张，开始下一章。`);
    m.appendChild(box);
    const c=el('button','btn gold','明白了'); c.style.marginTop='10px'; c.onclick=()=>closeModal(); m.appendChild(c);
  });
}

  start(){

  },

  _show(i){
    if(i<0||i>=this.STEPS.length){ this._end(); return; }
    this.step=i;
    const s=this.STEPS[i];
    $('#tut-title').textContent=s.title;
    $('#tut-body').innerHTML=s.body;
    $('#tut-progress').textContent=`${i+1} / ${this.STEPS.length}`;
    $('#tut-prev').disabled=(i===0);
    $('#tut-next').textContent=(i===this.STEPS.length-1)?'开始游戏！🎮':'明白了 →';
    $('#tut-box').style.display='block';
    this._spotlight(s.sel, s.pos||'right');
  },

  _spotlight(sel, pos){
    $$('.tut-spot').forEach(e=>e.remove());
    const box=$('#tut-box'), bw=338, bh=310;
    const vw=window.innerWidth, vh=window.innerHeight;
    if(!sel){
      box.style.left=Math.max(8,(vw-bw)/2)+'px';
      box.style.top=Math.max(8,(vh-bh)/2)+'px'; return;
    }
    const target=document.querySelector(sel);
    if(!target){ box.style.left=Math.max(8,(vw-bw)/2)+'px'; box.style.top=Math.max(8,(vh-bh)/2)+'px'; return; }
    const r=target.getBoundingClientRect(), pad=8;
    const spot=document.createElement('div'); spot.className='tut-spot';
    spot.style.cssText=`left:${r.left-pad}px;top:${r.top-pad}px;width:${r.width+pad*2}px;height:${r.height+pad*2}px`;
    document.body.appendChild(spot);
    let bx, by;
    if(pos==='right')  { bx=r.right+16;        by=r.top; }
    else if(pos==='left') { bx=r.left-bw-16;   by=r.top; }
    else if(pos==='top')  { bx=r.left;          by=r.top-bh-16; }
    else if(pos==='bottom'){ bx=r.left;         by=r.bottom+16; }
    else                  { bx=(vw-bw)/2;       by=(vh-bh)/2; }
    bx=Math.max(8,Math.min(bx,vw-bw-8));
    by=Math.max(8,Math.min(by,vh-bh-8));
    box.style.left=bx+'px'; box.style.top=by+'px';
  },

  next(){ if(this.step===this.STEPS.length-1) this._end(); else this._show(this.step+1); },
  prev(){ if(this.step>0) this._show(this.step-1); },

  _end(){
    this.on=false;
    $('#tut-box').style.display='none';
    $('#tut-blocker').style.display='none';
    $$('.tut-spot').forEach(e=>e.remove());
    showStartScreen();
  }
};

  showStartScreen();
});
