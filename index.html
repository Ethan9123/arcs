/* ============ 扩展·新行动（领袖与传说，消耗 1 行动点）============
   每张「新行动」绑定一个基础行动类型(build/move/repair)，仅当本回合主导花色含该行动时可用（规则书：New Action）。*/
function expActionList(p){
  if(!G.useExpansion||!p||G.phase!=='actions'||!G.actionSuit) return [];
  const baseActs=SUITS[G.actionSuit].actions; const out=[];
  const has=(k)=>leaderHas(p,k)||loreHas(p,k);
  if(has('summon')&&baseActs.includes('build')) out.push({key:'summon',label:'📜工具祭司·召唤：在你控制且有你城市的系统建 1 舰（每回合一次）',used:!!(p._abil&&p._abil._summon)});
  if(has('nurture')&&baseActs.includes('build')) out.push({key:'nurture',label:'📜活体建筑·培育：课税你的 1 座忠诚城市'});
  if(has('prune')&&baseActs.includes('repair')) out.push({key:'prune',label:'📜活体建筑·修剪：忠诚城市↔太空港 互换'});
  if(has('martyr')&&baseActs.includes('move')) out.push({key:'martyr',label:'📜生存覆写·殉道：毁己方1新鲜舰→毁同系统1敌舰(战利品)'});
  if(has('firerifles')&&baseActs.includes('battle')) out.push({key:'firerifles',label:'📜银河步枪·步枪齐射：远程炮击相邻系统（突袭骰，先舰后建筑，不触发战斗事件）'});
  if(has('guide')&&baseActs.includes('move')) out.push({key:'guide',label:'📜力场光束·导引：从有新鲜忠诚星港的系统移动任意舰（含非忠诚，忽略移动修正）'});
  if(has('annex')&&baseActs.includes('build')&&ambitionDeclared('tyrant')) out.push({key:'annex',label:'👑暴君权威·吞并：你控制的城/港换为忠诚（暴君宣告中）'});
  return out;
}
function hasExpActions(p){ return expActionList(p).length>0; }
function openExpActions(){
  const me=G.players[G.actor]; const list=expActionList(me);
  openModal(m=>{ m.appendChild(el('h2',null,'扩展新行动 · 领袖/传说'));
    m.appendChild(el('div','hintbox','领袖/传说卡提供的「新行动」，每个消耗 1 次行动（须本回合主导花色含对应基础行动）。'));
    if(!list.length) m.appendChild(el('div','hintbox','当前没有可用的扩展新行动。'));
    list.forEach(it=>{ const b=el('button','btn'); b.style.cssText='display:block;width:100%;margin:6px 0;text-align:left';
      b.innerHTML=it.label+(it.used?' <span style="opacity:.55;font-size:12px">（本回合已用）</span>':'');
      b.disabled=(G.actionsLeft<=0)||it.used;
      b.onclick=()=>{ closeModal(); EXP_ACTION_RUN[it.key](me); }; m.appendChild(b); });
    const cc=el('button','btn ghost','关闭'); cc.onclick=()=>closeModal(); m.appendChild(cc);
  });
}
function expSysBrief(id){ const s=G.map[id];
  const ships=Object.entries(s.pieces.ships).filter(([c,n])=>n>0).map(([c,n])=>`${(PCOLORS.find(p=>p.key===c)||{name:c}).name}舰${n}`).join(' ');
  const blds=s.pieces.buildings.map(b=>`${(PCOLORS.find(p=>p.key===b.owner)||{name:b.owner}).name}${b.type==='city'?'城':'港'}`).join(' ');
  return [s.resource?RESOURCES[s.resource].name:'', ships, blds].filter(Boolean).join(' · '); }
function expPickSystem(title, hint, ids, cb){
  if(!ids.length){ toast('没有合法目标'); return; }
  openModal(m=>{ m.appendChild(el('h2',null,title)); if(hint) m.appendChild(el('div','hintbox',hint));
    ids.forEach(id=>{ const b=el('button','btn',`${id}　${expSysBrief(id)}`); b.style.cssText='display:block;width:100%;margin:5px 0;text-align:left';
      b.onclick=()=>{ closeModal(); cb(id); }; m.appendChild(b); });
    const cc=el('button','btn ghost','取消'); cc.onclick=()=>closeModal(); m.appendChild(cc);
  });
}
// 殉道：在系统 id 牺牲己方 1 新鲜舰，摧毁敌色 ec 的 1 舰（计入战利品）。抽出供测试。
function martyrResolve(me, id, ec){
  const s=G.map[id]; const col=me.color.key;
  s.pieces.ships[col]--; me.supply.ships++;                 // 己方新鲜舰 → 归还补给（不成战利品）
  const ep=G.players.find(p=>p.color.key===ec);
  s.pieces.ships[ec]--; const ed=dmgMap(s);                 // 敌舰 −1（优先保留新鲜被毁：仅当受损数超过总数才下调）
  if((ed[ec]||0)>s.pieces.ships[ec]) ed[ec]=s.pieces.ships[ec];
  if(s.pieces.ships[ec]<=0){ delete s.pieces.ships[ec]; if(ed[ec]!=null) delete ed[ec]; }
  if(ep) ep.supply.ships++; me.trophies++;
  return ep;
}
// 修剪：把系统 id 内你的忠诚建筑 b 改为另一类型（受补给限制）。抽出供测试。
function pruneSwap(me, b){ const to=b.type==='city'?'starport':'city';
  if((to==='city'?me.supply.cities:me.supply.starports)<=0) return false;
  if(b.type==='city') me.supply.cities++; else me.supply.starports++;
  b.type=to; b.damaged=false;
  if(to==='city') me.supply.cities--; else me.supply.starports--; return true; }
const EXP_ACTION_RUN={
  summon(me){ const col=me.color.key;
    if(me.supply.ships<=0){ toast('没有可用舰船补给'); return; }
    const ids=controlledSystems(me).filter(id=>G.map[id].pieces.buildings.some(b=>b.owner===col&&b.type==='city'));
    expPickSystem('召唤 · 选择系统','在你控制且有你城市的系统建造 1 艘舰船。', ids, id=>{
      addShips(id,me,1,false); if(!me._abil)me._abil={}; me._abil._summon=true;
      consumeAction(`${pname(G.actor)} 工具祭司·召唤：在 ${id} 建造 1 艘舰船`); });
  },
  nurture(me){ const col=me.color.key; const ids=[];
    for(const id in G.map){ const s=G.map[id]; if(s.outOfPlay) continue;
      if(s.pieces.buildings.some(b=>b.owner===col&&b.type==='city') && isLoyalSystem(id,me) && s.resource && G.resSupply[s.resource]>0) ids.push(id); }
    expPickSystem('培育 · 课税忠诚城市','选择你的 1 座忠诚城市课税（获得该行星资源）。', ids, id=>{
      const s=G.map[id]; let msg=`${pname(G.actor)} 活体建筑·培育：课税 ${id}`;
      if(gainResource(me,s.resource)) msg+=`，获得 ${RESOURCES[s.resource].name}`; consumeAction(msg); });
  },
  prune(me){ const col=me.color.key; const opts=[];
    for(const id in G.map){ const s=G.map[id]; if(s.outOfPlay) continue;
      s.pieces.buildings.forEach(b=>{ if(b.owner===col){ const to=b.type==='city'?'starport':'city';
        if((to==='city'?me.supply.cities:me.supply.starports)>0) opts.push({id,b}); } }); }
    if(!opts.length){ toast('没有可互换的忠诚建筑（或缺少对应补给）'); return; }
    openModal(m=>{ m.appendChild(el('h2',null,'修剪 · 城市↔太空港 互换'));
      m.appendChild(el('div','hintbox','选择你的 1 座忠诚建筑，替换为另一种类型（受补给限制）。'));
      opts.forEach(o=>{ const b=el('button','btn',`${o.id}：${o.b.type==='city'?'城市→太空港':'太空港→城市'}`); b.style.cssText='display:block;width:100%;margin:5px 0;text-align:left';
        b.onclick=()=>{ closeModal(); const to=o.b.type==='city'?'太空港':'城市'; if(pruneSwap(me,o.b)) consumeAction(`${pname(G.actor)} 活体建筑·修剪：${o.id} 的建筑改为${to}`); };
        m.appendChild(b); });
      const cc=el('button','btn ghost','取消'); cc.onclick=()=>closeModal(); m.appendChild(cc);
    });
  },
  martyr(me){ const col=me.color.key; const ids=[];
    for(const id in G.map){ const s=G.map[id]; if(s.outOfPlay) continue;
      if(freshShips(s,col)>0 && Object.keys(s.pieces.ships).some(c=>c!==col&&s.pieces.ships[c]>0)) ids.push(id); }
    expPickSystem('殉道 · 选择系统','摧毁你 1 艘新鲜舰，以摧毁该系统 1 艘敌舰（计入战利品）。', ids, id=>{
      const s=G.map[id]; const enemies=Object.keys(s.pieces.ships).filter(c=>c!==col&&s.pieces.ships[c]>0);
      const fin=(ec)=>{ const ep=martyrResolve(me,id,ec); consumeAction(`${pname(G.actor)} 生存覆写·殉道：在 ${id} 牺牲 1 舰，摧毁 ${ep?ep.name:ec} 1 舰（+1 战利品）`); };
      if(enemies.length===1) fin(enemies[0]);
      else openModal(m=>{ m.appendChild(el('h2',null,'殉道 · 选择摧毁的敌方'));
        enemies.forEach(ec=>{ const pl=G.players.find(p=>p.color.key===ec); const b=el('button','btn',pl?pl.name:ec); b.style.cssText='display:block;margin:5px 0';
          b.onclick=()=>{ closeModal(); fin(ec); }; m.appendChild(b); });
        const cc=el('button','btn ghost','取消'); cc.onclick=()=>closeModal(); m.appendChild(cc); }); });
  },
  guide(me){ const col=me.color.key;
    const sources=Object.keys(G.map).filter(id=>{
      const s=G.map[id]; if(s.outOfPlay) return false;
      return s.pieces.buildings.some(b=>b.owner===col&&b.type==='starport'&&!b.damaged)
        && Object.values(s.pieces.ships).some(n=>n>0);
    });
    expPickSystem('力场光束·导引 · 选择源系统','选择含你新鲜忠诚星港的系统（从该系统移动任意舰船，忽略移动修正）。', sources, src=>{
      const s=G.map[src];
      const adj=(s.neighbors||[]).filter(nb=>G.map[nb]&&!G.map[nb].outOfPlay);
      if(!adj.length){ toast('该系统无相邻系统'); return; }
      const shipColors=Object.keys(s.pieces.ships).filter(c=>s.pieces.ships[c]>0);
      if(!shipColors.length){ toast('该系统无舰船'); return; }
      const pickColorThenCount=c=>{
        const total=s.pieces.ships[c]; const plName=(G.players.find(p=>p.color.key===c)||{name:c}).name;
        openCountModal(`导引：移动 ${plName} 舰（共 ${total} 艘）`,1,total,n=>{
          expPickSystem(`导引 · 目标系统（从 ${src}）`,`将 ${n} 艘 ${plName} 舰移入相邻系统。`, adj, dst=>{
            const owner=G.players.find(p=>p.color.key===c)||{color:{key:c},supply:{ships:9999}};
            moveShips(src,dst,owner,n); SFX.move();
            consumeAction(`${pname(G.actor)} 力场光束·导引：${n} 艘 ${plName} 舰 ${src}→${dst}`);
          });
        });
      };
      if(shipColors.length===1){ pickColorThenCount(shipColors[0]); return; }
      openModal(m2=>{ m2.appendChild(el('h2',null,'导引 · 选择舰色'));
        m2.appendChild(el('div','hintbox','选择本次导引移动的舰船颜色。'));
        shipColors.forEach(c=>{ const pl=G.players.find(p=>p.color.key===c);
          const b=el('button','btn',`${pl?pl.name:c}（${s.pieces.ships[c]} 艘）`); b.style.cssText='display:block;width:100%;margin:5px 0';
          if(pl) b.style.background=pl.color.css;
          b.onclick=()=>{ closeModal(); pickColorThenCount(c); }; m2.appendChild(b); });
        const cc=el('button','btn ghost','取消'); cc.onclick=()=>closeModal(); m2.appendChild(cc); });
    });
  },
  firerifles(me){ const col=me.color.key;
    const sources=Object.keys(G.map).filter(id=>{
      const s=G.map[id]; if(s.outOfPlay) return false; return freshShips(s,col)>0;
    });
    expPickSystem('步枪齐射 · 选择源系统','选择有你新鲜忠诚舰的系统（每艘提供 1 颗突袭骰）。', sources, src=>{
      const s=G.map[src]; const numDice=freshShips(s,col);
      const adj=(s.neighbors||[]).filter(nb=>G.map[nb]&&!G.map[nb].outOfPlay);
      if(!adj.length){ toast('该系统无相邻系统'); return; }
      expPickSystem('步枪齐射 · 选择目标系统',`将掷 ${numDice} 颗突袭骰，每 ✷ 造 1 击（先舰后建筑，不触发战斗事件）。`, adj, dst=>{
        const ds=G.map[dst];
        const defColors=[...new Set([
          ...Object.keys(ds.pieces.ships).filter(c=>ds.pieces.ships[c]>0),
          ...ds.pieces.buildings.map(b=>b.owner)
        ])].filter(c=>c!==col);
        if(!defColors.length){ toast('目标系统无可攻击对象'); return; }
        const doFire=defC=>{
          const defP=G.players.find(p=>p.color.key===defC);
          let hits=0;
          for(let i=0;i<numDice;i++){ const f=DICE.skirmish.faces[Math.floor(Math.random()*DICE.skirmish.faces.length)]; hits+=f.hit||0; }
          const shipR=applyShipHits(dst,defC,hits,me);
          const bldR=damageBuildings(dst,defC,shipR.overflow,me);
          let msg=`${pname(G.actor)} 银河步枪·步枪齐射：${src}→${dst}，掷 ${numDice} 骰命中 ${hits} 次；${defP?defP.name:defC} 受损 ${shipR.damaged}/被毁 ${shipR.destroyed} 舰，摧毁建筑 ${bldR.destroyed}`;
          (bldR.outrages||[]).forEach(o=>{ msg+=`<br><b style="color:#e0703a">⚑ 摧毁城市→民愤</b>：${o.msg}`; });
          logMsg(msg,'bat');
          if(shipR.destroyed>0||bldR.destroyed>0) SFX.destroy(); else if(shipR.damaged>0) SFX.hit();
          consumeAction(null);
        };
        if(defColors.length===1){ doFire(defColors[0]); return; }
        openModal(m2=>{ m2.appendChild(el('h2',null,'步枪齐射 · 选择防御者'));
          m2.appendChild(el('div','hintbox','选择本次炮击针对的目标颜色。'));
          defColors.forEach(c=>{ const pl=G.players.find(p=>p.color.key===c);
            const bldCount=ds.pieces.buildings.filter(bld=>bld.owner===c).length;
            const btn=el('button','btn',`${pl?pl.name:c}（舰 ${ds.pieces.ships[c]||0} / 建筑 ${bldCount}）`); btn.style.cssText='display:block;width:100%;margin:5px 0';
            if(pl) btn.style.background=pl.color.css;
            btn.onclick=()=>{ closeModal(); doFire(c); }; m2.appendChild(btn); });
          const cc=el('button','btn ghost','取消'); cc.onclick=()=>closeModal(); m2.appendChild(cc); });
      });
    });
  },
  annex(me){ const col=me.color.key;
    if(!ambitionDeclared('tyrant')){ toast('需暴君已宣告'); return; }
    const opts=[]; controlledSystems(me).forEach(id=>{ const s=G.map[id];
      s.pieces.buildings.forEach(b=>{ if(b.owner!==col && (b.type==='city'?me.supply.cities:me.supply.starports)>0) opts.push({id,b}); }); });

/* 战役开局：逐玩家选命运 → 创建战役 G + 自动存档。地基阶段不启用幕流程，命运与持久化先就绪。 */
function startCampaignSetup(np, names, setupV){
  const m=$('#modal'); const w=$('#modalWrap'); w.style.display='flex';
  const pool = CAMPAIGN_FATES.map(f=>f.num);
  const chosen = [];
  const launch=()=>{
    w.style.display='none';
    const label='战役·'+names.slice(0,np).map((n,i)=>n||PCOLORS[i].name).join('/');
    newGame(np, names.slice(0,np), false, setupV, {fates:chosen.slice(0,np), label});
    campSetupImperialCouncil(); // 战役：帝国议会入宫廷
    // 第一幕开局设置：逐玩家执行其命运 Act I setup（有脚本者自动执行，无脚本者待 P9 编码）
    G.players.forEach((p,i)=>campRunActSetup(i));
    saveCampaignSlot('auto', label);
    render();
    toast('战役已创建并自动存档（第一幕已就绪；幕结算见状态栏 📜）');
  };
  const step=(pi)=>{
    if(pi>=np){ launch(); return; }
    openModal(mm=>{
      mm.appendChild(el('h2',null,`命运选择 · ${names[pi]||PCOLORS[pi].name+'方'}（${pi+1}/${np}）`));
      mm.appendChild(el('div','hintbox','选择你的命运（Fate）。复杂度 ●○○~●●● 表示机制深度。点卡名旁「图」可看卡面。'));
      const grid=el('div'); grid.style.cssText='max-height:56vh;overflow:auto;display:grid;grid-template-columns:1fr 1fr;gap:6px';
      pool.forEach(num=>{ const f=fateByNum(num);
        const b=el('button','btn'); b.style.cssText='display:block;text-align:left;padding:8px;margin:0;line-height:1.4';
        b.innerHTML=`<b>${f.cn}</b> <span style="opacity:.55;font-size:11px">${f.en}</span> <span style="color:#d9b25a">${fateStars(f.cx)}</span>`+
          `<br><span style="font-size:11px;opacity:.8">${f.theme.length>54?f.theme.slice(0,54)+'…':f.theme}</span>`;
        b.onclick=()=>{ chosen.push(num); pool.splice(pool.indexOf(num),1); closeModal(); step(pi+1); };
        grid.appendChild(b);
      });
      mm.appendChild(grid);
      const rnd=el('button','btn ghost','🎲 余下玩家随机分配并开始');
      rnd.style.cssText='width:100%;margin-top:8px';
      rnd.onclick=()=>{ while(chosen.length<np && pool.length){ const k=Math.floor(Math.random()*pool.length); chosen.push(pool.splice(k,1)[0]); } closeModal(); launch(); };
      mm.appendChild(rnd);
      const back=el('button','btn ghost','返回'); back.onclick=()=>{ closeModal(); showStartScreen(); };
      mm.appendChild(back);
    });
  };
  step(0);
}
/* 战役进度面板：当前幕/首席摄政/帝国信托/律法书 + 各玩家命运三幕进度 + 幕结算向导 */
function openCampaignPanel(){
  if(!G.campaign || !G.campaign.enabled) return;
  const cp=G.campaign;
  openModal(m=>{
    m.appendChild(el('h2',null,`📜 凋敝远疆战役 · 第 ${cp.act} 幕`));
    // 顶部状态
    const st=el('div','hintbox'); st.style.cssText='text-align:left';
    let stHtml=`场次 ${cp.session} · 第 ${cp.act}/3 幕`;
    if(cp.firstRegentIdx!=null && G.players[cp.firstRegentIdx]) stHtml+=` · 首席摄政：<b style="color:${G.players[cp.firstRegentIdx].color.css}">${G.players[cp.firstRegentIdx].name}</b>`;
    // 帝国议会状态
    const councilTxt = cp.council==='decided'
      ? `已裁决（持有者 ${cp.councilHolder!=null&&G.players[cp.councilHolder]?G.players[cp.councilHolder].name:'?'}，回合末结算）`
      : '会期中（议会区可攫取）';
    stHtml+=`<br>帝国议会：${councilTxt}`;
    const trust=RES_ORDER.filter(r=>cp.trust[r]>0).map(r=>`${RESOURCES[r].icon}${cp.trust[r]}`).join(' ');
    stHtml+=`<br>帝国信托：${trust||'（空）'}`;
    const pol=EDICT_POLICIES[campCurrentPolicy()];
    stHtml+=`<br>当前敕令政策：<b style="color:#d9b25a">${pol?pol.name:'—'}</b>`;
    const empSys=campEmpireSystems();
    if(empSys.length) stHtml+=`<br>帝国控制：${empSys.length} 系统 / ${campEmpireClustersControlled()} 星团（${empSys.join(' ')}）`;
    st.innerHTML=stHtml; m.appendChild(st);

      b.onclick=()=>{ campChangePolicy(k); closeModal(); openCampaignPanel(); }; pr.appendChild(b); });

    const eb=el('button','btn ghost sm','⚖ 立即结算敕令（当前政策）'); eb.style.cssText='width:100%;margin:4px 0';
    eb.onclick=()=>{ campResolveEdict(); render(); closeModal(); openCampaignPanel(); }; m.appendChild(eb);

    const sb=el('button','btn ghost sm','🕊 召开峰会（交易/好感/转正）'); sb.style.cssText='width:100%;margin:0 0 4px';
    sb.onclick=()=>{ closeModal(); openSummitModal(G.initiative); }; m.appendChild(sb);

    bb.innerHTML='<b style="color:#9a6fd0">☣ 凋敝 Blight</b><br>'+(blighted.length
      ? blighted.map(id=>`${id}：${blightFresh(G.map[id])}新鲜/${blightTotal(G.map[id])}总`).join('　')

    clb.onclick=()=>{ campAddBlightToCluster(Math.floor(Math.random()*6)+1); render(); closeModal(); openCampaignPanel(); }; br.appendChild(clb);
    const rb2=el('button','btn ghost sm','修复受损凋敝'); rb2.onclick=()=>{ campRepairAllBlight(); render(); closeModal(); openCampaignPanel(); }; br.appendChild(rb2);
    const cb2=el('button','btn ghost sm','★结算凋敝危机'); cb2.onclick=()=>{ campResolveBlightCrisis(); render(); closeModal(); openCampaignPanel(); }; br.appendChild(cb2);

    fb.innerHTML='<b style="color:#d9b25a">✦ 旗舰 Flagship</b><br>'+(fsPlayers.length
      ? fsPlayers.map(i=>{ const f=G.players[i].flagship; const dmg=Object.values(f.up).filter(v=>v==='damaged').length;
          return `${pname(i)} @ ${f.sys}${dmg?`（${dmg} 升级受损）`:'（全新鲜）'}`; }).join('<br>')
      : '暂无玩家持有旗舰（命运9-18 通过旗舰布置获得）');

    // 维和者(15)：停火标记

    // 门魅(22)：通道 + 扭曲通道控制
    G.players.forEach((p,i)=>{ if(p.fate!==22) return; const row=el('div','row'); row.style.cssText='gap:5px;flex-wrap:wrap;align-items:center';

      const ap=el('button','btn ghost sm','星门放通道'); ap.onclick=()=>{ closeModal(); pickFromList('哪个星门放通道',[1,2,3,4,5,6].map(c=>({label:'G'+c,val:'G'+c})),id=>{ campPlaceMark('passage',i,id); openCampaignPanel(); }); }; row.appendChild(ap);
      const tc=el('button','btn ghost sm','切换扭曲通道控制'); tc.onclick=()=>{ G.campaign.twistedCtrl=campControlsTwisted(i)?null:i; reopen(); }; row.appendChild(tc);
      m.appendChild(row); });
    // 阴谋家(23)：阴谋结算(可正可负)
    G.players.forEach((p,i)=>{ if(p.fate!==23) return; const row=el('div','row'); row.style.cssText='gap:5px;flex-wrap:wrap;align-items:center';
      row.appendChild(el('span',null,`🕵${pname(i)} 计时${p.fateProgress||0}：`));
      [['猜中+1',1],['猜错-1',-1]].forEach(([lab,dv])=>{ const b=el('button','btn ghost sm',lab); b.onclick=()=>{ campFire('conspiracyScore',{playerIdx:i,delta:dv}); reopen(); }; row.appendChild(b); });
      m.appendChild(row); });
    // 各玩家命运三幕进度
    const roman=['Ⅰ','Ⅱ','Ⅲ'];
    G.players.forEach((p,i)=>{ if(!p.fate) return; const f=fateByNum(p.fate); if(!f) return;
      const card=el('div','hintbox'); card.style.cssText='text-align:left;margin:5px 0';
      const idTag=p.identity==='outlaw'?'⚑法外':'👑摄政';
      const objs=f.acts.map((o,ai)=>{ if(!o) return '';
        const done=p.fateObjMet[ai]?'✓':(ai+1===cp.act?'▶':'○');
        const col=p.fateObjMet[ai]?'#6fcf8e':(ai+1===cp.act?'#d9b25a':'#7f8ea8');
        return `<div style="color:${col};font-size:11.5px;line-height:1.5">${done} 第${roman[ai]}幕：${o}</div>`;

      // 当前幕进度：计时型显示 进度/阈值 进度条；非计时型显示达成判定

          `<span style="display:inline-block;width:120px;height:7px;background:#222c44;border-radius:4px;vertical-align:middle;margin-left:6px;overflow:hidden">`+
          `<span style="display:block;height:100%;width:${pct}%;background:${(p.fateProgress||0)>=th?'#6fcf8e':'#d9b25a'}"></span></span></div>`;

        const met=campObjectiveMet(i); prog=`<div style="margin-top:3px;font-size:11px;color:${met?'#6fcf8e':'#7f8ea8'}">本幕目标：${met?'✓ 已达成':'○ 未达成'}</div>`;

      const vic=p._campVictory?' <span style="color:#ffd700">🏆战役胜利</span>':'';
      card.innerHTML=`<b style="color:${p.color.css}">${p.name}</b> · <span style="color:#c98bd6">${f.cn}</span> <span style="opacity:.7;font-size:11px">${idTag}</span>${vic}${ACT_SCRIPTS[p.fate]?'':' <span style="opacity:.5;font-size:10px">(脚本待编码)</span>'}<br>${objs}${prog}`;
      m.appendChild(card);
    });
    // 操作：结算本幕
    if(cp.act<3){
      const rb=el('button','btn gold',`结算第 ${cp.act} 幕并进入第 ${cp.act+1} 幕`); rb.style.cssText='width:100%;margin-top:8px';
      rb.onclick=()=>{ closeModal(); openActResolveWizard(); };
      m.appendChild(rb);
    } else {
      m.appendChild(el('div','hintbox','第 3 幕为战役终局幕，达成第三幕目标即触发终局结算（终局判定见后续阶段）。'));
    }
    const cc=el('button','btn ghost','关闭'); cc.onclick=()=>closeModal(); m.appendChild(cc);
  });
}
/* 幕结算向导：逐玩家询问本幕目标是否达成（半自动·关键确认），自动执行对应成功/失败分支后推进 */
function openActResolveWizard(){
  const cp=G.campaign; const act=cp.act;
  const fatePlayers=G.players.map((p,i)=>i).filter(i=>G.players[i].fate);
  const step=(k)=>{
    if(k>=fatePlayers.length){
      // 全员判定完毕 → 执行中场休息 A–F，再展示摘要与「选命运」(F)
      const summary=campIntermission();
      render();
      openModal(m=>{ m.appendChild(el('h2',null,`🔄 中场休息 · 已进入第 ${G.campaign.act} 幕`));
        const box=el('div','hintbox'); box.style.cssText='text-align:left;font-size:12px;line-height:1.7';
        box.innerHTML=(summary||[]).join('<br>'); m.appendChild(box);
        m.appendChild(el('div','hintbox','F·选命运：达成者抽1张、失败者抽2张选1（数字版可在下方为玩家改选命运，或保留当前命运）。'));
        const fb=el('button','btn','🎴 重选命运（F）'); fb.style.cssText='width:100%;margin:4px 0';
        fb.onclick=()=>{ closeModal(); openFateReChoose(); }; m.appendChild(fb);
        const ok=el('button','btn gold','保留当前命运，继续'); ok.style.cssText='width:100%';
        ok.onclick=()=>{ closeModal(); G.players.forEach((p,i)=>campRunActSetup(i)); render(); openCampaignPanel(); }; m.appendChild(ok); });
      return;
    }
    const pi=fatePlayers[k]; const p=G.players[pi]; const f=fateByNum(p.fate);
    const sc=fateActScript(p.fate, act);
    openModal(m=>{
      m.appendChild(el('h2',null,`第 ${act} 幕结算 · ${p.name}`));
      m.appendChild(el('div','hintbox',`<b style="color:#c98bd6">${f?f.cn:''}</b> 第 ${act} 幕目标：<br><span style="font-size:12px;line-height:1.6">${(f&&f.acts[act-1])||'（无）'}</span>`));
      // 引擎自动判定提示（半自动：玩家确认）
      const autoMet=campObjectiveMet(pi); const th=fateThresholdCur(pi);
      const judgeTxt = (th!=null) ? `引擎判定：进度 ${p.fateProgress||0}/${th} → ${autoMet?'达成 ✓':'未达成 ✗'}`
        : (FATE_OBJECTIVE_CHECK[p.fate]&&FATE_OBJECTIVE_CHECK[p.fate][act]) ? `引擎判定：${autoMet?'达成 ✓':'未达成 ✗'}`
        : '此命运本幕无自动判定（请按桌面规则人工裁定）';
      const jb=el('div','hintbox'); jb.style.cssText=`text-align:left;border-left:3px solid ${autoMet?'#6fcf8e':'#d9b25a'}`; jb.innerHTML=`<b>${judgeTxt}</b>`; m.appendChild(jb);
      if(!sc) m.appendChild(el('div','hintbox','此命运幕脚本尚未编码（后续阶段补齐）。可记录达成与否，暂不自动增删卡库。'));
      const yes=el('button','btn gold','✓ 达成目标（成功）'); yes.style.cssText='display:block;width:100%;margin:6px 0';
      yes.onclick=()=>{ campResolveActForPlayer(pi,true); closeModal(); step(k+1); };
      const no=el('button','btn','✗ 未达成（失败）'); no.style.cssText='display:block;width:100%;margin:6px 0';
      no.onclick=()=>{ campResolveActForPlayer(pi,false); closeModal(); step(k+1); };
      m.appendChild(yes); m.appendChild(no);
      const cancel=el('button','btn ghost','取消结算'); cancel.onclick=()=>closeModal(); m.appendChild(cancel);
    });
  };
  step(0);
}
/* 峰会模态框：主持人(host)可行召集令动作；任意玩家经同意行谈判动作。热座下由玩家协商，引擎执行结果。 */
function openSummitModal(hostIdx){
  if(!G.campaign||!G.campaign.enabled) return;
  const others=i=>G.players.map((p,j)=>j).filter(j=>j!==i);
  const refresh=()=>{ closeModal(); openSummitModal(hostIdx); };
  openModal(m=>{
    m.appendChild(el('h2',null,`🕊 峰会 · 主持：${pname(hostIdx)}`));
    // 好感概览
    const fv=el('div','hintbox'); fv.style.cssText='text-align:left;font-size:11.5px';
    fv.innerHTML='<b>好感持有</b>（你命运卡上的对手密探）：<br>'+G.players.map((p,i)=>{
      const f=campFavorsOf(p); const t=campFavorsTotal(p);
      const det=Object.keys(f).filter(k=>f[k]>0).map(k=>`${(PCOLORS.find(c=>c.key===k)||{name:k}).name}×${f[k]}`).join('、');
      return `${pname(i)}：${t?det:'—'}`; }).join('<br>');
    m.appendChild(fv);
    const mkBtn=(label,cb)=>{ const b=el('button','btn ghost sm',label); b.style.cssText='display:block;width:100%;margin:3px 0;text-align:left'; b.onclick=cb; return b; };

    const coTitle=el('div'); coTitle.style.cssText='color:#d9b25a;font-weight:700;margin:6px 0 2px'; coTitle.textContent='召集令动作（主持人）'; m.appendChild(coTitle);
    if(G.campaign.council==='decided') m.appendChild(mkBtn('向议会请愿：翻回会期中',()=>{ campPetitionCouncil(); render(); refresh(); }));
    if(G.players[hostIdx].identity==='regent') m.appendChild(mkBtn('脱离帝国：你翻为法外者',()=>{ campLeaveEmpire(hostIdx); render(); refresh(); }));
    if(!G.players.some(p=>p.identity==='regent')) m.appendChild(mkBtn('复兴帝国：成为摄政并取首席摄政',()=>{ campReviveEmpire(hostIdx); render(); refresh(); }));
    // 归还好感（迫使）：选一名你持有其好感的对手，退1迫其行动
    others(hostIdx).filter(j=>(campFavorsOf(G.players[hostIdx])[G.players[j].color.key]||0)>0).forEach(j=>{
      m.appendChild(mkBtn(`归还 ${pname(j)} 1 好感（迫使其执行 1 谈判动作）`,()=>{ campReturnFavor(hostIdx,j,1); render(); refresh(); })); });
    // —— 谈判动作（任意玩家，经同意）——
    const ngTitle=el('div'); ngTitle.style.cssText='color:#7fd4c4;font-weight:700;margin:8px 0 2px'; ngTitle.textContent='谈判动作（经被影响方同意）'; m.appendChild(ngTitle);
    m.appendChild(mkBtn('许诺好感：A 给 B 1 密探（置于 B 命运卡）',()=>openSummitPick('promise',hostIdx,refresh)));
    m.appendChild(mkBtn('转移资产：俘虏/战利品/好感/资源',()=>openSummitPick('transfer',hostIdx,refresh)));
    m.appendChild(mkBtn('让渡控制：地图忠诚棋子换为对手同类',()=>openSummitPick('cede',hostIdx,refresh)));
    m.appendChild(mkBtn('委派权柄：议会卡上密探换为对手',()=>openSummitPick('delegate',hostIdx,refresh)));
    if(G.campaign.firstRegentIdx===hostIdx) m.appendChild(mkBtn('招纳入帝国：法外者翻为摄政（首席摄政）',()=>openSummitPick('invite',hostIdx,refresh)));
    const cc=el('button','btn gold','结束峰会'); cc.style.cssText='width:100%;margin-top:8px'; cc.onclick=()=>{ closeModal(); render(); }; m.appendChild(cc);
  });
}
// 峰会谈判动作的目标选择器
function openSummitPick(kind, hostIdx, back){
  const ps=G.players.map((p,i)=>i);
  const pickTwo=(title,cb)=>{ // 选 from → to
    openModal(m=>{ m.appendChild(el('h2',null,title));
      m.appendChild(el('div','hintbox','选择「给予方」：'));
      ps.forEach(i=>{ const b=el('button','btn',pname(i)); b.style.cssText='display:block;width:100%;margin:3px 0;background:'+G.players[i].color.css;
        b.onclick=()=>{ closeModal(); openModal(m2=>{ m2.appendChild(el('h2',null,'选择「接收方」'));
          ps.filter(j=>j!==i).forEach(j=>{ const b2=el('button','btn',pname(j)); b2.style.cssText='display:block;width:100%;margin:3px 0;background:'+G.players[j].color.css;
            b2.onclick=()=>{ closeModal(); cb(i,j); }; m2.appendChild(b2); });
          const x=el('button','btn ghost','返回'); x.onclick=()=>{ closeModal(); back&&back(); }; m2.appendChild(x); }); };
        m.appendChild(b); });
      const x=el('button','btn ghost','返回'); x.onclick=()=>{ closeModal(); back&&back(); }; m.appendChild(x);
    });
  };
  if(kind==='promise'){ pickTwo('许诺好感',(a,b)=>{ if(!campPromiseFavor(a,b)) toast('给予方无可用密探'); render(); back&&back(); }); }
  else if(kind==='invite'){ const outlaws=G.players.map((p,i)=>i).filter(i=>G.players[i].identity==='outlaw');
    if(!outlaws.length){ toast('没有法外者可招纳'); back&&back(); return; }
    pickFromList('招纳哪名法外者入帝国',outlaws.map(i=>({label:pname(i),val:i})),i=>{ campInviteToEmpire(hostIdx,i); render(); back&&back(); }); }
  else if(kind==='transfer'){ pickTwo('转移资产',(a,b)=>{
    const opts=[]; if(G.players[a].captives>0) opts.push({label:'俘虏',val:['captive']});
    if(G.players[a].trophies>0) opts.push({label:'战利品',val:['trophy']});

  else if(kind==='cede'){ pickTwo('让渡控制',(a,b)=>{
    const ac=G.players[a].color.key; const opts=[];
    for(const id in G.map){ const s=G.map[id]; if(s.outOfPlay) continue;

  else if(kind==='delegate'){ pickTwo('委派权柄',(a,b)=>{
    const ac=G.players[a].color.key; const cards=G.court.filter(c=>c&&c.agents&&(c.agents[ac]||0)>0);

/* 中场休息 F·选命运：逐玩家保留或改选命运，最后统一运行新幕开局设置 */
function openFateReChoose(){
  const order=G.players.map((p,i)=>i).filter(i=>G.players[i].fate!=null);
  const finish=()=>{ G.players.forEach((p,i)=>campRunActSetup(i)); render();
    openModal(m=>{ m.appendChild(el('h2',null,`第 ${G.campaign.act} 幕开局设置已执行`));
      m.appendChild(el('div','hintbox','各命运的本幕开局已自动执行（有脚本者）。可在 📜 面板查看议会区/律法书/标记变化。'));
      const ok=el('button','btn gold','好'); ok.onclick=()=>{ closeModal(); openCampaignPanel(); }; m.appendChild(ok); }); };
  const step=(k)=>{
    if(k>=order.length){ finish(); return; }
    const i=order[k]; const p=G.players[i]; const cur=fateByNum(p.fate);
    const completedLast = p.fateObjMet[Math.max(0,G.campaign.act-2)]; // 上一幕是否达成（act 已+1）
    openModal(m=>{ m.appendChild(el('h2',null,`选命运 · ${pname(i)}`));
      m.appendChild(el('div','hintbox',`当前命运：<b style="color:#c98bd6">${cur?cur.cn:'?'}</b>。${completedLast?'上一幕达成（抽1张，可保留）。':'上一幕失败（抽2张选1）。'}`));
      const keep=el('button','btn gold',`保留 ${cur?cur.cn:''}`); keep.style.cssText='display:block;width:100%;margin:4px 0';
      keep.onclick=()=>{ closeModal(); step(k+1); }; m.appendChild(keep);
      const chg=el('button','btn',`改选命运`); chg.style.cssText='display:block;width:100%;margin:4px 0';
      chg.onclick=()=>{ closeModal();
        const pool=CAMPAIGN_FATES.map(f=>f.num).filter(n=>!G.players.some(q=>q.fate===n)||n===p.fate);
        pickFromList(`${pname(i)} 改选哪个命运`, pool.map(n=>{ const f=fateByNum(n); return {label:`${f.cn} ${fateStars(f.cx)}`,val:n}; }), n=>{
          p.fate=n; p.fateObjMet=[false,false,false]; p.fateProgress=0;
          // 换命运：归还好感（规则）
          G.players.forEach(q=>{ if(q!==p){ const f=campFavorsOf(p); if(f[q.color.key]){ q.supply.agents+=f[q.color.key]; delete f[q.color.key]; } } });
          campLog(`${pname(i)} 改选命运为 ${fateByNum(n).cn}`); step(k+1); }); };
      m.appendChild(chg);
    });
  };
  step(0);
}

    types.forEach(t=>{ const K=MARK_KINDS[t];
      const hd=el('div'); hd.style.cssText='color:#d9b25a;font-weight:700;margin:6px 0 2px'; hd.textContent=`${K.glyph} ${K.cn}`; m.appendChild(hd);
      const row=el('div','row'); row.style.cssText='gap:4px;flex-wrap:wrap';

/* 战役读档菜单：列出 localStorage 中的存档槽，支持读取/删除/导出JSON、以及导入JSON */
function openCampaignLoadMenu(){
  openModal(m=>{
    m.appendChild(el('h2',null,'📂 战役存档'));
    const saves=listCampaignSlots();
    if(!saves.length) m.appendChild(el('div','hintbox','暂无存档。'));
    saves.forEach(sv=>{
      const row=el('div','row'); row.style.cssText='gap:6px;align-items:center';
      const info=el('button','btn'); info.style.cssText='flex:1;text-align:left';
      info.innerHTML=`<b>${sv.label||sv.slot}</b><br><span style="font-size:11px;opacity:.7">${sv.np||'?'}人 · 第${sv.chapter||1}章 · 第${sv.act||1}幕</span>`;
      info.onclick=()=>{ if(loadCampaignSlot(sv.slot)){ $('#modalWrap').style.display='none'; render(); toast('战役已读取'); } else toast('读取失败'); };
      row.appendChild(info);
      const exp=el('button','btn ghost sm','导出'); exp.title='导出为 JSON 文件';
      exp.onclick=()=>exportCampaignFile(sv.slot); row.appendChild(exp);
      const del=el('button','btn ghost sm','🗑'); del.onclick=()=>{ deleteCampaignSlot(sv.slot); closeModal(); openCampaignLoadMenu(); }; row.appendChild(del);
      m.appendChild(row);
    });
    const imp=el('button','btn ghost','📥 导入 JSON 存档'); imp.style.cssText='width:100%;margin-top:8px';
    imp.onclick=()=>importCampaignFile(); m.appendChild(imp);
    const cc=el('button','btn ghost','关闭'); cc.onclick=()=>closeModal(); m.appendChild(cc);
  });
}
function exportCampaignFile(slot){
  if(!hasLocalStorage()) return;
  const data=localStorage.getItem(campaignSlotKey(slot)); if(!data){ toast('存档不存在'); return; }
  try{
    const blob=new Blob([data],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download=`arcs_campaign_${slot}.json`; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
    toast('已导出 JSON 存档');
  }catch(e){ toast('导出失败'); }
}
function importCampaignFile(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='application/json,.json';
  inp.onchange=e=>{ const f=e.target.files&&e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{ try{ restoreCampaignSnapshot(String(r.result)); saveCampaignSlot('imported', (G.campaign&&G.campaign.label)||'导入的战役');
      $('#modalWrap').style.display='none'; render(); toast('已导入并读取战役存档'); }catch(err){ toast('导入失败：存档格式无效'); } };
    r.readAsText(f);
  };
  inp.click();
}

            宣告雄心时，出牌的点数临时计为 0（不额外增加行动）。`,
      sel:'#hand', pos:'top' },

    { title:'⚡ 七种行动',
      body:`用行动次数执行（<b>同一行动可重复</b>）：<br><br>
            💰 <b>课税</b>：在你城市所在星球取 1 个资源<br>
            🚀 <b>移动</b>：将舰船移到相邻系统<br>
            ⚔️ <b>战斗</b>：在有敌人的系统投骰攻击<br>
            🏗️ <b>建造</b>：建造舰船 / 城市 / 太空港<br>
            👥 <b>影响</b>：在议会牌上放密探<br>
            📋 <b>收纳</b>：拿走你占多数密探的议会卡<br>
            🔧 <b>修理</b>：修复受损舰船或建筑`,
      sel:'#actionBar', pos:'left' },

    { title:'⚔️ 战斗骰子',
      body:`战斗耗 1 行动，骰数 ≤ 你在该系统的舰船数：<br><br>
            <span style="color:#4a8ef5">■ <b>突袭（蓝）</b></span>：命中稳定，无自伤 → <b>新手推荐</b><br>
            <span style="color:#e56157">■ <b>强攻（红）</b></span>：高命中但有自伤 → 决定性一击<br>
            <span style="color:#e5aa40">■ <b>劫掠（橙）</b></span>：打建筑 + 抢资源（需满足条件）<br><br>
            骰面：⚔命中 / 🔥自伤 / 🛡拦截 / 🏠建筑 / 🔑钥匙<br>
            击毁 1 艘敌舰 = 1 个<b>战利品</b>（霸主雄心用）`,
      sel:'#board', pos:'right' },

    { title:'🏛️ 议会牌与密探',
      body:`底部议会区有若干公会卡：<br><br>
            1. 用<b>影响</b>行动在卡上放置密探<br>
            2. 你的密探<b>占多数</b>时，用<b>收纳</b>行动拿走该卡<br>
            3. 收纳后：获得卡牌的<b>持续能力</b>，敌方密探成为<b>俘虏</b><br><br>
            ⚡ <b>帝国之声（Vox）卡</b>：收纳即触发强力效果后弃置。<br>
            🔑 部分卡有序幕能力，可在行动前免费激活一次。`,
      sel:'#court', pos:'top' },

    { title:'📊 章节结束与计分',
      body:`所有手牌打完后，章节结束：<br><br>
            1️⃣ <b>雄心计分</b>：已宣告的雄心按名次发权力值<br>
            2️⃣ <b>城市奖励</b>：建了 4+ 城市的玩家额外加分<br>
            3️⃣ <b>标记升级</b>：面值最低的标记翻面（下章分更高）<br>
            4️⃣ <b>重新发牌</b>：每人重发 6 张手牌<br><br>
            共 3 章，第3章末最终计分，<b>权力值最高者获胜</b>！`,
      sel:'#side', pos:'left' },

    { title:'🚀 已掌握核心规则！',
      body:`<b>开始游戏前的关键提示：</b><br><br>
            ✅ <b>每章必须宣告至少一次雄心</b>（否则那章得0分）<br>
            ✅ 先<b>建太空港 → 造舰船 → 扩张 → 建城市 → 课税</b><br>
            ✅ 小数字牌行动多，<b>留给关键时机</b>使用<br>
            ✅ 战斗时<b>骰数 = 舰船数</b>，先布兵再攻<br>
            ✅ 游戏中随时查看右上角的 <b>📖 规则</b> 按钮<br><br>
            <b>点击「开始游戏」，选好人数，征服星域！⭐</b>`,
      sel:null },
  ],

  start(){
    this.on=true; this.step=0;
    tutInitDemo();
    render();
    $('#tut-blocker').style.display='block';
    this._show(0);
  },

  _show(i){
    if(i<0||i>=this.STEPS.length){ this._end(); return; }
    this.step=i;
    const s=this.STEPS[i];
    $('#tut-title').textContent=s.title;
    $('#tut-body').innerHTML=s.body;
    $('#tut-progress').textContent=`${i+1} / ${this.STEPS.length}`;
    $('#tut-prev').disabled=(i===0);
    $('#tut-next').textContent=(i===this.STEPS.length-1)?'开始游戏！🎮':'明白了 →';
    $('#tut-box').style.display='block';
    this._spotlight(s.sel, s.pos||'right');
  },

  _spotlight(sel, pos){
    $$('.tut-spot').forEach(e=>e.remove());
    const box=$('#tut-box'), bw=338, bh=310;
    const vw=window.innerWidth, vh=window.innerHeight;
    if(!sel){
      box.style.left=Math.max(8,(vw-bw)/2)+'px';
      box.style.top=Math.max(8,(vh-bh)/2)+'px'; return;
    }
    const target=document.querySelector(sel);
    if(!target){ box.style.left=Math.max(8,(vw-bw)/2)+'px'; box.style.top=Math.max(8,(vh-bh)/2)+'px'; return; }
    const r=target.getBoundingClientRect(), pad=8;
    const spot=document.createElement('div'); spot.className='tut-spot';
    spot.style.cssText=`left:${r.left-pad}px;top:${r.top-pad}px;width:${r.width+pad*2}px;height:${r.height+pad*2}px`;
    document.body.appendChild(spot);
    let bx, by;
    if(pos==='right')  { bx=r.right+16;        by=r.top; }
    else if(pos==='left') { bx=r.left-bw-16;   by=r.top; }
    else if(pos==='top')  { bx=r.left;          by=r.top-bh-16; }
    else if(pos==='bottom'){ bx=r.left;         by=r.bottom+16; }
    else                  { bx=(vw-bw)/2;       by=(vh-bh)/2; }
    bx=Math.max(8,Math.min(bx,vw-bw-8));
    by=Math.max(8,Math.min(by,vh-bh-8));
    box.style.left=bx+'px'; box.style.top=by+'px';
  },

  next(){ if(this.step===this.STEPS.length-1) this._end(); else this._show(this.step+1); },
  prev(){ if(this.step>0) this._show(this.step-1); },

  _end(){
    this.on=false;
    $('#tut-box').style.display='none';
    $('#tut-blocker').style.display='none';
    $$('.tut-spot').forEach(e=>e.remove());
    showStartScreen();
  }
};

// 方向一：移动端侧栏抽屉开关
function toggleSide(force){
  const open = force!=null ? force : !document.body.classList.contains('side-open');
  document.body.classList.toggle('side-open', open);
  const b=$('#sideToggle'); if(b) b.textContent = open ? '✕' : '☰';
}
// 方向三：全局键盘快捷键（输入聚焦 / 教学进行时不拦截游戏键）
function isModalOpen(){ const w=$('#modalWrap'); return w && w.style.display==='flex'; }
function onGlobalKey(e){
  const tag=(e.target&&e.target.tagName||'').toLowerCase();
  if(tag==='input'||tag==='textarea'||e.target.isContentEditable) return; // 输入框聚焦不拦截
  if(e.metaKey||e.ctrlKey||e.altKey) return;
  // Esc：优先关闭弹窗，其次取消进行中的行动（教学进行时交由其自身按钮，不干预）
  if(e.key==='Escape'){
    if(TUT.on) return;
    if(isModalOpen()){ e.preventDefault(); closeModal(); $('#modal').classList.remove('victory'); return; }
    if(G&&G.pending){ e.preventDefault(); closeModal(); cancelAction(); return; }
    return;
  }
  // Enter：触发弹窗内主按钮（金色），否则触发可见的金色操作按钮
  if(e.key==='Enter'){
    if(TUT.on) return;
    let scope = isModalOpen() ? $('#modal') : $('#actionBar');
    if(scope){ const gold=scope.querySelector('.btn.gold:not(:disabled)'); if(gold){ e.preventDefault(); gold.click(); return; } }
    return;
  }
  if(TUT.on) return;            // 教学进行中不响应游戏快捷键
  if(isModalOpen()) return;     // 弹窗打开时数字键不选牌
  // 数字 1-7：选择对应手牌位（仅主导/跟随阶段，且该位存在）
  if(/^[1-7]$/.test(e.key) && G && (G.phase==='lead'||G.phase==='follow')){
    const owner=handOwnerIdx(); const p=G.players[owner]; const idx=parseInt(e.key,10)-1;
    if(p && p.hand[idx]!==undefined){ e.preventDefault(); onCardClick(owner, idx); }
  }
}

window.addEventListener('DOMContentLoaded', ()=>{
  $('#tut-exit').onclick=()=>TUT._end();
  $('#tut-prev').onclick=()=>TUT.prev();
  $('#tut-next').onclick=()=>TUT.next();
  const st=$('#sideToggle'); if(st) st.onclick=()=>toggleSide();
  window.addEventListener('keydown', onGlobalKey);
  showStartScreen();
});
</script>
