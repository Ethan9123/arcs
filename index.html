<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCS 暗星悬弧 · 电子版</title>
<style>
  :root{
    --bg:#0b0e17; --panel:#141a28; --panel2:#1c2436; --ink:#e8ecf5; --muted:#8b96ad;
    --gold:#d9b25a; --line:#2a3350; --good:#4cc38a; --bad:#e0556b; --accent:#5b8cff;
    --p1:#e23b3b; --p2:#3b7fe2; --p3:#e2b53b; --p4:#e9edf5;
    --adm:#6f7bd6; --agg:#d6564f; --con:#d59a3e; --mob:#46b39a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:"Segoe UI","Microsoft YaHei",system-ui,sans-serif;font-size:14px;overflow:hidden}
  #app{display:flex;height:100vh;width:100vw}
  /* ---- 左：棋盘 ---- */
  #boardWrap{flex:1;position:relative;min-width:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 45%,#15203a 0%,#0b0e17 70%)}
  #board{width:min(100%,96vh);height:min(100%,96vh)}
  /* ---- 右：信息面板 ---- */
  #side{width:360px;min-width:360px;background:var(--panel);border-left:1px solid var(--line);
    display:flex;flex-direction:column;height:100vh}
  .side-sec{border-bottom:1px solid var(--line);padding:10px 12px}
  .side-sec h3{margin:0 0 8px;font-size:12px;letter-spacing:1px;color:var(--gold);text-transform:uppercase;font-weight:700}
  #log{flex:1;overflow-y:auto;font-size:12.5px;line-height:1.5}
  #log .e{padding:3px 6px;border-radius:5px;margin-bottom:2px}
  #log .e.sys{color:var(--muted)}
  #log .e.act{background:#1b2740}
  #log .e.bat{background:#3a1f27}
  #log .e.score{background:#23341f;color:#bfe6a8}
  .pill{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:700}
  /* 玩家条 */
  .pl{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;margin-bottom:5px;background:var(--panel2)}
  .pl.cur{outline:2px solid var(--gold)}
  .pl .dot{width:14px;height:14px;border-radius:50%;flex:none;border:1px solid #0006}
  .pl .nm{font-weight:700;flex:none;width:54px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pl .stats{font-size:11px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap}
  .pl .pw{margin-left:auto;font-weight:800;color:var(--gold)}
  .res{display:inline-flex;align-items:center;gap:2px}
  .res b{color:var(--ink)}
  /* 手牌 */
  #hand{display:flex;gap:6px;flex-wrap:wrap;min-height:90px}
  .card{width:62px;height:90px;border-radius:8px;border:2px solid #0006;position:relative;cursor:pointer;
    display:flex;flex-direction:column;justify-content:space-between;padding:5px;color:#fff;
    box-shadow:0 2px 5px #0007;transition:transform .08s;user-select:none}
  .card:hover{transform:translateY(-4px)}
  .card.sel{outline:3px solid var(--gold);transform:translateY(-6px)}
  .card.dim{opacity:.38;filter:grayscale(.4)}
  .card .num{font-size:22px;font-weight:800;line-height:1}
  .card .suit{font-size:10px;font-weight:700;opacity:.95}
  .card .pips{display:flex;gap:3px}
  .card .pips i{width:7px;height:7px;border-radius:50%;background:#fff;display:block;box-shadow:0 0 0 1px #0005}
  .card.adm{background:linear-gradient(160deg,#6f7bd6,#4a55a8)}
  .card.agg{background:linear-gradient(160deg,#d6564f,#a83a34)}
  .card.con{background:linear-gradient(160deg,#d59a3e,#a8742a)}
  .card.mob{background:linear-gradient(160deg,#46b39a,#2f8270)}
  /* 顶部状态条 */
  #top{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:10px;align-items:center;
    background:#0c1220cc;border:1px solid var(--line);border-radius:30px;padding:6px 16px;backdrop-filter:blur(4px);z-index:5}
  #top .chip{font-size:12px;color:var(--muted)}
  #top .chip b{color:var(--ink)}
  /* 雄心盒 */
  #ambitions{display:flex;flex-direction:column;gap:4px}
  .amb{display:flex;align-items:center;gap:8px;font-size:12px;padding:4px 6px;border-radius:6px;background:var(--panel2)}
  .amb .ic{width:18px;text-align:center}
  .amb .val{margin-left:auto;font-weight:700}
  .amb.declared{outline:1px solid var(--gold)}
  /* 按钮 */
  button{font-family:inherit;cursor:pointer}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:7px 12px;font-weight:700;font-size:13px}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
  .btn.gold{background:var(--gold);color:#221a07}
  .btn.sm{padding:4px 9px;font-size:12px}
  #actionBar{display:flex;gap:6px;flex-wrap:wrap}
  /* 弹窗 */
  #modalWrap{position:fixed;inset:0;background:#000a;display:none;align-items:center;justify-content:center;z-index:50}
  #modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px;max-width:560px;width:92%;
    max-height:88vh;overflow:auto;box-shadow:0 10px 40px #000b}
  #modal h2{margin:0 0 6px;color:var(--gold)}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:8px 0}
  input[type=text]{background:#0c1220;border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:7px 9px;font-size:14px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{background:transparent;color:var(--ink);border:none;padding:7px 14px;font-size:14px}
  .seg button.on{background:var(--accent);color:#fff}
  .hintbox{background:#0c1220;border:1px solid var(--line);border-radius:8px;padding:10px;font-size:13px;color:var(--muted)}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#0c1220ee;border:1px solid var(--gold);
    color:var(--ink);padding:10px 18px;border-radius:10px;z-index:60;font-size:14px;display:none;box-shadow:0 6px 20px #000a}
  /* SVG 元素 */
  .sys-hit{cursor:pointer}
  .sys-node{transition:filter .1s}
  .sys-label{font-size:11px;fill:#cdd6e8;font-weight:600;pointer-events:none}
  .legal{filter:drop-shadow(0 0 6px var(--gold))}
  .scrollwrap{max-height:150px;overflow:auto}
  code{background:#0c1220;padding:1px 4px;border-radius:4px;color:#cbd5ef}
  /* 议会区 */
  #court{position:absolute;left:10px;bottom:10px;display:flex;gap:6px;z-index:4}
  .ccard{width:92px;min-height:64px;background:#21283c;border:1px solid #3a466a;border-radius:8px;
    padding:6px;font-size:11px;color:#dfe6f5;box-shadow:0 3px 8px #0007;cursor:pointer;transition:border-color .15s,transform .1s}
  .ccard:hover{border-color:#e8c97a;transform:translateY(-2px)}
  .ccard.vox{background:#2c2336;border-color:#6b4f7a}
  .ccard .cn{font-weight:700;margin-bottom:3px;font-size:11px;color:#e8c97a;line-height:1.2}
  .ccard.vox .cn{color:#d9b6ef}
  .ccard .cmeta{display:flex;gap:4px;align-items:center;margin-bottom:4px;flex-wrap:wrap}
  .ccard .badge{font-size:8px;padding:0 4px;border-radius:6px;line-height:14px;font-weight:700}
  .badge.auto{background:#1f5132;color:#9be8b6}
  .badge.passive{background:#3a3a18;color:#e0d98a}
  .badge.manual{background:#2a3550;color:#9fb0d4}
  .badge.vox{background:#4a2f5e;color:#e3b9f7}
  .ccard .keys{font-size:8px;color:#c79b5a;font-weight:700}
  .ccard .ag{display:flex;gap:3px;flex-wrap:wrap}
  .ccard .ag span{width:12px;height:12px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:8px;color:#000;font-weight:800}
  .cardtxt{font-size:13px;line-height:1.7;color:#dbe3f3;background:#0c1322;border:1px solid #2a3550;border-radius:8px;padding:10px 12px;margin:8px 0}
  /* ---------- 真实卡面素材（缺图时回退到文字渲染） ---------- */
  .card{overflow:hidden}
  .card .cardimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;z-index:1;border-radius:6px}
  .ccard{position:relative;overflow:hidden}
  .ccard .ccimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;z-index:0}
  .ccard.imgok{height:128px;min-height:0;padding:0}
  .ccard.imgok .cn,.ccard.imgok .cmeta{display:none}
  .ccard.imgok .ag{position:absolute;left:4px;bottom:4px;margin:0;z-index:2;background:#000a;border-radius:9px;padding:2px 4px}
  .courtbig{display:block;width:300px;max-width:78%;margin:6px auto 12px;border-radius:12px;box-shadow:0 8px 24px #000b}
  /* ---- 战斗骰子动画 ---- */
  @keyframes modal-pop { 0%{transform:scale(.92);opacity:0} 100%{transform:scale(1);opacity:1} }
  @keyframes slide-up { 0%{transform:translate(-50%,20px);opacity:0} 100%{transform:translate(-50%,0);opacity:1} }
  @keyframes power-flash { 0%{color:var(--gold);transform:scale(1.3)} 50%{color:#fff;transform:scale(1.5)} 100%{color:var(--gold);transform:scale(1)} }
  @keyframes card-play { 0%{transform:translateY(0)} 40%{transform:translateY(-20px) scale(1.1)} 100%{transform:translateY(-80px) scale(.8);opacity:0} }
  @keyframes card-select { 0%{transform:translateY(0) scale(1)} 50%{transform:translateY(-9px) scale(1.07)} 100%{transform:translateY(0) scale(1)} }
  @keyframes die-tumble{
    0%{transform:perspective(80px) rotateX(0deg) rotateY(0deg) scale(1)}
    25%{transform:perspective(80px) rotateX(90deg) rotateY(72deg) scale(.86)}
    50%{transform:perspective(80px) rotateX(180deg) rotateY(144deg) scale(1.1)}
    75%{transform:perspective(80px) rotateX(270deg) rotateY(216deg) scale(.9)}
    100%{transform:perspective(80px) rotateX(360deg) rotateY(288deg) scale(1)}
  }
  @keyframes die-settle{
    0%{transform:scale(1.35) rotateZ(-12deg)}
    45%{transform:scale(.95) rotateZ(5deg)}
    72%{transform:scale(1.06) rotateZ(-2deg)}
    100%{transform:scale(1) rotateZ(0deg)}
  }
  #modal { animation: modal-pop .18s ease-out; }
  .toast { animation: slide-up .22s ease-out; }
  .card.playing { animation: card-play .3s ease-in forwards; pointer-events:none; }
  .card.selecting{animation:card-select .22s ease-out;}
  .die3d{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;
    width:54px;height:54px;border-radius:10px;color:#fff;margin:4px;line-height:1.1;
    box-shadow:0 5px 14px #000c,inset 0 1px 0 rgba(255,255,255,.22),inset 0 -2px 0 rgba(0,0,0,.28);
    transition:filter .18s}
  .die3d.sk{background:linear-gradient(145deg,#4a8ef5,#2b5fb8)}
  .die3d.as{background:linear-gradient(145deg,#e56157,#b03530)}
  .die3d.ra{background:linear-gradient(145deg,#e5aa40,#b07820)}
  .die3d.rolling{animation:die-tumble .17s linear infinite}
  .die3d.landing{animation:die-settle .35s ease-out forwards}
  .die3d.glow-hit{filter:drop-shadow(0 0 9px #ffd700)}
  .die3d.glow-miss{opacity:.45}
  #dice-anim{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:14px 0}
  @keyframes battle-flash {
    0%{filter:drop-shadow(0 0 0px #e56157)}
    30%{filter:drop-shadow(0 0 24px #e56157)}
    100%{filter:drop-shadow(0 0 2px #e56157)}
  }
  .sys-flash{animation:battle-flash .7s ease-out}
  @keyframes res-float {
    0%{opacity:1;transform:translateY(0)}
    100%{opacity:0;transform:translateY(-28px)}
  }
  .res-float{position:fixed;pointer-events:none;font-size:15px;font-weight:800;
    color:#d9b25a;z-index:70;animation:res-float .9s ease-out forwards}
  /* ---- 新手教学 ---- */
  .tut-spot{position:fixed;z-index:87;border-radius:12px;pointer-events:none;
    box-shadow:0 0 0 9999px rgba(0,0,0,.80),0 0 0 3px #d9b25a,0 0 22px 4px #d9b25a55;
    transition:left .26s,top .26s,width .26s,height .26s}
  #tut-blocker{position:fixed;inset:0;z-index:85;display:none;cursor:default}
  #tut-box{position:fixed;z-index:90;background:#141a28;border:2px solid #d9b25a;
    border-radius:14px;padding:18px 20px;width:338px;
    box-shadow:0 10px 36px #000d;display:none;transition:left .26s,top .26s}
  #tut-title{margin:0 0 8px;color:#d9b25a;font-size:15px;font-weight:800;line-height:1.3}
  #tut-body{font-size:13px;line-height:1.78;color:#dbe3f3;margin-bottom:14px}
  #tut-footer{display:flex;justify-content:space-between;align-items:center;gap:4px}
  #tut-progress{font-size:11px;color:#8b96ad;white-space:nowrap;flex:none}

  /* ========================================================================
     UI/UX 增强（纯增量；桌面端零回归——响应式只在窄屏媒体查询内生效）
     ======================================================================== */
  /* —— 方向二：终局胜利画面 —— */
  @keyframes vic-pop{0%{transform:scale(.85);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
  @keyframes crown-bounce{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-5px) rotate(6deg)}}
  @keyframes vic-shine{0%{background-position:-200% 0}100%{background-position:200% 0}}
  #modal.victory{max-width:520px;text-align:center;border-color:var(--gold);
    box-shadow:0 0 0 1px var(--gold),0 14px 56px #000d,0 0 60px #d9b25a33}
  .vic-title{font-size:30px;font-weight:900;letter-spacing:2px;margin:2px 0 4px;
    background:linear-gradient(90deg,#d9b25a,#fff3cf,#d9b25a,#fff3cf);background-size:200% auto;
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    animation:vic-shine 3s linear infinite}
  .vic-sub{color:var(--muted);font-size:13px;margin-bottom:14px}
  .vic-rank{display:flex;flex-direction:column;gap:6px;margin:0 0 16px}
  .vic-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;
    background:var(--panel2);border:1px solid var(--line);text-align:left;
    animation:vic-pop .4s ease-out both}
  .vic-row .rk{width:22px;font-weight:800;color:var(--muted);flex:none;text-align:center}
  .vic-row .rdot{width:14px;height:14px;border-radius:50%;flex:none;border:1px solid #0006}
  .vic-row .rnm{font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .vic-row .rpw{font-weight:900;color:var(--gold);font-size:17px;flex:none}
  .vic-row .rmeta{color:var(--muted);font-size:11px;flex:none}
  .vic-row.win{background:linear-gradient(120deg,#2a2410,#3a3015);
    border-color:var(--gold);box-shadow:0 0 18px #d9b25a44}
  .vic-row.win .rnm{color:var(--gold)}
  .vic-row.win .crown{animation:crown-bounce 1.4s ease-in-out infinite;font-size:20px;flex:none}

  /* —— 方向二：手牌悬停放大预览（仅桌面端非触控） —— */
  @media (hover:hover) and (min-width:821px){
    #hand .card{transition:transform .12s ease,box-shadow .12s ease,z-index 0s}
    #hand .card:hover{transform:translateY(-10px) scale(1.55);z-index:30;
      box-shadow:0 12px 30px #000d,0 0 0 2px var(--gold)}
    #hand .card.sel:hover{transform:translateY(-12px) scale(1.55)}
  }
  /* —— 方向二：棋子 / 高亮过渡与脉冲 —— */
  @keyframes legal-pulse{0%,100%{filter:drop-shadow(0 0 4px var(--gold))}50%{filter:drop-shadow(0 0 11px var(--gold))}}
  .legal{animation:legal-pulse 1.4s ease-in-out infinite}
  .sys-node{transition:filter .18s ease}
  .sys-node:hover{filter:brightness(1.15)}

  /* —— 方向三：回合 / 阶段横幅 —— */
  #turnBanner{display:flex;align-items:center;gap:8px;padding:7px 10px;margin-bottom:8px;
    border-radius:9px;background:var(--panel2);border-left:4px solid var(--accent);font-size:13px}
  #turnBanner .tb-dot{width:11px;height:11px;border-radius:50%;flex:none;border:1px solid #0006}
  #turnBanner .tb-who{font-weight:800}
  #turnBanner .tb-ph{margin-left:auto;font-size:11px;color:var(--muted);
    background:#0c1322;border:1px solid var(--line);border-radius:20px;padding:2px 9px}
  .kbd-hint{font-size:10.5px;color:var(--muted);margin-top:6px;line-height:1.6}
  .kbd-hint kbd{background:#0c1322;border:1px solid var(--line);border-bottom-width:2px;
    border-radius:4px;padding:0 5px;font-family:inherit;font-size:10px;color:#cbd5ef}

  /* —— 方向四：雄心进度条 —— */
  .amb{position:relative}
  .amb .ambbar{display:flex;height:4px;border-radius:3px;overflow:hidden;background:#0c1322;
    margin-left:6px;flex:1;max-width:74px;min-width:30px}
  .amb .ambbar i{display:block;height:100%}
  .amb .lead-star{color:var(--gold);font-size:9px;margin-left:2px}

  /* —— 方向四：日志筛选 —— */
  #logFilter{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
  #logFilter .lf{font-size:10.5px;padding:2px 8px;border-radius:12px;border:1px solid var(--line);
    background:transparent;color:var(--muted);cursor:pointer;line-height:1.5}
  #logFilter .lf.on{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* —— 方向一：移动端响应式（仅 ≤820px 生效；桌面端完全不受影响） —— */
  #sideToggle{display:none}
  @media (max-width:820px){
    html,body{font-size:14px}
    #app{flex-direction:column;height:100vh;height:100dvh}
    #boardWrap{flex:none;height:56vh;height:56dvh;width:100%}
    #board{width:min(100%,56vh);height:min(100%,56vh)}
    #side{width:auto;min-width:0;width:100%;flex:1;min-height:0;height:auto;
      border-left:none;border-top:1px solid var(--line);overflow-y:auto;
      transform:translateX(100%);position:fixed;top:0;right:0;bottom:0;left:0;
      z-index:45;background:var(--panel);transition:transform .28s ease;
      box-shadow:-6px 0 26px #000a}
    body.side-open #side{transform:translateX(0)}
    /* 浮动侧栏开关按钮 */
    #sideToggle{display:flex;align-items:center;justify-content:center;
      position:fixed;right:14px;bottom:14px;z-index:46;width:50px;height:50px;
      border-radius:50%;border:1px solid var(--gold);background:#141a28ee;
      color:var(--gold);font-size:22px;box-shadow:0 4px 16px #000b;backdrop-filter:blur(4px)}
    body.side-open #sideToggle{background:var(--gold);color:#221a07}
    /* 顶栏：缩小、允许换行 */
    #top{flex-wrap:wrap;justify-content:center;gap:5px 8px;padding:5px 10px;max-width:94vw;
      top:6px;border-radius:14px}
    #top .chip{font-size:11px}
    #top .btn.sm{padding:3px 7px;font-size:11px}
    /* 议会区：可横向滚动、缩小，避免遮挡棋盘 */
    #court{left:6px;right:6px;bottom:6px;max-width:none;overflow-x:auto;
      flex-wrap:nowrap;padding-bottom:3px;-webkit-overflow-scrolling:touch}
    #court .ccard{flex:none;width:74px;min-height:54px;font-size:10px}
    #court .ccard.imgok{height:96px}
    /* 手牌：横向滚动一行 */
    #hand{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
    #hand .card{flex:none}
    /* 触控友好：最小点击尺寸 */
    .btn{min-height:40px;padding:9px 14px}
    .btn.sm{min-height:34px}
    .seg button{min-height:40px}
    #logFilter .lf{min-height:30px;padding:4px 10px}
    .ccard{min-height:44px}
    /* 弹窗占满更多宽度 */
    #modal{width:96%;max-height:92vh;padding:18px}
    .vic-title{font-size:24px}
  }
  @media (max-width:480px){
    #boardWrap{height:50vh;height:50dvh}
    #board{width:min(100%,50vh);height:min(100%,50vh)}
    #top .chip{font-size:10px}
  }
</style>
</head>
<body>
<div id="app">
  <div id="boardWrap">
    <div id="top"></div>
    <svg id="board" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet"></svg>
    <div id="court"></div>
  </div>
  <div id="side">
    <div class="side-sec"><h3>玩家</h3><div id="players"></div></div>
    <div class="side-sec"><h3>雄心 · 标记盒</h3><div id="ambitions"></div></div>
    <div class="side-sec"><h3>操作</h3><div id="prompt" class="hintbox" style="margin-bottom:8px"></div><div id="actionBar"></div>

function buildMap(){
  const sys = {};
  const cx=500, cy=500;
  const Rg=205, Rp=355;
  for(let c=1;c<=6;c++){
    const base = -90 + (c-1)*60;       // 度
    const ga = base*Math.PI/180;
    const gid = 'G'+c;
    sys[gid] = {id:gid, kind:'gate', cluster:c, label:''+c,
      x:cx+Rg*Math.cos(ga), y:cy+Rg*Math.sin(ga),
      neighbors:[], slots:0, resource:null, pieces:newPieceSlot(), outOfPlay:false, pathMarker:false};
    const planetDefs=[['A',-19,Rp-22],['B',0,Rp],['C',19,Rp-22]];
    for(const [pl,da,rad] of planetDefs){
      const pa=(base+da)*Math.PI/180;
      const pid=c+''+pl;
      sys[pid]={id:pid, kind:'planet', cluster:c, idsym:pl, label:pid,
        resource:PLANET_LAYOUT[c][pl], slots:PLANET_SLOTS[pid]||1,
        x:cx+rad*Math.cos(pa), y:cy+rad*Math.sin(pa),
        neighbors:[], pieces:newPieceSlot(), outOfPlay:false, pathMarker:false, buildings:[]};
    }
  }
  // 邻接：星门环
  for(let c=1;c<=6;c++){
    const n1=(c%6)+1, n2=((c+4)%6)+1;
    addAdj(sys,'G'+c,'G'+n1); addAdj(sys,'G'+c,'G'+n2);
    // 星门-本团行星
    addAdj(sys,'G'+c, c+'A'); addAdj(sys,'G'+c, c+'B'); addAdj(sys,'G'+c, c+'C');
    // 团内行星链 A-B-C
    addAdj(sys, c+'A', c+'B'); addAdj(sys, c+'B', c+'C');
  }
  return sys;
}
function addAdj(sys,a,b){ if(!sys[a].neighbors.includes(b))sys[a].neighbors.push(b);
  if(!sys[b].neighbors.includes(a))sys[b].neighbors.push(a); }
function newPieceSlot(){ return {ships:{}, dmg:{}, buildings:[]}; } // ships:{color:总数}; dmg:{color:受损数}; buildings:[{type,owner,damaged}]

      deck.push({suit:s, number:n, pips:PIPS_BY_NUMBER[n]});
    }
  }
  return deck;
}

// 开局一次性效果（抽选后立即应用）：调整 supply / outraged
function applyLeaderSetup(p){
  if(!p||!p.leader) return;
  // Mystic/Cryptic：物资+燃料民愤槽各放 1 密探（共 2 密探）
  if(leaderHas(p,'cryptic')){ p.outraged.material=true; p.outraged.fuel=true; p.supply.agents-=2; }
  // Quartermaster/Greedy：物资民愤槽放 1 密探
  if(leaderHas(p,'greedy')){ p.outraged.material=true; p.supply.agents-=1; }
  // Overseer/Hated：废弃 2 忠诚舰 + 3 忠诚密探
  if(leaderHas(p,'hated')){ p.supply.ships-=2; p.supply.agents-=3; }
  // Anarchist/Decentralized：废弃玩家板最左 2 座城市
  if(leaderHas(p,'decentralized')){ p.supply.cities-=2; }
  // Archivist/Learned：开局抽 5 传说留 2 弃 3 —— 在 startLoreDraft 发牌时按此玩家放大抽取池
}

/* ======================= 音效系统（Web Audio API 合成）===================== */
const SFX={
  _ctx:null, _muted:false,
  _c(){ if(this._ctx) return this._ctx; try{this._ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){} return this._ctx; },
  _g(vol,t){ const c=this._c(); if(!c)return null; const g=c.createGain(); g.gain.setValueAtTime(vol,t||c.currentTime); return g; },
  _osc(type,freq,dur,vol,delay){
    const c=this._c(); if(!c||this._muted)return;
    const o=c.createOscillator(),g=c.createGain();
    o.type=type; o.frequency.value=freq;
    const t=c.currentTime+(delay||0);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g);g.connect(c.destination); o.start(t);o.stop(t+dur);
  },
  _sweep(f1,f2,dur,type,vol,delay){
    const c=this._c(); if(!c||this._muted)return;
    const o=c.createOscillator(),g=c.createGain();
    o.type=type||'sine';
    const t=c.currentTime+(delay||0);
    o.frequency.setValueAtTime(f1,t); o.frequency.exponentialRampToValueAtTime(f2,t+dur);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g);g.connect(c.destination); o.start(t);o.stop(t+dur);
  },
  _noise(dur,freq,q,vol,delay){
    const c=this._c(); if(!c||this._muted)return;
    const n=c.sampleRate*dur, buf=c.createBuffer(1,n,c.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/n*5);
    const src=c.createBufferSource(); src.buffer=buf;
    const bp=c.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=freq||800; bp.Q.value=q||2;
    const g=c.createGain(); const t=c.currentTime+(delay||0);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    src.connect(bp);bp.connect(g);g.connect(c.destination); src.start(t);src.stop(t+dur);
  },
  // ---- 各事件音效 ----
  roll(){ this._noise(.22,1400,1.2,.35); this._sweep(280,90,.18,'sawtooth',.1); },
  land(){ this._sweep(200,75,.12,'sine',.22); this._noise(.06,500,3,.18); },
  hit(){ this._sweep(160,55,.13,'sine',.28); },
  destroy(){ this._noise(.38,180,.7,.45); this._osc('sine',70,.28,.25); },
  card(){ this._sweep(650,260,.11,'sawtooth',.11); },
  seize(){ [440,554,659].forEach((f,i)=>this._osc('triangle',f,.22,.18,i*.07)); },
  score(){ [523,659,784,1047].forEach((f,i)=>this._osc('sine',f,.38,.2,i*.09)); },
  chapter(){ [392,330,262].forEach((f,i)=>this._osc('sine',f,.48,.18,i*.17)); },
  newChapter(){ [523,587,659,784].forEach((f,i)=>this._osc('triangle',f,.28,.15,i*.09)); },
  victory(){ [523,659,784,1047,1568].forEach((f,i)=>this._osc('triangle',f,.5,.2,i*.11)); },
  build(){ this._sweep(380,560,.09,'sine',.14); },
  modal(){ this._sweep(280,460,.07,'sine',.09); },
  key(){ this._sweep(750,1100,.05,'triangle',.13); },
  move(){ this._sweep(320,140,.09,'sine',.13); this._noise(.04,2600,1.3,.06); },

};

const ACTION_NAMES={tax:'课税',build:'建造',move:'移动',repair:'修理',influence:'影响',secure:'收纳',battle:'战斗'};

/* ------------------------------ 游戏状态 -------------------------------- */
let G = null; // 全局游戏对象

function newGame(numPlayers, names, useExpansion){
  const map = buildMap();
  const players = [];
  for(let i=0;i<numPlayers;i++){
    players.push({
      idx:i, name:names[i]||('玩家'+(i+1)), color:PCOLORS[i],
      hand:[], res:{material:0,fuel:0,weapon:0,relic:0,psionic:0},
      trophies:0, captives:0, power:0, guildCards:[],
      leader:null, // 领袖卡 id（仅开扩展时分配）
      loreCards:[], // 传说卡 id 列表（仅开扩展时发牌，每人 2 张作为个人能力）
      outraged:{material:false,fuel:false,weapon:false,relic:false,psionic:false}, // 民愤：被覆盖的资源不能用于序幕行动（仍可课税/计雄心）
      supply:{ships:15, cities:5, starports:5, agents:10}, // 未上场的棋子
      hasPassed:false, outForRound:false,
    });
  }
  G = {
    numPlayers, players, map,
    useExpansion: !!useExpansion, // 领袖与传说扩展开关（false 时基础游戏行为零变化）
    actionDeck:[], discard:[],
    court:[], courtDeck:[], courtDiscard:[], // courtDiscard：被弃置的公会卡（序幕一次性能力用完后）
    resSupply:{material:5,fuel:5,weapon:5,relic:5,psionic:5},
    // 雄心标记盒：每个雄心 box 里放置的标记（{f:首位, s:次位}）
    ambitionBox:{tycoon:[],tyrant:[],warlord:[],keeper:[],empath:[]},
    // 3 枚雄心标记：开局蓝面（低）朝上 → 5/3、3/2、2/0（官方规则书 p.4-E/p.5/p.18 实拍核对）。
    // f/s = 当前面的「首位/次位」权力；nf/ns = 翻面后的高面值；flipped = 是否已翻面。
    // 每章清算 Step2：把所有标记收回可用区，并翻面「当前首位权力最低且尚未翻面」的一枚（escalation，p.19）。
    // 翻面高面值取通行的实体标记数值（2/0→4/2、3/2→6/4、5/3→9/5）。
    markersAvailable:[
      {f:5,s:3,flipped:false,nf:9,ns:5},
      {f:3,s:2,flipped:false,nf:6,ns:4},
      {f:2,s:0,flipped:false,nf:4,ns:2},
    ], // 宣告时取「当前首位最高」者
    declaredThisChapter:{}, // ambitionKey -> true
    phantom:null,           // 2 人局：虚拟第三方各雄心计数（出局行星资源播种，仅占位不得分）
    chapter:1, maxChapters:5,
    initiative:0,            // 先攻玩家 idx
    // 回合状态
    phase:'setup',
    lead:null,               // {playerIdx, card, ambition, zero}
    played:[],               // 本回合打出的牌 [{playerIdx,card,mode,faceDown}]
    seizedBy:null,           // 夺取先攻的玩家 idx
    passedInARow:0,          // 连续 pass 计数（用于结束章节）
    followQueue:[],          // 待跟随玩家队列
    turnPlayer:0,
    actor:null,              // 当前执行行动的玩家 idx
    actionsLeft:0, actionSuit:null,
    pending:null,            // 交互式行动状态 {type, step, ...}
    log:[],
  };
  setupGame();
  return G;
}

function logMsg(html, cls=''){ G.log.push({html, cls}); renderLog(); }

function setupGame(){
  const n=G.numPlayers;
  G.actionDeck = buildActionDeck(n);
  // 移除 1/7（2-3人）已在 build 内处理；洗牌
  shuffle(G.actionDeck);
  // 议会
  G.courtDeck = shuffle(buildCourtDeck());
  const courtN = (n===2)?3:4;
  for(let i=0;i<courtN;i++) G.court.push(G.courtDeck.pop());
  // 雄心标记初始：3 个标记，蓝(低)面朝上
  // 先攻随机
  G.initiative = Math.floor(Math.random()*n);
  G.turnPlayer = G.initiative;

  // 出局星团（path/out-of-play）：2-3人盖 2 团，4人盖 1 团
  const coverCount = (n>=4)?1:2;
  // 选择不与任何起始系统冲突的星团；起始系统见下
  const startPlan = makeStartPlan(n); // 每玩家 {A,B,C系统}
  const usedClusters = new Set();
  Object.values(startPlan).forEach(sp=>[sp.A,sp.B,sp.C].forEach(id=>usedClusters.add(G.map[id].cluster)));
  const freeClusters = [1,2,3,4,5,6].filter(c=>!usedClusters.has(c));
  shuffle(freeClusters);
  // 2 人局：6 个出局行星的资源按类型播种到雄心盒，作为「虚拟第三方」（官方规则书 p.4 步骤K / p.19）。
  // 物资+燃料→大亨；武器→军阀（计为战利品）；遗物→守护；通灵→共情。暴君不播种。
  if(n===2) G.phantom={tycoon:0,tyrant:0,warlord:0,keeper:0,empath:0};
  for(let i=0;i<coverCount && i<freeClusters.length;i++){
    const c=freeClusters[i];
    G.map['G'+c].pathMarker=true; G.map['G'+c].outOfPlay=true;
    [c+'A',c+'B',c+'C'].forEach(id=>{
      G.map[id].outOfPlay=true;
      if(n===2&&G.phantom){ const r=G.map[id].resource;
        if(r==='material'||r==='fuel') G.phantom.tycoon++;
        else if(r==='weapon') G.phantom.warlord++;
        else if(r==='relic') G.phantom.keeper++;
        else if(r==='psionic') G.phantom.empath++;
      }
    });
    // path marker 连通两侧星门
    const n1=(c%6)+1, n2=((c+4)%6)+1; addAdj(G.map,'G'+n1,'G'+n2);
  }

  // 放置起始棋子
  G.players.forEach((p,i)=>{
    const sp=startPlan[i];
    placeBuilding(sp.A, 'city', p); addShips(sp.A, p, 3);
    placeBuilding(sp.B, 'starport', p); addShips(sp.B, p, 3);
    addShips(sp.C, p, 2);
    // 起始资源：A、B 行星类型各 1
    gainResource(p, G.map[sp.A].resource, true);
    gainResource(p, G.map[sp.B].resource, true);
  });

  // 发牌：每人 6 张
  G.players.forEach(p=>{ for(let k=0;k<6;k++) p.hand.push(G.actionDeck.pop()); sortHand(p); });

  G.phase='lead';
  logMsg(`<b>第 ${G.chapter} 章</b> 开始 · 先攻：<span style="color:${G.players[G.initiative].color.css}">${G.players[G.initiative].name}</span>`,'sys');
  // 领袖扩展：开局先进行领袖抽选（应用 setup 效果后再 beginRound）；未开扩展时维持原样
  if(G.useExpansion){ startLeaderDraft(); return; }
  beginRound();
}

/* ---------------------- 领袖抽选阶段（热座简化）------------------------ */
// 洗乱 16 领袖，按行动顺位每位玩家依次从「发给他的 2 张」里选 1 张（模态框顺序进行）。
// 选完应用 setup 效果；全部选完后 logMsg + beginRound()。测试中可直接调用 assignLeader/applyLeaderSetup。
function assignLeader(p, id){ p.leader=id; applyLeaderSetup(p); }
function startLeaderDraft(){
  G.phase='leaderdraft';
  const pool=shuffle(LEADERS.map(L=>L.id));
  const order=[]; for(let k=0;k<G.numPlayers;k++) order.push((G.initiative+k)%G.numPlayers);
  const step=(qi)=>{
    if(qi>=order.length){
      logMsg(`领袖抽选完成：${G.players.map((p,i)=>pname(i)+'→'+leaderById(p.leader).cn).join('，')}`,'sys');
      dealLoreCards(); // 领袖选定后发传说卡，再 beginRound
      return;
    }
    const pIdx=order[qi]; const p=G.players[pIdx];
    const a=leaderById(pool.pop()), b=leaderById(pool.pop());
    openModal(m=>{
      m.appendChild(el('h2',null,'领袖抽选 · '+p.name));
      m.appendChild(el('div','hintbox',`${p.name}，从下列 2 名领袖中选 1 名（点击查看能力，选定后立即应用开局效果）：`));
      [a,b].forEach(L=>{
        const b1=el('button','btn'); b1.style.cssText='display:block;width:100%;margin:6px 0;text-align:left';
        b1.innerHTML=`<b>${L.cn} ${L.name}</b>　<span style="opacity:.7;font-size:12px">${L.abilities.map(x=>x.n).join(' · ')}</span>`;
        b1.onclick=()=>{ closeModal(); assignLeader(p,L.id);
          logMsg(`${pname(pIdx)} 选择领袖 <b>${L.cn} ${L.name}</b>`,'sys'); step(qi+1); };
        m.appendChild(b1);
      });
    });
  };
  step(0);
}

/* ---------------------- 传说卡发牌阶段（热座简化）---------------------- */
// 领袖抽选完成后调用：洗乱 28 张传说卡，给每位玩家发 2 张作为个人能力（直接保留，不再 draft）。
// 领袖 Archivist/Learned 的玩家改为发 5 张、由其留 2 弃 3（模态框选择）。发完 logMsg + beginRound()。
// 测试中可直接调用 assignLoreToPlayer(p, ids) 指定持有的传说卡。
function assignLoreToPlayer(p, ids){ p.loreCards=ids.slice(); }
function dealLoreCards(){
  G.phase='loredraft';
  const pool=shuffle(LORE.map(L=>L.id));
  const order=[]; for(let k=0;k<G.numPlayers;k++) order.push((G.initiative+k)%G.numPlayers);
  const archivists=[]; // 需 5 选 2 的玩家（延后用模态框处理）
  order.forEach(pIdx=>{ const p=G.players[pIdx];
    if(G.useExpansion && leaderHas(p,'learned')){
      // Archivist/Learned：抽 5 张暂存，稍后由模态框留 2 弃 3
      const draw=[]; for(let k=0;k<5 && pool.length;k++) draw.push(pool.pop());
      p._loreDraw=draw; archivists.push(pIdx);
    } else {
      const ids=[]; for(let k=0;k<2 && pool.length;k++) ids.push(pool.pop());
      assignLoreToPlayer(p, ids);
    }
  });
  const finish=()=>{
    G.players.forEach(p=>{ delete p._loreDraw; });
    logMsg(`传说卡发牌完成：${G.players.map((p,i)=>pname(i)+' 持 '+(p.loreCards.length)+' 张传说').join('，')}`,'sys');
    G.phase='lead'; beginRound();
  };
  // 依序处理 Archivist 玩家的 5 选 2（无 Archivist 时直接 finish）
  const doArchivist=(ai)=>{
    if(ai>=archivists.length){ finish(); return; }
    const p=G.players[archivists[ai]]; const draw=(p._loreDraw||[]).map(loreById);
    const chosen=[];
    const renderPick=()=>openModal(m=>{
      m.appendChild(el('h2',null,'博学 · '+p.name+' 留 2 弃 3'));
      m.appendChild(el('div','hintbox',`${p.name}（档案官·博学）：从 5 张传说中点选 <b>2</b> 张保留（已选 ${chosen.length}/2）。`));
      draw.forEach(L=>{ const picked=chosen.indexOf(L.id)>=0;
        const b=el('button',picked?'btn gold':'btn'); b.style.cssText='display:block;width:100%;margin:6px 0;text-align:left';
        b.innerHTML=`${picked?'☑ ':'☐ '}<b>${L.cn} ${L.name}</b>　<span style="opacity:.7;font-size:11px">${L.abilities.map(x=>x.n).join(' · ')}</span>`;
        b.onclick=()=>{ const i=chosen.indexOf(L.id);
          if(i>=0) chosen.splice(i,1); else { if(chosen.length>=2){ toast('最多留 2 张'); return; } chosen.push(L.id); }
          renderPick(); };
        m.appendChild(b);
      });
      if(chosen.length===2){ const ok=el('button','btn gold','确定（弃其余 3 张）'); ok.style.marginTop='6px';
        ok.onclick=()=>{ closeModal(); assignLoreToPlayer(p, chosen);
          logMsg(`${pname(archivists[ai])} 博学：留 ${chosen.map(id=>loreById(id).cn).join('、')}，弃 3 张`,'sys'); doArchivist(ai+1); };
        m.appendChild(ok); }
    });
    renderPick();
  };
  doArchivist(0);
}

// 为各玩家分配起始 A/B/C 系统，尽量分散在不同星团
function makeStartPlan(n){
  // 6 个星团，取互不相邻的起始团；每玩家用本团 A/B/C
  const order=[1,4,2,5,3,6]; // 分散顺序
  const plan={};
  for(let i=0;i<n;i++){
    const c=order[i];
    plan[i]={A:c+'A', B:c+'B', C:c+'C'};
  }
  return plan;
}

/* --------------------------- 棋子放置/操作 ------------------------------ */
// 舰船状态模型：s.pieces.ships[col]=该色舰船「总数」；s.pieces.dmg[col]=其中「受损」数；新鲜数=总-受损。
// 受损舰（侧翻）【不计入控制权】，但仍可移动/投骰；再受 1 次命中即被摧毁（成为对手战利品，不归还补给）。
function dmgMap(s){ return s.pieces.dmg||(s.pieces.dmg={}); }                 // 兼容旧/测试构造的无 dmg 棋盘
function dmgShipsN(s,col){ return (s.pieces.dmg&&s.pieces.dmg[col])||0; }
function freshShips(s,col){ return (s.pieces.ships[col]||0)-dmgShipsN(s,col); }
function addShips(sysId, player, count, damaged){
  const s=G.map[sysId]; const c=player.color.key;
  s.pieces.ships[c]=(s.pieces.ships[c]||0)+count;
  if(damaged){ const d=dmgMap(s); d[c]=(d[c]||0)+count; }                     // 敌方控制处建造 → 置为受损
  player.supply.ships-=count;
}
// 自系统移除 count 艘（优先「新鲜」后「受损」），归还补给；返回移除数。（一般撤离/回收；战斗摧毁见 applyShipHits）
function removeShips(sysId, player, count){
  const s=G.map[sysId]; const c=player.color.key;
  const total=s.pieces.ships[c]||0; const dmg=dmgShipsN(s,c); const fresh=total-dmg;
  const rmFresh=Math.min(fresh,count); const rmDmg=Math.min(dmg,count-rmFresh); const rm=rmFresh+rmDmg;
  s.pieces.ships[c]=total-rm; if(!s.pieces.ships[c]) delete s.pieces.ships[c];
  if(s.pieces.dmg&&rmDmg){ s.pieces.dmg[c]=dmg-rmDmg; if(!s.pieces.dmg[c]) delete s.pieces.dmg[c]; }
  player.supply.ships+=rm; return rm;
}
// 移动：src→dst 搬运 n 艘（优先「新鲜」），保留受损状态，补给中性（不进出补给）。返回实际搬运数。
function moveShips(srcId, dstId, player, n){
  const c=player.color.key; const ss=G.map[srcId], ds=G.map[dstId];
  const total=ss.pieces.ships[c]||0; const dmg=dmgShipsN(ss,c); const fresh=total-dmg;
  const mFresh=Math.min(fresh,n); const mDmg=Math.min(dmg,n-mFresh); const m=mFresh+mDmg;
  ss.pieces.ships[c]=total-m; if(!ss.pieces.ships[c]) delete ss.pieces.ships[c];
  if(ss.pieces.dmg&&mDmg){ ss.pieces.dmg[c]=dmg-mDmg; if(!ss.pieces.dmg[c]) delete ss.pieces.dmg[c]; }
  ds.pieces.ships[c]=(ds.pieces.ships[c]||0)+m;
  if(mDmg){ const d=dmgMap(ds); d[c]=(d[c]||0)+mDmg; }
  return m;
}
// 对系统内 col 色舰船施加 n 次命中：每次优先「新鲜→受损」，无新鲜则「受损→摧毁」。
// 被摧毁的舰船计入 destroyer.trophies（不归还原主补给）。返回 {damaged,destroyed,overflow}（overflow=舰船已尽、未用完的命中数）。
function applyShipHits(sysId, col, n, destroyer){
  const s=G.map[sysId]; let damaged=0, destroyed=0, applied=0;
  for(let i=0;i<n;i++){
    const total=s.pieces.ships[col]||0; if(total<=0) break;
    const dmg=dmgShipsN(s,col);
    if(total-dmg>0){ const d=dmgMap(s); d[col]=(d[col]||0)+1; damaged++; }              // 新鲜→受损
    else { s.pieces.ships[col]=total-1; if(!s.pieces.ships[col]) delete s.pieces.ships[col];
           const d=dmgMap(s); d[col]=dmg-1; if(!d[col]) delete d[col];                   // 受损→摧毁
           destroyed++; if(destroyer) destroyer.trophies++; }
    applied++;
  }
  return {damaged, destroyed, overflow:n-applied};
}
function placeBuilding(sysId, type, player){
  const s=G.map[sysId];
  s.pieces.buildings.push({type, owner:player.color.key, damaged:false});
  if(type==='city') player.supply.cities--; else player.supply.starports--;
}
function gainResource(player, rtype, fromSupplyFree=false){
  if(!rtype) return false;
  if(!fromSupplyFree){ if(G.resSupply[rtype]<=0){ return false; } }
  if(G.resSupply[rtype]>0) G.resSupply[rtype]--;
  player.res[rtype]=(player.res[rtype]||0)+1;
  return true;
}
function spendResource(player, rtype){
  if(player.res[rtype]>0){ player.res[rtype]--; G.resSupply[rtype]++; return true; }
  return false;
}

/* ----------------------- 控制权 / 忠诚 判定 ----------------------------- */
function piecesCountInSystem(s, colorKey){
  let n=(s.pieces.ships[colorKey]||0);
  for(const b of s.pieces.buildings) if(b.owner===colorKey) n++;
  return n;
}
// 控制权（规则书 p.6 / p.13）：严格——「新鲜舰船」数多于其他【每一名】玩家者控制该系统。
// 重要：建筑【不】计入控制；受损舰船【不】计入控制；并列最多则无人控制（系统「自由」，对各方皆忠诚）。
function controllerOf(sysId){
  const s=G.map[sysId]; const tally={};
  for(const c in s.pieces.ships){ const f=freshShips(s,c); if(f>0) tally[c]=f; }
  let best=null,bestN=0,tie=false;
  for(const c in tally){ if(tally[c]>bestN){best=c;bestN=tally[c];tie=false;} else if(tally[c]===bestN){tie=true;} }
  return (best&&!tie)?best:null;
}
// 某系统对该玩家是否“忠诚”可用：玩家控制该系统，或系统无人控制(自由)
function isLoyalSystem(sysId, player){
  const ctrl=controllerOf(sysId);
  return ctrl===null || ctrl===player.color.key;
}
function systemHasRivalControl(sysId, player){
  const ctrl=controllerOf(sysId);
  return ctrl!==null && ctrl!==player.color.key;
}
// 弹射移动可达集：从含「忠诚太空港」的 src（行星）出发，舰船可「持续穿过星门」前进，
// 直到「进入任意行星」或「进入他人控制的星门」即停止（官方《Action Summaries》：until they move
// into any planet or a gate that is controlled by anyone else）。该停止系统仍是合法终点。
// 因此唯一可继续穿过的中转 = 「非他人控制的星门」（你控制或无人控制的星门）；行星一律终止。
// 返回所有可抵达的目的系统（不含 src）。
function catapultReach(src, col){
  const out=new Set(), seen=new Set([src]), q=[src];
  while(q.length){
    const cur=q.shift(); const s=G.map[cur]; const ctrl=controllerOf(cur);
    // 能否从 cur 继续前进？起点可；之后仅当 cur 是「星门」且非他人控制时可穿过。进入任意行星即止。
    const canLeave=(cur===src) || (s.kind==='gate' && (ctrl===null||ctrl===col));
    if(!canLeave) continue;
    for(const nb of G.map[cur].neighbors){
      if(G.map[nb].outOfPlay) continue;
      if(!seen.has(nb)){ seen.add(nb); out.add(nb); q.push(nb); }
    }
  }
  return out;
}

function renderBoard(){

function drawSystem(svg, s){
  const g=svgEl('g',{class:'sys-node', 'data-sys':s.id});
  const isGate=s.kind==='gate';
  const r=isGate?26:30;
  // 资源色环
  const rc = s.kind==='planet' ? RESOURCES[s.resource].color : '#5b6b8c';
  if(s.outOfPlay){
    g.appendChild(svgEl('circle',{cx:s.x,cy:s.y,r:r,fill:'#0c1018',stroke:'#283250','stroke-width':2,'stroke-dasharray':'4 4'}));
    const x=svgEl('text',{x:s.x,y:s.y+5,'text-anchor':'middle',fill:'#46557a','font-size':12}); x.textContent='出局'; g.appendChild(x);
    svg.appendChild(g); return;
  }
  if(isGate){
    g.appendChild(svgEl('rect',{x:s.x-r,y:s.y-r,width:2*r,height:2*r,rx:7,fill:'#16203a',stroke:'#3a5ea0','stroke-width':2,transform:`rotate(45 ${s.x} ${s.y})`}));
    const t=svgEl('text',{x:s.x,y:s.y+5,'text-anchor':'middle',fill:'#9fc0ff','font-size':16,'font-weight':800}); t.textContent=s.label; g.appendChild(t);
  } else {
    g.appendChild(svgEl('circle',{cx:s.x,cy:s.y,r:r,fill:'#121a2c',stroke:rc,'stroke-width':3}));
    // 资源图标
    const ic=svgEl('text',{x:s.x,y:s.y-4,'text-anchor':'middle',fill:rc,'font-size':15,'font-weight':700});
    ic.textContent=resGlyph(s.resource); g.appendChild(ic);
    const lb=svgEl('text',{x:s.x,y:s.y+12,'text-anchor':'middle',fill:'#7f8ea8','font-size':9}); lb.textContent=s.id; g.appendChild(lb);
    // 建筑槽点
    for(let i=0;i<s.slots;i++){
      const sx=s.x-7+i*14, sy=s.y+r-3;
      g.appendChild(svgEl('circle',{cx:sx,cy:sy,r:2.4,fill:'#2c3960'}));
    }
  }
  // 棋子徽标（环绕系统）
  drawPieces(g, s, r);
  // 合法目标高亮
  if(G.highlight&&G.highlight.has(s.id)){
    g.insertBefore(svgEl('circle',{cx:s.x,cy:s.y,r:r+7,fill:'none',stroke:'#d9b25a','stroke-width':3,opacity:0.95,'stroke-dasharray':'5 4'}), g.firstChild);
  }
  // 命中区
  const hit=svgEl('circle',{cx:s.x,cy:s.y,r:r+10,fill:'transparent',class:'sys-hit','data-sys':s.id});
  hit.addEventListener('click',()=>onSystemClick(s.id));
  g.appendChild(hit);
  svg.appendChild(g);
}

function drawPieces(g, s, r){
  // 建筑：在系统下方排列
  let bx=s.x-(s.pieces.buildings.length-1)*8;
  s.pieces.buildings.forEach((b,i)=>{
    const col=PCOLORS.find(c=>c.key===b.owner).hex;
    const yy=s.y+r+10;
    const xx=s.x-(s.pieces.buildings.length-1)*9+i*18;
    if(b.type==='city'){
      const p=svgEl('rect',{x:xx-6,y:yy-6,width:12,height:12,rx:2,fill:col,stroke:'#000a','stroke-width':1});
      if(b.damaged)p.setAttribute('opacity','.45'); g.appendChild(p);
    } else {
      const p=svgEl('polygon',{points:diamondPts(xx,yy,7),fill:col,stroke:'#000a','stroke-width':1});
      if(b.damaged)p.setAttribute('opacity','.45'); g.appendChild(p);
    }
  });
  // 船：系统上方按颜色分组。新鲜=正立三角(实心)；受损=倒置三角(半透明虚边，示意「侧翻」)，各自标数。
  let ships=Object.entries(s.pieces.ships).filter(([c,n])=>n>0);
  ships.forEach(([c,n],i)=>{
    const col=PCOLORS.find(cc=>cc.key===c).hex;
    const fresh=freshShips(s,c), dmg=dmgShipsN(s,c);
    const ang=-90+(i-(ships.length-1)/2)*26; const baseR=r+14;
    const fx=s.x+baseR*Math.cos(ang*Math.PI/180), fy=s.y+baseR*Math.sin(ang*Math.PI/180);
    if(fresh>0){
      g.appendChild(svgEl('polygon',{points:triPts(fx,fy,7),fill:col,stroke:'#000a','stroke-width':1}));
      const tn=svgEl('text',{x:fx,y:fy+3.5,'text-anchor':'middle',fill:'#000','font-size':9,'font-weight':800}); tn.textContent=fresh; g.appendChild(tn);
    }
    if(dmg>0){
      const dr=baseR+(fresh>0?16:0);
      const dx=s.x+dr*Math.cos(ang*Math.PI/180), dy=s.y+dr*Math.sin(ang*Math.PI/180);
      g.appendChild(svgEl('polygon',{points:triPtsDown(dx,dy,7),fill:col,opacity:'.45',stroke:'#000a','stroke-width':1,'stroke-dasharray':'2 1.5'}));
      const tn=svgEl('text',{x:dx,y:dy-1.5,'text-anchor':'middle',fill:'#000','font-size':8,'font-weight':800}); tn.textContent=dmg; g.appendChild(tn);
    }
  });
}
function triPts(x,y,s){return `${x},${y-s} ${x-s},${y+s} ${x+s},${y+s}`;}
function triPtsDown(x,y,s){return `${x},${y+s} ${x-s},${y-s} ${x+s},${y-s}`;}
function diamondPts(x,y,s){return `${x},${y-s} ${x+s},${y} ${x},${y+s} ${x-s},${y}`;}
function resGlyph(r){ return {material:'■',fuel:'▲',weapon:'✦',relic:'❖',psionic:'✺'}[r]||'?'; }

function onCardClick(owner,i){
  if(G.phase==='lead' && owner===G.initiative){
    SFX.card();
    const cards=$$('.card'); if(cards[i]){ cards[i].classList.add('playing'); }
    setTimeout(()=>leadCard(i),280);
  }
  else if(G.phase==='follow' && G.followQueue.length && owner===G.followQueue[0]){
    const cards=$$('.card'); if(cards[i]) cards[i].classList.add('selecting');
    followCardChoose(i);
  }
}

function beginRound(){
  G.pending=null; G.highlight=null; G.actionContext=null;
  if(G.players.every(p=>p.hand.length===0)){ endChapter(); return; }
  let guard=0; while(G.players[G.initiative].hand.length===0&&guard<G.numPlayers){ G.initiative=(G.initiative+1)%G.numPlayers; guard++; }
  G.turnPlayer=G.initiative; G.phase='lead';
  setPrompt(`轮到 ${pname(G.initiative)} <b>主导出牌</b>：点击下方一张手牌打出（可宣告雄心），或点“跳过·传递先攻”。`);
  render();
}
function leadPass(){
  logMsg(`${pname(G.initiative)} 传递先攻`,'sys'); G.passedInARow++;
  if(G.passedInARow>=G.numPlayers){ logMsg('全员连续传递，本章结束','sys'); endChapter(); return; }
  G.initiative=(G.initiative+1)%G.numPlayers; beginRound();
}
function leadCard(i){
  const pIdx=G.initiative; const p=G.players[pIdx]; const card=p.hand.splice(i,1)[0];
  G.passedInARow=0; G.lead={playerIdx:pIdx,card,ambition:null,zero:false};
  G.played=[{playerIdx:pIdx,card,mode:'lead',zero:false}];
  logMsg(`${pname(pIdx)} 主导：<b style="color:${SUITS[card.suit].color}">${SUITS[card.suit].name}${card.number}</b>（${card.pips}行动）`,'act');
  maybeDeclare(pIdx,card,()=>startActions(pIdx,'lead',card.suit,card.pips));
}
function maybeDeclare(pIdx,card,cont){
  let options=[];
  if(card.number>=2&&card.number<=6) options=[AMB_ORDER[card.number-2]];
  else if(card.number===7) options=AMB_ORDER.slice();
  if(options.length===0||G.markersAvailable.length===0){ cont(); return; }
  openModal(m=>{
    m.appendChild(el('h2',null,'宣告雄心？'));
    const mk=G.markersAvailable.reduce((a,b)=>b.f>a.f?b:a);
    m.appendChild(el('div','hintbox',`宣告将取走最高标记 ${mk.f}/${mk.s} 放入该雄心盒，并把此牌点数视为 0（更易失去先攻）。`));
    options.forEach(k=>{ const b=el('button','btn',`宣告 ${AMBITIONS[k].icon} ${AMBITIONS[k].name}`); b.style.display='block'; b.style.margin='6px 0';
      b.onclick=()=>{ closeModal(); declareAmbition(pIdx,k); cont(); }; m.appendChild(b); });
    const no=el('button','btn ghost','不宣告，直接行动'); no.onclick=()=>{ closeModal(); cont(); }; m.appendChild(no);
  });
}
function declareAmbition(pIdx,ambKey){
  let bi=0; for(let i=1;i<G.markersAvailable.length;i++) if(G.markersAvailable[i].f>G.markersAvailable[bi].f) bi=i;
  const mk=G.markersAvailable.splice(bi,1)[0];
  G.ambitionBox[ambKey].push(mk); G.declaredThisChapter[ambKey]=true;
  G.lead.ambition=ambKey;
  const bySecret=(ambKey==='keeper'||ambKey==='empath')&&ownsEff(G.players[pIdx],'secretorder');
  const byBards=ownsEff(G.players[pIdx],'bards'); // 星际吟游诗人：正面打出主导牌宣告时不归零（任意野心）
  if(bySecret||byBards){
    const why=bySecret?'隐秘结社':'星际吟游诗人';
    logMsg(`${pname(pIdx)} 宣告雄心 <b>${AMBITIONS[ambKey].name}</b>（标记 ${mk.f}/${mk.s}）；<b>${why}</b>生效：此牌点数不归零`,'act');
  } else {
    G.lead.zero=true; if(G.played[0]) G.played[0].zero=true;
    logMsg(`${pname(pIdx)} 宣告雄心 <b>${AMBITIONS[ambKey].name}</b>（标记 ${mk.f}/${mk.s}；此牌点数→0）`,'act');
  }
  onDeclareAmbition(pIdx,ambKey); // 扩展：宣告后触发领袖钩子（Upstart/Ambitious 获 1 资源等）
}
// 宣告雄心后的统一触发钩子（主导宣告 declareAmbition 与 Vox·民众呼声 两条路径共用）。
// 领袖 Upstart/Ambitious（扩展）：成功宣告雄心后，可获得任意 1 个资源（弹模态让其选择；供应空的资源不可选）。
function ambitiousGain(me,rt){ return gainResource(me,rt); } // 薄封装，便于无头测试直接断言
function onDeclareAmbition(pIdx,ambKey){
  const me=G.players[pIdx];
  if(G.useExpansion && leaderHas(me,'ambitious')){
    const avail=RES_ORDER.filter(r=>G.resSupply[r]>0);
    if(!avail.length){ logMsg(`${pname(pIdx)} 领袖·野心：资源供应已空，无法获得资源`,'sys'); return; }
    openModal(m=>{
      m.appendChild(el('h2',null,'领袖·野心 · 获得 1 资源'));
      m.appendChild(el('div','hintbox','你宣告了雄心：选择获得任意 1 个资源（受供应限制）。'));
      avail.forEach(rt=>{ const b=el('button','btn',`${RESOURCES[rt].icon} ${RESOURCES[rt].name}`); b.style.cssText='display:block;width:100%;margin:6px 0';
        b.onclick=()=>{ closeModal(); if(ambitiousGain(me,rt)) logMsg(`${pname(pIdx)} 领袖·野心：获得 ${RESOURCES[rt].name}`,'act'); }; m.appendChild(b); });
    });
  }
}
// 取走当前最高（首位最大）的雄心标记
function takeTopMarker(){ if(!G.markersAvailable.length) return null;
  let bi=0; for(let i=1;i<G.markersAvailable.length;i++) if(G.markersAvailable[i].f>G.markersAvailable[bi].f) bi=i;
  return G.markersAvailable.splice(bi,1)[0]; }

function startActions(pIdx,context,suit,count){
  G.actionContext=context; G.actor=pIdx; G.actionSuit=suit; G.actionsLeft=count;
  // 记录本次行动的跟随方式（copy/pivot/surpass/lead）供课税加成等领袖能力判断；主导回合清空
  G.actionFollowMode=(context==='follow')?(G._followMode||null):null;
  G.pending=null; G.highlight=null; G.phase='actions'; G.turnPlayer=pIdx;
  G.players[pIdx]._abil={}; // 重置”每回合一次”能力标记（如 g24 文物贩子）
  G.preludeOpen=(count>0); G.weaponBattle=false; G._freePrelude=false; // 序幕（规则书 p.17/20）：出牌后→花费首个行动点前可花资源换行动；武器解锁/免点数标记每回合重置
  (G.players[pIdx].guildCards||[]).forEach(c=>{ c._freshlySecured=false; }); // 新序幕窗口开始：清除”本序幕刚收纳”标记（规则书 p.20）
  if(count<=0){ endActorTurn(); return; }
  promptActions(); render();
}
function promptActions(){
  const acts=SUITS[G.actionSuit].actions.map(a=>ACTION_NAMES[a]).join(' / ');
  setPrompt(`${pname(G.actor)} 执行 <b style="color:${SUITS[G.actionSuit].color}">${SUITS[G.actionSuit].name}</b> · 剩余 <b>${G.actionsLeft}</b> 次。<br>可用：${acts}。`);
}
function endActorTurn(){
  G.pending=null; G.highlight=null;
  if(G.actionContext==='lead'){ startFollow(); }
  else { G.followQueue.shift(); advanceFollow(); }
}
function cancelAction(){ if(G._freePrelude) abortPrelude(); G.pending=null; G.highlight=null; promptActions(); render(); }

/* ------------------------------ 跟随 ----------------------------------- */
function startFollow(){
  G.actionContext='follow'; G.followQueue=[];
  for(let k=1;k<G.numPlayers;k++) G.followQueue.push((G.initiative+k)%G.numPlayers);
  advanceFollow();
}
function advanceFollow(){
  while(G.followQueue.length && G.players[G.followQueue[0]].hand.length===0){
    const idx=G.followQueue.shift(); logMsg(`${pname(idx)} 无手牌，自动跳过`,'sys');
  }
  if(G.followQueue.length===0){ checkInitiative(); return; }
  const idx=G.followQueue[0]; G.phase='follow'; G.turnPlayer=idx; G.pending=null; G.highlight=null;
  setPrompt(followPrompt(idx)); render();
}
function followPrompt(idx){
  const lc=G.lead.card; const ln=G.lead.zero?0:lc.number;
  return `${pname(idx)} <b>跟随</b>：点击一张手牌选 超越/复制/转向。<br>主导牌 <b style="color:${SUITS[lc.suit].color}">${SUITS[lc.suit].name}${ln}</b>；超越需同花色且点数 &gt; ${ln}。`;
}
function followCardChoose(i){
  const idx=G.followQueue[0]; const p=G.players[idx]; const card=p.hand[i];
  const lc=G.lead.card; const ln=G.lead.zero?0:lc.number;
  const modes=[]; if(card.suit===lc.suit&&card.number>ln) modes.push('surpass');
  if(card.suit!==lc.suit) modes.push('pivot'); modes.push('copy');
  const canSeize=(G.seizedBy===null);
  openModal(m=>{
    m.appendChild(el('h2',null,`使用 ${SUITS[card.suit].name}${card.number}`));
    const mdLabel={surpass:`超越（取 ${card.pips} 行动 · ${SUITS[lc.suit].name}）`,pivot:`转向（取 1 行动 · ${SUITS[card.suit].name}）`,copy:`复制（取 1 行动 · ${SUITS[lc.suit].name}，盖放）`};
    let seize=false;
    modes.forEach(mode=>{ const b=el('button','btn',mdLabel[mode]); b.style.display='block'; b.style.margin='6px 0';
      b.onclick=()=>{ closeModal(); followPlay(idx,i,mode,seize); }; m.appendChild(b); });
    if(canSeize){
      const cb=el('button','btn ghost sm','☐ 同时夺取先攻'); cb.style.marginTop='6px';
      cb.onclick=()=>{ seize=!seize; cb.textContent=(seize?'☑':'☐')+' 同时夺取先攻'; }; m.appendChild(cb);
      m.appendChild(el('div','hintbox','夺取：额外弃1张牌（或用“7”超越）。本回合后续无人可再夺。'));
    }
    const cc=el('button','btn ghost','取消'); cc.onclick=()=>closeModal(); m.appendChild(cc);
  });
}
function followPlay(idx,i,mode,seize){
  const p=G.players[idx]; const card=p.hand.splice(i,1)[0];
  G.played.push({playerIdx:idx,card,mode,zero:false});
  logMsg(`${pname(idx)} ${({surpass:'超越',pivot:'转向',copy:'复制'})[mode]}：${SUITS[card.suit].name}${card.number}`,'act');
  const doActions=()=>{
    SFX.card();
    G._followMode=mode; // 记录本次跟随方式（surpass/pivot/copy）供领袖课税加成等判断
    if(mode==='surpass') startActions(idx,'follow',card.suit,card.pips);
    else if(mode==='pivot') startActions(idx,'follow',card.suit,1);
    else startActions(idx,'follow',G.lead.card.suit,1);
  };
  if(seize && G.seizedBy===null){
    if(mode==='surpass'&&card.number===7){
      G.seizedBy=idx; logMsg(`${pname(idx)} 以 7 超越，夺取先攻`,'sys'); toast(`🏁 ${G.players[idx].name} 以「7」夺取先攻！`); SFX.seize(); doActions();
    } else if(p.hand.length===0){
      toast('无额外手牌，未能夺取先攻'); doActions();
    } else if(p.hand.length===1){
      // 仅剩一张手牌，无需选择，直接弃置
      G.discard.push(p.hand.splice(0,1)[0]); G.seizedBy=idx;
      logMsg(`${pname(idx)} 额外弃牌，夺取先攻`,'sys'); toast(`🏁 ${G.players[idx].name} 弃牌夺取先攻！`); SFX.seize(); doActions();
    } else {
      // 规则书：玩家自选弃 1 张手牌（不限哪张）以夺取先攻
      openModal(m=>{
        m.appendChild(el('h2',null,'夺取先攻 · 选择弃置的手牌'));
        m.appendChild(el('div','hintbox','选择 1 张手牌弃置以夺取本回合先攻：'));
        const row=el('div'); row.style.cssText='display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:10px 0';
        p.hand.forEach((hc,hi)=>{
          const b=cardEl(hc);
          b.onclick=()=>{ closeModal(); G.discard.push(p.hand.splice(hi,1)[0]); G.seizedBy=idx;
            logMsg(`${pname(idx)} 额外弃 ${SUITS[hc.suit].name}${hc.number}，夺取先攻`,'sys'); toast(`🏁 ${G.players[idx].name} 弃牌夺取先攻！`); SFX.seize(); doActions(); };
          row.appendChild(b);
        });
        m.appendChild(row);
        const no=el('button','btn ghost','取消夺取（不弃牌）'); no.onclick=()=>{ closeModal(); doActions(); }; m.appendChild(no);
      });
    }
  } else {
    doActions();
  }
}
function followPass(){
  const idx=G.followQueue[0]; logMsg(`${pname(idx)} 跳过本回合`,'sys');
  G.followQueue.shift(); advanceFollow();
}

function checkInitiative(){
  let ni;
  if(G.seizedBy!==null){ ni=G.seizedBy; }
  else { let best=null,bn=-1; for(const pl of G.played){ if(pl.mode==='surpass'&&pl.card.number>bn){bn=pl.card.number;best=pl.playerIdx;} }
    ni=(best!==null)?best:G.initiative; }
  logMsg(ni!==G.initiative?`先攻转移给 ${pname(ni)}`:'先攻保持不变','sys');
  if(ni!==G.initiative) toast(`🏁 先攻 → ${G.players[ni].name}`, 1800);
  G.initiative=ni; endRoundDiscard();
}
function endRoundDiscard(){
  for(const pl of G.played){
    if(pl._return!=null){ const owner=G.players[pl._return]; owner.hand.push(pl.card); sortHand(owner);
      logMsg(`${pname(pl._return)} 联合体能力：收回 ${SUITS[pl.card.suit].name}${pl.card.number} 到手牌`,'sys'); }
    else G.discard.push(pl.card);
  }
  G.played=[]; G.lead=null; G.seizedBy=null;
  if(G.players.some(p=>p.hand.length>0)) beginRound(); else endChapter();
}

/* --------------------------- 章节 / 计分 ------------------------------- */
function endChapter(){
  G.phase='score';
  logMsg(`—— 第 ${G.chapter} 章结束 · 结算雄心 ——`,'score');
  toast(`📊 第 ${G.chapter} 章结算中…`, 2200);
  SFX.chapter();
  scoreAmbitions();
  // 领袖 Fuel-Drinker/Lavish（扩展）：若本章结算了「大亨」，持此领袖者弃光全部燃料（归还供应）
  if(G.useExpansion && G.ambitionBox.tycoon.length>0){
    G.players.forEach((p,i)=>{ if(leaderHas(p,'lavish') && p.res.fuel>0){ const n=p.res.fuel; G.resSupply.fuel+=n; p.res.fuel=0; logMsg(`${pname(i)} 领袖·挥霍：大亨已结算，弃光 ${n} 燃料`,'sys'); } });
  }
  applyCartelDiscards();
  if(G.ambitionBox.warlord.length>0) G.players.forEach(p=>{ if(p.trophies){logMsg(`${pname(G.players.indexOf(p))} 返还 ${p.trophies} 战利品`,'sys'); p.trophies=0;} });
  if(G.ambitionBox.tyrant.length>0) G.players.forEach(p=>{ if(p.captives){logMsg(`${pname(G.players.indexOf(p))} 返还 ${p.captives} 俘虏`,'sys'); p.captives=0;} });
  flipLowestAmbitionMarker(); // 收回全部标记到可用区 + 翻面「权力最低且未翻面」的一枚（官方 p.19 escalation）
  G.declaredThisChapter={};
  const thresh=POWER_TO_WIN[G.numPlayers];
  if(G.players.some(p=>p.power>=thresh) || G.chapter>=G.maxChapters){ endGame(); return; }
  G.chapter++; dealNewChapter();
  logMsg(`—— 第 ${G.chapter} 章开始（先攻 ${pname(G.initiative)}）——`,'score');
  toast(`🌟 第 ${G.chapter} 章开始！`, 1800);
  SFX.newChapter();
  offerTwoPlayerMulligan(); // 2 人局：非先攻方可一次性重抽 6 张手牌（官方 p.19）
  beginRound();
}
function dealNewChapter(){
  G.actionDeck=shuffle(buildActionDeck(G.numPlayers)); G.discard=[];
  G.players.forEach(p=>{ p.hand=[]; for(let k=0;k<6;k++) p.hand.push(G.actionDeck.pop()); sortHand(p); });
}
// 章末清算：收回所有雄心标记（盒中+可用）到可用区，并把「当前首位权力最低且尚未翻面」的一枚翻到高面。
// 翻面是持久的（跨章累积）：第1章末翻 2/0→4/2，第2章末翻 3/2→6/4，第3章末翻 5/3→9/5，之后无可翻。
function flipLowestAmbitionMarker(){
  const all=[...G.markersAvailable]; AMB_ORDER.forEach(k=>{ all.push(...G.ambitionBox[k]); G.ambitionBox[k]=[]; });
  G.markersAvailable=all;
  const unflipped=all.filter(m=>!m.flipped && m.nf!=null);
  if(unflipped.length){
    const m=unflipped.reduce((a,b)=> b.f<a.f ? b : a); // 当前首位权力最低者
    m.f=m.nf; m.s=m.ns; m.flipped=true;
    logMsg(`雄心标记升级（翻面）：一枚标记现为 <b>${m.f}/${m.s}</b>（首/次权力提高）`,'score');
  }
}
// 2 人局补正（Mulligan，官方 p.19）：发牌后，非先攻方可一次性弃掉全部 6 张手牌并重抽 6 张（必须接受新手牌）。
function twoPlayerMulliganRedraw(pIdx){
  const p=G.players[pIdx];
  G.discard.push(...p.hand); p.hand=[];
  for(let k=0;k<6&&G.actionDeck.length;k++) p.hand.push(G.actionDeck.pop());
  sortHand(p);
  logMsg(`${pname(pIdx)}（非先攻）行使 2 人局补正：弃掉手牌并重抽 6 张`,'sys'); render();
}
function offerTwoPlayerMulligan(){
  if(G.numPlayers!==2) return;
  const pIdx=(G.initiative+1)%2; // 非先攻玩家
  openModal(m=>{
    m.appendChild(el('h2',null,'2 人局补正（Mulligan）'));
    m.appendChild(el('div','hintbox',`${pname(pIdx)} 为非先攻方，可一次性弃掉全部 6 张手牌并重抽（必须接受新手牌）。`));
    const b1=el('button','btn','重抽 6 张'); b1.style.cssText='display:block;width:100%;margin:6px 0';
    b1.onclick=()=>{ closeModal(); twoPlayerMulliganRedraw(pIdx); };
    const b2=el('button','btn ghost','保留手牌'); b2.style.cssText='display:block;width:100%;margin:6px 0';
    b2.onclick=()=>{ closeModal(); };
    m.appendChild(b1); m.appendChild(b2);
  });
}
// 领袖计分修正映射（扩展）：某些领袖「该雄心」第二名不得分，且其本人第一名改按次位分（无城市奖励）。
// Elder/Just→暴君(tyrant)，Warrior/Violent→共情(empath)，Archivist/Academic→大亨(tycoon)。
const LEADER_AMB_DOWNGRADE={ just:'tyrant', violent:'empath', academic:'tycoon' };
// 玩家 i 是否对雄心 k 持有「降级型」领袖（第二名不得分/自己首位降为次位分）
function leaderDowngradesAmb(i,k){
  if(!G.useExpansion || i<0) return false;
  const p=G.players[i];
  for(const eff in LEADER_AMB_DOWNGRADE){ if(LEADER_AMB_DOWNGRADE[eff]===k && leaderHas(p,eff)) return true; }
  return false;
}
function scoreAmbitions(){
  AMB_ORDER.forEach(k=>{
    const mk=G.ambitionBox[k]; if(!mk.length) return;
    const hi=mk.reduce((x,m)=>x+m.f,0), lo=mk.reduce((x,m)=>x+m.s,0);
    // 竞争者：真实玩家（计数>0）+ 2 人局虚拟第三方（出局行星资源播种，仅占位、从不得分）
    const cs=G.players.map((p,i)=>({i,n:AMBITIONS[k].count(p),real:true})).filter(o=>o.n>0);
    if(G.numPlayers===2 && G.phantom && G.phantom[k]>0) cs.push({i:-1,n:G.phantom[k],real:false});
    if(!cs.length){ logMsg(`雄心 ${AMBITIONS[k].name}：无人持有，无人得分`,'score'); return; }
    const nameOf=o=> o.real?pname(o.i):'虚拟第三方';
    logMsg(`雄心 <b>${AMBITIONS[k].name}</b>（首${hi}/次${lo}）数量：${cs.map(o=>nameOf(o)+'×'+o.n).join('，')}`,'score');
    // 该雄心是否存在「降级型」领袖（任一参与者持有）：触发时第二名不得分
    const downgradeFirst=cs.some(o=>o.real && leaderDowngradesAmb(o.i,k));
    const maxN=Math.max(...cs.map(o=>o.n)); const firsts=cs.filter(o=>o.n===maxN);
    if(firsts.length===1){
      const f=firsts[0];
      if(f.real){
        if(leaderDowngradesAmb(f.i,k)){ // 该领袖本人首位 → 按次位分，且无城市奖励
          award(f.i, lo, `${AMBITIONS[k].name} 首位（领袖降级→次位分 +${lo}，无城市奖励）`);
        } else { const bonus=cityBonus(G.players[f.i]);
          award(f.i, hi+bonus, `${AMBITIONS[k].name} 首位 +${hi}${bonus?`(+${bonus}城市奖励)`:''}`);
        }
      } else logMsg(`雄心 ${AMBITIONS[k].name}：首位由虚拟第三方占据（不得分）`,'score');
      // 次位：余者中的最高且必须唯一；并列次位则无人得分（官方 p18）
      const rest=cs.filter(o=>o!==f);
      if(rest.length){ const m2=Math.max(...rest.map(o=>o.n)); const seconds=rest.filter(o=>o.n===m2);
        if(seconds.length===1){ const s=seconds[0];
          if(downgradeFirst){ logMsg(`雄心 ${AMBITIONS[k].name}：领袖效果生效，第二名不得分`,'score'); }
          else if(s.real){
            if(G.useExpansion && leaderHas(G.players[s.i],'proud')) logMsg(`雄心 ${AMBITIONS[k].name}：${pname(s.i)} 骄傲——仅唯一首位才得分，次位不得分`,'score');
            else award(s.i, lo, `${AMBITIONS[k].name} 次位 +${lo}`);
          }
          else logMsg(`雄心 ${AMBITIONS[k].name}：次位由虚拟第三方占据（不得分）`,'score');
        } else logMsg(`雄心 ${AMBITIONS[k].name}：并列次位（${seconds.length} 方），次位无人得分`,'score');
      }
    } else {
      // 并列首位：各方改得「次位」分（虚拟第三方仍不得分），且不再另设次位
      firsts.forEach(o=>{ if(!o.real){ logMsg(`雄心 ${AMBITIONS[k].name}：虚拟第三方并列首位（不得分）`,'score'); return; }
        // Noble/Proud（扩展）：计分只有唯一第一名才得分 → 并列首位时该玩家不得分
        if(G.useExpansion && leaderHas(G.players[o.i],'proud')){ logMsg(`雄心 ${AMBITIONS[k].name}：${pname(o.i)} 骄傲——并列首位不得分`,'score'); return; }
        award(o.i, lo, `${AMBITIONS[k].name} 并列首位 +${lo}`);
      });
    }
  });
}
function award(i,pow,reason){
  G.players[i].power += pow;
  logMsg(`${pname(i)} ${reason} → 总分 <b>${G.players[i].power}</b>`,'score');
  SFX.score();
  // animate power display
  setTimeout(()=>{
    const els=document.querySelectorAll('.pl-pw-'+i);
    els.forEach(e=>{ e.style.animation='none'; e.offsetHeight; e.style.animation='power-flash .5s ease-out'; });
  },50);
}
function cityBonus(p){ const built=5-p.supply.cities; return built>=5?5:(built>=4?2:0); }
function totalRes(p){ return RES_ORDER.reduce((x,r)=>x+p.res[r],0); }
// 垄断联盟：每章计分后，拥有者的对手须弃光对应资源（材料/燃料）
function applyCartelDiscards(){
  ['material','fuel'].forEach(r=>{
    const owner=effOwner('cartel:'+r); if(!owner) return;
    let total=0;
    G.players.forEach(p=>{ if(p===owner) return; if(p.res[r]>0){ total+=p.res[r]; G.resSupply[r]+=p.res[r]; p.res[r]=0; } });
    const card=owner.guildCards.find(c=>c.eff==='cartel:'+r);
    if(total>0) logMsg(`「${card?card.name:'垄断联盟'}」生效：对手共弃置 ${total} 个${RESOURCES[r].name}`,'score');
  });
}
// 终局平分判定：官方规则——平分时「行动顺位最靠前者」获胜（从先攻者起顺时针）。顺位是全序，可彻底打破任何平分。
function turnOrderRank(p){ const n=G.numPlayers; const idx=G.players.indexOf(p); return (idx - G.initiative + n) % n; }
function endGame(){
  G.phase='end';
  SFX.victory();
  const sorted=[...G.players].sort((a,b)=> b.power-a.power || turnOrderRank(a)-turnOrderRank(b));
  const w=sorted[0]; logMsg(`🏆 游戏结束！胜者 ${pname(G.players.indexOf(w))}（${w.power}分）`,'score'); render();
  showVictoryScreen(sorted);
}
// 华丽终局画面：金色冠军高亮 + 排名表 + 再来一局（SFX.victory 已在 endGame 播放）
function showVictoryScreen(sorted){
  sorted = sorted || [...G.players].sort((a,b)=> b.power-a.power || turnOrderRank(a)-turnOrderRank(b));

    m.appendChild(sub);

      const dot=el('span','rdot'); dot.style.background=p.color.css; row.appendChild(dot);

      row.appendChild(el('span','rpw',p.power+''));

    b.onclick=()=>{ $('#modal').classList.remove('victory'); closeModal(); showStartScreen(); };
    m.appendChild(b);
  });
}

/* ============================== 行动实现 =============================== */
function onSystemClick(id){
  if(!G||!G.pending) return;
  const t=G.pending.type;
  if(t==='tax') doTax(id);
  else if(t==='build') doBuild(id);
  else if(t==='move') doMovePick(id);
  else if(t==='repair') doRepair(id);
  else if(t==='battle') doBattlePick(id);
}
function actorColorKey(){ return G.players[G.actor].color.key; }
function countShips(sys,col){ return G.map[sys].pieces.ships[col]||0; }
function emptySlots(sys){ const s=G.map[sys]; return s.kind==='planet'?(s.slots-s.pieces.buildings.length):0; }
function hasRival(s,col){ for(const c in s.pieces.ships){ if(c!==col&&s.pieces.ships[c]>0) return true; } return s.pieces.buildings.some(b=>b.owner!==col); }
function beginAction(type){
  if(G.actionsLeft<=0||G.pending) return;
  if(type==='influence'){ openInfluence(); return; }
  if(type==='secure'){ openSecure(); return; }
  const legal=legalTargets(type);
  if(legal.size===0){ toast('没有合法的「'+ACTION_NAMES[type]+'」目标'); return; }
  G.pending={type, step:(type==='move'?'src':'pick'), legal};
  G.highlight=legal; setPrompt(actionHint(type)); render();
}
function legalTargets(type){
  const col=actorColorKey(); const me=G.players[G.actor]; const set=new Set();
  for(const id in G.map){ const s=G.map[id]; if(s.outOfPlay) continue;
    if(type==='tax'){
      // 课税合法目标 = (a)你的忠诚城市（系统你控制或自由，且资源供给非空）；或 (b)你控制的系统中的敌方城市（资源可空——仍可俘获密探）。每城每回合限一次。
      const taxed=me._abil&&me._abil._taxed;
      const retax=canRetax(me); // Warlord's Cruelty：忽略「本回合已课税」限制
      const notTaxed=(owner)=>retax||!(taxed&&taxed.has(id+':'+owner));
      const cities=s.pieces.buildings.filter(b=>b.type==='city');
      let ownLoyal=cities.some(b=>b.owner===col)&&isLoyalSystem(id,me)&&s.resource&&G.resSupply[s.resource]>0&&notTaxed(col);
      const rc=(controllerOf(id)===col)?cities.find(b=>b.owner!==col):null;
      let rivalOK=rc&&notTaxed(rc.owner);
      // 领袖课税限制（扩展）：与 doTax 的 leaderTaxBlock 一致，提前从合法集中剔除被禁城市
      if(G.useExpansion){
        if(ownLoyal && leaderTaxBlock(me,id,{owner:col})) ownLoyal=false;
        if(rivalOK && leaderTaxBlock(me,id,rc)) rivalOK=false;
      }
      // 传说 Empath's Bond（扩展）：共情已宣告时，可课任意系统的任意城市（资源供给非空、未课税即可）
      let bondOK=false;
      if(empathBondActive(me) && s.resource && G.resSupply[s.resource]>0) bondOK=cities.some(b=>notTaxed(b.owner));
      if(ownLoyal||rivalOK||bondOK) set.add(id);
    } else if(type==='build'){
      const ship = canBuildShipAt(me,s,id,col); // 忠诚太空港可造船（受每港每回合 1 艘上限）；系统被敌方控制则造为「受损」（规则书 p.6）
      const bld = s.kind==='planet' && hasLoyalPiece(s,col) && emptySlots(id)>0 && (me.supply.cities>0||me.supply.starports>0); // 有忠诚棋子(舰船或建筑)的行星空槽可建城/港（规则书 p.12）
      if(ship||bld) set.add(id);
    } else if(type==='move'){
      if((s.pieces.ships[col]>0)&&isLoyalSystem(id,me)) set.add(id);
    } else if(type==='repair'){
      // 规则书 p.13：修理可作用于地图上任意「受损建筑」或「受损舰船」
      if(s.pieces.buildings.some(b=>b.owner===col&&b.damaged) || dmgShipsN(s,col)>0) set.add(id);
    } else if(type==='battle'){
      if((s.pieces.ships[col]>0)&&hasRival(s,col)) set.add(id);
    }
  }
  return set;
}
function actionHint(type){ return ({
  tax:'课税：点击金色高亮系统——你的忠诚城市（得资源），或你控制的敌方城市（得资源并俘获其 1 密探）。每城每回合限一次。',
  build:'建造：点击高亮系统 — 忠诚太空港建船，或你有忠诚棋子(舰船或建筑)且有空槽的行星建城市/太空港。',
  move:'移动：先点起点（你的忠诚舰船所在系统）。',
  repair:'修理：点击有你受损舰船或建筑的系统——扶正 1 艘受损舰船，或修复 1 座受损建筑。',
  battle:'战斗：点击你有舰船且有敌方棋子的系统。',
})[type]||''; }
function consumeAction(desc){
  if(desc) logMsg(desc,'act');
  if(G._freePrelude){ G._freePrelude=false; G._preludePaid=null; G.pending=null; G.highlight=null; promptActions(); render(); return; } // 序幕资源行动：不消耗行动点、不结束序幕
  G.preludeOpen=false; // 花费首个行动点 → 序幕结束（规则书 p.17）
  G.actionsLeft--; G.pending=null; G.highlight=null;
  if(G.actionsLeft<=0) endActorTurn(); else { promptActions(); render(); }
}
/* ----------------------------- 序幕（Prelude，规则书 p.17/20） ----------------------------- */
// 资源→序幕行动：物资=建造/修理、燃料=移动、武器=解锁「以本牌点数发动战斗」、遗物=收纳、通灵=主导牌所列行动。
// 被民愤的资源不能用于其序幕行动（仍可课税/计雄心）；忠诚卡可「以任意资源支付」并「无视该资源民愤」。
const PRELUDE_ACTS = { material:['build','repair'], fuel:['move'], relic:['secure'], psionic:null, weapon:null };
function loyalFor(player, rt){ return (player.guildCards||[]).some(c=>c&&c.eff==='loyal:'+rt); }
function preludeActsFor(rt){ return rt==='psionic' ? ((G.lead&&G.lead.card)?SUITS[G.lead.card.suit].actions.slice():[]) : (PRELUDE_ACTS[rt]||[]); }
function actionFeasible(type){
  const me=G.players[G.actor]; const col=me.color.key;
  if(type==='secure') return G.court.some(c=>majorityOn(c,col));
  if(type==='influence') return me.supply.agents>0 && G.court.length>0;
  return legalTargets(type).size>0;
}
function preludeActionDesc(rt){ return ({material:'建造/修理', fuel:'移动', weapon:'解锁「以本牌点数发动战斗」', relic:'收纳', psionic:'打出主导牌所列行动'})[rt]; }
// 返回 {enabled, desc, reason}
function preludeOption(me, rt){
  const desc=preludeActionDesc(rt); const loyal=loyalFor(me, rt);
  const hasAny=RES_ORDER.some(r=>(me.res[r]||0)>0);
  const canPay = loyal ? hasAny : ((me.res[rt]||0)>0);
  if(!canPay) return {enabled:false, desc, reason: loyal?'无任何资源':'无该资源'};
  if(me.outraged&&me.outraged[rt] && !loyal) return {enabled:false, desc, reason:'已民愤'};
  if(rt==='weapon'){ return G.weaponBattle ? {enabled:false, desc, reason:'本回合已解锁'} : {enabled:true, desc, loyal}; }
  if(rt==='psionic' && !(G.lead&&G.lead.card)) return {enabled:false, desc, reason:'无主导牌'};
  const feasible = preludeActsFor(rt).some(a=>actionFeasible(a));
  if(!feasible) return {enabled:false, desc, reason:'无合法目标'};
  return {enabled:true, desc, loyal};
}
function openPrelude(){
  const me=G.players[G.actor];
  if(!G.preludeOpen){ toast('序幕已结束（已花费行动点）'); return; }
  if(G.pending) return;
  openModal(m=>{
    m.appendChild(el('h2',null,'序幕 · 花费资源换行动'));
    m.appendChild(el('div','hintbox','出牌后、花费首个行动点前，可花资源换取额外行动（不消耗行动点）；资源用后归还供应。被民愤的资源不能用于其序幕行动（忠诚卡例外）。'));
    RES_ORDER.forEach(rt=>{ const o=preludeOption(me, rt);
      const b=el('button','btn'+(o.enabled?'':' ghost')); b.style.cssText='display:block;width:100%;margin:6px 0;text-align:left'; b.disabled=!o.enabled;
      b.innerHTML=`<b style="color:${RESOURCES[rt].color}">${RESOURCES[rt].icon} ${RESOURCES[rt].name}</b> → ${o.desc}`+(o.enabled?(o.loyal?'　<span style="opacity:.7;font-size:12px">忠诚:可用任意资源支付</span>':''):`　<span style="opacity:.55;font-size:12px">(${o.reason})</span>`);
      b.onclick=()=>{ closeModal(); doPreludeSpend(rt); }; m.appendChild(b); });
    // —— 扩展·序幕能力（领袖与传说，均免点数、不结束序幕）——
    if(G.useExpansion){
      // 弃卡清除民愤（Empath's Vision/Keeper's Trust/Warlord's Cruelty/Tyrant's Ego/Tycoon's Charm）
      preludeClearOutrageOptions(me).forEach(opt=>{
        const b=el('button','btn'); b.style.cssText='display:block;width:100%;margin:6px 0;text-align:left';
        b.innerHTML=`📜 弃「${opt.name}」清除 <b>${opt.types.map(rt=>RESOURCES[rt].name).join('+')}</b> 民愤`;
        b.onclick=()=>{ closeModal(); preludeClearOutrage(me,opt.cardId); openPrelude(); }; m.appendChild(b);
      });
      // Tycoon's Ambition：弃光物资+燃料宣告 1 个未宣告雄心
      if(loreHas(me,'tycoondeclare') && ambitionDeclared('tycoon') && G.markersAvailable.length>0
         && AMB_ORDER.some(k=>!G.declaredThisChapter[k]) && (me.res.material+me.res.fuel)>0){
        const b=el('button','btn'); b.style.cssText='display:block;width:100%;margin:6px 0;text-align:left';
        b.innerHTML='📜 <b>大亨野心</b>：弃光物资+燃料 → 宣告 1 个未宣告雄心';
        b.onclick=()=>{ closeModal(); openTycoonAmbition(me); }; m.appendChild(b);
      }
      // Tycoon's Charm：弃物资/燃料换资源
      if(loreHas(me,'charmgain') && ambitionDeclared('tycoon') && (me.res.material+me.res.fuel)>0){
        const b=el('button','btn'); b.style.cssText='display:block;width:100%;margin:6px 0;text-align:left';
        b.innerHTML='📜 <b>大亨魅力</b>：弃物资/燃料 → 每个换 1 资源';
        b.onclick=()=>{ closeModal(); openTycoonCharm(me); }; m.appendChild(b);
      }
    }
    if(G.weaponBattle) m.appendChild(el('div','hintbox','✦ 本回合已解锁：可用本牌点数发动战斗（见行动栏）。'));
    const cc=el('button','btn ghost','关闭'); cc.onclick=()=>closeModal(); m.appendChild(cc);
  });
}
// 扩展·序幕：弃卡清除民愤 —— 选项与执行
function preludeClearOutrageOptions(me){
  if(!G.useExpansion) return [];
  const out=[];
  (me.loreCards||[]).forEach(id=>{ const L=loreById(id); if(!L) return;
    const types=L.eff.filter(e=>e.indexOf('clearoutrage:')===0).map(e=>e.split(':')[1]).filter(rt=>me.outraged&&me.outraged[rt]);
    if(types.length) out.push({cardId:id, name:L.cn, types});
  });
  return out;
}
function preludeClearOutrage(me, cardId){
  const L=loreById(cardId); if(!L) return false;
  const types=L.eff.filter(e=>e.indexOf('clearoutrage:')===0).map(e=>e.split(':')[1]).filter(rt=>me.outraged[rt]);
  if(!types.length) return false;
  types.forEach(rt=>{ me.outraged[rt]=false; });
  const i=(me.loreCards||[]).indexOf(cardId); if(i>=0) me.loreCards.splice(i,1);
  logMsg(`${pname(G.actor)} 序幕·弃「${L.cn}」清除 ${types.map(rt=>RESOURCES[rt].name).join('+')} 民愤`,'act');
  render(); return true;
}
// Tycoon's Ambition：弃光物资+燃料 → 宣告 1 个未宣告雄心（不归零主导牌）
function declareAmbitionNoZero(pIdx, ambKey){
  if(!G.markersAvailable.length) return null;

  G.ambitionBox[ambKey].push(mk); G.declaredThisChapter[ambKey]=true;
  onDeclareAmbition(pIdx, ambKey);

}

        openPrelude(); }; m.appendChild(b); });

// Tycoon's Charm：每弃 1 物资/燃料换 1 资源（优先弃燃料）
function tycoonCharmDiscard1(me){ if(me.res.fuel>0){ me.res.fuel--; G.resSupply.fuel++; return 'fuel'; } if(me.res.material>0){ me.res.material--; G.resSupply.material++; return 'material'; } return null; }
function openTycoonCharm(me){

      b.onclick=()=>{ const d=tycoonCharmDiscard1(me); if(d){ gainResource(me,rt); logMsg(`${pname(G.actor)} 大亨魅力：弃 ${RESOURCES[d].name} 换 ${RESOURCES[rt].name}`,'act'); } draw(); };
      m.appendChild(b); });

function preludePay(me, pr){ me.res[pr]=(me.res[pr]||0)-1; if(me.res[pr]<0) me.res[pr]=0; G.resSupply[pr]=(G.resSupply[pr]||0)+1; G._preludePaid=pr; }
function abortPrelude(){ // 序幕免点数行动被放弃/取消：退还已花资源并清除标记
  if(!G._freePrelude) return;
  if(G._preludePaid){ const me=G.players[G.actor]; me.res[G._preludePaid]=(me.res[G._preludePaid]||0)+1; G.resSupply[G._preludePaid]=Math.max(0,(G.resSupply[G._preludePaid]||0)-1);
    logMsg(`${pname(G.actor)} 放弃序幕行动，退还 ${RESOURCES[G._preludePaid].name}`,'sys'); }
  G._freePrelude=false; G._preludePaid=null;
}
function doPreludeSpend(rt){
  const me=G.players[G.actor]; const o=preludeOption(me, rt);
  if(!o.enabled){ toast('该序幕行动不可用'); return; }
  const loyal=loyalFor(me, rt);
  const payTypes = loyal ? RES_ORDER.filter(r=>(me.res[r]||0)>0) : [rt];
  if(loyal && payTypes.length>1){
    openModal(m=>{ m.appendChild(el('h2',null,`忠诚卡 · 用哪种资源支付（作为${RESOURCES[rt].name}）`));
      payTypes.forEach(pr=>{ const b=el('button','btn',`花 ${RESOURCES[pr].icon} ${RESOURCES[pr].name}`); b.style.cssText='display:block;width:100%;margin:6px 0';
        b.onclick=()=>{ closeModal(); preludePay(me, pr); launchPrelude(rt); }; m.appendChild(b); });
      const cc=el('button','btn ghost','取消'); cc.onclick=()=>closeModal(); m.appendChild(cc);
    });
    return;
  }
  preludePay(me, loyal?payTypes[0]:rt); launchPrelude(rt);

function launchPrelude(rt){

function openRaidModal(atkIdx, defC, keysLeft, done){

// 领袖 Quartermaster/Resilient（扩展）：任何有该玩家参与的战斗后，按其控制的星港数（含对手的），
// 每个修复战斗星系内 1 艘忠诚（己方）受损舰。返回修复数（供日志/测试）。
function leaderResilientRepair(p, sysId){
  if(!G.useExpansion || !leaderHas(p,'resilient')) return 0;

  // 该玩家控制的星港数（含对手的——只要建在你控制的系统里）
  let starports=0; for(const cid of controlledSystems(p)){ const cs=G.map[cid];
    starports+=cs.pieces.buildings.filter(b=>b.type==='starport').length; }
  let repaired=0; const d=dmgMap(s);
  for(let i=0;i<starports && (d[col]||0)>0;i++){ d[col]--; if(!d[col]) delete d[col]; repaired++; }
  return repaired;
}

}
// 洗劫议会（Ransack）：每摧毁 1 座城市，可「收纳任意 1 张含守方密探的议会卡」，卡上所有敌方密探计入战利品（非俘虏）。可放弃。
function maybeRansack(times, defC, done){

      b.onclick=()=>{ closeModal(); ransackTake(c, defC, ()=>maybeRansack(times-1, defC, done)); }; m.appendChild(b); });

// 收纳（洗劫版）：敌方密探→战利品；自己密探归还补给；Vox 立即触发；不消耗行动点，完成后调用 after()。
function ransackTake(c, defC, after){

  else if(c.eff==='gatedice'){ logMsg('「星门守备部队」就位：你在星门发起战斗 +2 骰','sys'); }
  else if(c.eff==='secretorder'){ logMsg('「隐秘结社」就位：宣告守护/共情时此牌点数不归零','sys'); }
