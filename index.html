function resolveBattle(sysId,defColor,alloc){
  const s=G.map[sysId]; const atk=G.players[G.actor]; const def=G.players.find(p=>p.color.key===defColor);
  const res={hit:0,self:0,intercept:0,bldg:0,key:0};
  const faceLog=[]; // 记录每颗骰子的面结果，供动画展示
  const rollDie=(dt)=>{ const f=Object.assign({},DICE[dt].faces[Math.floor(Math.random()*6)]); faceLog.push({type:dt,face:f}); return f; };
  const addFace=(f)=>{ for(const k in f){ if(k!=='_rerolled') res[k]=(res[k]||0)+(f[k]||0); } };
  // 传说·门控前置量：进攻舰是否全新鲜（开战时）、攻方新鲜忠诚舰数（鱼雷重掷预算）、守方新鲜忠诚舰
  const lore=G.useExpansion;
  const atkTotal0=s.pieces.ships[atk.color.key]||0, atkFresh0=freshShips(s,atk.color.key);
  const defFresh0=freshShips(s,defColor);
  const skFaces=[]; const skFaceIdx=[];
  const asFaces=[]; const asFaceIdx=[]; // 强攻骰面（供寻的鱼雷重掷）
  const raFaces=[]; const raFaceIdx=[]; // 劫掠骰面（供 Corsair/Tricky 重掷）
  // 领袖 Corsair/Tricky（扩展）：进攻战斗可重掷劫掠骰，数量 ≤ 你拥有的不同资源种类数
  const trickyOn=(G.useExpansion && leaderHas(atk,'tricky'));
  // 传说 Empath's Vision（扩展）：共情已宣告期间，掷骰方可重掷任意数量骰一次（无预算）。需把三类骰都纳入数组。
  const visionOn=(lore && loreHas(atk,'empathvision') && ambitionDeclared('empath'));
  // 突袭骰始终纳入数组（游击部队重掷用）；强攻骰在鱼雷/Vision 时纳入；劫掠骰在 Tricky/Vision 时纳入
  for(const dt of ['skirmish','assault','raid']){ const n=alloc[dt]||0;
    for(let i=0;i<n;i++){ const f=rollDie(dt);
      if(dt==='skirmish'){ skFaces.push(f); skFaceIdx.push(faceLog.length-1); }
      else if(dt==='assault' && lore && (loreHas(atk,'seekertorp')||visionOn)){ asFaces.push(f); asFaceIdx.push(faceLog.length-1); }
      else if(dt==='raid' && (trickyOn||visionOn)){ raFaces.push(f); raFaceIdx.push(faceLog.length-1); }
      else addFace(f); } }
  let rerolled=0; // 游击部队：每 1 武器标志（武器资源＋武器图标公会卡）可重掷 1 颗空白游击骰（自动重掷无收益骰）
  if(ownsEff(atk,'skirmishreroll')){
    let budget=weaponIcons(atk);
    for(let i=0;i<skFaces.length && budget>0;i++){
      const f=skFaces[i]; const blank=!(f.hit||f.self||f.intercept||f.bldg||f.key);
      if(blank){ const nf=Object.assign({},DICE['skirmish'].faces[Math.floor(Math.random()*6)],{_rerolled:1}); skFaces[i]=nf; faceLog[skFaceIdx[i]].face=nf; budget--; rerolled++; }
    }
  }
  // 传说·寻的鱼雷(Seeker Torpedoes)：进攻掷骰后，每艘新鲜忠诚进攻舰可重掷至多 1 颗强攻骰。
  // 强攻骰每个有 self 的面都带 hit，故自动策略=重掷所有掷出自损面 ◯ 的骰，给玩家最大避损机会。
  let torpReroll=0;
  if(lore && loreHas(atk,'seekertorp') && asFaces.length){
    let budget=atkFresh0; // 每艘新鲜忠诚进攻舰 ≤1 颗
    for(let i=0;i<asFaces.length && budget>0;i++){
      const f=asFaces[i]; if((f.self||0)>0){
        const nf=Object.assign({},DICE['assault'].faces[Math.floor(Math.random()*6)],{_rerolled:1}); asFaces[i]=nf; faceLog[asFaceIdx[i]].face=nf; budget--; torpReroll++;
      }
    }
  }
  // 领袖 Corsair/Tricky（扩展）：进攻方重掷无收益（无钥匙且无建筑命中）的劫掠骰，预算=拥有的不同资源种类数。
  let trickyReroll=0;
  if(trickyOn && raFaces.length){
    let budget=RES_ORDER.filter(r=>(atk.res[r]||0)>0).length; // distinct 资源种类数
    for(let i=0;i<raFaces.length && budget>0;i++){
      const f=raFaces[i]; const noGain=!((f.key||0)>0 || (f.bldg||0)>0); // 仅命中 intercept 等无收益面才重掷
      if(noGain){ const nf=Object.assign({},DICE['raid'].faces[Math.floor(Math.random()*6)],{_rerolled:1}); raFaces[i]=nf; faceLog[raFaceIdx[i]].face=nf; budget--; trickyReroll++; }
    }
  }
  skFaces.forEach(addFace); asFaces.forEach(addFace); raFaces.forEach(addFace); res._rerolled=rerolled; res._torpReroll=torpReroll; res._trickyReroll=trickyReroll;
  // —— 传说·自损面修正（攻方收骰前，规则书各卡）——
  let mirrorAdd=0, signalCut=0, railgunAdd=0;
  if(lore){
    // 镜面装甲(Mirror Plating)·防御：攻击者若掷了任意强攻骰，向其加 1 个自损面 ◯
    if(def && loreHas(def,'mirror') && (alloc.assault|0)>0){ mirrorAdd=1; res.self=(res.self||0)+1; }
    // 信号破坏者(Signal Breaker)·进攻：开战时所有进攻舰新鲜 → 忽略掷出的 1 个自损面（不低于 0）
    if(loreHas(atk,'signalbreaker') && atkTotal0>0 && atkFresh0===atkTotal0 && (res.self||0)>0){ signalCut=1; res.self=Math.max(0,res.self-1); }
    // 轨道炮阵列(Railgun Arrays)·防御：攻击者收骰前若有任何新鲜忠诚防御舰 → 攻击者必受 1 击
    if(def && loreHas(def,'railgun') && defFresh0>0){ railgunAdd=1; res.self=(res.self||0)+1; }
  }
  res._mirrorAdd=mirrorAdd; res._signalCut=signalCut; res._railgunAdd=railgunAdd;
  // —— 结算顺序（规则书 p.14）：①自伤 → ②拦截（每战一次，=守方「新鲜舰」数）→ ③命中守方舰（新鲜→受损→摧毁；舰尽溢出建筑）→ ④命中建筑 → ⑤劫掠 ——
  const def0fresh=freshShips(s,defColor);                                 // 拦截基数：守方战前「新鲜舰」数
  const interLoss=(res.intercept>0 && def0fresh>0) ? def0fresh : 0;       // 任意拦截面即触发；伤害=守方新鲜舰数；每战仅一次
  const atkR=applyShipHits(sysId, atk.color.key, res.self+interLoss, def); // 攻方舰：新鲜→受损→摧毁；被摧毁→守方战利品
  const defR=applyShipHits(sysId, defColor, res.hit, atk);                 // 守方舰：被摧毁→攻方战利品；舰尽则 overflow 转建筑
  const bld=damageBuildings(sysId, defColor, res.bldg+defR.overflow, atk); // 摧毁建筑→攻方战利品；摧毁城市→民愤
  const stolen=0; // 劫掠改为模态框交互，此处不再自动偷取
  return {res, atkDmg:atkR.damaged, atkLost:atkR.destroyed, defDmg:defR.damaged, defKilled:defR.destroyed, bldgDestroyed:bld.destroyed, outrages:bld.outrages, stolen, interLoss, faces:faceLog};
}
// 建筑命中：新鲜→受损（翻面）；受损→摧毁（移除，归还原主补给；并计入 destroyer 战利品）。
// 摧毁【城市】→ destroyer 就该星系行星资源「引发民愤」（规则书 p.16）。返回 {destroyed, outrages:[{rtype,msg}]}。
function damageBuildings(sysId,color,n,destroyer){
  const s=G.map[sysId]; let destroyed=0; const outrages=[];
  for(let i=0;i<n;i++){
    const fresh=s.pieces.buildings.find(b=>b.owner===color&&!b.damaged);
    if(fresh){ fresh.damaged=true; continue; }
    const di=s.pieces.buildings.findIndex(b=>b.owner===color&&b.damaged);
    if(di>=0){ const b=s.pieces.buildings.splice(di,1)[0]; const o=G.players.find(p=>p.color.key===color);
      if(b.type==='city'){ o.supply.cities++; if(destroyer&&s.resource){ outrages.push({rtype:s.resource, msg:provokeOutrage(destroyer, s.resource)}); } }
      else o.supply.starports++;
      destroyed++; if(destroyer) destroyer.trophies++; } else break;
  }
  return {destroyed, outrages};
}
// 引发民愤（规则书 p.16）：destroyer 弃光自己该类型的资源(归还供应)与公会卡(忠诚卡例外保留)，
// 并用密探覆盖该资源的民愤图标（已民愤则不再放密探）。被民愤的资源不能用于序幕行动（但仍可课税/计雄心）。
function provokeOutrage(player, rtype){
  if(!rtype||!player) return '';
  const parts=[];
  const rn=player.res[rtype]||0;                                   // 1) 弃光该类型资源 → 归还供应
  if(rn>0){ player.res[rtype]=0; G.resSupply[rtype]+=rn; parts.push(`弃 ${rn} ${RESOURCES[rtype].name}`); }
  const discarded=[], kept=[];                                     // 2) 弃光该类型公会卡（忠诚卡保留）
  for(const c of (player.guildCards||[]).slice()){
    if(c.icon!==rtype) continue;
    if(typeof c.eff==='string' && c.eff.startsWith('loyal:')){ kept.push(c.name); continue; }
    discardGuildCard(player, c); discarded.push(c.name);
  }
  if(discarded.length) parts.push(`弃公会卡[${discarded.join('、')}]`);
  if(kept.length) parts.push(`保留忠诚卡[${kept.join('、')}]`);
  const already=player.outraged[rtype]; player.outraged[rtype]=true; // 3) 覆盖民愤图标
  if(!already){ if(player.supply.agents>0) player.supply.agents--; parts.push('覆盖民愤图标(−1密探)'); }
  else parts.push('（该资源此前已民愤）');
  return parts.join('，');
}
function stealResource(from,to){ if(ownsEff(from,'guardian')) return null;

  // 传说·守护者信任(Keeper's Trust)：守护已宣告期间，对手不能偷你与他们(偷取者)已有相同类型的资源

function majorityOn(c,col){ const mine=c.agents[col]||0; if(mine<=0) return false;

function doSecure(c){

  else if(c.eff==='secretorder'){ logMsg('「隐秘结社」就位：宣告守护/共情时此牌点数不归零','sys'); }
  consumeAction(base);

/* ================= 议会卡能力：序幕一次性 / 行动型 / 持续面板 =================
   正式规则中多数为「序幕阶段」能力；本简化引擎没有独立序幕，统一作为
   玩家回合内可主动激活的能力，通过行动栏「议会卡能力」面板调用。
   - 序幕一次性：免费，使用后弃置该公会卡（移入 courtDiscard）
   - 行动型：消耗 1 次行动
   - g24 文物贩子：每回合一次，不弃卡                                          */
function rivalsOf(me){ return G.players.filter(p=>p!==me); }
function ownsCardId(p,id){ return (p.guildCards||[]).some(c=>c.id===id); }
function weaponIcons(p){ return (p.res.weapon|0) + guildIcons(p,'weapon'); } // 武器标志 = 武器资源 + 武器图标公会卡（规则书 p.18）
function controlledSystems(p){ const out=[]; for(const id in G.map){ const s=G.map[id]; if(!s.outOfPlay && controllerOf(id)===p.color.key) out.push(id); } return out; }
function gatesInPlay(){ const out=[]; for(let cl=1;cl<=6;cl++){ const id='G'+cl; if(G.map[id]&&!G.map[id].outOfPlay) out.push(id); } return out; }
function stealableGuildCards(victim){ const cards=(victim.guildCards||[]); const guard=cards.find(c=>c.eff==='guardian'); if(guard) return [guard];
  let list=cards.slice();
  // 传说·守护者团结(Keeper's Solidarity)：守护已宣告期间，只要你持有与某公会卡同类型的资源，对手不能偷该卡
  if(G.useExpansion && loreHas(victim,'keepersolidarity') && ambitionDeclared('keeper')){
    list=list.filter(c=>!(c.icon && (victim.res[c.icon]||0)>0));
  }
  return list; }
// 偷取一张对手公会卡：宣誓守护者(g22)被偷时不归偷取者，而是置于议会牌堆底（规则书）。返回 true=归入偷取者麾下；false=置底。
// 议会牌堆以 .pop() 取顶 → 数组末为顶、首为底；故置底用 unshift。
function takeStolenGuildCard(opp,me,card){ const i=(opp.guildCards||[]).indexOf(card); if(i>=0) opp.guildCards.splice(i,1);
  if(card.eff==='guardian'){ card.agents={}; G.courtDeck.unshift(card); return false; }
  (me.guildCards=me.guildCards||[]).push(card); return true; }
function discardGuildCard(owner,card){
  if((card.stash|0)>0 && typeof card.eff==='string' && card.eff.startsWith('cartel:')){ const rt=card.eff.split(':')[1]; G.resSupply[rt]+=card.stash; card.stash=0; } // 垄断卡离场：堆置资源归还供应

function abFillSlots(me,card,rtype){ const SLOTS=6; let need=Math.max(0,SLOTS-totalRes(me)); let got=0,stolen=0;

function expActionList(p){
  if(!G.useExpansion||!p||G.phase!=='actions'||!G.actionSuit) return [];
  const baseActs=SUITS[G.actionSuit].actions; const out=[];
  const has=(k)=>leaderHas(p,k)||loreHas(p,k);
  if(has('summon')&&baseActs.includes('build')) out.push({key:'summon',label:'📜工具祭司·召唤：在你控制且有你城市的系统建 1 舰（每回合一次）',used:!!(p._abil&&p._abil._summon)});
  if(has('nurture')&&baseActs.includes('build')) out.push({key:'nurture',label:'📜活体建筑·培育：课税你的 1 座忠诚城市'});
  if(has('prune')&&baseActs.includes('repair')) out.push({key:'prune',label:'📜活体建筑·修剪：忠诚城市↔太空港 互换'});
  if(has('martyr')&&baseActs.includes('move')) out.push({key:'martyr',label:'📜生存覆写·殉道：毁己方1新鲜舰→毁同系统1敌舰(战利品)'});
  if(has('annex')&&baseActs.includes('build')&&ambitionDeclared('tyrant')) out.push({key:'annex',label:'👑暴君权威·吞并：你控制的城/港换为忠诚（暴君宣告中）'});

// 殉道：在系统 id 牺牲己方 1 新鲜舰，摧毁敌色 ec 的 1 舰（计入战利品）。抽出供测试。
function martyrResolve(me, id, ec){
  const s=G.map[id]; const col=me.color.key;
  s.pieces.ships[col]--; me.supply.ships++;                 // 己方新鲜舰 → 归还补给（不成战利品）
  const ep=G.players.find(p=>p.color.key===ec);
  s.pieces.ships[ec]--; const ed=dmgMap(s);                 // 敌舰 −1（优先保留新鲜被毁：仅当受损数超过总数才下调）
  if((ed[ec]||0)>s.pieces.ships[ec]) ed[ec]=s.pieces.ships[ec];
  if(s.pieces.ships[ec]<=0){ delete s.pieces.ships[ec]; if(ed[ec]!=null) delete ed[ec]; }
  if(ep) ep.supply.ships++; me.trophies++;
  return ep;
}

    for(const id in G.map){ const s=G.map[id]; if(s.outOfPlay) continue;
      if(s.pieces.buildings.some(b=>b.owner===col&&b.type==='city') && isLoyalSystem(id,me) && s.resource && G.resSupply[s.resource]>0) ids.push(id); }
    expPickSystem('培育 · 课税忠诚城市','选择你的 1 座忠诚城市课税（获得该行星资源）。', ids, id=>{
      const s=G.map[id]; let msg=`${pname(G.actor)} 活体建筑·培育：课税 ${id}`;
      if(gainResource(me,s.resource)) msg+=`，获得 ${RESOURCES[s.resource].name}`; consumeAction(msg); });
  },
  prune(me){ const col=me.color.key; const opts=[];
    for(const id in G.map){ const s=G.map[id]; if(s.outOfPlay) continue;
      s.pieces.buildings.forEach(b=>{ if(b.owner===col){ const to=b.type==='city'?'starport':'city';
        if((to==='city'?me.supply.cities:me.supply.starports)>0) opts.push({id,b}); } }); }
    if(!opts.length){ toast('没有可互换的忠诚建筑（或缺少对应补给）'); return; }
    openModal(m=>{ m.appendChild(el('h2',null,'修剪 · 城市↔太空港 互换'));
      m.appendChild(el('div','hintbox','选择你的 1 座忠诚建筑，替换为另一种类型（受补给限制）。'));
      opts.forEach(o=>{ const b=el('button','btn',`${o.id}：${o.b.type==='city'?'城市→太空港':'太空港→城市'}`); b.style.cssText='display:block;width:100%;margin:5px 0;text-align:left';
        b.onclick=()=>{ closeModal(); const to=o.b.type==='city'?'太空港':'城市'; if(pruneSwap(me,o.b)) consumeAction(`${pname(G.actor)} 活体建筑·修剪：${o.id} 的建筑改为${to}`); };
        m.appendChild(b); });
      const cc=el('button','btn ghost','取消'); cc.onclick=()=>closeModal(); m.appendChild(cc);
    });
  },
  martyr(me){ const col=me.color.key; const ids=[];
    for(const id in G.map){ const s=G.map[id]; if(s.outOfPlay) continue;
      if(freshShips(s,col)>0 && Object.keys(s.pieces.ships).some(c=>c!==col&&s.pieces.ships[c]>0)) ids.push(id); }
    expPickSystem('殉道 · 选择系统','摧毁你 1 艘新鲜舰，以摧毁该系统 1 艘敌舰（计入战利品）。', ids, id=>{
      const s=G.map[id]; const enemies=Object.keys(s.pieces.ships).filter(c=>c!==col&&s.pieces.ships[c]>0);
      const fin=(ec)=>{ const ep=martyrResolve(me,id,ec); consumeAction(`${pname(G.actor)} 生存覆写·殉道：在 ${id} 牺牲 1 舰，摧毁 ${ep?ep.name:ec} 1 舰（+1 战利品）`); };
      if(enemies.length===1) fin(enemies[0]);
      else openModal(m=>{ m.appendChild(el('h2',null,'殉道 · 选择摧毁的敌方'));
        enemies.forEach(ec=>{ const pl=G.players.find(p=>p.color.key===ec); const b=el('button','btn',pl?pl.name:ec); b.style.cssText='display:block;margin:5px 0';
          b.onclick=()=>{ closeModal(); fin(ec); }; m.appendChild(b); });
        const cc=el('button','btn ghost','取消'); cc.onclick=()=>closeModal(); m.appendChild(cc); }); });
  },
  annex(me){ const col=me.color.key;
    if(!ambitionDeclared('tyrant')){ toast('需暴君已宣告'); return; }
    const opts=[]; controlledSystems(me).forEach(id=>{ const s=G.map[id];
      s.pieces.buildings.forEach(b=>{ if(b.owner!==col && (b.type==='city'?me.supply.cities:me.supply.starports)>0) opts.push({id,b}); }); });
    if(!opts.length){ toast('没有可吞并的建筑（需你控制系统中有敌方城/港且你有对应补给）'); return; }
    openModal(m=>{ m.appendChild(el('h2',null,'吞并 · 替换为忠诚建筑'));
      m.appendChild(el('div','hintbox','将你控制的系统中 1 座敌方城市/太空港替换为你的忠诚同类建筑（敌方建筑归还其补给）。'));
      opts.forEach(o=>{ const ow=G.players.find(p=>p.color.key===o.b.owner); const b=el('button','btn',`${o.id}：${ow?ow.name:o.b.owner}的${o.b.type==='city'?'城市':'太空港'} → 你的`); b.style.cssText='display:block;width:100%;margin:5px 0;text-align:left';
        b.onclick=()=>{ closeModal();
          if(o.b.type==='city'){ if(ow)ow.supply.cities++; me.supply.cities--; } else { if(ow)ow.supply.starports++; me.supply.starports--; }
          o.b.owner=col; o.b.damaged=false;
          consumeAction(`${pname(G.actor)} 暴君权威·吞并：${o.id} 的${o.b.type==='city'?'城市':'太空港'}归你所有`); };
        m.appendChild(b); });
      const cc=el('button','btn ghost','取消'); cc.onclick=()=>closeModal(); m.appendChild(cc);
    });
  },
};
function openCountModal(title,min,max,cb){
  let v=max;
  openModal(m=>{ m.appendChild(el('h2',null,title));
    const row=el('div','row'); const val=el('span',null,''+v); val.style.cssText='font-size:24px;font-weight:800;min-width:36px;text-align:center';
    const minus=el('button','btn ghost','−'),plus=el('button','btn ghost','＋');
    minus.onclick=()=>{ v=Math.max(min,v-1); val.textContent=v; }; plus.onclick=()=>{ v=Math.min(max,v+1); val.textContent=v; };
    row.appendChild(minus); row.appendChild(val); row.appendChild(plus); m.appendChild(row);
    const ok=el('button','btn gold','确定'); ok.onclick=()=>{closeModal(); cb(v);}; m.appendChild(ok);
    const cc=el('button','btn ghost','取消'); cc.onclick=()=>closeModal(); m.appendChild(cc);
  });
}

function showStartScreen(){
  const m=$('#modal'); const w=$('#modalWrap'); w.style.display='flex';
  let np=4; let names=['','','','']; let useExp=false;
  function draw(){
    m.innerHTML='';
    m.appendChild(el('h2',null,'ARCS 暗星悬弧 · 电子版'));
    m.appendChild(el('div','hintbox','基础游戏 · 热座（同设备轮流）· 中文界面。选择人数与名称后开始。'));
    const seg=el('div','row');
    seg.appendChild(el('span',null,'玩家人数：'));
    const sg=el('div','seg');
    [2,3,4].forEach(n=>{const b=el('button',np===n?'on':'',n+'人');b.onclick=()=>{np=n;draw();};sg.appendChild(b);});
    seg.appendChild(sg); m.appendChild(seg);
    for(let i=0;i<np;i++){
      const r=el('div','row');
      const dot=el('span','dot');dot.style.cssText=`width:16px;height:16px;border-radius:50%;background:${PCOLORS[i].css};display:inline-block`;
      r.appendChild(dot);
      const inp=el('input');inp.type='text';inp.placeholder=PCOLORS[i].name+'方 · 玩家'+(i+1);inp.value=names[i];
      inp.oninput=e=>names[i]=e.target.value; r.appendChild(inp);
      m.appendChild(r);
    }
    // 扩展开关：勾选后 newGame 时 G.useExpansion=true，开局进行领袖抽选
    const expRow=el('div','row'); expRow.style.marginTop='8px';
    const expBtn=el('button','btn ghost sm',(useExp?'☑':'☐')+' ⚔ 领袖与传说扩展');
    expBtn.style.cssText='width:100%;text-align:left';
    expBtn.onclick=()=>{ useExp=!useExp; draw(); };
    expRow.appendChild(expBtn); m.appendChild(expRow);
    if(useExp) m.appendChild(el('div','hintbox','已启用领袖与传说扩展：开局每位玩家从 2 名领袖中选 1 名，随后各发 2 张传说卡作为个人能力。'));
    const ctl=el('div','row');ctl.style.marginTop='14px';
    const start=el('button','btn gold','开始游戏');
    start.onclick=()=>{ w.style.display='none'; newGame(np, names.slice(0,np), useExp); render(); };
    ctl.appendChild(start);
    const rules=el('button','btn ghost','规则速查');
    rules.onclick=showRules; ctl.appendChild(rules);
    const tut=el('button','btn ghost','📚 新手教学');
    tut.style.background='linear-gradient(135deg,#1d2a45,#2a3a5a)';
    tut.onclick=()=>{ w.style.display='none'; TUT.start(); };
    ctl.appendChild(tut);
    m.appendChild(ctl);
  }
  draw();
}
function showRules(){
  const sec=(title,body)=>`<div style="margin:10px 0 4px;color:#d9b25a;font-weight:800;font-size:14px">${title}</div><div style="color:#c4cde0;font-size:12.5px;line-height:1.7">${body}</div>`;
  const suitRows=SUIT_ORDER.map(s=>`<b style="color:${SUITS[s].color}">${SUITS[s].name}</b>：${SUITS[s].actions.map(a=>ACTION_NAMES[a]).join(' / ')}`).join('　');
  const pipRows=Object.entries(PIPS_BY_NUMBER).map(([n,p])=>`${n}→${p}`).join('，');
  const ambRows=AMB_ORDER.map(k=>`${AMBITIONS[k].icon} <b>${AMBITIONS[k].name}</b>（${AMBITIONS[k].desc}）`).join('；');
  const winRow=Object.entries(POWER_TO_WIN).map(([n,p])=>`${n}人 ${p}`).join(' / ');

    m.appendChild(el('h2',null,'📖 规则速查 · ARCS 基础'));

    + sec('🔄 回合流程', `先攻者<b>主导</b>：打出1张牌，其花色=可执行的行动种类，牌面数字=<b>行动次数</b>。其余玩家按先攻顺序依次<b>跟随</b>。回合末结算先攻、弃掉本回合打出的牌，进入下一回合。手牌出完则本章结束。`)
    + sec('🃏 跟随方式', `<b>超越</b>：同花色且点数更高 → 获得「该牌点数」次行动（主导花色）。<br><b>复制</b>：任意牌盖放 → 获得 1 次行动（主导花色）。<br><b>转向</b>：不同花色 → 获得 1 次行动（你所打花色）。<br>也可<b>跳过</b>不出牌。`)
    + sec('⚡ 先攻与夺取', `跟随时可额外弃 1 张牌<b>夺取先攻</b>（或用「7」超越夺取）。每回合仅首个夺取者生效，之后无人可再夺。若无人夺取，则由<b>超越点数最高者</b>取得先攻；无人超越则先攻不变。`)
    + sec('🎴 花色 → 行动', `${suitRows}<br>牌面数字 → 行动次数：${pipRows}`)
    + sec('🛠 七种行动', `<b>课税</b>：在你控制城市的行星取该资源。<br><b>建造</b>：忠诚太空港造舰船；或在你有<b>忠诚棋子（舰船或建筑）</b>的行星空槽建城市/太空港（敌方控制处所建为受损）。<br><b>移动</b>：把忠诚舰船移往相邻系统。<br><b>修理</b>：修复 1 个你的受损建筑。<br><b>影响</b>：在议会卡上放置 1 名密探。<br><b>收纳</b>：将你占多数密探的议会卡收入麾下，俘获其上敌方密探（计入暴君）。<br><b>战斗</b>：在你有舰船且有敌方棋子的系统投骰。`)
    + sec('🎲 战斗骰', `<b style="color:#3b7fe2">突袭</b>(蓝)：6面有3面命中，稳定、无自损。<br><b style="color:#d6564f">强攻</b>(红)：高伤（含双命中）但多自损，含 1 面「拦截」。<br><b style="color:#d59a3e">劫掠</b>(橙)：命中建筑/用钥匙抢资源；可用条件：敌方在本系统有建筑，或敌方全图无任何建筑。<br>结算顺序：自损 → 拦截（受守方鲜活舰船数限制）→ 命中（先船后建筑）→ 建筑命中 → 钥匙抢资源。每击毁 1 艘敌舰得 1 <b>战利品</b>。`)
    + sec('🏆 雄心与计分', `主导/跟随打出数字 <b>2–6</b> 可声明对应雄心（4人局「7」可任选，「1」不可声明），取走<b>面值最高的未用标记</b>放入该雄心盒，并把该牌点数视为 0。<br>每章末按各<b>已声明</b>的雄心盒结算：该项数量<b>最多者得首位分</b>，次多者得次位分；并列首位各得次位分。<br>初始标记面值（声明越早拿到面值越高）：<b>5/3、3/2、2/0</b>；每章末翻面升级最低一枚（翻后最终为 9/5、6/4、4/2）。首位额外加成：建有 ≥4 城市 +2、≥5 城市 +5。<br>雄心项：${ambRows}。`)
    + sec('🧹 章节清理', `结算后：若本章结算过<b>军阀</b>，全体返还战利品；结算过<b>暴君</b>，全体返还俘虏。标记复位、重洗牌库、每人发 6 张，开始下一章。`);
    m.appendChild(box);
    const c=el('button','btn gold','明白了'); c.style.marginTop='10px'; c.onclick=()=>closeModal(); m.appendChild(c);
  });
}

            ⚔️ <b>战斗</b>：在有敌人的系统投骰攻击<br>
            🏗️ <b>建造</b>：建造舰船 / 城市 / 太空港<br>
            👥 <b>影响</b>：在议会牌上放密探<br>
            📋 <b>收纳</b>：拿走你占多数密探的议会卡<br>
            🔧 <b>修理</b>：修复受损舰船或建筑`,
      sel:'#actionBar', pos:'left' },

    { title:'⚔️ 战斗骰子',
      body:`战斗耗 1 行动，骰数 ≤ 你在该系统的舰船数：<br><br>
            <span style="color:#4a8ef5">■ <b>突袭（蓝）</b></span>：命中稳定，无自伤 → <b>新手推荐</b><br>
            <span style="color:#e56157">■ <b>强攻（红）</b></span>：高命中但有自伤 → 决定性一击<br>
            <span style="color:#e5aa40">■ <b>劫掠（橙）</b></span>：打建筑 + 抢资源（需满足条件）<br><br>
            骰面：⚔命中 / 🔥自伤 / 🛡拦截 / 🏠建筑 / 🔑钥匙<br>
            击毁 1 艘敌舰 = 1 个<b>战利品</b>（霸主雄心用）`,
      sel:'#board', pos:'right' },

    { title:'🏛️ 议会牌与密探',
      body:`底部议会区有若干公会卡：<br><br>
            1. 用<b>影响</b>行动在卡上放置密探<br>
            2. 你的密探<b>占多数</b>时，用<b>收纳</b>行动拿走该卡<br>
            3. 收纳后：获得卡牌的<b>持续能力</b>，敌方密探成为<b>俘虏</b><br><br>
            ⚡ <b>帝国之声（Vox）卡</b>：收纳即触发强力效果后弃置。<br>
            🔑 部分卡有序幕能力，可在行动前免费激活一次。`,
      sel:'#court', pos:'top' },

    { title:'📊 章节结束与计分',
      body:`所有手牌打完后，章节结束：<br><br>
            1️⃣ <b>雄心计分</b>：已宣告的雄心按名次发权力值<br>
            2️⃣ <b>城市奖励</b>：建了 4+ 城市的玩家额外加分<br>
            3️⃣ <b>标记升级</b>：面值最低的标记翻面（下章分更高）<br>
            4️⃣ <b>重新发牌</b>：每人重发 6 张手牌<br><br>
            共 3 章，第3章末最终计分，<b>权力值最高者获胜</b>！`,
      sel:'#side', pos:'left' },

    { title:'🚀 已掌握核心规则！',
      body:`<b>开始游戏前的关键提示：</b><br><br>
            ✅ <b>每章必须宣告至少一次雄心</b>（否则那章得0分）<br>
            ✅ 先<b>建太空港 → 造舰船 → 扩张 → 建城市 → 课税</b><br>
            ✅ 小数字牌行动多，<b>留给关键时机</b>使用<br>
            ✅ 战斗时<b>骰数 = 舰船数</b>，先布兵再攻<br>
            ✅ 游戏中随时查看右上角的 <b>📖 规则</b> 按钮<br><br>
            <b>点击「开始游戏」，选好人数，征服星域！⭐</b>`,
      sel:null },
  ],

  start(){
    this.on=true; this.step=0;
    tutInitDemo();
    render();
    $('#tut-blocker').style.display='block';
    this._show(0);
  },

  _show(i){
    if(i<0||i>=this.STEPS.length){ this._end(); return; }
    this.step=i;
    const s=this.STEPS[i];
    $('#tut-title').textContent=s.title;
    $('#tut-body').innerHTML=s.body;
    $('#tut-progress').textContent=`${i+1} / ${this.STEPS.length}`;
    $('#tut-prev').disabled=(i===0);
    $('#tut-next').textContent=(i===this.STEPS.length-1)?'开始游戏！🎮':'明白了 →';
    $('#tut-box').style.display='block';
    this._spotlight(s.sel, s.pos||'right');
  },

  _spotlight(sel, pos){
    $$('.tut-spot').forEach(e=>e.remove());
    const box=$('#tut-box'), bw=338, bh=310;
    const vw=window.innerWidth, vh=window.innerHeight;
    if(!sel){
      box.style.left=Math.max(8,(vw-bw)/2)+'px';
      box.style.top=Math.max(8,(vh-bh)/2)+'px'; return;
    }
    const target=document.querySelector(sel);
    if(!target){ box.style.left=Math.max(8,(vw-bw)/2)+'px'; box.style.top=Math.max(8,(vh-bh)/2)+'px'; return; }
    const r=target.getBoundingClientRect(), pad=8;
    const spot=document.createElement('div'); spot.className='tut-spot';
    spot.style.cssText=`left:${r.left-pad}px;top:${r.top-pad}px;width:${r.width+pad*2}px;height:${r.height+pad*2}px`;
    document.body.appendChild(spot);
    let bx, by;
    if(pos==='right')  { bx=r.right+16;        by=r.top; }
    else if(pos==='left') { bx=r.left-bw-16;   by=r.top; }
    else if(pos==='top')  { bx=r.left;          by=r.top-bh-16; }
    else if(pos==='bottom'){ bx=r.left;         by=r.bottom+16; }
    else                  { bx=(vw-bw)/2;       by=(vh-bh)/2; }
    bx=Math.max(8,Math.min(bx,vw-bw-8));
    by=Math.max(8,Math.min(by,vh-bh-8));
    box.style.left=bx+'px'; box.style.top=by+'px';
  },

  next(){ if(this.step===this.STEPS.length-1) this._end(); else this._show(this.step+1); },
  prev(){ if(this.step>0) this._show(this.step-1); },

  _end(){
    this.on=false;
    $('#tut-box').style.display='none';
    $('#tut-blocker').style.display='none';
    $$('.tut-spot').forEach(e=>e.remove());
    showStartScreen();
  }
};

// 方向一：移动端侧栏抽屉开关
function toggleSide(force){
  const open = force!=null ? force : !document.body.classList.contains('side-open');
  document.body.classList.toggle('side-open', open);
  const b=$('#sideToggle'); if(b) b.textContent = open ? '✕' : '☰';
}
// 方向三：全局键盘快捷键（输入聚焦 / 教学进行时不拦截游戏键）
function isModalOpen(){ const w=$('#modalWrap'); return w && w.style.display==='flex'; }
function onGlobalKey(e){
  const tag=(e.target&&e.target.tagName||'').toLowerCase();
  if(tag==='input'||tag==='textarea'||e.target.isContentEditable) return; // 输入框聚焦不拦截
  if(e.metaKey||e.ctrlKey||e.altKey) return;
  // Esc：优先关闭弹窗，其次取消进行中的行动（教学进行时交由其自身按钮，不干预）
  if(e.key==='Escape'){
    if(TUT.on) return;
    if(isModalOpen()){ e.preventDefault(); closeModal(); $('#modal').classList.remove('victory'); return; }
    if(G&&G.pending){ e.preventDefault(); closeModal(); cancelAction(); return; }
    return;
  }
  // Enter：触发弹窗内主按钮（金色），否则触发可见的金色操作按钮
  if(e.key==='Enter'){
    if(TUT.on) return;
    let scope = isModalOpen() ? $('#modal') : $('#actionBar');
    if(scope){ const gold=scope.querySelector('.btn.gold:not(:disabled)'); if(gold){ e.preventDefault(); gold.click(); return; } }
    return;
  }
  if(TUT.on) return;            // 教学进行中不响应游戏快捷键
  if(isModalOpen()) return;     // 弹窗打开时数字键不选牌
  // 数字 1-7：选择对应手牌位（仅主导/跟随阶段，且该位存在）
  if(/^[1-7]$/.test(e.key) && G && (G.phase==='lead'||G.phase==='follow')){
    const owner=handOwnerIdx(); const p=G.players[owner]; const idx=parseInt(e.key,10)-1;
    if(p && p.hand[idx]!==undefined){ e.preventDefault(); onCardClick(owner, idx); }
  }
}

window.addEventListener('DOMContentLoaded', ()=>{
  $('#tut-exit').onclick=()=>TUT._end();
  $('#tut-prev').onclick=()=>TUT.prev();
  $('#tut-next').onclick=()=>TUT.next();
  const st=$('#sideToggle'); if(st) st.onclick=()=>toggleSide();
  window.addEventListener('keydown', onGlobalKey);
  showStartScreen();
});
</script>
