function campCardById(id){ return CAMPAIGN_CARDS.find(c=>c.id===id); }
/* ===== 阶段2：战役议会牌库动态增删引擎 + 幕状态机 + 幕脚本解释器 ===== */
function campLog(msg){ if(typeof logMsg==='function' && G && G.log) logMsg(msg,'sys'); }
// 共享战役公会卡的资源图标（用于公会花色计数：代言人等命运）。沿用基础 5×2 花色布局。
const CAMPAIGN_GUILD_ICON = {
  mining_interest:'material', construction_union:'material', gatekeepers:'fuel', shipping_interest:'fuel',
  skirmishers:'weapon', arms_union:'weapon', lattice_spies:'psionic', silver_tongues:'psionic',
  sworn_guardians:'relic', elder_broker:'relic',
};
// 把登记项实例化为议会区运行时卡（可被影响/攫取；逐卡 gameplay 效果按命运后续接线）
function makeCampaignCourtCard(id){
  const c=campCardById(id); if(!c) return null;
  const ki=CAMPAIGN_CARD_KI[id]; // [钥匙数, 资源图标]——读卡面符号提取，覆盖默认
  const keys=ki?ki[0]:(c.keys>0?c.keys:2); const icon=ki?ki[1]:(CAMPAIGN_GUILD_ICON[id]||c.icon||null);
  return { id:'cc_'+id, srcId:id, campaign:true, t:(c.k==='vox'?'vox':'guild'),
    name:c.cn, en:c.en, keys, eff:null, txt:c.eff||'', icon, agents:{} };
}
// 从所有议会区(议会区/牌堆/弃堆/玩家麾下)移除某战役卡，返回被移除的运行时卡或 null
function campZoneRemove(srcId){
  const match=c=>c&&c.campaign&&c.srcId===srcId;
  for(const zone of [G.court, G.courtDeck, G.courtDiscard]){ const i=zone.findIndex(match); if(i>=0) return zone.splice(i,1)[0]; }
  for(const p of G.players){ const arr=p.guildCards||[]; const i=arr.findIndex(match); if(i>=0) return arr.splice(i,1)[0]; }
  return null;
}
function campCountInZones(srcId){ let n=0; const match=c=>c&&c.campaign&&c.srcId===srcId;
  [G.court,G.courtDeck,G.courtDiscard].forEach(z=>n+=z.filter(match).length);
  G.players.forEach(p=>n+=(p.guildCards||[]).filter(match).length); return n; }
function campAddToCourtDeck(srcId){ const card=makeCampaignCourtCard(srcId); if(!card) return false;
  G.courtDeck.push(card); if(typeof shuffle==='function') shuffle(G.courtDeck);
  campLog(`战役：「${card.name}」加入议会牌堆`); return true; }
function campScrapCard(srcId){ const c=campCardById(srcId); const r=campZoneRemove(srcId);
  campLog(`战役：废弃「${c?c.cn:srcId}」`+(r?'':'（不在场）')); return !!r; }
function campBuryCard(card){ if(card) G.courtDeck.unshift(card); } // 牌堆底（pop 取顶 → unshift 即底）
function campSearchDiscardToCourt(srcId){ const i=G.courtDiscard.findIndex(c=>c&&c.campaign&&c.srcId===srcId);
  if(i<0) return false; G.court.push(G.courtDiscard.splice(i,1)[0]); return true; }
// 律法书（有序 Law/Edict/Title/Reminder）
function campAddToLawbook(id){ if(!G.campaign.lawbook.includes(id)){ G.campaign.lawbook.push(id); const c=campCardById(id); campLog(`战役：律法书加入「${c?c.cn:id}」`); return true; } return false; }
function campRemoveFromLawbook(id){ const i=G.campaign.lawbook.indexOf(id); if(i>=0){ const c=campCardById(id); G.campaign.lawbook.splice(i,1); campLog(`战役：律法书移除「${c?c.cn:id}」`); return true; } return false; }
// 发卡给命运玩家（放入其麾下 guildCards，作为其专属战役卡）
function campGainCard(srcId, playerIdx){ const p=G.players[playerIdx]; if(!p) return false;
  const card=makeCampaignCourtCard(srcId); if(!card) return false;
  (p.guildCards=p.guildCards||[]).push(card); const c=campCardById(srcId);
  campLog(`${pname(playerIdx)} 获得战役卡「${c?c.cn:srcId}」`); return true; }
function campSetFirstRegent(playerIdx){ G.campaign.firstRegentIdx=playerIdx;
  if(G.players[playerIdx]) campLog(`${pname(playerIdx)} 成为首席摄政`); }

// 幕脚本解释器：执行一组指令（op: addCourt/scrap/addLaw/removeLaw/gainCard/firstRegent/token/note）
// ctx.playerIdx = 该命运所属玩家（gainCard/firstRegent 的目标）
function runActInstrs(instrs, ctx){
  ctx=ctx||{}; const pi=ctx.playerIdx;
  (instrs||[]).forEach(ins=>{
    const ids=ins.ids||(ins.id?[ins.id]:[]);
    switch(ins.op){
      case 'addCourt': ids.forEach(campAddToCourtDeck); break;
      case 'scrap': ids.forEach(campScrapCard); break;
      case 'addLaw': ids.forEach(campAddToLawbook); break;
      case 'removeLaw': ids.forEach(campRemoveFromLawbook); break;
      case 'gainCard': ids.forEach(id=>campGainCard(id, pi)); break;
      case 'firstRegent': campSetFirstRegent(pi); break;
      case 'token': campLog(`战役·标记：${ins.note||ins.id||''}`); break;
      case 'note': campLog(`战役：${ins.note||''}`); break;
      default: break;
    }
  });
}
// 幕脚本数据（按命运num）。阶段2：摄政官(1)为完整参考实装；其余命运在 P9 逐一编码，
// 缺失时幕结算回退为「展示官方文字清单，由玩家手动操作」。
const ACT_SCRIPTS = {
  1:{ // Steward 摄政官
    1:{ setup:[{op:'gainCard',id:'imperial_authority'},{op:'gainCard',id:'dealmakers'},{op:'firstRegent'}],
        success:[{op:'addCourt',ids:['council_intrigue','tax_collectors','hunter_squads']},{op:'addLaw',id:'imperial_protectors'},{op:'scrap',ids:['empire_falls','lesser_regent']}],
        fail:[{op:'scrap',ids:['council_intrigue','tax_collectors','hunter_squads','imperial_protectors']},{op:'addCourt',ids:['empire_falls','lesser_regent','dealmakers']}] },
    2:{ setup:[{op:'addLaw',id:'imperial_quorum'}],
        success:[{op:'addCourt',ids:['navy_reprisal','council_insiders','galactic_bards']},{op:'scrap',ids:['imperial_defectors','lesser_regent']}],
        fail:[{op:'scrap',ids:['navy_reprisal','council_insiders','galactic_bards']},{op:'addCourt',ids:['imperial_defectors','lesser_regent']}] },
    3:{ setup:[{op:'addLaw',id:'imperial_sponsor'},{op:'token',note:'受资助标记放到首席摄政板块'},{op:'removeLaw',id:'govern_the_imperial_reach'},{op:'addLaw',ids:['govern_with_authority_a_policy_of_war','govern_with_authority_a_policy_of_escalation','govern_with_authority_a_policy_of_peace']}],
        success:[], fail:[] },
  },
};
function fateActScript(fateNum, act){ const s=ACT_SCRIPTS[fateNum]; return s && s[act]; }
// 运行某玩家当前幕的 setup
function campRunActSetup(playerIdx){ const p=G.players[playerIdx]; if(!p||!p.fate) return;
  const sc=fateActScript(p.fate, G.campaign.act); if(sc&&sc.setup) runActInstrs(sc.setup,{playerIdx}); }
// 结算某玩家当前幕（success/fail 分支）
function campResolveActForPlayer(playerIdx, success){ const p=G.players[playerIdx]; if(!p||!p.fate) return;
  const act=G.campaign.act; p.fateObjMet[act-1]=!!success;
  const sc=fateActScript(p.fate, act);
  if(sc) runActInstrs(success?sc.success:sc.fail, {playerIdx});
  campLog(`${pname(playerIdx)}（${(fateByNum(p.fate)||{}).cn||''}）第 ${act} 幕${success?'达成':'未达成'}`);
}
// 全体结算本幕后推进到下一幕（封顶第3幕）；推进后运行新幕 setup；返回新幕号
function campAdvanceAct(){ if(G.campaign.act<3){ G.campaign.act++; G.players.forEach((p,i)=>campRunActSetup(i)); }
  autosaveCampaign(); return G.campaign.act; }

/* ===== 阶段10：中场休息(Intermission) A–F 串联（官方战役辅助卡）===== */
// 在各玩家本幕成败已判定(fateObjMet)后调用。执行 A–F 步骤并推进到下一幕。返回结算摘要。
function campIntermission(){
  if(!G.campaign||!G.campaign.enabled) return null;
  const act=G.campaign.act; const summary=[];
  // A. 结算命运：未达成本幕目标者，按「目标标记距0的剩余值」失去权力。
  //    官方目标标记是「倒数到0」模型(规则书 p28：例 标记在5格→失去5、权力2→-3)。本实现 fateProgress 向上计数到阈值，
  //    故剩余值 = 阈值 - 已推进进度。权力可为负(规则书 p28 用「-」格表示)，不再用 Math.min 钳制。
  G.players.forEach((p,i)=>{ if(!p.fate) return;
    if(!p.fateObjMet[act-1]){ const th=fateThreshold(p.fate,act,G.numPlayers);
      const loss=(th!=null)?Math.max(0,th-(p.fateProgress||0)):0;
      if(loss>0){ p.power-=loss; summary.push(`A·${pname(i)} 第${act}幕失败 → 失去 ${loss} 权力（目标标记距0剩余${loss}格）`); campLog(`中场A：${pname(i)} 第${act}幕失败，目标标记距0剩余 ${loss} → 失去 ${loss} 权力（当前 ${p.power}）`); } } });
  // B. 清理议会：除帝国议会外全部回牌堆、清空议会区密探、销毁弃牌堆，重洗并补满
  const keepCouncil=G.court.filter(c=>c&&c.council); const back=G.court.filter(c=>!(c&&c.council));
  back.forEach(c=>{ if(c.agents) c.agents={}; G.courtDeck.push(c); });
  G.courtDiscard=[]; G.court=keepCouncil.slice(); if(typeof shuffle==='function') shuffle(G.courtDeck);
  const courtN=(G.numPlayers===2)?3:4; while(G.court.filter(c=>!(c&&c.council)).length<courtN && G.courtDeck.length) G.court.push(G.courtDeck.pop());
  if(keepCouncil.length){ G.campaign.council='session'; G.campaign.councilHolder=null; }
  summary.push('B·议会区已清理重置');
  // C. 清理棋子：战利品/俘虏清零、帝国信托清空(冻结资源)
  G.players.forEach(p=>{ p.trophies=0; p.captives=0; }); const freed=campEmptyTrust();
  summary.push(`C·清零战利品/俘虏，清空帝国信托(${freed})`);
  // D. 修复与销毁：修复全部受损凋敝；销毁全部受损舰船/建筑；销毁有凋敝且无舰系统的建筑
  campIntermissionBlight(); let dShips=0,dBld=0;
  for(const id in G.map){ const s=G.map[id];
    for(const col in (s.pieces.dmg||{})){ const d=s.pieces.dmg[col]||0; if(d>0){ s.pieces.ships[col]=(s.pieces.ships[col]||0)-d; if(s.pieces.ships[col]<=0) delete s.pieces.ships[col]; const o=G.players.find(p=>p.color.key===col); if(o) o.supply.ships+=d; dShips+=d; } }
    s.pieces.dmg={};
    s.pieces.buildings=s.pieces.buildings.filter(b=>{ if(b.damaged){ const o=G.players.find(p=>p.color.key===b.owner); if(o){ if(b.type==='city')o.supply.cities++; else o.supply.starports++; } dBld++; return false; } return true; });
  }
  summary.push(`D·修复凋敝；销毁 ${dShips} 受损舰 / ${dBld} 受损建筑`);
  // E. 转移先攻与权力：先攻给权力最高者；权力>1 者失去一半(向下取整失去)
  let mx=-Infinity,mi=0; G.players.forEach((p,i)=>{ if(p.power>mx){ mx=p.power; mi=i; } }); G.initiative=mi;
  G.players.forEach(p=>{ if(p.power>1) p.power=Math.ceil(p.power/2); });
  summary.push(`E·先攻→${pname(mi)}；各玩家权力减半(取多保留)`);
  // F. 选命运由向导处理（completed 抽1 / failed 抽2选1）。此处重置进度并推进幕号（幕 setup 在选命运后由向导统一执行）。
  G.players.forEach(p=>{ p.fateProgress=0; });
  if(G.campaign.act<3) G.campaign.act++; G.campaign.session=(G.campaign.session||1)+1;
  summary.push(`F·进入第 ${G.campaign.act} 幕（第 ${G.campaign.session} 场）；选命运后运行幕开局设置`);
  autosaveCampaign(); return summary;
}

/* ===== 阶段3：命运目标判定引擎（事件总线 + 进度规则 + 阈值/章末判定 + 终局胜利） ===== */

    3:(ev,d,p,i)=>{ if(ev==='ambitionWon' && d.playerIdx===i) return Math.min(p.captives, campTotalMarks('bunker'));

    1:(ev,d,p,i)=>{ if(ev==='summitGift' && d.toIdx===i) return 2; if(ev==='magnateExport' && d.playerIdx===i) return 2; return 0; },

    1:(ev,d,p,i)=>{ if(ev==='ambitionWon' && d.playerIdx===i) return 2*campGolems(i); if(ev==='golemSpend') return 2; return 0; },

    3:(ev,d,p,i)=>{ return (ev==='conspiracyScore' && d.playerIdx===i) ? (d.delta||0) : 0; },

function campEvLabel(ev){ return {initiativeSeized:'夺取先攻',ambitionWon:'赢得雄心',actionWithInitiative:'持先攻打牌',chapterEnd:'章末',trophyGained:'夺战利品',captiveTaken:'俘获'}[ev]||ev; }
// 事件总线：向当前幕的进度规则派发，按 delta 推进 fateProgress
function campFire(ev, data){
  if(!G || !G.campaign || !G.campaign.enabled) return; data=data||{};
  // 记录本章各玩家赢得的雄心（多张命运的章末判定用；campChapterEndJudge 末尾清空）
  if(ev==='ambitionWon' && data.playerIdx!=null && data.ambition){ const wp=G.players[data.playerIdx];
    if(wp){ (wp._ambWon||(wp._ambWon={}))[data.ambition]=true; } }
  G.players.forEach((p,i)=>{ if(!p.fate) return;
    const rules=FATE_PROGRESS[p.fate]; const fn=rules&&rules[G.campaign.act]; if(!fn) return;
    const delta=fn(ev,data,p,i)||0;
    if(delta!==0){ p.fateProgress=Math.max(0,(p.fateProgress||0)+delta); campLog(`${pname(i)} 命运进度 ${delta>0?'+':''}${delta} → ${p.fateProgress}（${campEvLabel(ev)}）`); }
  });
}
function campWonAmbition(playerIdx, amb){ const p=G.players[playerIdx]; return !!(p&&p._ambWon&&p._ambWon[amb]); }
// 该雄心本章「赢得或未被宣告」（多张命运的条件用）
function campWonOrUndeclared(playerIdx, amb){ return campWonAmbition(playerIdx,amb) || !ambitionDeclared(amb); }
// 当前玩家本幕阈值（计时型）/ null（非计时型）
function fateThresholdCur(playerIdx){ const p=G.players[playerIdx]; return (p&&p.fate)?fateThreshold(p.fate,G.campaign.act,G.numPlayers):null; }
// 当前玩家本幕目标是否达成（计时型比阈值；否则用自定义判定）
function campObjectiveMet(playerIdx){
  const p=G.players[playerIdx]; if(!p||!p.fate) return false;
  const act=G.campaign.act; const th=fateThreshold(p.fate,act,G.numPlayers);
  if(th!=null) return (p.fateProgress||0)>=th;
  const chk=FATE_OBJECTIVE_CHECK[p.fate]&&FATE_OBJECTIVE_CHECK[p.fate][act];
  return chk?!!chk(p,playerIdx):false;
}
// 章末：派发 chapterEnd 事件 + 终局幕(3)胜利检查（达标且≥1权力）。返回胜利者 idx 数组。
function campChapterEndJudge(){
  if(!G.campaign||!G.campaign.enabled) return [];
  campFire('chapterEnd',{}); const winners=[];
  G.players.forEach((p,i)=>{ if(!p.fate) return;
    const met=campObjectiveMet(i);
    if(G.campaign.act===3 && met && p.power>=1){ p._campVictory=true; winners.push(i);
      campLog(`🏆 ${pname(i)}（${(fateByNum(p.fate)||{}).cn||''}）达成第三幕命运目标且≥1权力 → 战役胜利！`); }
  });
  G.players.forEach(p=>{ p._ambWon={}; }); // 清空本章雄心记录

}
// 命运判定常用 helper
function campPlanetsControlled(playerIdx){ const col=G.players[playerIdx].color.key; let n=0;
  for(const id in G.map){ const s=G.map[id]; if(s.outOfPlay||s.kind!=='planet') continue; if(controllerOf(id)===col) n++; } return n; }
function campSystemsControlled(playerIdx){ const col=G.players[playerIdx].color.key; let n=0;
  for(const id in G.map){ const s=G.map[id]; if(s.outOfPlay) continue; if(controllerOf(id)===col) n++; } return n; }
function campPlanetsControlledByRes(playerIdx, res){ const col=G.players[playerIdx].color.key; let n=0;
  for(const id in G.map){ const s=G.map[id]; if(s.outOfPlay||s.kind!=='planet'||s.resource!==res) continue; if(controllerOf(id)===col) n++; } return n; }
function campLoyalShipsTotal(playerIdx){ const col=G.players[playerIdx].color.key; let n=0;
  for(const id in G.map) n+=(G.map[id].pieces.ships[col]||0); return n; }
function campMoreLoyalShipsThanRivals(playerIdx){ const mine=campLoyalShipsTotal(playerIdx);
  return G.players.every((q,j)=> j===playerIdx || mine>campLoyalShipsTotal(j)); }
// 凋敝代言者：你控制且有忠诚舰的系统中的凋敝总数
function campBlightInControlledShipped(playerIdx){ const col=G.players[playerIdx].color.key; let n=0;
  for(const id in G.map){ const s=G.map[id]; if(s.outOfPlay) continue;
    if((s.pieces.ships[col]||0)>0 && controllerOf(id)===col) n+=blightTotal(s); } return n; }
// 审判官：章末存在「≥2 名真实玩家并列第一」的雄心盒数量
function campAmbitionsTiedFirst(){ let n=0;
  AMB_ORDER.forEach(k=>{ const vals=G.players.map(p=>AMBITIONS[k].count(p)); const mx=Math.max(0,...vals);
    if(mx>0 && vals.filter(v=>v===mx).length>=2) n++; }); return n; }
// 霸主(恐惧)：与你民愤相符且你持有的资源类型数；与你民愤相符且你控制的行星类型数（首席摄政含帝国控制行星）
function campOutrageMatchedRes(playerIdx){ const p=G.players[playerIdx]; let n=0;
  RES_ORDER.forEach(r=>{ if(p.outraged[r] && (p.res[r]||0)>0) n++; }); return n; }
function campOutrageMatchedPlanetTypes(playerIdx){ const p=G.players[playerIdx]; let n=0;
  RES_ORDER.forEach(r=>{ if(!p.outraged[r]) return;
    let ctrl=campPlanetsControlledByRes(playerIdx,r);
    if(G.campaign.firstRegentIdx===playerIdx) ctrl+=campEmpireSystems().filter(id=>G.map[id].kind==='planet'&&G.map[id].resource===r).length;
    if(ctrl>0) n++; }); return n; }

/* ===== 阶段4：帝国身份轴 + 帝国议会 + 帝国信托 ===== */
// 帝国议会：固定宫廷卡（双面 会期中/已裁决），不入牌堆、不计钥匙
function makeImperialCouncilCard(){ return {id:'imperial_council', council:true, campaign:true, t:'special',
  name:'帝国议会', en:'Imperial Council', keys:0, eff:null,
  txt:'双面卡。会期中：可被攫取。攫取→翻到「已裁决」由你掌握本回合决策权；回合末交回宫廷并依序：①可召开峰会 ②摄政→升首席摄政 ③法外者→从首席摄政信托偷取 ④结算危机或敕令。', agents:{} }; }
function imperialCouncilCard(){ return G.court.find(c=>c&&c.council)||null; }
function campSetupImperialCouncil(){ // 战役开局把帝国议会放入宫廷
  if(!G.court.some(c=>c&&c.council)) G.court.push(makeImperialCouncilCard());
  G.campaign.council='session'; G.campaign.councilHolder=null;
}
// 攫取帝国议会 → 翻到「已裁决」，记录持有者（本回合掌握决策权）
function campSecureCouncil(playerIdx){
  G.campaign.council='decided'; G.campaign.councilHolder=playerIdx;
  campLog(`${pname(playerIdx)} 攫取帝国议会 → 翻到「已裁决」，本回合掌握决策权`);
}
// 回合末结算「已裁决」的帝国议会（峰会P6/危机敕令P5暂为占位，身份与信托链已实装）
function campResolveCouncil(){
  if(!G.campaign || !G.campaign.enabled) return;
  if(G.campaign.council!=='decided' || G.campaign.councilHolder==null) return;
  const pi=G.campaign.councilHolder; const p=G.players[pi]; if(!p){ G.campaign.council='session'; G.campaign.councilHolder=null; return; }
  campLog(`—— 帝国议会结算（持有者 ${pname(pi)}）——`);
  // ①峰会（P6 暂略）；②摄政→首席摄政；③法外者→从信托偷取；④危机/敕令（P5 暂略）
  if(p.identity==='regent'){ if(G.campaign.firstRegentIdx!==pi) campSetFirstRegent(pi); else campLog(`${pname(pi)} 已是首席摄政`); }
  else if(p.identity==='outlaw'){
    if(G.campaign.firstRegentIdx!=null && campTrustTotal()>0){ const got=campTrustTakeAny(p);
      if(got) campLog(`${pname(pi)}（法外者）从帝国信托偷取 1 ${RESOURCES[got].name}`); }
    else campLog(`${pname(pi)}（法外者）欲从首席摄政偷取，但信托为空或无首席摄政`);
  }
  // ④ 必须结算危机或敕令（持有者二选一；半自动默认结算敕令，危机为占位）
  if(typeof campResolveEdict==='function') campResolveEdict();
  G.campaign.council='session'; G.campaign.councilHolder=null; autosaveCampaign();
}
// 帝国信托
function campTrustTotal(){ return RES_ORDER.reduce((n,r)=>n+(G.campaign.trust[r]||0),0); }
function campTrustAdd(res,n){ n=n||1; G.campaign.trust[res]=(G.campaign.trust[res]||0)+n; return n; }
function campTrustTake(res,n){ n=n||1; const t=Math.min(G.campaign.trust[res]||0,n); G.campaign.trust[res]-=t; return t; }
function campTrustTakeAny(toPlayer){ for(const r of RES_ORDER){ if((G.campaign.trust[r]||0)>0){ G.campaign.trust[r]--; if(toPlayer) toPlayer.res[r]=(toPlayer.res[r]||0)+1; return r; } } return null; }
function campEmptyTrust(){ const n=campTrustTotal(); RES_ORDER.forEach(r=>{ if(G.campaign.trust[r]>0){ G.resSupply[r]+=G.campaign.trust[r]; G.campaign.trust[r]=0; } }); return n; }
// 身份转换：摄政 ↔ 法外者；首席摄政变法外者则让出首席摄政席位
function campSetIdentity(idx, id){ const p=G.players[idx]; if(!p) return; const old=p.identity; p.identity=id;
  if(old!==id) campLog(`${pname(idx)} 身份：${old==='regent'?'摄政':'法外者'} → ${id==='regent'?'摄政':'法外者'}`);
  if(id==='outlaw' && G.campaign.firstRegentIdx===idx){ G.campaign.firstRegentIdx=null; campLog(`${pname(idx)} 让出首席摄政席位`); }
}
function campBecomeOutlaw(idx){ campSetIdentity(idx,'outlaw'); }
function campBecomeRegent(idx){ campSetIdentity(idx,'regent'); }

/* ===== 阶段5：律法书 + 敕令政策机 + 事件骰结算环 ===== */
// 三张「治理帝国疆域」政策（战争/和平/升级），各为两步：①征收需求 ②帝国行动
const EDICT_POLICIES = {
  war:{ name:'战争政策', en:'Policy of War',
    demand:'从每名敌对摄政取1战利品或俘虏归首席摄政（不入信托）；无则取1密探作恩惠；再无可使其变法外者',
    action:'从供应给每名摄政发1武器（供应空则从信托支取）' },
  peace:{ name:'和平政策', en:'Policy of Peace',
    demand:'从每名摄政(含自己)取1遗物或通灵入帝国信托；敌对摄政无则取密探；再无可变法外者',
    action:'每名摄政按未占用城市槽获得城市加成势力' },
  escalation:{ name:'升级政策', en:'Policy of Escalation',
    demand:'从每名摄政(含自己)取1武器/燃料/物资入帝国信托；敌对摄政无则取密探；再无可变法外者',
    action:'在帝国控制系统放2艘新帝国星舰（暂记入帝国星舰池，待帝国棋子阶段落图）' },
};
function campCurrentPolicy(){ return G.campaign.edictPolicy || 'war'; }
function campChangePolicy(pol){ if(EDICT_POLICIES[pol]){ G.campaign.edictPolicy=pol; campLog(`首席摄政切换政策 → ${EDICT_POLICIES[pol].name}`); autosaveCampaign(); } }
// 结算敕令：①征收需求 ②帝国行动（由首席摄政执行）
function campResolveEdict(){
  const fr=G.campaign.firstRegentIdx;
  if(fr==null){ campLog('结算敕令：当前无首席摄政，敕令暂不结算'); return; }
  const pol=campCurrentPolicy(); const P=EDICT_POLICIES[pol];
  campLog(`—— 结算敕令 · ${P.name} ——`);
  const regents=G.players.map((p,i)=>i).filter(i=>G.players[i].identity==='regent');
  // ① 征收需求
  if(pol==='war'){
    regents.filter(i=>i!==fr).forEach(i=>{ const p=G.players[i];
      if(p.trophies>0){ p.trophies--; G.players[fr].trophies++; campLog(`战争·征收：${pname(i)} 交出 1 战利品`); }
      else if(p.captives>0){ p.captives--; G.players[fr].captives++; campLog(`战争·征收：${pname(i)} 交出 1 俘虏`); }
      else if(p.supply.agents>0){ p.supply.agents--; campLog(`战争·征收：${pname(i)} 无战利品/俘虏 → 交 1 密探作恩惠`); }
      else campLog(`战争·征收：${pname(i)} 无可征（可手动将其变为法外者）`);
    });
  } else {
    const want = pol==='peace'?['relic','psionic']:['weapon','fuel','material'];
    regents.forEach(i=>{ const p=G.players[i]; const r=want.find(x=>(p.res[x]||0)>0);
      if(r){ p.res[r]--; campTrustAdd(r,1); campLog(`${P.name}·征收：${pname(i)} 交出 1 ${RESOURCES[r].name} 入帝国信托`); }
      else if(i!==fr && p.supply.agents>0){ p.supply.agents--; campLog(`${P.name}·征收：${pname(i)} 无对应资源 → 交 1 密探作恩惠`); }
      else if(i!==fr) campLog(`${P.name}·征收：${pname(i)} 无可征（可手动变法外者）`);
    });
  }
  // ② 帝国行动
  if(pol==='war'){ let got=0; regents.forEach(i=>{ if(G.resSupply.weapon>0){ G.resSupply.weapon--; G.players[i].res.weapon++; got++; } else if(campTrustTake('weapon',1)){ G.players[i].res.weapon++; got++; } }); campLog(`战争·帝国行动：${got} 名摄政各获 1 武器`); }
  else if(pol==='peace'){ regents.forEach(i=>{ const b=cityBonus(G.players[i]); if(b){ G.players[i].power+=b; campLog(`和平·帝国行动：${pname(i)} 城市加成 +${b} 权力`); } }); }
  else if(pol==='escalation'){ const tgt=campEscalationPlaceShips(); if(tgt) campLog(`升级·帝国行动：在 ${tgt} 放置 2 艘新帝国星舰`); }
  autosaveCampaign();
}
// 危机结算：凋敝危机（每新鲜凋敝3击/受损1击，先击帝国舰再击各玩家忠诚舰）；危机卡个体效果在 P9 逐卡接线
function campResolveCrisis(){ campLog('—— 结算危机 ——'); if(typeof campResolveBlightCrisis==='function') campResolveBlightCrisis(); }
// 事件骰：📜敕令 / ★危机（面分布近似 3:3，可按实体骰调整）
function campRollEventDie(){ return (Math.floor(Math.random()*6)<3)?'edict':'crisis'; }
// 回合末事件结算：议会已裁决→结算议会；否则掷事件骰→敕令/危机
function campRoundEndEvent(){
  if(!G.campaign || !G.campaign.enabled) return;
  if(G.campaign.council==='decided'){ campResolveCouncil(); return; }
  const r=campRollEventDie();
  campLog(`回合末事件骰：${r==='edict'?'📜 结算敕令':'★ 结算危机'}`);

}

/* ===== 阶段6：峰会(Summit) 交易子系统 + 好感(Favor) ===== */
// 好感 = 置于某玩家命运卡上的对手密探（p.favors[对手色]）。持有他人好感 = 对其的杠杆。
function campFavorsOf(p){ return p.favors||(p.favors={}); }
function campFavorsTotal(p){ const f=campFavorsOf(p); return Object.keys(f).reduce((a,k)=>a+(f[k]||0),0); }
// 许诺好感：giver 从供应给 1 密探，置于 recipient 命运卡上（recipient 由此握有对 giver 的好感）
function campPromiseFavor(giverIdx, recipientIdx){
  const g=G.players[giverIdx], r=G.players[recipientIdx]; if(!g||!r||giverIdx===recipientIdx) return false;
  if(g.supply.agents<=0) return false;
  g.supply.agents--; const f=campFavorsOf(r); f[g.color.key]=(f[g.color.key]||0)+1;
  campLog(`${pname(giverIdx)} 向 ${pname(recipientIdx)} 许诺 1 好感`); return true;
}
// 归还好感：holder 把所持 target 的好感退回 target（迫使 target 执行 n 个谈判动作；默认每动作 1 好感）
function campReturnFavor(holderIdx, targetIdx, n){
  const h=G.players[holderIdx], t=G.players[targetIdx]; if(!h||!t) return 0;
  const f=campFavorsOf(h); const have=f[t.color.key]||0; n=Math.min(have, n||1);
  if(n<=0) return 0; f[t.color.key]-=n; if(f[t.color.key]<=0) delete f[t.color.key]; t.supply.agents+=n;
  campLog(`${pname(holderIdx)} 归还 ${pname(targetIdx)} ${n} 好感（迫使其执行 ${n} 个谈判动作）`); return n;
}
// 转移资产：把 1 个 俘虏/战利品/好感/资源 给对手
function campTransferAsset(fromIdx, toIdx, kind, res){
  const a=G.players[fromIdx], b=G.players[toIdx]; if(!a||!b||fromIdx===toIdx) return false;
  if(kind==='captive'){ if(a.captives<=0) return false; a.captives--; b.captives++; }
  else if(kind==='trophy'){ if(a.trophies<=0) return false; a.trophies--; b.trophies++; }
  else if(kind==='resource'){ if((a.res[res]||0)<=0) return false; a.res[res]--; b.res[res]=(b.res[res]||0)+1; }
  else if(kind==='favor'){ const f=campFavorsOf(a); const c=res||Object.keys(f).find(k=>f[k]>0); if(!c||(f[c]||0)<=0) return false; f[c]--; if(f[c]<=0) delete f[c]; const fb=campFavorsOf(b); fb[c]=(fb[c]||0)+1; }
  else return false;
  campLog(`${pname(fromIdx)} → ${pname(toIdx)} 转移资产（${kind==='resource'?RESOURCES[res].name:kind==='captive'?'俘虏':kind==='trophy'?'战利品':'好感'}）`);
  if(kind==='resource'||kind==='favor') campFire('summitGift',{toIdx, fromIdx, kind}); // 大亨：对手赠予好感/资源
  return true;
}
// 招纳入帝国：首席摄政把法外者翻回摄政
function campInviteToEmpire(frIdx, outlawIdx){ if(G.campaign.firstRegentIdx!==frIdx) return false;
  if(!G.players[outlawIdx]||G.players[outlawIdx].identity!=='outlaw') return false; campBecomeRegent(outlawIdx); return true; }
// 脱离帝国：摄政翻为法外者；若为首席摄政则把板块给权力最高的摄政（无则空缺）
function campLeaveEmpire(idx){ const p=G.players[idx]; if(!p||p.identity!=='regent') return false;
  const wasFirst=(G.campaign.firstRegentIdx===idx); campBecomeOutlaw(idx);
  if(wasFirst){ const regents=G.players.map((q,i)=>i).filter(i=>G.players[i].identity==='regent');
    if(regents.length){ regents.sort((x,y)=>G.players[y].power-G.players[x].power); campSetFirstRegent(regents[0]); }
    else { G.campaign.firstRegentIdx=null; campLog('帝国已无摄政，首席摄政空缺（详见规则书 p.16）'); } }
  return true;
}
// 复兴帝国：若无任何摄政，本玩家成为摄政并取首席摄政
function campReviveEmpire(idx){ if(G.players.some(p=>p.identity==='regent')) return false;
  campBecomeRegent(idx); campSetFirstRegent(idx); campLog(`${pname(idx)} 复兴帝国，成为首席摄政`); return true; }
// 向议会请愿：把已裁决的帝国议会翻回会期中
function campPetitionCouncil(){ if(G.campaign.council==='decided'){ G.campaign.council='session'; G.campaign.councilHolder=null; campLog('向议会请愿：帝国议会翻回「会期中」'); return true; } return false; }
// 让渡控制：把 fromIdx 的 1 个忠诚棋子(舰/建筑)替换为 toIdx 同类棋子（含规则限制）
function campCedeControl(fromIdx, toIdx, sysId, pieceType){
  const a=G.players[fromIdx], b=G.players[toIdx]; const s=G.map[sysId]; if(!a||!b||!s) return false;
  const ac=a.color.key, bc=b.color.key;
  if(pieceType==='ship'){
    if((s.pieces.ships[ac]||0)<=0) return false;
    // 不能替换你地图上最后 1 艘舰
    let totalShips=0; for(const id in G.map) totalShips+=(G.map[id].pieces.ships[ac]||0); if(totalShips<=1) return false;
    const dmg=dmgShipsN(s,ac); const wasDmg=dmg>0 && (s.pieces.ships[ac]-dmg)<=0;
    s.pieces.ships[ac]--; if(s.pieces.ships[ac]<=0) delete s.pieces.ships[ac];
    if(wasDmg && s.pieces.dmg){ s.pieces.dmg[ac]--; if(s.pieces.dmg[ac]<=0) delete s.pieces.dmg[ac]; }
    a.supply.ships++; b.supply.ships--; s.pieces.ships[bc]=(s.pieces.ships[bc]||0)+1;
  } else { // 建筑：仅当该系统无你的忠诚舰；不能替换最后 1 座城/港
    if((s.pieces.ships[ac]||0)>0) return false;
    const b1=s.pieces.buildings.find(x=>x.owner===ac && x.type===pieceType); if(!b1) return false;
    let cnt=0; for(const id in G.map) cnt+=G.map[id].pieces.buildings.filter(x=>x.owner===ac&&x.type===pieceType).length; if(cnt<=1) return false;
    b1.owner=bc;
  }
  campLog(`${pname(fromIdx)} 让渡 ${sysId} 的${pieceType==='ship'?'舰船':pieceType==='city'?'城市':'星港'}给 ${pname(toIdx)}`); return true;
}
// 委派权柄：把 fromIdx 在某议会卡上的 1 个密探替换为 toIdx 的密探
function campDelegateAuthority(fromIdx, toIdx, card){
  const a=G.players[fromIdx], b=G.players[toIdx]; if(!a||!b||!card||!card.agents) return false;
  const ac=a.color.key, bc=b.color.key; if((card.agents[ac]||0)<=0 || b.supply.agents<=0) return false;
  card.agents[ac]--; if(card.agents[ac]<=0) delete card.agents[ac]; a.supply.agents++;
  card.agents[bc]=(card.agents[bc]||0)+1; b.supply.agents--;
  campLog(`${pname(fromIdx)} 在「${card.name}」上的密探委派给 ${pname(toIdx)}`); return true;
}

/* ===== 阶段7：凋敝(Blight) 棋子层 + 凋敝危机 + 蔓延/中场处理 ===== */
function blightTotal(s){ return (s&&s.pieces&&s.pieces.blight)||0; }
function blightDmg(s){ return (s&&s.pieces&&s.pieces.blightDmg)||0; }
function blightFresh(s){ return blightTotal(s)-blightDmg(s); }
function campPlaceBlight(sysId, damaged, n){ const s=G.map[sysId]; if(!s||s.outOfPlay) return 0; n=n||1;
  s.pieces.blight=(s.pieces.blight||0)+n; if(damaged) s.pieces.blightDmg=(s.pieces.blightDmg||0)+n;
  campLog(`凋敝：${sysId} +${n} ${damaged?'受损':'新鲜'}凋敝`); return n; }
// 施加 hits 到凋敝（Tough：每 2 击推进一档 新鲜→受损→摧毁）；返回被摧毁数（→战利品归 destroyer）
function campHitBlight(sysId, hits, destroyer){ const s=G.map[sysId]; if(!s) return 0; let destroyed=0; let acc=hits|0;
  while(acc>=2 && blightTotal(s)>0){
    if(blightFresh(s)>0){ s.pieces.blightDmg=(s.pieces.blightDmg||0)+1; }              // 新鲜→受损
    else { s.pieces.blight--; s.pieces.blightDmg--; destroyed++; if(destroyer) destroyer.trophies++; } // 受损→摧毁
    acc-=2;
  }
  if((s.pieces.blight||0)<=0){ s.pieces.blight=0; s.pieces.blightDmg=0; }
  return destroyed;
}
function campRepairAllBlight(){ let n=0; for(const id in G.map){ const s=G.map[id]; if(s.pieces&&s.pieces.blightDmg){ n+=s.pieces.blightDmg; s.pieces.blightDmg=0; } } if(n) campLog(`修复 ${n} 个受损凋敝（→新鲜）`); return n; }
// 凋敝危机：每系统 fresh×3 + dmg×1 击；先击帝国舰，无则击该系统每名玩家的忠诚舰（各自承受，新鲜优先）
function campResolveBlightCrisis(){ let total=0;
  for(const id in G.map){ const s=G.map[id]; const fr=blightFresh(s), dm=blightDmg(s); const hits=fr*3+dm*1; if(hits<=0) continue;
    total+=hits; campLog(`凋敝危机 ${id}：${fr}新鲜+${dm}受损 → ${hits} 击`);
    const imp=(s.pieces.ships&&s.pieces.ships.imperial)||0;
    if(imp>0) applyShipHits(id,'imperial',hits,null);
    else G.players.forEach(p=>{ if((s.pieces.ships[p.color.key]||0)>0) applyShipHits(id,p.color.key,hits,null); });
    if(typeof campMarksAt==='function' && campMarksAt(id,'bunker').length) campFire('blightCrisisOnBunker',{sysId:id}); // 幸存者：地堡行星凋敝危机
  }
  if(!total) campLog('凋敝危机：地图上无凋敝');
  return total;
}
// 中场凋敝处理：修复全部受损凋敝；摧毁「有凋敝且无舰」系统中的建筑（归还供应）
function campIntermissionBlight(){ campRepairAllBlight();
  for(const id in G.map){ const s=G.map[id]; if(blightTotal(s)>0){ const anyShip=Object.values(s.pieces.ships||{}).some(n=>n>0);
    if(!anyShip && s.pieces.buildings.length){ const removed=s.pieces.buildings.length;
      s.pieces.buildings.forEach(b=>{ const o=G.players.find(p=>p.color.key===b.owner); if(o){ if(b.type==='city')o.supply.cities++; else o.supply.starports++; } });
      s.pieces.buildings=[]; campLog(`中场：${id} 有凋敝且无舰 → 摧毁 ${removed} 座建筑`); } } }
}
// Act II/III 布置：星门加凋敝（无凋敝无舰的星门各 1 受损）
function campAddBlightToGates(){ let n=0; for(let cl=1;cl<=6;cl++){ const id='G'+cl; const s=G.map[id]; if(!s||s.outOfPlay) continue;
  const anyShip=Object.values(s.pieces.ships||{}).some(x=>x>0);
  if(blightTotal(s)===0 && !anyShip){ campPlaceBlight(id,true,1); n++; } } return n; }
// Act II/III 布置：在某星簇所有无凋敝行星各放 1 受损凋敝
function campAddBlightToCluster(cl){ let n=0; ['A','B','C'].forEach(pl=>{ const id=cl+pl; const s=G.map[id]; if(s&&!s.outOfPlay&&blightTotal(s)===0){ campPlaceBlight(id,true,1); n++; } }); return n; }
// 清剿凋敝：玩家以所在系统新鲜忠诚舰数掷突袭骰攻击凋敝（每 2 击推进一档，摧毁→战利品）
function campAssaultBlight(sysId, playerIdx){ const s=G.map[sysId]; const p=G.players[playerIdx]; if(!s||!p) return 0;
  const col=p.color.key; const dice=freshShips(s,col); if(dice<=0||blightTotal(s)<=0) return 0;
  let hits=0; for(let i=0;i<dice;i++){ const f=DICE.skirmish.faces[Math.floor(Math.random()*6)]; hits+=f.hit||0; }
  const before=blightTotal(s); const destroyed=campHitBlight(sysId,hits,p);
  campLog(`${pname(playerIdx)} 清剿 ${sysId} 凋敝：掷 ${dice} 突袭骰命中 ${hits}，摧毁 ${destroyed}（剩 ${blightTotal(s)}）`);
  return destroyed;
}
// 玩家是否控制「带新鲜凋敝」的系统（博物学家命运用）
function campFreshBlightSystemsControlled(playerIdx){ const p=G.players[playerIdx]; if(!p) return 0; let n=0;
  for(const id in G.map){ if(blightFresh(G.map[id])>0 && controllerOf(id)===p.color.key) n++; } return n; }

/* ===== 阶段8a：帝国星舰落图 + 帝国控制（《帝国规则》辅助卡） ===== */
function impShipsN(s){ return (s&&s.pieces&&s.pieces.ships&&s.pieces.ships.imperial)||0; }
function impDmg(s){ return (s&&s.pieces&&s.pieces.dmg&&s.pieces.dmg.imperial)||0; }
function impFresh(s){ return impShipsN(s)-impDmg(s); }
function campPlaceImperialShips(sysId, n, damaged){ const s=G.map[sysId]; if(!s||s.outOfPlay) return 0; n=n||1;
  s.pieces.ships.imperial=(s.pieces.ships.imperial||0)+n; if(damaged){ s.pieces.dmg=s.pieces.dmg||{}; s.pieces.dmg.imperial=(s.pieces.dmg.imperial||0)+n; }
  campLog(`帝国：${sysId} +${n} 帝国星舰`); return n; }
// 帝国以「任意新鲜帝国舰」控制系统（无视玩家忠诚舰）
function campEmpireControls(sysId){ return impFresh(G.map[sysId])>0; }
function campEmpireSystems(){ return Object.keys(G.map).filter(id=>!G.map[id].outOfPlay && campEmpireControls(id)); }
function campEmpireClustersControlled(){ const cl=new Set(); campEmpireSystems().forEach(id=>{ const c=G.map[id].cluster; if(c) cl.add(c); }); return cl.size; }
// 法外者城市是否全部处于帝国控制之下（或无法外者城市）——摄政官第三幕用
function campAllOutlawCitiesControlled(){
  let any=false, allCtrl=true;
  for(const id in G.map){ const s=G.map[id]; if(s.outOfPlay) continue;
    s.pieces.buildings.forEach(b=>{ if(b.type!=='city') return; const ow=G.players.find(p=>p.color.key===b.owner);
      if(ow && ow.identity==='outlaw'){ any=true; if(!campEmpireControls(id)) allCtrl=false; } }); }
  return !any || allCtrl; // 无法外者城市 → 视为帝国控制全部
}
// 升级政策的帝国行动：在帝国控制系统放 2 新帝国舰；否则放在（首席）摄政的忠诚星港
function campEscalationPlaceShips(){
  let target=campEmpireSystems()[0];
  if(!target){ const fr=G.campaign.firstRegentIdx;
    const regentCols=G.players.filter(p=>p.identity==='regent').map(p=>p.color.key);
    const pref=fr!=null?G.players[fr].color.key:null;
    for(const id in G.map){ const s=G.map[id]; if(s.outOfPlay) continue;
      const sp=s.pieces.buildings.find(b=>b.type==='starport'&&(b.owner===pref));
      if(sp){ target=id; break; } }
    if(!target) for(const id in G.map){ const s=G.map[id]; if(s.outOfPlay) continue;
      if(s.pieces.buildings.some(b=>b.type==='starport'&&regentCols.includes(b.owner))){ target=id; break; } }
  }
  if(target){ campPlaceImperialShips(target,2); return target; }
  campLog('升级·帝国行动：无可放置帝国星舰的系统'); return null;
}

/* ===== 阶段8b：旗舰(Flagship) 子系统（旗舰升级参考卡 + 帝国规则辅助卡） ===== */
// 6 项升级（受损仍提供效益）：旗舰板列出，命中作为护甲逐一受损
const FLAGSHIP_UPGRADES = [
  {k:'slipstream', cn:'滑流引擎', d:'序幕每回合一次：弹射移动旗舰，或将其他星舰从旗舰处移出'},
  {k:'tractor',    cn:'牵引波束', d:'旗舰防御时，攻击方不能掷劫掠骰'},
  {k:'control',    cn:'控制阵列', d:'旗舰在星门时，可将该星簇任意城市当忠诚课税（不抓俘虏）'},
  {k:'defense',    cn:'防御阵列', d:'旗舰防御时可拦截，按旗舰板每个完好星港造成 1 击'},
  {k:'crane',      cn:'星舰起重机', d:'旗舰每回合可建造至多 2 艘星舰'},
  {k:'hull',       cn:'船体', d:'无特殊效益，可像其他升级一样被命中'},
];
function campHasFlagship(playerIdx){ const p=G.players[playerIdx]; return !!(p&&p.flagship&&p.flagship.sys); }
function campFlagshipAt(sysId){ for(let i=0;i<G.players.length;i++){ if(campHasFlagship(i)&&G.players[i].flagship.sys===sysId) return i; } return -1; }
// 旗舰升级是否生效（受损仍生效；只要旗舰在场且拥有该槽即 true）
function campFlagshipUpgrade(playerIdx, k){ return campHasFlagship(playerIdx) && !!G.players[playerIdx].flagship.up && (k in G.players[playerIdx].flagship.up); }
function campFlagshipFreshStarports(playerIdx){ if(!campHasFlagship(playerIdx)) return 0; const p=G.players[playerIdx];
  // 旗舰板上的星港（防御阵列拦截用）：简化为「有任一新鲜升级 → 1」，命运实装时细化为板上实际星港数
  return Object.values(p.flagship.up).some(v=>v==='fresh')?1:0; }
// 旗舰布置：在含本玩家忠诚棋子(舰/建筑)的系统放置旗舰；6 升级全新鲜
function campFlagshipSetup(playerIdx, sysId){ const p=G.players[playerIdx]; const s=G.map[sysId]; if(!p||!s||s.outOfPlay) return false;
  const col=p.color.key; const hasLoyal=(s.pieces.ships[col]>0)||s.pieces.buildings.some(b=>b.owner===col);
  if(!hasLoyal) return false;
  const up={}; FLAGSHIP_UPGRADES.forEach(u=>up[u.k]='fresh'); p.flagship={sys:sysId, up};
  campLog(`${pname(playerIdx)} 旗舰布置于 ${sysId}（6 升级全新鲜）`); return true; }
// 旗舰移动：迁到相邻系统（滑流引擎可弹射，本版按相邻处理）
function campFlagshipMove(playerIdx, dstSys){ if(!campHasFlagship(playerIdx)) return false; const p=G.players[playerIdx];
  const cur=G.map[p.flagship.sys]; if(!cur || !(cur.neighbors||[]).includes(dstSys)) return false;
  p.flagship.sys=dstSys; campLog(`${pname(playerIdx)} 旗舰移动 → ${dstSys}`); return true; }
// 旗舰重新安置(Resettle)：移除并在含忠诚棋子的新系统重放
function campFlagshipResettle(playerIdx, sysId){ const p=G.players[playerIdx]; const s=G.map[sysId]; if(!campHasFlagship(playerIdx)||!s||s.outOfPlay) return false;
  const col=p.color.key; const hasLoyal=(s.pieces.ships[col]>0)||s.pieces.buildings.some(b=>b.owner===col); if(!hasLoyal) return false;
  p.flagship.sys=sysId; campLog(`${pname(playerIdx)} 旗舰重新安置于 ${sysId}`); return true; }
// 旗舰受击：逐一损坏新鲜升级（护甲）；全部受损后再受击则摧毁旗舰
function campFlagshipHit(playerIdx, n){ if(!campHasFlagship(playerIdx)) return {damaged:0,destroyed:false}; const p=G.players[playerIdx];
  let dmg=0; n=n||1;
  for(let h=0;h<n;h++){ const fresh=FLAGSHIP_UPGRADES.map(u=>u.k).filter(k=>p.flagship.up[k]==='fresh');
    if(fresh.length){ p.flagship.up[fresh[0]]='damaged'; dmg++; }
    else { campLog(`${pname(playerIdx)} 旗舰所有升级已受损，再受击 → 旗舰被摧毁`); p.flagship=null; return {damaged:dmg,destroyed:true}; } }
  campLog(`${pname(playerIdx)} 旗舰受损 ${dmg} 个升级`); return {damaged:dmg,destroyed:false}; }
// 旗舰修复：修复 1 个（或全部）受损升级
function campFlagshipRepair(playerIdx, all){ if(!campHasFlagship(playerIdx)) return 0; const p=G.players[playerIdx]; let n=0;
  for(const u of FLAGSHIP_UPGRADES){ if(p.flagship.up[u.k]==='damaged'){ p.flagship.up[u.k]='fresh'; n++; if(!all) break; } }
  if(n) campLog(`${pname(playerIdx)} 旗舰修复 ${n} 个升级`); return n; }
// 星舰起重机：玩家本回合在旗舰系统可建造的舰数上限（2，否则普通规则）
function campFlagshipCraneLimit(playerIdx, sysId){ return (campHasFlagship(playerIdx)&&G.players[playerIdx].flagship.sys===sysId&&campFlagshipUpgrade(playerIdx,'crane'))?2:0; }

/* ===== 阶段9：命运专属地图标记框架（旗帜/王座/地堡 共用基类） ===== */
// 关键字：building(可伤/修)、tough(双段血)、noRaid(不可劫掠)、loyal(忠诚棋件)；统一存于 G.campaign.marks
const MARK_KINDS = {
  banner:{cn:'旗帜', glyph:'⚑', kw:['building','noRaid','loyal']},        // Hegemon 霸主
  seat:  {cn:'王座', glyph:'♛', kw:['loyal','token']},                    // Warden 守护者(领主)
  bunker:{cn:'地堡', glyph:'⌂', kw:['building','tough','noRaid','loyal']}, // Survivalist 幸存者
  passage:{cn:'通道', glyph:'◈', kw:['token']},                          // Gate Wraith 门魅（置于星门）
};
function campMarks(){ return (G.campaign.marks||(G.campaign.marks=[])); }
function campPlaceMark(type, playerIdx, sysId){ const p=G.players[playerIdx]; const s=G.map[sysId]; if(!p||!s||s.outOfPlay||!MARK_KINDS[type]) return false;
  campMarks().push({type, owner:p.color.key, sys:sysId}); campLog(`${pname(playerIdx)} 放置${MARK_KINDS[type].cn}于 ${sysId}`); return true; }
function campRemoveMark(type, playerIdx, sysId){ const col=G.players[playerIdx].color.key; const arr=campMarks();
  const idx=arr.findIndex(m=>m.type===type&&m.owner===col&&(!sysId||m.sys===sysId)); if(idx<0) return false; arr.splice(idx,1); return true; }
function campMarksOf(playerIdx, type){ const col=G.players[playerIdx].color.key; return campMarks().filter(m=>m.type===type&&m.owner===col).length; }
function campMarksAt(sysId, type){ return campMarks().filter(m=>m.sys===sysId&&(!type||m.type===type)); }
function campTotalMarks(type){ return campMarks().filter(m=>m.type===type).length; }
// 王座/采邑(Warden)：你拥有王座且控制其系统 → 计为「控制的王座」；你放王座的星团 → 你是该采邑领主
function campSeatsControlled(playerIdx){ const col=G.players[playerIdx].color.key;
  return campMarks().filter(m=>m.type==='seat'&&m.owner===col&&controllerOf(m.sys)===col).length; }
function campLordClusters(playerIdx){ const col=G.players[playerIdx].color.key; const cl=new Set();
  campMarks().forEach(m=>{ if(m.type==='seat'&&m.owner===col){ const c=G.map[m.sys]&&G.map[m.sys].cluster; if(c) cl.add(c); } }); return cl; }
function campFiefsCount(playerIdx){ return campLordClusters(playerIdx).size; }
function campCitiesInFiefs(playerIdx){ const cls=campLordClusters(playerIdx); let n=0;
  for(const id in G.map){ const s=G.map[id]; if(s.outOfPlay||!cls.has(s.cluster)) continue; n+=s.pieces.buildings.filter(b=>b.type==='city').length; } return n; }
// 公会卡花色（代言人命运）：玩家麾下公会卡的去重资源图标数 / 公会卡总数 / 超过的对手数
function campGuildSuits(playerIdx){ const p=G.players[playerIdx]; const s=new Set();
  (p.guildCards||[]).forEach(c=>{ if(c.icon) s.add(c.icon); }); return s.size; }
function campGuildCount(playerIdx){ return (G.players[playerIdx].guildCards||[]).length; }
function campRivalsExceededInGuilds(playerIdx){ const mine=campGuildCount(playerIdx);
  return G.players.filter((q,j)=>j!==playerIdx && mine>campGuildCount(j)).length; }
function campGuildCardsInCourt(){ return G.court.filter(c=>c&&(c.t==='guild'||c.eff)).length; } // 议会区公会卡数（近似：非vox/非议会特殊卡）
// 垄断卡（大亨命运）：以计数器 p._monopolies 表示
function campMonopolies(playerIdx){ return G.players[playerIdx]._monopolies||0; }
function campGainMonopoly(playerIdx){ const p=G.players[playerIdx]; p._monopolies=(p._monopolies||0)+1;
  campLog(`${pname(playerIdx)} 获得 1 张垄断卡（共 ${p._monopolies}）`); campFire('monopolyGained',{playerIdx}); }
function campLoseMonopoly(playerIdx){ const p=G.players[playerIdx]; if((p._monopolies||0)>0){ p._monopolies--; return true; } return false; }
// 自由城市/自由建筑（奠基者命运）：owner==='free' 的建筑
function campFreeCities(){ const out=[]; for(const id in G.map){ const s=G.map[id]; if(s.outOfPlay) continue;
  s.pieces.buildings.forEach(b=>{ if(b.owner==='free'&&b.type==='city') out.push({id,b}); }); } return out; }
// 联邦成员色集合（默认：战役内全体玩家皆为成员；失格者可移除）
function campMembers(){ return G.campaign.commMembers || (G.campaign.commMembers=G.players.map(p=>p.color.key)); }
// 奠基者计数：未被帝国控制、且未被「非成员对手」控制的自由城市数
function campFounderFreeCities(){ const mem=campMembers();
  return campFreeCities().filter(({id})=>{ if(campEmpireControls(id)) return false;
    const ctrl=controllerOf(id); return !ctrl || mem.includes(ctrl); }).length; }
function campPlaceFreeCity(sysId){ const s=G.map[sysId]; if(!s||s.outOfPlay) return false;
  s.pieces.buildings.push({type:'city',owner:'free',damaged:false}); campLog(`${sysId} 放置自由城市`); return true; }
// 通灵比较（和平主义者）：对手通灵总和 vs 你的通灵
function campRivalsPsionicSum(playerIdx){ return G.players.reduce((n,q,j)=>n+(j!==playerIdx?(q.res.psionic||0):0),0); }
// 海盗藏宝（海盗命运）：p._hoard={res:数}，民愤不弃、可花费可计雄心
function campHoard(playerIdx){ const p=G.players[playerIdx]; return p._hoard||(p._hoard={material:0,fuel:0,weapon:0,relic:0,psionic:0}); }
function campHoardTotal(playerIdx){ const h=campHoard(playerIdx); return RES_ORDER.reduce((n,r)=>n+(h[r]||0),0); }
function campHoardAdd(playerIdx,res,n){ const h=campHoard(playerIdx); h[res]=(h[res]||0)+(n||1); campLog(`${pname(playerIdx)} 海盗藏宝 +${n||1} ${RESOURCES[res].name}`); }
function campHoardScarceTypes(playerIdx){ const h=campHoard(playerIdx); let n=0;
  RES_ORDER.forEach(r=>{ if((h[r]||0)>0 && G.players.every((q,j)=> j===playerIdx || (h[r]||0)>(q.res[r]||0))) n++; }); return n; }
// 探路者：秘密传送门行星 p._portal、已放对勾线索数 p._checks、已找到 p._portalFound、送达朝圣者 p._pilgrimsHome
function campPathCheck(playerIdx, flagSys){ const p=G.players[playerIdx]; if(!p._portal) return 'none'; const s1=G.map[p._portal], s2=G.map[flagSys]; if(!s1||!s2) return 'none';
  if(flagSys===p._portal){ p._portalFound=true; campLog(`${pname(playerIdx)} 旗舰停在正确行星 → 发现传送门！`); campFire('pathfinderPortal',{playerIdx}); return 'portal'; }
  if(s1.cluster===s2.cluster || s1.idsym===s2.idsym){ p._checks=(p._checks||0)+1; campLog(`${pname(playerIdx)} 线索：✓对勾（线索数 ${p._checks}）`); campFire('pathfinderCheck',{playerIdx}); return 'check'; }
  campLog(`${pname(playerIdx)} 线索：✗叉`); return 'x'; }
// 看护者(5)：傀儡计数 + 遗珍(遗物/通灵公会卡)收藏

// G 为纯数据对象（无函数/DOM/循环引用），可直接 JSON 序列化。快照含版本号便于日后迁移。
const CAMPAIGN_SAVE_VERSION = 1;
const CAMPAIGN_SLOT_PREFIX = 'arcs_campaign_';
function campaignSnapshot(){ return JSON.stringify({ v:CAMPAIGN_SAVE_VERSION, ts:null, G }); }
function restoreCampaignSnapshot(str){
  const obj = (typeof str==='string') ? JSON.parse(str) : str;
  if(!obj || !obj.G) throw new Error('存档格式无效');
  G = obj.G;
  return G;
}
function hasLocalStorage(){ try { return typeof localStorage!=='undefined' && localStorage; } catch(e){ return false; } }
function campaignSlotKey(slot){ return CAMPAIGN_SLOT_PREFIX + (slot||'auto'); }
function saveCampaignSlot(slot, label){
  if(!hasLocalStorage()) return false;
  try { const snap=JSON.parse(campaignSnapshot()); snap.label=label||(G&&G.campaign&&G.campaign.label)||'战役存档';
    localStorage.setItem(campaignSlotKey(slot), JSON.stringify(snap)); return true; } catch(e){ return false; }
}
function loadCampaignSlot(slot){
  if(!hasLocalStorage()) return false;
  const s=localStorage.getItem(campaignSlotKey(slot)); if(!s) return false;
  try { restoreCampaignSnapshot(s); return true; } catch(e){ return false; }
}
function deleteCampaignSlot(slot){ if(hasLocalStorage()) try { localStorage.removeItem(campaignSlotKey(slot)); } catch(e){} }
function listCampaignSlots(){
  if(!hasLocalStorage()) return [];
  const out=[];
  for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i);
    if(k && k.indexOf(CAMPAIGN_SLOT_PREFIX)===0){ const slot=k.slice(CAMPAIGN_SLOT_PREFIX.length);

/* ======================= 音效系统（Web Audio API 合成）===================== */
const SFX={
  _ctx:null, _muted:false,
  _c(){ if(this._ctx) return this._ctx; try{this._ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){} return this._ctx; },
  _g(vol,t){ const c=this._c(); if(!c)return null; const g=c.createGain(); g.gain.setValueAtTime(vol,t||c.currentTime); return g; },
  _osc(type,freq,dur,vol,delay){
    const c=this._c(); if(!c||this._muted)return;
    const o=c.createOscillator(),g=c.createGain();
    o.type=type; o.frequency.value=freq;
    const t=c.currentTime+(delay||0);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g);g.connect(c.destination); o.start(t);o.stop(t+dur);
  },
  _sweep(f1,f2,dur,type,vol,delay){
    const c=this._c(); if(!c||this._muted)return;
    const o=c.createOscillator(),g=c.createGain();
    o.type=type||'sine';
    const t=c.currentTime+(delay||0);
    o.frequency.setValueAtTime(f1,t); o.frequency.exponentialRampToValueAtTime(f2,t+dur);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g);g.connect(c.destination); o.start(t);o.stop(t+dur);
  },
  _noise(dur,freq,q,vol,delay){
    const c=this._c(); if(!c||this._muted)return;
    const n=c.sampleRate*dur, buf=c.createBuffer(1,n,c.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/n*5);
    const src=c.createBufferSource(); src.buffer=buf;
    const bp=c.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=freq||800; bp.Q.value=q||2;
    const g=c.createGain(); const t=c.currentTime+(delay||0);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    src.connect(bp);bp.connect(g);g.connect(c.destination); src.start(t);src.stop(t+dur);
  },
  // ---- 各事件音效 ----
  roll(){ this._noise(.22,1400,1.2,.35); this._sweep(280,90,.18,'sawtooth',.1); },
  land(){ this._sweep(200,75,.12,'sine',.22); this._noise(.06,500,3,.18); },
  hit(){ this._sweep(160,55,.13,'sine',.28); },
  destroy(){ this._noise(.38,180,.7,.45); this._osc('sine',70,.28,.25); },
  card(){ this._sweep(650,260,.11,'sawtooth',.11); },
  seize(){ [440,554,659].forEach((f,i)=>this._osc('triangle',f,.22,.18,i*.07)); },
  score(){ [523,659,784,1047].forEach((f,i)=>this._osc('sine',f,.38,.2,i*.09)); },
  chapter(){ [392,330,262].forEach((f,i)=>this._osc('sine',f,.48,.18,i*.17)); },
  newChapter(){ [523,587,659,784].forEach((f,i)=>this._osc('triangle',f,.28,.15,i*.09)); },
  victory(){ [523,659,784,1047,1568].forEach((f,i)=>this._osc('triangle',f,.5,.2,i*.11)); },
  build(){ this._sweep(380,560,.09,'sine',.14); },
  modal(){ this._sweep(280,460,.07,'sine',.09); },
  key(){ this._sweep(750,1100,.05,'triangle',.13); },
  move(){ this._sweep(320,140,.09,'sine',.13); this._noise(.04,2600,1.3,.06); },
  tax(){ this._osc('triangle',520,.05,.13); this._osc('triangle',780,.05,.11,.045); },
};

/* ===== AI 前向模型封装（P0）：决策时搜索/自对弈用；纯函数，浏览器与无头测试通用 ===== */
// 深拷贝游戏状态：保留 Set/Map、保留共享引用与循环引用(memo)、丢弃函数(回调不可克隆)。
// 用于 MCTS「克隆→模拟→丢弃」，绝不污染真实棋局。注意 G.pending.legal / _abil._taxed 等是 Set。
function cloneState(obj, memo){
  memo = memo || new Map();
  if(obj===null || typeof obj!=='object') return obj;
  if(memo.has(obj)) return memo.get(obj);                                   // 共享引用/循环引用：复用同一克隆，保持对象身份
  if(obj instanceof Set){ const s=new Set(); memo.set(obj,s); obj.forEach(v=>s.add(cloneState(v,memo))); return s; }
  if(obj instanceof Map){ const m=new Map(); memo.set(obj,m); obj.forEach((v,k)=>m.set(cloneState(k,memo),cloneState(v,memo))); return m; }
  if(Array.isArray(obj)){ const a=[]; memo.set(obj,a); for(let i=0;i<obj.length;i++) a[i]=cloneState(obj[i],memo); return a; }
  const o={}; memo.set(obj,o);
  for(const k in obj){ if(!Object.prototype.hasOwnProperty.call(obj,k)) continue;
    const v=obj[k]; if(typeof v==='function') continue;                     // 丢弃函数(如 pending 的回调)——克隆出的状态用于搜索, 不需要回调
    o[k]=cloneState(v,memo); }
  return o;
}
// 终局判定

// 每座位分数向量（权力=通用计分货币；战役终局再叠加 _campVictory 优先，见 endGameSort）

/* ===== AI 移动接口（P1a）：legalMoves / applyMove / aiEval，供启发式 agent 与 MCTS 用 ===== */
// 当前决策座位（纯函数）
function aiActiveSeat(state){
  const ph=state.phase;
  if(ph==='lead') return state.initiative;
  if(ph==='follow') return state.followQueue.length?state.followQueue[0]:state.turnPlayer;
  if(ph==='actions') return state.actor;
  return state.turnPlayer;
}
// P1a 支持的行动（可干净自动结算）；move(多步)/battle(掷骰) 留待 P1b 专门接口
const AI_SUPPORTED_ACTIONS = ['tax','build','repair','influence','secure'];
// 枚举当前决策点的合法 move（不修改 state；actions 阶段临时只读 swap G 调用引擎 legalTargets）
function legalMoves(state){
  const ph=state.phase;
  if(ph==='lead'){
    const p=state.players[state.initiative]; const moves=[{type:'leadPass'}];
    for(let i=0;i<p.hand.length;i++){ const card=p.hand[i];
      moves.push({type:'lead',i,declare:null});
      if(state.markersAvailable && state.markersAvailable.length>0){
        let ks=[]; if(card.number>=2&&card.number<=6) ks=[AMB_ORDER[card.number-2]]; else if(card.number===7) ks=AMB_ORDER.slice();
        for(const k of ks){ if(!state.declaredThisChapter||!state.declaredThisChapter[k]) moves.push({type:'lead',i,declare:k}); }
      }
    }
    return moves;
  }
  if(ph==='follow'){
    const idx=state.followQueue[0]; const p=state.players[idx]; const moves=[{type:'followPass'}];
    const lc=state.lead.card; const ln=state.lead.zero?0:lc.number;
    for(let i=0;i<p.hand.length;i++){ const card=p.hand[i];
      if(card.suit===lc.suit && card.number>ln) moves.push({type:'follow',i,mode:'surpass'});
      if(card.suit!==lc.suit) moves.push({type:'follow',i,mode:'pivot'});
      moves.push({type:'follow',i,mode:'copy'});
    }
    return moves;
  }
  if(ph==='actions'){
    const moves=[{type:'endActions'}];
    if(state.actionsLeft>0){
      const acts=SUITS[state.actionSuit].actions.filter(a=>AI_SUPPORTED_ACTIONS.includes(a));
      const me=state.players[state.actor]; const col=me.color.key;
      const saved=G; G=state;
      try{
        for(const a of acts){
          if(a==='influence'){ if(me.supply.agents>0 && state.court.length) moves.push({type:'action',action:'influence'}); continue; }
          if(a==='secure'){ if(state.court.some(c=>majorityOn(c,col))) moves.push({type:'action',action:'secure'}); continue; }
          legalTargets(a).forEach(t=>moves.push({type:'action',action:a,target:t}));
        }
      } finally { G=saved; }
    }
    return moves;
  }
  return [];
}
// 模态自答（移动感知）：捕获 builder 内带 onclick 的按钮并按 move 意图选择。document.createElement 在浏览器与无头桩下皆可。
function aiResolveModal(builder, move){
  const node=document.createElement('div'); builder(node);
  const btns=[]; (function visit(n){ if(!n||typeof n!=='object') return; if(typeof n.onclick==='function') btns.push(n);
    const kids=n._children||(n.children?Array.prototype.slice.call(n.children):null)||[]; kids.forEach(visit); })(node);
  if(!btns.length) return;
  const txt=b=>(b.textContent||'');
  let pick=null;
  if(move && move.type==='lead'){
    if(move.declare){ pick=btns.find(b=>txt(b).includes(AMBITIONS[move.declare].name)); }
    if(!pick) pick=btns.find(b=>/不宣告|直接行动/.test(txt(b)));
  } else if(move && move.type==='action'){
    pick=btns.find(b=>!/取消|放弃|停止|不宣告|跳过/.test(txt(b)));   // 选第一个“正向”选项（建造类型/影响某卡/修理某项）
  }
  if(!pick) pick=btns.find(b=>/不宣告|跳过|停止|放弃|取消/.test(txt(b))) || btns[btns.length-1];
  if(pick && typeof pick.onclick==='function') pick.onclick();
}
// 执行一个 move（在 applyMove 内对克隆态调用，UI 已静音、openModal 已换成自答）
function aiDrive(move){
  if(move.type==='leadPass'){ leadPass(); return; }
  if(move.type==='lead'){ leadCard(move.i); return; }
  if(move.type==='followPass'){ followPass(); return; }
  if(move.type==='follow'){ followPlay(G.followQueue[0], move.i, move.mode, false); return; }
  if(move.type==='endActions'){ endActorTurn(); return; }
  if(move.type==='action'){
    if(move.action==='influence'||move.action==='secure'){ beginAction(move.action); }
    else { beginAction(move.action); if(G.pending) onSystemClick(move.target); }
    return;
  }
}
// 应用 move → 返回新状态（绝不修改入参 state）。内部克隆 + 临时静音 UI/换模态自答 + 驱动引擎 + 还原。
function applyMove(state, move){
  const savedG=G, sRender=render, sToast=toast, sPrompt=setPrompt, sLog=logMsg, sCamp=campLog, sPromptA=promptActions, sModal=openModal;
  G=cloneState(state);
  const noop=function(){};
  render=noop; toast=noop; setPrompt=noop; logMsg=noop; campLog=noop; promptActions=noop;
  openModal=function(builder){ aiResolveModal(builder, move); };
  try{ aiDrive(move); return G; }
  finally{ G=savedG; render=sRender; toast=sToast; setPrompt=sPrompt; logMsg=sLog; campLog=sCamp; promptActions=sPromptA; openModal=sModal; }
}
// 叶子评估（启发式效用；后续 P2 的「人格」= 这里的权重向量）。纯函数, 仅读 state。
// 关键：必须"看得到雄心结算"——ARCS 权力只在章末已宣告雄心结算时产生(scoreAmbitions)，
// 否则近视评估永不宣告→永不得分。这里把"已宣告雄心上本座位的预估收益"计入效用。
function aiEval(state, seat){
  const p=state.players[seat]; if(!p) return 0;
  const ck=p.color.key;
  let res=0; for(const r of RES_ORDER) res+=(p.res[r]||0);
  let blds=0, ships=0; for(const id in state.map){ const s=state.map[id];
    blds += (s.pieces.buildings||[]).filter(b=>b.owner===ck).length;
    ships += (s.pieces.ships&&s.pieces.ships[ck])||0; }
  let u = (p.power||0)*1.0 + res*0.5 + blds*1.0 + ships*0.3 + ((p.guildCards||[]).length)*0.6 + (p.trophies||0)*0.4;
  // 已宣告雄心结算预估：对每个已宣告雄心, 按本座位在该指标的名次估算可得权力(乘系数防过度乐观)
  const saved=G; G=state;
  try{
    for(const k of AMB_ORDER){ const mk=state.ambitionBox[k]; if(!mk||!mk.length) continue;
      const hi=mk.reduce((x,m)=>x+(m.f||0),0), lo=mk.reduce((x,m)=>x+(m.s||0),0);
      const myC=AMBITIONS[k].count(p); if(myC<=0) continue;
      let better=0; for(const q of state.players){ if(q!==p && AMBITIONS[k].count(q)>myC) better++; }
      if(better===0) u+=hi*0.8; else if(better===1) u+=lo*0.7;     // 估计第1名得hi/第2名得lo
      u += myC*0.25;                                                // 朝该已宣告雄心继续累积有正反馈
    }
  } finally { G=saved; }
  return u;
}

let G = null; // 全局游戏对象

function newGame(numPlayers, names, useExpansion, setupVariant, campaignOpts){
  const map = buildMap();
  const players = [];
  for(let i=0;i<numPlayers;i++){
    players.push({
      idx:i, name:names[i]||('玩家'+(i+1)), color:PCOLORS[i],
      hand:[], res:{material:0,fuel:0,weapon:0,relic:0,psionic:0},
      trophies:0, captives:0, power:0, guildCards:[],
      leader:null, // 领袖卡 id（仅开扩展时分配）
      loreCards:[], // 传说卡 id 列表（仅开扩展时发牌，每人 2 张作为个人能力）
      outraged:{material:false,fuel:false,weapon:false,relic:false,psionic:false}, // 民愤：被覆盖的资源不能用于序幕行动（仍可课税/计雄心）
      supply:{ships:15, cities:5, starports:5, agents:10}, // 未上场的棋子
      hasPassed:false, outForRound:false,
      // 战役字段（仅战役模式生效；单场模式恒为默认值）
      fate:null,                 // 命运卡 num (1-24)
      identity:'regent',         // 'regent'(摄政) | 'outlaw'(法外者)
      fateProgress:0,            // 命运目标进度计数
      fateObjMet:[false,false,false], // 三幕目标达成标记
      favors:{},                 // 好感：{对手色:数量}——置于本玩家命运卡上的对手密探（峰会杠杆）
      flagship:null,             // 旗舰：null 或 {sys, up:{6升级:'fresh'|'damaged'}}（命运9-18 用）
    });
  }
  G = {
    numPlayers, players, map,
    useExpansion: !!useExpansion, // 领袖与传说扩展开关（false 时基础游戏行为零变化）
    setupVariant: setupVariant||(numPlayers+'_homelands'), // 桌面布局方案 key
    actionDeck:[], discard:[],
    court:[], courtDeck:[], courtDiscard:[], // courtDiscard：被弃置的公会卡（序幕一次性能力用完后）
    resSupply:{material:5,fuel:5,weapon:5,relic:5,psionic:5},
    // 雄心标记盒：每个雄心 box 里放置的标记（{f:首位, s:次位}）
    ambitionBox:{tycoon:[],tyrant:[],warlord:[],keeper:[],empath:[]},
    // 3 枚雄心标记：开局蓝面（低）朝上 → 5/3、3/2、2/0（官方规则书 p.4-E/p.5/p.18 实拍核对）。
    // f/s = 当前面的「首位/次位」权力；nf/ns = 翻面后的高面值；flipped = 是否已翻面。
    // 每章清算 Step2：把所有标记收回可用区，并翻面「当前首位权力最低且尚未翻面」的一枚（escalation，p.19）。
    // 翻面高面值取通行的实体标记数值（2/0→4/2、3/2→6/4、5/3→9/5）。
    markersAvailable:[
      {f:5,s:3,flipped:false,nf:9,ns:5},
      {f:3,s:2,flipped:false,nf:6,ns:4},
      {f:2,s:0,flipped:false,nf:4,ns:2},
    ], // 宣告时取「当前首位最高」者
    declaredThisChapter:{}, // ambitionKey -> true
    phantom:null,           // 2 人局：虚拟第三方各雄心计数（出局行星资源播种，仅占位不得分）
    chapter:1, maxChapters:5,
    initiative:0,            // 先攻玩家 idx
    // 回合状态
    phase:'setup',
    lead:null,               // {playerIdx, card, ambition, zero}
    played:[],               // 本回合打出的牌 [{playerIdx,card,mode,faceDown}]
    seizedBy:null,           // 夺取先攻的玩家 idx
    passedInARow:0,          // 连续 pass 计数（用于结束章节）
    followQueue:[],          // 待跟随玩家队列
    turnPlayer:0,
    actor:null,              // 当前执行行动的玩家 idx
    actionsLeft:0, actionSuit:null,
    pending:null,            // 交互式行动状态 {type, step, ...}
    log:[],
    // 战役元层状态（enabled=false 时基础游戏行为零变化；阶段性启用各子系统）
    campaign: campaignOpts ? {
      enabled:true,
      label: campaignOpts.label || '战役',
      act:1,                 // 当前幕 1-3
      session:1,             // 当前场次
      intermissionPending:false,
      firstRegentIdx:null,   // 首席摄政玩家 idx
      trust:{material:0,fuel:0,weapon:0,relic:0,psionic:0}, // 帝国信托
      council:'session',     // 'session'(会期中) | 'decided'(已裁决)
      lawbook:[],            // 有序律法/敕令/头衔卡（阶段5启用）
      edictPolicy:null,      // 当前政策面
      marks:[],             // 命运专属地图标记：[{type:'banner'|'seat'|'bunker',owner:色,sys}]（阶段9框架）
      fatesInPlay: (campaignOpts.fates||[]).slice(), // 本局命运 num 列表（按玩家序）
    } : { enabled:false },
  };
  // 战役模式：把分配的命运写入各玩家
  if(campaignOpts && campaignOpts.fates){
    campaignOpts.fates.forEach((fnum,i)=>{ if(players[i]) players[i].fate=fnum; });
  }
  setupGame();
  return G;
}

function logMsg(html, cls=''){ G.log.push({html, cls}); renderLog(); }

function setupGame(){
  const n=G.numPlayers;
  G.actionDeck = buildActionDeck(n);
  // 移除 1/7（2-3人）已在 build 内处理；洗牌
  shuffle(G.actionDeck);
  // 议会
  G.courtDeck = shuffle(buildCourtDeck());
  const courtN = (n===2)?3:4;
  for(let i=0;i<courtN;i++) G.court.push(G.courtDeck.pop());
  // 雄心标记初始：3 个标记，蓝(低)面朝上
  // 先攻随机
  G.initiative = Math.floor(Math.random()*n);
  G.turnPlayer = G.initiative;

  // 桌面布局：从 SETUP_PLANS 取方案（官方 Setup Card 精确复现）
  const plan = getSetupPlan(n, G.setupVariant);
  // 2 人局：出局星团资源播种到「虚拟第三方」（官方规则书 p.4-K）
  if(n===2) G.phantom={tycoon:0,tyrant:0,warlord:0,keeper:0,empath:0};
  (plan.oop||[]).forEach(c=>{
    G.map['G'+c].pathMarker=true; G.map['G'+c].outOfPlay=true;
    [c+'A',c+'B',c+'C'].forEach(id=>{
      G.map[id].outOfPlay=true;
      if(n===2&&G.phantom){ const r=G.map[id].resource;
        if(r==='material'||r==='fuel') G.phantom.tycoon++;
        else if(r==='weapon') G.phantom.warlord++;
        else if(r==='relic') G.phantom.keeper++;
        else if(r==='psionic') G.phantom.empath++;
      }
    });
    const n1=(c%6)+1, n2=((c+4)%6)+1; addAdj(G.map,'G'+n1,'G'+n2);
  });

  // 放置起始棋子（按方案）
  G.players.forEach((p,i)=>{
    const sp=plan.start[i]||{A:(i+1)+'A',B:(i+1)+'B',C:(i+1)+'C'}; // 安全后备
    placeBuilding(sp.A, 'city', p); addShips(sp.A, p, 3);
    placeBuilding(sp.B, 'starport', p); addShips(sp.B, p, 3);
    addShips(sp.C, p, 2);
    // 起始资源：城市行星 + 星港行星各 1
    gainResource(p, G.map[sp.A].resource, true);
    gainResource(p, G.map[sp.B].resource, true);
  });

  // 发牌：每人 6 张
  G.players.forEach(p=>{ for(let k=0;k<6;k++) p.hand.push(G.actionDeck.pop()); sortHand(p); });

  G.phase='lead';
  logMsg(`<b>第 ${G.chapter} 章</b> 开始 · 先攻：<span style="color:${G.players[G.initiative].color.css}">${G.players[G.initiative].name}</span> · 布局：<b>${plan.name}</b>（${plan.en}）`,'sys');
  // 领袖扩展：开局先进行领袖抽选（应用 setup 效果后再 beginRound）；未开扩展时维持原样
  if(G.useExpansion){ startLeaderDraft(); return; }
  beginRound();
}

/* ---------------------- 领袖抽选阶段（热座简化）------------------------ */
// 洗乱 16 领袖，按行动顺位每位玩家依次从「发给他的 2 张」里选 1 张（模态框顺序进行）。
// 选完应用 setup 效果；全部选完后 logMsg + beginRound()。测试中可直接调用 assignLeader/applyLeaderSetup。
function assignLeader(p, id){ p.leader=id; applyLeaderSetup(p); }
function startLeaderDraft(){
  G.phase='leaderdraft';
  const pool=shuffle(LEADERS.map(L=>L.id));
  const order=[]; for(let k=0;k<G.numPlayers;k++) order.push((G.initiative+k)%G.numPlayers);
  const step=(qi)=>{
    if(qi>=order.length){
      logMsg(`领袖抽选完成：${G.players.map((p,i)=>pname(i)+'→'+leaderById(p.leader).cn).join('，')}`,'sys');
      dealLoreCards(); // 领袖选定后发传说卡，再 beginRound
      return;
    }
    const pIdx=order[qi]; const p=G.players[pIdx];
    const a=leaderById(pool.pop()), b=leaderById(pool.pop());
    openModal(m=>{
      m.appendChild(el('h2',null,'领袖抽选 · '+p.name));
      m.appendChild(el('div','hintbox',`${p.name}，从下列 2 名领袖中选 1 名（点击查看能力，选定后立即应用开局效果）：`));
      const row=el('div'); row.style.cssText='display:flex;gap:10px;justify-content:center;flex-wrap:wrap';
      [a,b].forEach(L=>{
        const b1=el('button','btn'); b1.style.cssText='display:block;flex:1;min-width:180px;max-width:300px;margin:6px 0;text-align:center;padding:8px';
        const im=cardImgEl(`assets/leader/${L.id}.jpg`,300);
        if(im) b1.appendChild(im);
        const tx=el('div'); tx.innerHTML=`<b>${L.cn} ${L.name}</b><br><span style="opacity:.7;font-size:11px">${L.abilities.map(x=>x.n).join(' · ')}</span>`;
        b1.appendChild(tx);
        b1.onclick=()=>{ closeModal(); assignLeader(p,L.id);
          logMsg(`${pname(pIdx)} 选择领袖 <b>${L.cn} ${L.name}</b>`,'sys'); step(qi+1); };
        row.appendChild(b1);
      });
      m.appendChild(row);
    });
  };
  step(0);
}

/* ---------------------- 传说卡发牌阶段（热座简化）---------------------- */
// 领袖抽选完成后调用：洗乱 28 张传说卡，给每位玩家发 2 张作为个人能力（直接保留，不再 draft）。
// 领袖 Archivist/Learned 的玩家改为发 5 张、由其留 2 弃 3（模态框选择）。发完 logMsg + beginRound()。
// 测试中可直接调用 assignLoreToPlayer(p, ids) 指定持有的传说卡。
function assignLoreToPlayer(p, ids){ p.loreCards=ids.slice(); }
function dealLoreCards(){
  G.phase='loredraft';
  const pool=shuffle(LORE.map(L=>L.id));
  const order=[]; for(let k=0;k<G.numPlayers;k++) order.push((G.initiative+k)%G.numPlayers);
  const archivists=[]; // 需 5 选 2 的玩家（延后用模态框处理）
  order.forEach(pIdx=>{ const p=G.players[pIdx];
    if(G.useExpansion && leaderHas(p,'learned')){
      // Archivist/Learned：抽 5 张暂存，稍后由模态框留 2 弃 3
      const draw=[]; for(let k=0;k<5 && pool.length;k++) draw.push(pool.pop());
      p._loreDraw=draw; archivists.push(pIdx);
    } else {
      const ids=[]; for(let k=0;k<2 && pool.length;k++) ids.push(pool.pop());
      assignLoreToPlayer(p, ids);
    }
  });
  const finish=()=>{
    G.players.forEach(p=>{ delete p._loreDraw; });
    logMsg(`传说卡发牌完成：${G.players.map((p,i)=>pname(i)+' 持 '+(p.loreCards.length)+' 张传说').join('，')}`,'sys');
    G.phase='lead'; beginRound();
  };
  // 依序处理 Archivist 玩家的 5 选 2（无 Archivist 时直接 finish）
  const doArchivist=(ai)=>{
    if(ai>=archivists.length){ finish(); return; }
    const p=G.players[archivists[ai]]; const draw=(p._loreDraw||[]).map(loreById);
    const chosen=[];
    const renderPick=()=>openModal(m=>{
      m.appendChild(el('h2',null,'博学 · '+p.name+' 留 2 弃 3'));
      m.appendChild(el('div','hintbox',`${p.name}（档案官·博学）：从 5 张传说中点选 <b>2</b> 张保留（已选 ${chosen.length}/2）。`));
      draw.forEach(L=>{ const picked=chosen.indexOf(L.id)>=0;
        const b=el('button',picked?'btn gold':'btn'); b.style.cssText='display:flex;align-items:center;gap:8px;width:100%;margin:6px 0;text-align:left';
        const im=cardImgEl(`assets/lore/${L.id}.jpg`,86); if(im){ im.style.margin='0'; b.appendChild(im); }
        const tx=el('span'); tx.innerHTML=`${picked?'☑ ':'☐ '}<b>${L.cn} ${L.name}</b>　<span style="opacity:.7;font-size:11px">${L.abilities.map(x=>x.n).join(' · ')}</span>`;
        b.appendChild(tx);
        b.onclick=()=>{ const i=chosen.indexOf(L.id);
          if(i>=0) chosen.splice(i,1); else { if(chosen.length>=2){ toast('最多留 2 张'); return; } chosen.push(L.id); }
          renderPick(); };
        m.appendChild(b);
      });
      if(chosen.length===2){ const ok=el('button','btn gold','确定（弃其余 3 张）'); ok.style.marginTop='6px';
        ok.onclick=()=>{ closeModal(); assignLoreToPlayer(p, chosen);
          logMsg(`${pname(archivists[ai])} 博学：留 ${chosen.map(id=>loreById(id).cn).join('、')}，弃 3 张`,'sys'); doArchivist(ai+1); };
        m.appendChild(ok); }
    });
    renderPick();
  };
  doArchivist(0);
}

// 为各玩家分配起始 A/B/C 系统，尽量分散在不同星团
// ——— 官方桌面布局方案（Setup Cards）———
// start[i]={A:systemId, B:systemId, C:systemId}
//   A → 城市+3舰+获得资源；B → 星港+3舰+获得资源；C → 2舰（无建筑）
// oop → 必须封闭（out-of-play）的星团编号列表
const SETUP_PLANS = {
  // ——— 2 人 ———
  '2_homelands': { n:2, name:'本土防御', en:'Homelands',
    start:[{A:'1A',B:'1B',C:'1C'},{A:'4A',B:'4B',C:'4C'}], oop:[2,5] },
  '2_mixup1':   { n:2, name:'混战·甲', en:'Mix Up 1',
    start:[{A:'1A',B:'2B',C:'1C'},{A:'2A',B:'1B',C:'2C'}], oop:[4,5] },
  '2_mixup2':   { n:2, name:'混战·乙', en:'Mix Up 2',
    start:[{A:'1A',B:'1B',C:'2C'},{A:'2A',B:'2B',C:'1C'}], oop:[4,5] },
  '2_frontiers':{ n:2, name:'边疆争夺', en:'Frontiers',
    start:[{A:'1A',B:'2B',C:'2C'},{A:'2A',B:'1B',C:'1C'}], oop:[4,5] },
  // ——— 3 人 ———
  '3_homelands':    { n:3, name:'本土防御', en:'Homelands',
    start:[{A:'1A',B:'1B',C:'1C'},{A:'2A',B:'2B',C:'2C'},{A:'3A',B:'3B',C:'3C'}], oop:[5,6] },
  '3_mixup':        { n:3, name:'混战', en:'Mix Up',
    start:[{A:'1A',B:'2B',C:'3C'},{A:'2A',B:'3B',C:'1C'},{A:'3A',B:'1B',C:'2C'}], oop:[5,6] },
  '3_frontiers':    { n:3, name:'边疆争夺', en:'Frontiers',
    start:[{A:'1A',B:'1B',C:'2C'},{A:'2A',B:'2B',C:'3C'},{A:'3A',B:'3B',C:'1C'}], oop:[5,6] },
  '3_coreconflict': { n:3, name:'核心冲突', en:'Core Conflict',
    start:[{A:'1A',B:'2B',C:'1C'},{A:'2A',B:'3B',C:'2C'},{A:'3A',B:'1B',C:'3C'}], oop:[4,6] },
  // ——— 4 人 ———
  '4_mixup1':   { n:4, name:'混战·甲', en:'Mix Up 1',
    start:[{A:'1A',B:'4B',C:'1C'},{A:'4A',B:'2B',C:'4C'},{A:'2A',B:'3B',C:'2C'},{A:'3A',B:'1B',C:'3C'}], oop:[5] },
  '4_mixup2':   { n:4, name:'混战·乙', en:'Mix Up 2',
    start:[{A:'4A',B:'1B',C:'4C'},{A:'1A',B:'2B',C:'1C'},{A:'2A',B:'3B',C:'2C'},{A:'3A',B:'4B',C:'3C'}], oop:[5] },
  '4_mixup3':   { n:4, name:'混战·丙', en:'Mix Up 3',
    start:[{A:'1A',B:'1B',C:'2C'},{A:'2A',B:'2B',C:'3C'},{A:'3A',B:'3B',C:'4C'},{A:'4A',B:'4B',C:'1C'}], oop:[5] },
  '4_frontiers':{ n:4, name:'边疆争夺', en:'Frontiers',
    start:[{A:'1A',B:'1B',C:'1C'},{A:'2A',B:'2B',C:'2C'},{A:'3A',B:'3B',C:'3C'},{A:'4A',B:'4B',C:'4C'}], oop:[5] },
};
function getSetupPlan(n, variant){
  const key=variant||(n+'_homelands');
  return SETUP_PLANS[key]||SETUP_PLANS[n+'_homelands']||Object.values(SETUP_PLANS).find(p=>p.n===n);
}
function makeStartPlan(n){
  // 兼容旧调用路径（测试/教学）
  const order=[1,4,2,5,3,6];
  const plan={};
  for(let i=0;i<n;i++){ const c=order[i]; plan[i]={A:c+'A', B:c+'B', C:c+'C'}; }
  return plan;
}

/* --------------------------- 棋子放置/操作 ------------------------------ */
// 舰船状态模型：s.pieces.ships[col]=该色舰船「总数」；s.pieces.dmg[col]=其中「受损」数；新鲜数=总-受损。
// 受损舰（侧翻）【不计入控制权】，但仍可移动/投骰；再受 1 次命中即被摧毁（成为对手战利品，不归还补给）。
function dmgMap(s){ return s.pieces.dmg||(s.pieces.dmg={}); }                 // 兼容旧/测试构造的无 dmg 棋盘
function dmgShipsN(s,col){ return (s.pieces.dmg&&s.pieces.dmg[col])||0; }
function freshShips(s,col){ return (s.pieces.ships[col]||0)-dmgShipsN(s,col); }
function addShips(sysId, player, count, damaged){
  const s=G.map[sysId]; const c=player.color.key;
  s.pieces.ships[c]=(s.pieces.ships[c]||0)+count;
  if(damaged){ const d=dmgMap(s); d[c]=(d[c]||0)+count; }                     // 敌方控制处建造 → 置为受损
  player.supply.ships-=count;
}
// 自系统移除 count 艘（优先「新鲜」后「受损」），归还补给；返回移除数。（一般撤离/回收；战斗摧毁见 applyShipHits）
function removeShips(sysId, player, count){
  const s=G.map[sysId]; const c=player.color.key;
  const total=s.pieces.ships[c]||0; const dmg=dmgShipsN(s,c); const fresh=total-dmg;
  const rmFresh=Math.min(fresh,count); const rmDmg=Math.min(dmg,count-rmFresh); const rm=rmFresh+rmDmg;
  s.pieces.ships[c]=total-rm; if(!s.pieces.ships[c]) delete s.pieces.ships[c];
  if(s.pieces.dmg&&rmDmg){ s.pieces.dmg[c]=dmg-rmDmg; if(!s.pieces.dmg[c]) delete s.pieces.dmg[c]; }
  player.supply.ships+=rm; return rm;
}
// 移动：src→dst 搬运 n 艘（优先「新鲜」），保留受损状态，补给中性（不进出补给）。返回实际搬运数。
function moveShips(srcId, dstId, player, n){
  const c=player.color.key; const ss=G.map[srcId], ds=G.map[dstId];
  const total=ss.pieces.ships[c]||0; const dmg=dmgShipsN(ss,c); const fresh=total-dmg;
  const mFresh=Math.min(fresh,n); const mDmg=Math.min(dmg,n-mFresh); const m=mFresh+mDmg;
  ss.pieces.ships[c]=total-m; if(!ss.pieces.ships[c]) delete ss.pieces.ships[c];
  if(ss.pieces.dmg&&mDmg){ ss.pieces.dmg[c]=dmg-mDmg; if(!ss.pieces.dmg[c]) delete ss.pieces.dmg[c]; }
  ds.pieces.ships[c]=(ds.pieces.ships[c]||0)+m;
  if(mDmg){ const d=dmgMap(ds); d[c]=(d[c]||0)+mDmg; }
  return m;
}
// 对系统内 col 色舰船施加 n 次命中：每次优先「新鲜→受损」，无新鲜则「受损→摧毁」。
// 被摧毁的舰船计入 destroyer.trophies（不归还原主补给）。返回 {damaged,destroyed,overflow}（overflow=舰船已尽、未用完的命中数）。
function applyShipHits(sysId, col, n, destroyer){
  const s=G.map[sysId]; let damaged=0, destroyed=0, applied=0;
  for(let i=0;i<n;i++){
    const total=s.pieces.ships[col]||0; if(total<=0) break;
    const dmg=dmgShipsN(s,col);
    if(total-dmg>0){ const d=dmgMap(s); d[col]=(d[col]||0)+1; damaged++; }              // 新鲜→受损
    else { s.pieces.ships[col]=total-1; if(!s.pieces.ships[col]) delete s.pieces.ships[col];
           const d=dmgMap(s); d[col]=dmg-1; if(!d[col]) delete d[col];                   // 受损→摧毁
           destroyed++; if(destroyer) destroyer.trophies++; }
    applied++;
  }
  return {damaged, destroyed, overflow:n-applied};
}
function placeBuilding(sysId, type, player){
  const s=G.map[sysId];
  s.pieces.buildings.push({type, owner:player.color.key, damaged:false});
  if(type==='city') player.supply.cities--; else player.supply.starports--;
}
function gainResource(player, rtype, fromSupplyFree=false){
  if(!rtype) return false;
  if(!fromSupplyFree){ if(G.resSupply[rtype]<=0){ return false; } }
  if(G.resSupply[rtype]>0) G.resSupply[rtype]--;
  player.res[rtype]=(player.res[rtype]||0)+1;
  return true;
}
function spendResource(player, rtype){

/* ----------------------- 控制权 / 忠诚 判定 ----------------------------- */
function piecesCountInSystem(s, colorKey){
  let n=(s.pieces.ships[colorKey]||0);
  for(const b of s.pieces.buildings) if(b.owner===colorKey) n++;
  return n;
}
// 控制权（规则书 p.6 / p.13）：严格——「新鲜舰船」数多于其他【每一名】玩家者控制该系统。
// 重要：建筑【不】计入控制；受损舰船【不】计入控制；并列最多则无人控制（系统「自由」，对各方皆忠诚）。
function controllerOf(sysId){
  const s=G.map[sysId]; const tally={};
  for(const c in s.pieces.ships){ const f=freshShips(s,c); if(f>0) tally[c]=f; }
  let best=null,bestN=0,tie=false;
  for(const c in tally){ if(tally[c]>bestN){best=c;bestN=tally[c];tie=false;} else if(tally[c]===bestN){tie=true;} }
  return (best&&!tie)?best:null;
}
// 某系统对该玩家是否“忠诚”可用：玩家控制该系统，或系统无人控制(自由)
function isLoyalSystem(sysId, player){
  const ctrl=controllerOf(sysId);
  return ctrl===null || ctrl===player.color.key;
}
function systemHasRivalControl(sysId, player){
  const ctrl=controllerOf(sysId);
  return ctrl!==null && ctrl!==player.color.key;
}
// 弹射移动可达集：从含「忠诚太空港」的 src（行星）出发，舰船可「持续穿过星门」前进，
// 直到「进入任意行星」或「进入他人控制的星门」即停止（官方《Action Summaries》：until they move
// into any planet or a gate that is controlled by anyone else）。该停止系统仍是合法终点。
// 因此唯一可继续穿过的中转 = 「非他人控制的星门」（你控制或无人控制的星门）；行星一律终止。
// 返回所有可抵达的目的系统（不含 src）。
function catapultReach(src, col){
  const out=new Set(), seen=new Set([src]), q=[src];
  while(q.length){
    const cur=q.shift(); const s=G.map[cur]; const ctrl=controllerOf(cur);
    // 能否从 cur 继续前进？起点可；之后仅当 cur 是「星门」且非他人控制时可穿过。进入任意行星即止。
    const canLeave=(cur===src) || (s.kind==='gate' && (ctrl===null||ctrl===col));
    if(!canLeave) continue;
    for(const nb of G.map[cur].neighbors){
      if(G.map[nb].outOfPlay) continue;
      if(!seen.has(nb)){ seen.add(nb); out.add(nb); q.push(nb); }
    }
  }
  return out;
}

/* ---- 棋盘缩放/平移：滚轮缩放（指向光标）、按住拖拽平移、双击复位 ---- */
const BVIEW={x:0,y:0,w:3481,h:1860};
function boardViewApply(){ const svg=document.getElementById('board'); if(svg&&svg.setAttribute) svg.setAttribute('viewBox',`${BVIEW.x} ${BVIEW.y} ${BVIEW.w} ${BVIEW.h}`); }
function boardViewReset(){ BVIEW.x=0;BVIEW.y=0;BVIEW.w=3481;BVIEW.h=1860; boardViewApply(); }
(function initBoardZoom(){
  if(typeof document==='undefined'||!document.getElementById) return;
  const svg=document.getElementById('board');
  if(!svg||!svg.addEventListener||!svg.getBoundingClientRect) return;
  // 屏幕坐标 → 棋盘坐标（考虑 meet 模式的留白）
  const scaleOf=()=>{ const r=svg.getBoundingClientRect();
    const arV=BVIEW.w/BVIEW.h, arR=r.width/r.height;
    if(arR>arV) return {sc:r.height/BVIEW.h, ox:(r.width-BVIEW.w*(r.height/BVIEW.h))/2, oy:0, r};
    return {sc:r.width/BVIEW.w, ox:0, oy:(r.height-BVIEW.h*(r.width/BVIEW.w))/2, r}; };
  const toBoard=(ev)=>{ const m=scaleOf();
    return {x:BVIEW.x+(ev.clientX-m.r.left-m.ox)/m.sc, y:BVIEW.y+(ev.clientY-m.r.top-m.oy)/m.sc}; };
  svg.addEventListener('wheel',ev=>{ ev.preventDefault();
    const pt=toBoard(ev); const f=ev.deltaY>0?1.18:1/1.18;
    const w=Math.min(3481,Math.max(550,BVIEW.w*f)); const h=w*1860/3481;
    BVIEW.x=Math.min(Math.max(pt.x-(pt.x-BVIEW.x)*(w/BVIEW.w),0),3481-w);
    BVIEW.y=Math.min(Math.max(pt.y-(pt.y-BVIEW.y)*(h/BVIEW.h),0),1860-h);
    BVIEW.w=w; BVIEW.h=h; boardViewApply();
  },{passive:false});
  let drag=null;
  svg.addEventListener('pointerdown',ev=>{ if(ev.button!==0&&ev.pointerType==='mouse') return;
    drag={sx:ev.clientX,sy:ev.clientY,bx:BVIEW.x,by:BVIEW.y,moved:false}; });
  svg.addEventListener('pointermove',ev=>{ if(!drag) return;
    if(Math.abs(ev.clientX-drag.sx)+Math.abs(ev.clientY-drag.sy)>8) drag.moved=true;
    if(!drag.moved) return;
    const m=scaleOf();
    BVIEW.x=Math.min(Math.max(drag.bx-(ev.clientX-drag.sx)/m.sc,0),3481-BVIEW.w);
    BVIEW.y=Math.min(Math.max(drag.by-(ev.clientY-drag.sy)/m.sc,0),1860-BVIEW.h);
    boardViewApply();
  });
  const endDrag=()=>{ if(drag&&drag.moved){ svg._suppressClick=true; setTimeout(()=>{svg._suppressClick=false;},0); } drag=null; };
  svg.addEventListener('pointerup',endDrag);
  svg.addEventListener('pointerleave',endDrag);
  svg.addEventListener('dblclick',()=>boardViewReset());
})();

function drawPieces(g, s, r){
  // 建筑：在系统下方排列
  s.pieces.buildings.forEach((b,i)=>{
    const bc=PCOLORS.find(c=>c.key===b.owner)||(b.owner==='free'?{hex:'#9aa3b2'}:null); if(!bc) return; const col=bc.hex;
    const yy=s.y+r+26;
    const xx=s.x-(s.pieces.buildings.length-1)*24+i*48;
    if(b.type==='city'){
      const p=svgEl('rect',{x:xx-16,y:yy-16,width:32,height:32,rx:5,fill:col,stroke:'#000c','stroke-width':3});
      if(b.damaged)p.setAttribute('opacity','.45'); g.appendChild(p);
    } else {
      const p=svgEl('polygon',{points:diamondPts(xx,yy,19),fill:col,stroke:'#000c','stroke-width':3});
      if(b.damaged)p.setAttribute('opacity','.45'); g.appendChild(p);
    }
  });
  // 船：系统上方按颜色分组。新鲜=正立三角(实心)；受损=倒置三角(半透明虚边)，各自标数。
  let ships=Object.entries(s.pieces.ships).filter(([c,n])=>n>0);
  ships.forEach(([c,n],i)=>{
    const ci=PCOLORS.find(cc=>cc.key===c)||(c==='imperial'?{hex:'#b8a24a'}:null); if(!ci) return; const col=ci.hex;
    const fresh=freshShips(s,c), dmg=dmgShipsN(s,c);
    const ang=-90+(i-(ships.length-1)/2)*30; const baseR=r+38;
    const fx=s.x+baseR*Math.cos(ang*Math.PI/180), fy=s.y+baseR*Math.sin(ang*Math.PI/180);
    if(fresh>0){
      g.appendChild(svgEl('polygon',{points:triPts(fx,fy,19),fill:col,stroke:'#000c','stroke-width':3}));
      const tn=svgEl('text',{x:fx,y:fy+10,'text-anchor':'middle',fill:'#000','font-size':25,'font-weight':800}); tn.textContent=fresh; g.appendChild(tn);
    }
    if(dmg>0){
      const dr=baseR+(fresh>0?42:0);
      const dx=s.x+dr*Math.cos(ang*Math.PI/180), dy=s.y+dr*Math.sin(ang*Math.PI/180);
      g.appendChild(svgEl('polygon',{points:triPtsDown(dx,dy,19),fill:col,opacity:'.5',stroke:'#000c','stroke-width':3,'stroke-dasharray':'5 4'}));
      const tn=svgEl('text',{x:dx,y:dy-4,'text-anchor':'middle',fill:'#000','font-size':22,'font-weight':800}); tn.textContent=dmg; g.appendChild(tn);
    }
  });
  // 凋敝(Blight)：系统左侧暗色生物危害标记（新鲜=深紫实心、受损=半透明），标总数
  const bt=blightTotal(s);
  if(bt>0){ const fr=blightFresh(s); const bx=s.x-r-30, by=s.y;
    g.appendChild(svgEl('circle',{cx:bx,cy:by,r:18,fill:fr>0?'#6b3fa0':'#3a2456',stroke:'#1a0e2e','stroke-width':3,opacity:fr>0?0.95:0.6}));
    const bi=svgEl('text',{x:bx,y:by-2,'text-anchor':'middle',fill:'#e6d6ff','font-size':16,'font-weight':800}); bi.textContent='☣'; g.appendChild(bi);
    const bn=svgEl('text',{x:bx,y:by+14,'text-anchor':'middle',fill:'#e6d6ff','font-size':13,'font-weight':800}); bn.textContent=fr+'/'+bt; g.appendChild(bn);
  }
  // 旗舰(Flagship)：系统右侧玩家色大星标，标受损升级数
  if(typeof campFlagshipAt==='function' && G.campaign && G.campaign.enabled){ const fi=campFlagshipAt(s.id);
    if(fi>=0){ const fp=G.players[fi]; const col=fp.color.hex||fp.color.css; const fx=s.x+r+30, fy=s.y;
      g.appendChild(svgEl('circle',{cx:fx,cy:fy,r:20,fill:col,stroke:'#000','stroke-width':3}));
      const star=svgEl('text',{x:fx,y:fy+7,'text-anchor':'middle',fill:'#000','font-size':22,'font-weight':800}); star.textContent='✦'; g.appendChild(star);
      const dmg=Object.values(fp.flagship.up).filter(v=>v==='damaged').length;
      if(dmg>0){ const dn=svgEl('text',{x:fx+16,y:fy-12,'text-anchor':'middle',fill:'#e23b3b','font-size':15,'font-weight':800}); dn.textContent='-'+dmg; g.appendChild(dn); }
    }
  }
  // 命运标记（旗帜/王座/地堡）：系统上方一排小徽标
  if(typeof campMarksAt==='function' && G.campaign && G.campaign.enabled){ const mks=campMarksAt(s.id);
    mks.forEach((mk,i)=>{ const K=MARK_KINDS[mk.type]; if(!K) return; const pc=PCOLORS.find(c=>c.key===mk.owner);
      const mx=s.x-(mks.length-1)*16+i*32, my=s.y-r-26;
      g.appendChild(svgEl('circle',{cx:mx,cy:my,r:13,fill:pc?pc.hex:'#888',stroke:'#000','stroke-width':2}));

    });
  }
}
