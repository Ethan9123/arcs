/* ============================== 出牌引擎 =============================== */
function onCardClick(owner,i){
  if(G.phase==='lead' && owner===G.initiative){
    SFX.card();
    const cards=$$('.card'); if(cards[i]){ cards[i].classList.add('playing'); }
    setTimeout(()=>leadCard(i),280);
  }
  else if(G.phase==='follow' && G.followQueue.length && owner===G.followQueue[0]){
    const cards=$$('.card'); if(cards[i]) cards[i].classList.add('selecting');
    followCardChoose(i);
  }
}

function beginRound(){
  G.pending=null; G.highlight=null; G.actionContext=null;
  if(G.players.every(p=>p.hand.length===0)){ endChapter(); return; }
  let guard=0; while(G.players[G.initiative].hand.length===0&&guard<G.numPlayers){ G.initiative=(G.initiative+1)%G.numPlayers; guard++; }
  G.turnPlayer=G.initiative; G.phase='lead';
  setPrompt(`轮到 ${pname(G.initiative)} <b>主导出牌</b>：点击下方一张手牌打出（可宣告雄心），或点“跳过·传递先攻”。`);
  render();
}
function leadPass(){
  logMsg(`${pname(G.initiative)} 传递先攻`,'sys'); G.passedInARow++;
  if(G.passedInARow>=G.numPlayers){ logMsg('全员连续传递，本章结束','sys'); endChapter(); return; }
  G.initiative=(G.initiative+1)%G.numPlayers; beginRound();
}
function leadCard(i){
  const pIdx=G.initiative; const p=G.players[pIdx]; const card=p.hand.splice(i,1)[0];
  G.passedInARow=0; G.lead={playerIdx:pIdx,card,ambition:null,zero:false};
  G.played=[{playerIdx:pIdx,card,mode:'lead',zero:false}];
  logMsg(`${pname(pIdx)} 主导：<b style="color:${SUITS[card.suit].color}">${SUITS[card.suit].name}${card.number}</b>（${card.pips}行动）`,'act');
  maybeDeclare(pIdx,card,()=>startActions(pIdx,'lead',card.suit,card.pips));
}
function maybeDeclare(pIdx,card,cont){
  let options=[];
  if(card.number>=2&&card.number<=6) options=[AMB_ORDER[card.number-2]];
  else if(card.number===7) options=AMB_ORDER.slice();
  if(options.length===0||G.markersAvailable.length===0){ cont(); return; }
  openModal(m=>{
    m.appendChild(el('h2',null,'宣告雄心？'));
    const mk=G.markersAvailable.reduce((a,b)=>b.f>a.f?b:a);
    m.appendChild(el('div','hintbox',`宣告将取走最高标记 ${mk.f}/${mk.s} 放入该雄心盒，并把此牌点数视为 0（更易失去先攻）。`));
    options.forEach(k=>{ const b=el('button','btn',`宣告 ${AMBITIONS[k].icon} ${AMBITIONS[k].name}`); b.style.display='block'; b.style.margin='6px 0';
      b.onclick=()=>{ closeModal(); declareAmbition(pIdx,k); cont(); }; m.appendChild(b); });
    const no=el('button','btn ghost','不宣告，直接行动'); no.onclick=()=>{ closeModal(); cont(); }; m.appendChild(no);
  });
}
function declareAmbition(pIdx,ambKey){
  let bi=0; for(let i=1;i<G.markersAvailable.length;i++) if(G.markersAvailable[i].f>G.markersAvailable[bi].f) bi=i;
  const mk=G.markersAvailable.splice(bi,1)[0];
  G.ambitionBox[ambKey].push(mk); G.declaredThisChapter[ambKey]=true;
  G.lead.ambition=ambKey;
  const bySecret=(ambKey==='keeper'||ambKey==='empath')&&ownsEff(G.players[pIdx],'secretorder');
  const byBards=ownsEff(G.players[pIdx],'bards'); // 星际吟游诗人：正面打出主导牌宣告时不归零（任意野心）
  if(bySecret||byBards){
    const why=bySecret?'隐秘结社':'星际吟游诗人';
    logMsg(`${pname(pIdx)} 宣告雄心 <b>${AMBITIONS[ambKey].name}</b>（标记 ${mk.f}/${mk.s}）；<b>${why}</b>生效：此牌点数不归零`,'act');
  } else {
    G.lead.zero=true; if(G.played[0]) G.played[0].zero=true;
    logMsg(`${pname(pIdx)} 宣告雄心 <b>${AMBITIONS[ambKey].name}</b>（标记 ${mk.f}/${mk.s}；此牌点数→0）`,'act');
  }
  onDeclareAmbition(pIdx,ambKey); // 扩展：宣告后触发领袖钩子（Upstart/Ambitious 获 1 资源等）
}
// 宣告雄心后的统一触发钩子（主导宣告 declareAmbition 与 Vox·民众呼声 两条路径共用）。
// 领袖 Upstart/Ambitious（扩展）：成功宣告雄心后，可获得任意 1 个资源（弹模态让其选择；供应空的资源不可选）。
function ambitiousGain(me,rt){ return gainResource(me,rt); } // 薄封装，便于无头测试直接断言
function onDeclareAmbition(pIdx,ambKey){
  const me=G.players[pIdx];
  // Noble/Connected（扩展）：宣告雄心时自动收纳议会牌堆顶卡（无需行动点，本序幕不能立即用其序幕能力）
  if(G.useExpansion && leaderHas(me,'connected')){
    if(G.courtDeck.length){
      const c=G.courtDeck.pop(); const col=me.color.key; let captured=0;
      for(const k in c.agents){ if(k!==col&&c.agents[k]>0){ const rp=G.players.find(p=>p.color.key===k); rp.supply.agents+=c.agents[k]; captured+=c.agents[k]; } }
      me.captives+=captured; me.supply.agents+=(c.agents[col]||0);
      (me.guildCards=me.guildCards||[]).push(c);
      c._freshlySecured=true; // 规则：本序幕不能立即用其序幕能力
      logMsg(`${pname(pIdx)} 领袖·人脉：收纳「${c.name}」（俘获 ${captured} 密探；本序幕不可立即用其序幕）`,'sys');
    } else {
      logMsg(`${pname(pIdx)} 领袖·人脉：议会牌堆已空`,'sys');
    }
  }
  // Feastbringer/Generous（扩展）：宣告雄心的代价——给权力最少的对手 1 张公会卡（有公会卡才须给）
  if(G.useExpansion && leaderHas(me,'generous') && (me.guildCards||[]).length>0){
    openGenerousCost(pIdx); return; // modal链继续，后续能力（Ambitious）在 Generous 无公会卡路径才触发
  }
  // Demagogue/Bold（扩展）：宣告雄心时可对任意数量议会卡各施加 1 次影响
  if(G.useExpansion && leaderHas(me,'bold') && G.court.length>0 && me.supply.agents>0){
    openBoldInfluence(pIdx); return;
  }
  // Upstart/Ambitious（扩展）：宣告雄心后可获得任意 1 资源
  if(G.useExpansion && leaderHas(me,'ambitious')){
    const avail=RES_ORDER.filter(r=>G.resSupply[r]>0);
    if(!avail.length){ logMsg(`${pname(pIdx)} 领袖·野心：资源供应已空，无法获得资源`,'sys'); return; }
    openModal(m=>{
      m.appendChild(el('h2',null,'领袖·野心 · 获得 1 资源'));
      m.appendChild(el('div','hintbox','你宣告了雄心：选择获得任意 1 个资源（受供应限制）。'));
      avail.forEach(rt=>{ const b=el('button','btn',`${RESOURCES[rt].icon} ${RESOURCES[rt].name}`); b.style.cssText='display:block;width:100%;margin:6px 0';
        b.onclick=()=>{ closeModal(); if(ambitiousGain(me,rt)) logMsg(`${pname(pIdx)} 领袖·野心：获得 ${RESOURCES[rt].name}`,'act'); }; m.appendChild(b); });
    });
  }
}
// 领袖·Demagogue/Bold：宣告雄心时可对任意数量议会卡各施加 1 次影响（循环选牌弹窗）
function openBoldInfluence(pIdx){
  const me=G.players[pIdx];
  const loop=()=>{
    if(me.supply.agents<=0 || !G.court.length){ render(); return; }
    openModal(m=>{
      m.appendChild(el('h2',null,'领袖·大胆 · 影响任意数量议会卡'));
      m.appendChild(el('div','hintbox',`宣告雄心后：可对任意数量议会卡各施加 1 次影响（1 个密探/卡）。剩余密探：${me.supply.agents}。完成后点「完成」。`));
      G.court.forEach(c=>{
        const row=el('div'); row.style.cssText='display:flex;gap:6px;align-items:center;margin:5px 0';
        const b=el('button','btn'); b.style.cssText='flex:1;text-align:left';
        b.innerHTML=`<b>${c.name}</b>　<span style="opacity:.7;font-size:12px">密探：${Object.entries(c.agents).filter(([k,n])=>n>0).map(([k,n])=>`<span style="color:${PCOLORS.find(p=>p.key===k).css}">${n}</span>`).join(' ')||'无'}</span>`;
        b.onclick=()=>{ c.agents[me.color.key]=(c.agents[me.color.key]||0)+1; me.supply.agents--; SFX.key();
          logMsg(`${pname(pIdx)} 领袖·大胆：在「${c.name}」放置密探（余 ${me.supply.agents} 个）`,'act');
          closeModal(); loop(); }; row.appendChild(b); m.appendChild(row); });
      const done=el('button','btn gold','完成'); done.onclick=()=>{ closeModal(); render(); }; m.appendChild(done);
    });
  };
  loop();
}
// 领袖·Feastbringer/Generous：宣告雄心的代价——给权力最少对手 1 张公会卡
function openGenerousCost(pIdx){
  const me=G.players[pIdx];
  const rivals=G.players.map((p,i)=>({p,i})).filter(x=>x.i!==pIdx);
  if(!rivals.length) return;
  const minPow=Math.min(...rivals.map(x=>x.p.power));
  const weakest=rivals.filter(x=>x.p.power===minPow);
  if(weakest.length===1){ openGenerousGive(pIdx,weakest[0].i); return; }
  openModal(m=>{
    m.appendChild(el('h2',null,'领袖·慷慨 · 选择给予对象（权力并列）'));
    m.appendChild(el('div','hintbox','有并列最低权力的玩家，请选择给予其中哪位 1 张公会卡。'));
    weakest.forEach(x=>{ const b=el('button','btn'); b.style.cssText='display:block;width:100%;margin:5px 0';
      b.innerHTML=`<b style="color:${x.p.color.css}">${pname(x.i)}</b>（权力 ${x.p.power}）`;
      b.onclick=()=>{ closeModal(); openGenerousGive(pIdx,x.i); }; m.appendChild(b); });
  });
}
function openGenerousGive(pIdx,rivalIdx){
  const me=G.players[pIdx]; const rival=G.players[rivalIdx];
  openModal(m=>{
    m.appendChild(el('h2',null,`领袖·慷慨 · 给 ${pname(rivalIdx)} 1 张公会卡`));
    m.appendChild(el('div','hintbox','选择给予对方的公会卡（这是宣告雄心的代价）。'));
    (me.guildCards||[]).forEach(c=>{ const b=el('button','btn'); b.style.cssText='display:block;width:100%;margin:5px 0';
      b.innerHTML=`<b>${c.name}</b>　<span style="opacity:.7;font-size:12px">${c.cn||''} — ${effKindLabel(c.eff)}</span>`;
      b.onclick=()=>{ closeModal(); const ci=(me.guildCards||[]).indexOf(c); if(ci>=0) me.guildCards.splice(ci,1);
        (rival.guildCards=rival.guildCards||[]).push(c);
        logMsg(`${pname(pIdx)} 领袖·慷慨：将「${c.name}」赠予 ${pname(rivalIdx)}`,'act'); render(); }; m.appendChild(b); });
  });
}
// 取走当前最高（首位最大）的雄心标记
function takeTopMarker(){ if(!G.markersAvailable.length) return null;
  let bi=0; for(let i=1;i<G.markersAvailable.length;i++) if(G.markersAvailable[i].f>G.markersAvailable[bi].f) bi=i;
  return G.markersAvailable.splice(bi,1)[0]; }

function startActions(pIdx,context,suit,count){
  G.actionContext=context; G.actor=pIdx; G.actionSuit=suit; G.actionsLeft=count;
  // 记录本次行动的跟随方式（copy/pivot/surpass/lead）供课税加成等领袖能力判断；主导回合清空
  G.actionFollowMode=(context==='follow')?(G._followMode||null):null;
  G.pending=null; G.highlight=null; G.phase='actions'; G.turnPlayer=pIdx;
  G.players[pIdx]._abil={}; // 重置”每回合一次”能力标记（如 g24 文物贩子）
  G.preludeOpen=(count>0); G.weaponBattle=false; G._freePrelude=false; // 序幕（规则书 p.17/20）：出牌后→花费首个行动点前可花资源换行动；武器解锁/免点数标记每回合重置
  (G.players[pIdx].guildCards||[]).forEach(c=>{ c._freshlySecured=false; }); // 新序幕窗口开始：清除”本序幕刚收纳”标记（规则书 p.20）
  // 战役：持先攻者打出行动卡（游击者第二幕进度）
  if(context==='lead' && pIdx===G.initiative) campFire('actionWithInitiative',{playerIdx:pIdx});
  if(count<=0){ endActorTurn(); return; }
  promptActions(); render();
}
function promptActions(){
  const acts=SUITS[G.actionSuit].actions.map(a=>ACTION_NAMES[a]).join(' / ');
  setPrompt(`${pname(G.actor)} 执行 <b style="color:${SUITS[G.actionSuit].color}">${SUITS[G.actionSuit].name}</b> · 剩余 <b>${G.actionsLeft}</b> 次。<br>可用：${acts}。`);
}
function endActorTurn(){
  G.pending=null; G.highlight=null;
  autosaveCampaign(); // 战役模式：回合末自动存档（单场模式空操作）
  if(G.actionContext==='lead'){ startFollow(); }
  else { G.followQueue.shift(); advanceFollow(); }
}
function cancelAction(){ if(G._freePrelude) abortPrelude(); G.pending=null; G.highlight=null; promptActions(); render(); }

/* ------------------------------ 跟随 ----------------------------------- */
function startFollow(){
  G.actionContext='follow'; G.followQueue=[];
  for(let k=1;k<G.numPlayers;k++) G.followQueue.push((G.initiative+k)%G.numPlayers);
  advanceFollow();
}
function advanceFollow(){
  while(G.followQueue.length && G.players[G.followQueue[0]].hand.length===0){
    const idx=G.followQueue.shift(); logMsg(`${pname(idx)} 无手牌，自动跳过`,'sys');
  }
  if(G.followQueue.length===0){ checkInitiative(); return; }
  const idx=G.followQueue[0]; G.phase='follow'; G.turnPlayer=idx; G.pending=null; G.highlight=null;
  setPrompt(followPrompt(idx)); render();
}
function followPrompt(idx){
  const lc=G.lead.card; const ln=G.lead.zero?0:lc.number;
  return `${pname(idx)} <b>跟随</b>：点击一张手牌选 超越/复制/转向。<br>主导牌 <b style="color:${SUITS[lc.suit].color}">${SUITS[lc.suit].name}${ln}</b>；超越需同花色且点数 &gt; ${ln}。`;
}
function followCardChoose(i){
  const idx=G.followQueue[0]; const p=G.players[idx]; const card=p.hand[i];
  const lc=G.lead.card; const ln=G.lead.zero?0:lc.number;
  const modes=[]; if(card.suit===lc.suit&&card.number>ln) modes.push('surpass');
  if(card.suit!==lc.suit) modes.push('pivot'); modes.push('copy');
  const canSeize=(G.seizedBy===null);
  openModal(m=>{
    m.appendChild(el('h2',null,`使用 ${SUITS[card.suit].name}${card.number}`));
    const mdLabel={surpass:`超越（取 ${card.pips} 行动 · ${SUITS[lc.suit].name}）`,pivot:`转向（取 1 行动 · ${SUITS[card.suit].name}）`,copy:`复制（取 1 行动 · ${SUITS[lc.suit].name}，盖放）`};
    let seize=false;
    modes.forEach(mode=>{ const b=el('button','btn',mdLabel[mode]); b.style.display='block'; b.style.margin='6px 0';
      b.onclick=()=>{ closeModal(); followPlay(idx,i,mode,seize); }; m.appendChild(b); });
    if(canSeize){
      const cb=el('button','btn ghost sm','☐ 同时夺取先攻'); cb.style.marginTop='6px';
      cb.onclick=()=>{ seize=!seize; cb.textContent=(seize?'☑':'☐')+' 同时夺取先攻'; }; m.appendChild(cb);
      m.appendChild(el('div','hintbox','夺取：额外弃1张牌（或用“7”超越）。本回合后续无人可再夺。'));
    }
    const cc=el('button','btn ghost','取消'); cc.onclick=()=>closeModal(); m.appendChild(cc);
  });
}
function followPlay(idx,i,mode,seize){
  const p=G.players[idx]; const card=p.hand.splice(i,1)[0];
  G.played.push({playerIdx:idx,card,mode,zero:false});
  logMsg(`${pname(idx)} ${({surpass:'超越',pivot:'转向',copy:'复制'})[mode]}：${SUITS[card.suit].name}${card.number}`,'act');
  const doActions=()=>{
    SFX.card();
    G._followMode=mode; // 记录本次跟随方式（surpass/pivot/copy）供领袖课税加成等判断
    if(mode==='surpass') startActions(idx,'follow',card.suit,card.pips);
    else if(mode==='pivot') startActions(idx,'follow',card.suit,1);
    else startActions(idx,'follow',G.lead.card.suit,1);
  };
  if(seize && G.seizedBy===null){
    if(mode==='surpass'&&card.number===7){
      G.seizedBy=idx; logMsg(`${pname(idx)} 以 7 超越，夺取先攻`,'sys'); toast(`🏁 ${G.players[idx].name} 以「7」夺取先攻！`); SFX.seize(); doActions();
    } else if(p.hand.length===0){
      toast('无额外手牌，未能夺取先攻'); doActions();
    } else if(p.hand.length===1){
      // 仅剩一张手牌，无需选择，直接弃置
      G.discard.push(p.hand.splice(0,1)[0]); G.seizedBy=idx;
      logMsg(`${pname(idx)} 额外弃牌，夺取先攻`,'sys'); toast(`🏁 ${G.players[idx].name} 弃牌夺取先攻！`); SFX.seize(); doActions();
    } else {
      // 规则书：玩家自选弃 1 张手牌（不限哪张）以夺取先攻
      openModal(m=>{
        m.appendChild(el('h2',null,'夺取先攻 · 选择弃置的手牌'));
        m.appendChild(el('div','hintbox','选择 1 张手牌弃置以夺取本回合先攻：'));
        const row=el('div'); row.style.cssText='display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:10px 0';
        p.hand.forEach((hc,hi)=>{
          const b=cardEl(hc);
          b.onclick=()=>{ closeModal(); G.discard.push(p.hand.splice(hi,1)[0]); G.seizedBy=idx;
            logMsg(`${pname(idx)} 额外弃 ${SUITS[hc.suit].name}${hc.number}，夺取先攻`,'sys'); toast(`🏁 ${G.players[idx].name} 弃牌夺取先攻！`); SFX.seize(); doActions(); };
          row.appendChild(b);
        });
        m.appendChild(row);
        const no=el('button','btn ghost','取消夺取（不弃牌）'); no.onclick=()=>{ closeModal(); doActions(); }; m.appendChild(no);
      });
    }
  } else {
    doActions();
  }
}
function followPass(){
  const idx=G.followQueue[0]; logMsg(`${pname(idx)} 跳过本回合`,'sys');
  G.followQueue.shift(); advanceFollow();
}

function checkInitiative(){
  let ni;
  if(G.seizedBy!==null){ ni=G.seizedBy; }
  else { let best=null,bn=-1; for(const pl of G.played){ if(pl.mode==='surpass'&&pl.card.number>bn){bn=pl.card.number;best=pl.playerIdx;} }
    ni=(best!==null)?best:G.initiative; }
  logMsg(ni!==G.initiative?`先攻转移给 ${pname(ni)}`:'先攻保持不变','sys');
  if(ni!==G.initiative) toast(`🏁 先攻 → ${G.players[ni].name}`, 1800);
  const tookInit=(G.seizedBy!==null) || (ni!==G.initiative); // 以任意方式取得先攻标记
  G.initiative=ni; endRoundDiscard();
  if(tookInit) campFire('initiativeSeized',{playerIdx:ni}); // 战役：游击者等命运进度
}
function endRoundDiscard(){
  for(const pl of G.played){
    if(pl._return!=null){ const owner=G.players[pl._return]; owner.hand.push(pl.card); sortHand(owner);
      logMsg(`${pname(pl._return)} 联合体能力：收回 ${SUITS[pl.card.suit].name}${pl.card.number} 到手牌`,'sys'); }
    else G.discard.push(pl.card);
  }
  G.played=[]; G.lead=null; G.seizedBy=null;
  if(G.campaign && G.campaign.enabled) campRoundEndEvent(); // 战役：回合末事件（议会已裁决→结算议会；否则掷事件骰→敕令/危机）
  if(G.players.some(p=>p.hand.length>0)) beginRound(); else endChapter();
}

/* --------------------------- 章节 / 计分 ------------------------------- */
function endChapter(){
  G.phase='score';
  logMsg(`—— 第 ${G.chapter} 章结束 · 结算雄心 ——`,'score');
  toast(`📊 第 ${G.chapter} 章结算中…`, 2200);
  SFX.chapter();
  scoreAmbitions();
  // 战役：章末派发命运进度事件 + 终局幕胜利判定
  if(G.campaign && G.campaign.enabled) campChapterEndJudge();
  // 领袖 Fuel-Drinker/Lavish（扩展）：若本章结算了「大亨」，持此领袖者弃光全部燃料（归还供应）
  if(G.useExpansion && G.ambitionBox.tycoon.length>0){
    G.players.forEach((p,i)=>{ if(leaderHas(p,'lavish') && p.res.fuel>0){ const n=p.res.fuel; G.resSupply.fuel+=n; p.res.fuel=0; logMsg(`${pname(i)} 领袖·挥霍：大亨已结算，弃光 ${n} 燃料`,'sys'); } });
  }
  applyCartelDiscards();
  if(G.ambitionBox.warlord.length>0) G.players.forEach(p=>{ if(p.trophies){logMsg(`${pname(G.players.indexOf(p))} 返还 ${p.trophies} 战利品`,'sys'); p.trophies=0;} });
  if(G.ambitionBox.tyrant.length>0) G.players.forEach(p=>{ if(p.captives){logMsg(`${pname(G.players.indexOf(p))} 返还 ${p.captives} 俘虏`,'sys'); p.captives=0;} });
  flipLowestAmbitionMarker(); // 收回全部标记到可用区 + 翻面「权力最低且未翻面」的一枚（官方 p.19 escalation）
  G.declaredThisChapter={};
  const thresh=POWER_TO_WIN[G.numPlayers];
  if(G.players.some(p=>p.power>=thresh) || G.chapter>=G.maxChapters){ endGame(); return; }
  G.chapter++; dealNewChapter();
  logMsg(`—— 第 ${G.chapter} 章开始（先攻 ${pname(G.initiative)}）——`,'score');
  toast(`🌟 第 ${G.chapter} 章开始！`, 1800);
  SFX.newChapter();
  offerTwoPlayerMulligan(); // 2 人局：非先攻方可一次性重抽 6 张手牌（官方 p.19）
  beginRound();
}
function dealNewChapter(){
  G.actionDeck=shuffle(buildActionDeck(G.numPlayers)); G.discard=[];
  G.players.forEach(p=>{ p.hand=[]; for(let k=0;k<6;k++) p.hand.push(G.actionDeck.pop()); sortHand(p); });
}
// 章末清算：收回所有雄心标记（盒中+可用）到可用区，并把「当前首位权力最低且尚未翻面」的一枚翻到高面。
// 翻面是持久的（跨章累积）：第1章末翻 2/0→4/2，第2章末翻 3/2→6/4，第3章末翻 5/3→9/5，之后无可翻。
function flipLowestAmbitionMarker(){
  const all=[...G.markersAvailable]; AMB_ORDER.forEach(k=>{ all.push(...G.ambitionBox[k]); G.ambitionBox[k]=[]; });
  G.markersAvailable=all;
  const unflipped=all.filter(m=>!m.flipped && m.nf!=null);
  if(unflipped.length){
    const m=unflipped.reduce((a,b)=> b.f<a.f ? b : a); // 当前首位权力最低者
    m.f=m.nf; m.s=m.ns; m.flipped=true;
    logMsg(`雄心标记升级（翻面）：一枚标记现为 <b>${m.f}/${m.s}</b>（首/次权力提高）`,'score');
  }
}
// 2 人局补正（Mulligan，官方 p.19）：发牌后，非先攻方可一次性弃掉全部 6 张手牌并重抽 6 张（必须接受新手牌）。
function twoPlayerMulliganRedraw(pIdx){
  const p=G.players[pIdx];
  G.discard.push(...p.hand); p.hand=[];
  for(let k=0;k<6&&G.actionDeck.length;k++) p.hand.push(G.actionDeck.pop());
  sortHand(p);
  logMsg(`${pname(pIdx)}（非先攻）行使 2 人局补正：弃掉手牌并重抽 6 张`,'sys'); render();
}
function offerTwoPlayerMulligan(){
  if(G.numPlayers!==2) return;
  const pIdx=(G.initiative+1)%2; // 非先攻玩家
  openModal(m=>{
    m.appendChild(el('h2',null,'2 人局补正（Mulligan）'));
    m.appendChild(el('div','hintbox',`${pname(pIdx)} 为非先攻方，可一次性弃掉全部 6 张手牌并重抽（必须接受新手牌）。`));
    const b1=el('button','btn','重抽 6 张'); b1.style.cssText='display:block;width:100%;margin:6px 0';
    b1.onclick=()=>{ closeModal(); twoPlayerMulliganRedraw(pIdx); };
    const b2=el('button','btn ghost','保留手牌'); b2.style.cssText='display:block;width:100%;margin:6px 0';
    b2.onclick=()=>{ closeModal(); };
    m.appendChild(b1); m.appendChild(b2);
  });
}
// 领袖计分修正映射（扩展）：某些领袖「该雄心」第二名不得分，且其本人第一名改按次位分（无城市奖励）。
// Elder/Just→暴君(tyrant)，Warrior/Violent→共情(empath)，Archivist/Academic→大亨(tycoon)。
const LEADER_AMB_DOWNGRADE={ just:'tyrant', violent:'empath', academic:'tycoon' };
// 玩家 i 是否对雄心 k 持有「降级型」领袖（第二名不得分/自己首位降为次位分）
function leaderDowngradesAmb(i,k){
  if(!G.useExpansion || i<0) return false;
  const p=G.players[i];
  for(const eff in LEADER_AMB_DOWNGRADE){ if(LEADER_AMB_DOWNGRADE[eff]===k && leaderHas(p,eff)) return true; }
  return false;
}
function scoreAmbitions(){
  AMB_ORDER.forEach(k=>{
    const mk=G.ambitionBox[k]; if(!mk.length) return;
    const hi=mk.reduce((x,m)=>x+m.f,0), lo=mk.reduce((x,m)=>x+m.s,0);
    // 竞争者：真实玩家（计数>0）+ 2 人局虚拟第三方（出局行星资源播种，仅占位、从不得分）
    const cs=G.players.map((p,i)=>({i,n:AMBITIONS[k].count(p),real:true})).filter(o=>o.n>0);
    if(G.numPlayers===2 && G.phantom && G.phantom[k]>0) cs.push({i:-1,n:G.phantom[k],real:false});
    if(!cs.length){ logMsg(`雄心 ${AMBITIONS[k].name}：无人持有，无人得分`,'score'); return; }
    const nameOf=o=> o.real?pname(o.i):'虚拟第三方';
    logMsg(`雄心 <b>${AMBITIONS[k].name}</b>（首${hi}/次${lo}）数量：${cs.map(o=>nameOf(o)+'×'+o.n).join('，')}`,'score');
    // 该雄心是否存在「降级型」领袖（任一参与者持有）：触发时第二名不得分
    const downgradeFirst=cs.some(o=>o.real && leaderDowngradesAmb(o.i,k));
    const maxN=Math.max(...cs.map(o=>o.n)); const firsts=cs.filter(o=>o.n===maxN);
    if(firsts.length===1){
      const f=firsts[0];
      if(f.real){
        const _p0=G.players[f.i].power;
        if(leaderDowngradesAmb(f.i,k)){ // 该领袖本人首位 → 按次位分，且无城市奖励
          award(f.i, lo, `${AMBITIONS[k].name} 首位（领袖降级→次位分 +${lo}，无城市奖励）`);
        } else { const bonus=cityBonus(G.players[f.i]);
          award(f.i, hi+bonus, `${AMBITIONS[k].name} 首位 +${hi}${bonus?`(+${bonus}城市奖励)`:''}`);
        }
        campFire('ambitionWon',{playerIdx:f.i, ambition:k, power:G.players[f.i].power-_p0}); // 战役：赢得雄心（首位）
      } else logMsg(`雄心 ${AMBITIONS[k].name}：首位由虚拟第三方占据（不得分）`,'score');
      // 次位：余者中的最高且必须唯一；并列次位则无人得分（官方 p18）
      const rest=cs.filter(o=>o!==f);
      if(rest.length){ const m2=Math.max(...rest.map(o=>o.n)); const seconds=rest.filter(o=>o.n===m2);
        if(seconds.length===1){ const s=seconds[0];
          if(downgradeFirst){ logMsg(`雄心 ${AMBITIONS[k].name}：领袖效果生效，第二名不得分`,'score'); }
          else if(s.real){
            if(G.useExpansion && leaderHas(G.players[s.i],'proud')) logMsg(`雄心 ${AMBITIONS[k].name}：${pname(s.i)} 骄傲——仅唯一首位才得分，次位不得分`,'score');
            else award(s.i, lo, `${AMBITIONS[k].name} 次位 +${lo}`);
          }
          else logMsg(`雄心 ${AMBITIONS[k].name}：次位由虚拟第三方占据（不得分）`,'score');
        } else logMsg(`雄心 ${AMBITIONS[k].name}：并列次位（${seconds.length} 方），次位无人得分`,'score');
      }
    } else {
      // 并列首位：各方改得「次位」分（虚拟第三方仍不得分），且不再另设次位
      firsts.forEach(o=>{ if(!o.real){ logMsg(`雄心 ${AMBITIONS[k].name}：虚拟第三方并列首位（不得分）`,'score'); return; }
        // Noble/Proud（扩展）：计分只有唯一第一名才得分 → 并列首位时该玩家不得分
        if(G.useExpansion && leaderHas(G.players[o.i],'proud')){ logMsg(`雄心 ${AMBITIONS[k].name}：${pname(o.i)} 骄傲——并列首位不得分`,'score'); campFire('ambitionWon',{playerIdx:o.i, ambition:k, power:0}); return; }
        award(o.i, lo, `${AMBITIONS[k].name} 并列首位 +${lo}`);
        campFire('ambitionWon',{playerIdx:o.i, ambition:k, power:lo}); // 战役：赢得雄心（并列首位）
      });
    }
  });
}
function award(i,pow,reason){
  G.players[i].power += pow;
  logMsg(`${pname(i)} ${reason} → 总分 <b>${G.players[i].power}</b>`,'score');
  SFX.score();
  // animate power display
  setTimeout(()=>{
    const els=document.querySelectorAll('.pl-pw-'+i);
    els.forEach(e=>{ e.style.animation='none'; e.offsetHeight; e.style.animation='power-flash .5s ease-out'; });
  },50);
}
function cityBonus(p){ const built=5-p.supply.cities; return built>=5?5:(built>=4?2:0); }
function totalRes(p){ return RES_ORDER.reduce((x,r)=>x+p.res[r],0); }
// 垄断联盟：每章计分后，拥有者的对手须弃光对应资源（材料/燃料）
function applyCartelDiscards(){
  ['material','fuel'].forEach(r=>{
    const owner=effOwner('cartel:'+r); if(!owner) return;
    let total=0;
    G.players.forEach(p=>{ if(p===owner) return; if(p.res[r]>0){ total+=p.res[r]; G.resSupply[r]+=p.res[r]; p.res[r]=0; } });
    const card=owner.guildCards.find(c=>c.eff==='cartel:'+r);
    if(total>0) logMsg(`「${card?card.name:'垄断联盟'}」生效：对手共弃置 ${total} 个${RESOURCES[r].name}`,'score');
  });
}
// 终局平分判定：官方规则——平分时「行动顺位最靠前者」获胜（从先攻者起顺时针）。顺位是全序，可彻底打破任何平分。
function turnOrderRank(p){ const n=G.numPlayers; const idx=G.players.indexOf(p); return (idx - G.initiative + n) % n; }
// 终局排序：战役模式下「达成第三幕最终命运目标」者(_campVictory)最高优先；其次权力；再次行动顺位。
//   基础局 _campVictory 恒为 undefined → (0-0) 为假，自动回退到「权力→顺位」，对非战役无影响。
function endGameSort(){ return [...G.players].sort((a,b)=>
  ((b._campVictory?1:0)-(a._campVictory?1:0)) || (b.power-a.power) || (turnOrderRank(a)-turnOrderRank(b))); }
function endGame(){
  G.phase='end';
  SFX.victory();
  const sorted=endGameSort();
  const w=sorted[0]; logMsg(`🏆 游戏结束！胜者 ${pname(G.players.indexOf(w))}（${w.power}分）`,'score'); render();
  showVictoryScreen(sorted);
}
// 华丽终局画面：金色冠军高亮 + 排名表 + 再来一局（SFX.victory 已在 endGame 播放）

/* ============================== 行动实现 =============================== */
function onSystemClick(id){
  if(!G||!G.pending) return;
  const t=G.pending.type;
  if(t==='tax') doTax(id);
  else if(t==='build') doBuild(id);
  else if(t==='move') doMovePick(id);
  else if(t==='repair') doRepair(id);
  else if(t==='battle') doBattlePick(id);
}
function actorColorKey(){ return G.players[G.actor].color.key; }
function countShips(sys,col){ return G.map[sys].pieces.ships[col]||0; }
function emptySlots(sys){ const s=G.map[sys]; return s.kind==='planet'?(s.slots-s.pieces.buildings.filter(b=>!b._cloudCity).length):0; }
// 星门站：返回该星门所在星簇的所有资源类型（去重）
function gateClusterResources(gateId){ const c=parseInt(gateId),l=PLANET_LAYOUT[c]||{}; return [...new Set(Object.values(l))]; }
function hasRival(s,col){ for(const c in s.pieces.ships){ if(c!==col&&s.pieces.ships[c]>0) return true; } return s.pieces.buildings.some(b=>b.owner!==col); }
function beginAction(type){
  if(G.actionsLeft<=0||G.pending) return;
  if(type==='influence'){ openInfluence(); return; }
  if(type==='secure'){ openSecure(); return; }
  const legal=legalTargets(type);
  if(legal.size===0){ toast('没有合法的「'+ACTION_NAMES[type]+'」目标'); return; }
  G.pending={type, step:(type==='move'?'src':'pick'), legal};
  G.highlight=legal; setPrompt(actionHint(type)); render();
}
function legalTargets(type){
  const col=actorColorKey(); const me=G.players[G.actor]; const set=new Set();
  for(const id in G.map){ const s=G.map[id]; if(s.outOfPlay) continue;
    if(type==='tax'){
      // 课税合法目标 = (a)你的忠诚城市（系统你控制或自由，且资源供给非空）；或 (b)你控制的系统中的敌方城市（资源可空——仍可俘获密探）。每城每回合限一次。
      const taxed=me._abil&&me._abil._taxed;
      const retax=canRetax(me); // Warlord's Cruelty：忽略「本回合已课税」限制
      const notTaxed=(owner)=>retax||!(taxed&&taxed.has(id+':'+owner));
      const cities=s.pieces.buildings.filter(b=>b.type==='city');
      let ownLoyal=cities.some(b=>b.owner===col)&&isLoyalSystem(id,me)&&s.resource&&G.resSupply[s.resource]>0&&notTaxed(col);
      const rc=(controllerOf(id)===col)?cities.find(b=>b.owner!==col):null;
      let rivalOK=rc&&notTaxed(rc.owner);
      // 领袖课税限制（扩展）：与 doTax 的 leaderTaxBlock 一致，提前从合法集中剔除被禁城市
      if(G.useExpansion){
        if(ownLoyal && leaderTaxBlock(me,id,{owner:col})) ownLoyal=false;
        if(rivalOK && leaderTaxBlock(me,id,rc)) rivalOK=false;
      }
      // 传说 Empath's Bond（扩展）：共情已宣告时，可课任意系统的任意城市（资源供给非空、未课税即可）
      let bondOK=false;
      if(empathBondActive(me) && s.resource && G.resSupply[s.resource]>0) bondOK=cities.some(b=>notTaxed(b.owner));
      // 传说 Gate Stations（扩展）：在忠诚星门的星门站城市可课税（选星簇任意类型资源）
      if(G.useExpansion && s.kind==='gate'){
        const gsCity=s.pieces.buildings.find(b=>b.owner===col&&b._gateStation);
        const notTaxedGs=!taxed||!taxed.has(id+':_gs');
        if(gsCity && isLoyalSystem(id,me) && (retax||notTaxedGs)){
          const avail=gateClusterResources(id).filter(r=>G.resSupply[r]>0);
          if(avail.length) set.add(id);
        }
      }
      // 领袖 Anarchist/Inspiring（扩展）：在有忠诚舰船的系统，无视控制权课税对手城市，或课税空建筑槽
      let inspiringOK=false;
      if(G.useExpansion && leaderHas(me,'inspiring') && (s.pieces.ships[col]>0)){
        const iRival=cities.find(b=>b.owner!==col && notTaxed(b.owner));
        if(iRival && !leaderTaxBlock(me,id,iRival)) inspiringOK=true;
        else if(emptySlots(id)>0 && s.resource && G.resSupply[s.resource]>0 && notTaxed('_empty')) inspiringOK=true;
      }
      if(ownLoyal||rivalOK||bondOK||inspiringOK) set.add(id);
    } else if(type==='build'){
      // 传说 Gate Ports（扩展）：持有此卡时，忠诚星门可建造星港（每门最多 1 座，需有忠诚棋子）
      if(G.useExpansion&&loreHas(me,'gateports')&&s.kind==='gate'&&hasLoyalPiece(s,col)
         &&me.supply.starports>0&&!s.pieces.buildings.some(b=>b.type==='starport')) set.add(id);
      // 传说 Cloud Cities（扩展）：持有此卡时，可在行星槽外建城市（每行星最多1，需1个该行星类型资源）
      if(G.useExpansion&&loreHas(me,'cloudcities')&&s.kind==='planet'&&hasLoyalPiece(s,col)
         &&me.supply.cities>0&&s.resource&&(me.res[s.resource]||0)>0
         &&!s.pieces.buildings.some(b=>b._cloudCity)) set.add(id);
      // 传说 Gate Stations（扩展）：持有此卡时，可在星门建城市（每门最多1，类型=星簇资源）
      if(G.useExpansion&&loreHas(me,'gatestations')&&s.kind==='gate'&&hasLoyalPiece(s,col)
         &&me.supply.cities>0&&!s.pieces.buildings.some(b=>b._gateStation)) set.add(id);
      const ship = canBuildShipAt(me,s,id,col) || canBondBuildShipAt(me,s,id); // 忠诚太空港可造船；Empath's Bond 激活时任意星港亦可
      const bld = s.kind==='planet' && hasLoyalPiece(s,col) && emptySlots(id)>0 && (me.supply.cities>0||me.supply.starports>0); // 有忠诚棋子(舰船或建筑)的行星空槽可建城/港（规则书 p.12）
      if(ship||bld) set.add(id);
    } else if(type==='move'){
      if((s.pieces.ships[col]>0)&&isLoyalSystem(id,me)) set.add(id);
    } else if(type==='repair'){
      // 规则书 p.13：修理可作用于地图上任意「受损建筑」或「受损舰船」
      if(s.pieces.buildings.some(b=>b.owner===col&&b.damaged) || dmgShipsN(s,col)>0) set.add(id);
    } else if(type==='battle'){
      if((s.pieces.ships[col]>0)&&hasRival(s,col)) set.add(id);
    }
  }
  return set;
}
function actionHint(type){ return ({
  tax:'课税：点击金色高亮系统——你的忠诚城市（得资源），或你控制的敌方城市（得资源并俘获其 1 密探）。每城每回合限一次。',
  build:'建造：点击高亮系统 — 忠诚太空港建船，或你有忠诚棋子(舰船或建筑)且有空槽的行星建城市/太空港。',
  move:'移动：先点起点（你的忠诚舰船所在系统）。',
  repair:'修理：点击有你受损舰船或建筑的系统——扶正 1 艘受损舰船，或修复 1 座受损建筑。',
  battle:'战斗：点击你有舰船且有敌方棋子的系统。',
})[type]||''; }
function consumeAction(desc){
  if(desc) logMsg(desc,'act');
  if(G._freePrelude){ G._freePrelude=false; G._preludePaid=null; G.pending=null; G.highlight=null; promptActions(); render(); return; } // 序幕资源行动：不消耗行动点、不结束序幕
  // 领袖 Overseer/Ruthless：重复行动钩子——此次 consume 为免费重复，完成后调用真正的 consume 回调
  if(G._ruthlessRepeat){ const fn=G._ruthlessRepeat; G._ruthlessRepeat=null; G.pending=null; G.highlight=null; render(); fn(); return; }
  G.preludeOpen=false; // 花费首个行动点 → 序幕结束（规则书 p.17）
  G.actionsLeft--; G.pending=null; G.highlight=null;
  if(G.actionsLeft<=0) endActorTurn(); else { promptActions(); render(); }
}
/* ----------------------------- 序幕（Prelude，规则书 p.17/20） ----------------------------- */
// 资源→序幕行动：物资=建造/修理、燃料=移动、武器=解锁「以本牌点数发动战斗」、遗物=收纳、通灵=主导牌所列行动。
// 被民愤的资源不能用于其序幕行动（仍可课税/计雄心）；忠诚卡可「以任意资源支付」并「无视该资源民愤」。
const PRELUDE_ACTS = { material:['build','repair'], fuel:['move'], relic:['secure'], psionic:null, weapon:null };
function loyalFor(player, rt){ return (player.guildCards||[]).some(c=>c&&c.eff==='loyal:'+rt); }
function preludeActsFor(rt){ return rt==='psionic' ? ((G.lead&&G.lead.card)?SUITS[G.lead.card.suit].actions.slice():[]) : (PRELUDE_ACTS[rt]||[]); }
function actionFeasible(type){
  const me=G.players[G.actor]; const col=me.color.key;
  if(type==='secure') return G.court.some(c=>majorityOn(c,col));
  if(type==='influence') return me.supply.agents>0 && G.court.length>0;
  return legalTargets(type).size>0;
}
function preludeActionDesc(rt){ return ({material:'建造/修理', fuel:'移动', weapon:'解锁「以本牌点数发动战斗」', relic:'收纳', psionic:'打出主导牌所列行动'})[rt]; }
// 返回 {enabled, desc, reason}
function preludeOption(me, rt){
  const desc=preludeActionDesc(rt); const loyal=loyalFor(me, rt);
  const hasAny=RES_ORDER.some(r=>(me.res[r]||0)>0);
  const canPay = loyal ? hasAny : ((me.res[rt]||0)>0);
  if(!canPay) return {enabled:false, desc, reason: loyal?'无任何资源':'无该资源'};
  if(me.outraged&&me.outraged[rt] && !loyal) return {enabled:false, desc, reason:'已民愤'};
  if(rt==='weapon'){ return G.weaponBattle ? {enabled:false, desc, reason:'本回合已解锁'} : {enabled:true, desc, loyal}; }
  if(rt==='psionic' && !(G.lead&&G.lead.card)) return {enabled:false, desc, reason:'无主导牌'};
  const feasible = preludeActsFor(rt).some(a=>actionFeasible(a));
  if(!feasible) return {enabled:false, desc, reason:'无合法目标'};
  return {enabled:true, desc, loyal};
}
function openPrelude(){
  const me=G.players[G.actor];
  if(!G.preludeOpen){ toast('序幕已结束（已花费行动点）'); return; }
  if(G.pending) return;
  openModal(m=>{
    m.appendChild(el('h2',null,'序幕 · 花费资源换行动'));
    m.appendChild(el('div','hintbox','出牌后、花费首个行动点前，可花资源换取额外行动（不消耗行动点）；资源用后归还供应。被民愤的资源不能用于其序幕行动（忠诚卡例外）。'));
    RES_ORDER.forEach(rt=>{ const o=preludeOption(me, rt);
      const b=el('button','btn'+(o.enabled?'':' ghost')); b.style.cssText='display:block;width:100%;margin:6px 0;text-align:left'; b.disabled=!o.enabled;
      b.innerHTML=`<b style="color:${RESOURCES[rt].color}">${RESOURCES[rt].icon} ${RESOURCES[rt].name}</b> → ${o.desc}`+(o.enabled?(o.loyal?'　<span style="opacity:.7;font-size:12px">忠诚:可用任意资源支付</span>':''):`　<span style="opacity:.55;font-size:12px">(${o.reason})</span>`);
      b.onclick=()=>{ closeModal(); doPreludeSpend(rt); }; m.appendChild(b); });
    // —— 扩展·序幕能力（领袖与传说，均免点数、不结束序幕）——
    if(G.useExpansion){
      // 弃卡清除民愤（Empath's Vision/Keeper's Trust/Warlord's Cruelty/Tyrant's Ego/Tycoon's Charm）
      preludeClearOutrageOptions(me).forEach(opt=>{
        const b=el('button','btn'); b.style.cssText='display:block;width:100%;margin:6px 0;text-align:left';
        b.innerHTML=`📜 弃「${opt.name}」清除 <b>${opt.types.map(rt=>RESOURCES[rt].name).join('+')}</b> 民愤`;
        b.onclick=()=>{ closeModal(); preludeClearOutrage(me,opt.cardId); openPrelude(); }; m.appendChild(b);
      });
      // Tycoon's Ambition：弃光物资+燃料宣告 1 个未宣告雄心
      if(loreHas(me,'tycoondeclare') && ambitionDeclared('tycoon') && G.markersAvailable.length>0
         && AMB_ORDER.some(k=>!G.declaredThisChapter[k]) && (me.res.material+me.res.fuel)>0){
        const b=el('button','btn'); b.style.cssText='display:block;width:100%;margin:6px 0;text-align:left';
        b.innerHTML='📜 <b>大亨野心</b>：弃光物资+燃料 → 宣告 1 个未宣告雄心';
        b.onclick=()=>{ closeModal(); openTycoonAmbition(me); }; m.appendChild(b);
      }
      // Tycoon's Charm：弃物资/燃料换资源
      if(loreHas(me,'charmgain') && ambitionDeclared('tycoon') && (me.res.material+me.res.fuel)>0){
        const b=el('button','btn'); b.style.cssText='display:block;width:100%;margin:6px 0;text-align:left';
        b.innerHTML='📜 <b>大亨魅力</b>：弃物资/燃料 → 每个换 1 资源';
        b.onclick=()=>{ closeModal(); openTycoonCharm(me); }; m.appendChild(b);
      }
      // Warlord's Terror：消耗战利品施加影响（每个战利品 1 次）
      if(loreHas(me,'warlordterror') && ambitionDeclared('warlord') && me.trophies>0 && G.court.length>0 && me.supply.agents>0){
        const b=el('button','btn'); b.style.cssText='display:block;width:100%;margin:6px 0;text-align:left';
        b.innerHTML=`📜 <b>霸主恐怖</b>：消耗战利品（共 ${me.trophies} 个）→ 每个施加 1 次影响`;
        b.onclick=()=>{ closeModal(); openWarlordTerror(me); }; m.appendChild(b);
      }
      // Tyrant's Ego：消耗俘虏收纳议会卡（每个俘虏 1 次）
      if(loreHas(me,'tyrantego') && ambitionDeclared('tyrant') && me.captives>0 &&
         G.court.some(c=>majorityOn(c,me.color.key)&&!paranoidBlocksSecure(me,c))){
        const b=el('button','btn'); b.style.cssText='display:block;width:100%;margin:6px 0;text-align:left';
        b.innerHTML=`📜 <b>暴君傲慢</b>：消耗俘虏（共 ${me.captives} 个）→ 每个收纳 1 张议会卡`;
        b.onclick=()=>{ closeModal(); openTyrantEgo(me); }; m.appendChild(b);
      }
    }
    if(G.weaponBattle) m.appendChild(el('div','hintbox','✦ 本回合已解锁：可用本牌点数发动战斗（见行动栏）。'));
    const cc=el('button','btn ghost','关闭'); cc.onclick=()=>closeModal(); m.appendChild(cc);
  });
}
// 扩展·序幕：弃卡清除民愤 —— 选项与执行
function preludeClearOutrageOptions(me){
  if(!G.useExpansion) return [];
  const out=[];
  (me.loreCards||[]).forEach(id=>{ const L=loreById(id); if(!L) return;
    const types=L.eff.filter(e=>e.indexOf('clearoutrage:')===0).map(e=>e.split(':')[1]).filter(rt=>me.outraged&&me.outraged[rt]);
    if(types.length) out.push({cardId:id, name:L.cn, types});
  });
  return out;
}
function preludeClearOutrage(me, cardId){
  const L=loreById(cardId); if(!L) return false;
  const types=L.eff.filter(e=>e.indexOf('clearoutrage:')===0).map(e=>e.split(':')[1]).filter(rt=>me.outraged[rt]);
  if(!types.length) return false;
  types.forEach(rt=>{ me.outraged[rt]=false; });
  const i=(me.loreCards||[]).indexOf(cardId); if(i>=0) me.loreCards.splice(i,1);
  logMsg(`${pname(G.actor)} 序幕·弃「${L.cn}」清除 ${types.map(rt=>RESOURCES[rt].name).join('+')} 民愤`,'act');
  render(); return true;
}
// Tycoon's Ambition：弃光物资+燃料 → 宣告 1 个未宣告雄心（不归零主导牌）
function declareAmbitionNoZero(pIdx, ambKey){
  if(!G.markersAvailable.length) return null;
  let bi=0; for(let i=1;i<G.markersAvailable.length;i++) if(G.markersAvailable[i].f>G.markersAvailable[bi].f) bi=i;
  const mk=G.markersAvailable.splice(bi,1)[0];
  G.ambitionBox[ambKey].push(mk); G.declaredThisChapter[ambKey]=true;
  onDeclareAmbition(pIdx, ambKey);
  return mk;
}
function openTycoonAmbition(me){

    m.appendChild(el('div','hintbox','弃光你全部物资与燃料，宣告恰好 1 个尚未宣告的雄心（不影响主导牌点数）。'));

        openPrelude(); }; m.appendChild(b); });

  });
}
// Tycoon's Charm：每弃 1 物资/燃料换 1 资源（优先弃燃料）
function tycoonCharmDiscard1(me){ if(me.res.fuel>0){ me.res.fuel--; G.resSupply.fuel++; return 'fuel'; } if(me.res.material>0){ me.res.material--; G.resSupply.material++; return 'material'; } return null; }
function openTycoonCharm(me){

      m.appendChild(b); });

// 霸主恐怖(Warlord's Terror)：序幕中消耗战利品施加影响（每个战利品施加 1 次，战利品归还供应）
function openWarlordTerror(me){
  if(me.trophies<=0||!G.court.length||me.supply.agents<=0){ closeModal(); openPrelude(); return; }
  openModal(m=>{
    m.appendChild(el('h2',null,'霸主恐怖 · 消耗战利品施加影响'));

// 暴君傲慢(Tyrant's Ego)：序幕中消耗俘虏收纳议会卡（每俘虏收纳 1 张，俘虏归还——减少俘虏计数）
function openTyrantEgo(me){

  if(me.captives<=0||!securable.length){ closeModal(); openPrelude(); return; }

    m.appendChild(el('h2',null,'暴君傲慢 · 消耗俘虏收纳议会卡'));
    m.appendChild(el('div','hintbox',`俘虏：${me.captives}。每消耗 1 个俘虏收纳 1 张你占多数密探的议会卡（俘虏归还——减少你的俘虏计数）。完成后点「完成」。`));

      b.onclick=()=>{ closeModal(); me.captives--; doTyrantEgoSecure(me,c); }; m.appendChild(b); });

function doTyrantEgoSecure(me,c){
  const col=me.color.key; let captured=0;
  for(const k in c.agents){ if(k!==col&&c.agents[k]>0){ const rp=G.players.find(p=>p.color.key===k); rp.supply.agents+=c.agents[k]; captured+=c.agents[k]; } }
  me.captives+=captured; me.supply.agents+=(c.agents[col]||0);
  const idx=G.court.indexOf(c); G.court.splice(idx,1);
  if(G.courtDeck.length) G.court.splice(idx,0,G.courtDeck.pop());
  const base=`${pname(G.actor)} 暴君傲慢：消耗俘虏收纳「${c.name}」（俘获 ${captured} 密探）`;
  if(c.t==='vox'){ logMsg(base,'act'); runVoxEffect(c,()=>{ openTyrantEgo(me); }); return; }
  (me.guildCards=me.guildCards||[]).push(c);
  logMsg(base,'act'); openTyrantEgo(me);
}
function preludePay(me, pr){ me.res[pr]=(me.res[pr]||0)-1; if(me.res[pr]<0) me.res[pr]=0; G.resSupply[pr]=(G.resSupply[pr]||0)+1; G._preludePaid=pr; }
function abortPrelude(){ // 序幕免点数行动被放弃/取消：退还已花资源并清除标记

// 领袖课税限制（扩展）：返回禁止课税该城的原因，或 null（允许）。
function leaderTaxBlock(me,id,target){
  if(!G.useExpansion) return null;
  const col=me.color.key;
  // Upstart/Callow：只能课税你控制的忠诚城市（你的城市且系统由你控制）
  if(leaderHas(me,'callow') && (target.owner!==col || controllerOf(id)!==col)) return '稚嫩：只能课税你控制的忠诚城市';
  // Anarchist/Principled：不能课税忠诚城市（你自己的城市）
  if(leaderHas(me,'principled') && target.owner===col) return '有原则：不能课税你自己的忠诚城市';
  return null;
}
// 传说·条件型课税放宽（扩展，均需对应雄心已宣告）
function canRetax(me){ return G.useExpansion && loreHas(me,'recurtax') && ambitionDeclared('warlord'); }      // Warlord's Cruelty：可重复课税本回合已课税的城市
function empathBondActive(me){ return G.useExpansion && loreHas(me,'empathbond') && ambitionDeclared('empath'); } // Empath's Bond：可课任意城市（视为忠诚，不抓俘虏）
function doTax(id){
  const me=G.players[G.actor]; const s=G.map[id]; const col=me.color.key;
  if(!G.pending.legal.has(id)){ toast('请选择你控制的城市'); return; }
  const ab=(me._abil=me._abil||{}); const taxed=ab._taxed||(ab._taxed=new Set());
  // 传说 Gate Stations（扩展）：星门站城市课税 → 选择星簇资源类型
  if(G.useExpansion && s.kind==='gate'){
    const gsCity=s.pieces.buildings.find(b=>b.owner===col&&b._gateStation);
    if(gsCity && isLoyalSystem(id,me)){
      const retax=canRetax(me);
      if(!retax && taxed.has(id+':_gs')){ toast('该星门站本回合已课税'); return; }
      const avail=gateClusterResources(id).filter(r=>G.resSupply[r]>0);
      if(!avail.length){ toast('星簇资源供给已空'); return; }
      const doGsTax=r=>{
        if(!retax) taxed.add(id+':_gs');
        let msg=`${pname(G.actor)} 课税星门站 ${id}`;
        if(gainResource(me,r)) msg+=`，获得 ${RESOURCES[r].name}`; else msg+='（资源供给已空）';
        SFX.tax(); maybeRuthless(me,id,gsCity,'tax',msg);
      };
      if(avail.length===1){ doGsTax(avail[0]); return; }
      openModal(m=>{ m.appendChild(el('h2',null,`星门站 ${id} · 选择资源`));
        m.appendChild(el('div','hintbox','星门站城市类型匹配星簇所有行星资源，选择本次课税获得的类型。'));
        avail.forEach(r=>{ const btn=el('button','btn',`${RESOURCES[r].icon} ${RESOURCES[r].name}`); btn.style.cssText='display:block;width:100%;margin:5px 0';
          btn.onclick=()=>{ closeModal(); doGsTax(r); }; m.appendChild(btn); });
        const cc=el('button','btn ghost','取消'); cc.onclick=()=>closeModal(); m.appendChild(cc); });
      return;
    }
  }
  const retax=canRetax(me); const notTaxed=(owner)=>retax||!taxed.has(id+':'+owner);
  const cities=s.pieces.buildings.filter(b=>b.type==='city');
  // 敌方城市优先（可额外俘虏）：仅当你控制该系统时其敌方城市才可课税
  const rivalCity=(controllerOf(id)===col)?cities.find(b=>b.owner!==col&&notTaxed(b.owner)):null;
  const ownCity=cities.find(b=>b.owner===col&&notTaxed(col));
  let target=rivalCity||ownCity; let bondTax=false; let inspiringTax=false;
  // 传说 Empath's Bond（扩展）：无常规目标时，可课任意未课税城市（视为忠诚，不抓俘虏）
  if(!target && empathBondActive(me)){ target=cities.find(b=>notTaxed(b.owner)); if(target) bondTax=true; }
  // 领袖 Anarchist/Inspiring（扩展）：有忠诚舰时无视控制权课税对手城市，或课税空建筑槽
  const inspires=G.useExpansion && leaderHas(me,'inspiring') && (s.pieces.ships[col]>0);
  if(!target && inspires){
    const iRival=cities.find(b=>b.owner!==col && notTaxed(b.owner));
    if(iRival && !leaderTaxBlock(me,id,iRival)){ target=iRival; inspiringTax=true; }
  }
  if(!target && inspires && emptySlots(id)>0 && s.resource && s.kind==='planet' && notTaxed('_empty')){
    // 空建筑槽课税：获得行星资源，无城市目标，单独处理后返回
    if(!retax) taxed.add(id+':_empty');
    let imsg=`${pname(G.actor)} 鼓舞：课税 ${id} 空建筑槽`;
    if(gainResource(me,s.resource)) imsg+=`，获得 ${RESOURCES[s.resource].name}`; else imsg+='（资源供给已空）';
    if(G.useExpansion && (G.actionFollowMode==='copy'||G.actionFollowMode==='pivot')){
      const bonus=leaderHas(me,'taxbonus:weapon')?'weapon':null;
      if(bonus && gainResource(me,bonus)) imsg+=`；领袖加成 +${RESOURCES[bonus].name}`;
    }
    SFX.tax(); consumeAction(imsg); return;
  }
  if(!target){ toast('该城本回合已课税'); return; }
  const block=leaderTaxBlock(me,id,target);
  if(block && !bondTax && !inspiringTax){ toast(block); return; }
  if(!retax) taxed.add(id+':'+target.owner);
  let msg=`${pname(G.actor)} 课税 ${id}${bondTax?'（共情者羁绊）':''}${inspiringTax?'（鼓舞·无视控制权）':''}${retax?'（霸主残暴·重复课税）':''}`;
  if(gainResource(me,s.resource)) msg+=`，获得 ${RESOURCES[s.resource].name}`; else msg+='（资源供给已空，未获得）';
  if(target.owner!==col && !bondTax){ // 你控制的敌方城市 → 俘获该敌方 1 个密探（Empath's Bond 不抓俘虏）
    const rival=G.players.find(p=>p.color.key===target.owner);
    if(rival&&rival.supply.agents>0){ rival.supply.agents--; me.captives++; msg+=`，俘获 ${pname(G.players.indexOf(rival))} 1 密探`; }
    else msg+='（对方密探补给已空，未俘获）';
  }
  // 领袖课税加成（扩展）：本次行动来自 Copy/Pivot 时，按领袖额外获得 1 个资源
  if(G.useExpansion && (G.actionFollowMode==='copy'||G.actionFollowMode==='pivot')){
    const bonus = leaderHas(me,'taxbonus:psionic')?'psionic'
                : leaderHas(me,'taxbonus:fuel')?'fuel'
                : leaderHas(me,'taxbonus:weapon')?'weapon' : null;
    if(bonus && gainResource(me,bonus)) msg+=`；领袖加成额外获得 ${RESOURCES[bonus].name}`;
  }
  SFX.tax();
  maybeRuthless(me, id, target, 'tax', msg);
  // 领袖 Shaper/Mythic（扩展）：课税忠诚城市后可放 1 个资源改变行星类型（每行星仅一次，不可逆）
  if(G.useExpansion && leaderHas(me,'mythic') && s.kind==='planet' && !s._mythicLocked){
    const avail=RES_ORDER.filter(r=>(me.res[r]||0)>0 && r!==s.resource);
    if(avail.length){
      openModal(m=>{
        m.appendChild(el('h2',null,'领袖·神话'));
        m.appendChild(el('div','hintbox',`课税城市后可放 1 个资源到 ${id} 的资源图标上，行星类型永久变为该资源（不可逆）。当前：${RESOURCES[s.resource]?.name||'—'}`));
        avail.forEach(r=>{ const b=el('button','btn',`${RESOURCES[r].icon} 放置 ${RESOURCES[r].name}，${id} 类型变为 ${RESOURCES[r].name}`);
          b.style.cssText='display:block;width:100%;margin:5px 0';
          b.onclick=()=>{ closeModal(); const old=s.resource; me.res[r]--; G.resSupply[r]++;
            s.resource=r; s._mythicLocked=true;
            logMsg(`${pname(G.actor)} 领袖·神话：${id} 行星 ${RESOURCES[old]?.name||'?'}→${RESOURCES[r].name}（永久锁定）`,'act');
            render(); };
          m.appendChild(b); });
        const skip=el('button','btn ghost','跳过'); skip.onclick=()=>closeModal(); m.appendChild(skip);
      });
    }
  }
}
// 每个太空港每回合只能造 1 艘舰船（官方《Action Summaries》：A starport can only build one ship per turn）。
// 以「本行动回合内该系统已造舰数 < 该系统忠诚太空港数」判定是否仍可造；_abil 在每个行动回合开始时重置。
function loyalStarportsAt(s,col){ return s.pieces.buildings.filter(b=>b.owner===col&&b.type==='starport').length; }
function shipBuildsThisTurn(me,id){ return (me._abil&&me._abil._shipBuilds&&me._abil._shipBuilds[id])||0; }
function canBuildShipAt(me,s,id,col){ const n=loyalStarportsAt(s,col); return n>0 && me.supply.ships>0 && shipBuildsThisTurn(me,id)<n; }
function allStarportsAt(s){ return s.pieces.buildings.filter(b=>b.type==='starport').length; }
// Empath's Bond：共情已宣告时，任意星港均可造舰（每港每回合限 1 艘，敌方控制→受损，不抓俘虏）
function canBondBuildShipAt(me,s,id){ return empathBondActive(me) && allStarportsAt(s)>0 && me.supply.ships>0 && shipBuildsThisTurn(me,id)<allStarportsAt(s); }
// 「忠诚棋子」= 该系统内你颜色的任意棋子（舰船或建筑）。建造城/港只需系统内有 1 个忠诚棋子 + 空槽
// （规则书 p.12：Place 1 starport or city in an empty building slot in a system with a Loyal piece）。
function hasLoyalPiece(s,col){ return (s.pieces.ships[col]>0) || s.pieces.buildings.some(b=>b.owner===col); }
function doBuild(id){
  const s=G.map[id]; const me=G.players[G.actor]; const col=me.color.key;
  if(!G.pending.legal.has(id)){ toast('此处不能建造'); return; }

  const bondShip=canBondBuildShipAt(me,s,id); const loyalShip=canBuildShipAt(me,s,id,col);
  if(loyalShip||bondShip) opts.push({k:'ship',label:'建造 1 艘舰船（太空港'+(bondShip&&!loyalShip?'·共情羁绊':'')+'）'+(systemHasRivalControl(id,me)?'：敌方控制→受损':'')});
  // 传说 Gate Ports（扩展）：在星门建造星港
  if(G.useExpansion&&loreHas(me,'gateports')&&s.kind==='gate'&&hasLoyalPiece(s,col)
     &&me.supply.starports>0&&!s.pieces.buildings.some(b=>b.type==='starport'))
    opts.push({k:'gatestarport',label:'建造 太空港（星门港·每门最多1）'});
  // 传说 Cloud Cities（扩展）：在行星槽外建城市，花费 1 个该行星类型资源
  if(G.useExpansion&&loreHas(me,'cloudcities')&&s.kind==='planet'&&hasLoyalPiece(s,col)
     &&me.supply.cities>0&&s.resource&&(me.res[s.resource]||0)>0&&!s.pieces.buildings.some(b=>b._cloudCity))
    opts.push({k:'cloudcity',label:`建造 云端城市（槽外，花费 1 ${RESOURCES[s.resource]?.name||'?'}）`});
  if(G.useExpansion&&loreHas(me,'gatestations')&&s.kind==='gate'&&hasLoyalPiece(s,col)
     &&me.supply.cities>0&&!s.pieces.buildings.some(b=>b._gateStation))
    opts.push({k:'gatestation',label:`建造 城市（星门站·类型=星簇 ${gateClusterResources(id).map(r=>RESOURCES[r]?.name||r).join('/')}）`});
  if(s.kind==='planet'&&hasLoyalPiece(s,col)&&emptySlots(id)>0){ // 有忠诚棋子(舰船或建筑)即可在空槽建城/港（规则书 p.12）
    if(me.supply.cities>0) opts.push({k:'city',label:'建造 城市（可课税）'});
    if(me.supply.starports>0) opts.push({k:'starport',label:'建造 太空港（可造船）'});
  }
  if(!opts.length){ toast('此处无可建造项'); return; }
  openModal(m=>{
    m.appendChild(el('h2',null,'建造 · '+id));
    opts.forEach(o=>{ const b=el('button','btn',o.label); b.style.display='block'; b.style.margin='6px 0';
      b.onclick=()=>{ closeModal(); doBuildExec(id,o.k); }; m.appendChild(b); });
    const c=el('button','btn ghost','取消'); c.onclick=()=>{closeModal(); cancelAction();}; m.appendChild(c);
  });
}
function doBuildExec(id,kind){
  const s=G.map[id]; const me=G.players[G.actor];
  SFX.build();
  if(kind==='ship'){ let dmg=systemHasRivalControl(id,me);
    // 传说·隐匿港湾(Hidden Harbors)：你建造的舰始终新鲜，即使在敌方控制的系统
    const fresh=(G.useExpansion && loreHas(me,'buildfresh') && dmg); if(fresh) dmg=false;
    addShips(id,me,1,dmg);
    if(!me._abil) me._abil={}; if(!me._abil._shipBuilds) me._abil._shipBuilds={}; me._abil._shipBuilds[id]=(me._abil._shipBuilds[id]||0)+1; // 记录本回合该太空港已造舰
    const shipMsg=`${pname(G.actor)} 在 ${id} 建造 1 艘舰船${dmg?'（敌方控制→受损）':fresh?'（隐匿港湾→新鲜）':''}`+buildGainSuffix(me);
    const spUsed=s.pieces.buildings.find(b=>b.owner===me.color.key&&b.type==='starport');
    maybeRuthless(me, id, spUsed, 'ship', shipMsg); }
  else if(kind==='gatestarport'){ // 传说 Gate Ports：在星门建造星港（不占建造槽）
    placeBuilding(id,'starport',me);
    consumeAction(`${pname(G.actor)} 在星门 ${id} 建造太空港（星门港）`+buildGainSuffix(me)); }
  else if(kind==='cloudcity'){ // 传说 Cloud Cities：在行星槽外建城市，花费 1 个该行星类型资源
    const r=s.resource; me.res[r]--; G.resSupply[r]++;
    placeBuilding(id,'city',me); s.pieces.buildings[s.pieces.buildings.length-1]._cloudCity=true;
    consumeAction(`${pname(G.actor)} 在 ${id} 建造云端城市（槽外，花费 1 ${RESOURCES[r]?.name||'?'}）`+buildGainSuffix(me)); }
  else if(kind==='gatestation'){ // 传说 Gate Stations：在星门建城市（类型=星簇所有资源）
    placeBuilding(id,'city',me);
    const b=s.pieces.buildings[s.pieces.buildings.length-1];
    b._gateStation=true; b._gsTypes=gateClusterResources(id);
    consumeAction(`${pname(G.actor)} 在星门 ${id} 建造星门站城市（类型：${b._gsTypes.map(r=>RESOURCES[r]?.name||r).join('/')}）`+buildGainSuffix(me)); }
  else { const dmg=systemHasRivalControl(id,me); placeBuilding(id,kind,me);
    if(dmg) s.pieces.buildings[s.pieces.buildings.length-1].damaged=true;
    consumeAction(`${pname(G.actor)} 在 ${id} 建造 ${kind==='city'?'城市':'太空港'}${dmg?'（敌方控制→受损）':''}`+buildGainSuffix(me)); }
}
// 建造时持续型收益：矿业集团(g02)+1 物资、星际运输集团(g09)+1 燃料（受供应限制）
function buildGainSuffix(me){
  let suf='';
  for(const c of (me.guildCards||[])){
    if(c.eff==='buildgain:material'&&gainResource(me,'material')) suf+='；矿业集团 +1 物资';
    else if(c.eff==='buildgain:fuel'&&gainResource(me,'fuel')) suf+='；星际运输集团 +1 燃料';
  }
  return suf;
}
// 领袖 Overseer/Ruthless（扩展）：课税城市或星港造舰后，可击毁该建筑以重复本次行动（每回合一次）。
// actionType='tax'|'ship'；bldg 为刚使用的建筑（city或starport）；msg 为原行动日志文本。
function maybeRuthless(me, id, bldg, actionType, msg){
  const col=me.color.key; const s=G.map[id];
  const canFire=G.useExpansion && leaderHas(me,'ruthless')
    && bldg && s.pieces.buildings.includes(bldg) && !(me._abil&&me._abil._ruthlessUsed);
  if(!canFire){ consumeAction(msg); return; }
  openModal(m=>{
    m.appendChild(el('h2',null,'领袖·无情'));
    const bType=bldg.type==='city'?'城市':'太空港'; const isRival=bldg.owner!==col;
    m.appendChild(el('div','hintbox',`可击毁 ${id} 的${bType}以再次执行本行动（每回合一次）${isRival?'；击毁对手城市 → 民愤+洗劫机会':'；击毁忠诚建筑 → 民愤（如为城市）'}。`));
    const yes=el('button','btn',`击毁此${bType}，重复行动`); yes.style.cssText='display:block;width:100%;margin:5px 0';
    yes.onclick=()=>{ closeModal();
      if(!me._abil) me._abil={}; me._abil._ruthlessUsed=true;
      const bi=s.pieces.buildings.indexOf(bldg); if(bi>=0) s.pieces.buildings.splice(bi,1);
      const owner=G.players.find(p=>p.color.key===bldg.owner);
      if(bldg.type==='city') owner.supply.cities++; else owner.supply.starports++;
      me.trophies++; SFX.destroy();
      let destMsg=`${pname(G.actor)} 无情：击毁 ${id} 的${bType}`;
      const doRepeat=()=>{ G._ruthlessRepeat=()=>consumeAction(msg); G.pending=null; G.highlight=null;
        if(actionType==='tax') beginAction('tax'); else beginAction('build'); };
      // 摧毁城市 → 民愤：星门站城市触发其全部星簇类型，普通/云端城市触发行星类型
      const rtypes=bldg.type==='city'?(bldg._gateStation?(bldg._gsTypes||[]):(s.resource?[s.resource]:[])):[];
      if(rtypes.length){
        const oMsg=rtypes.map(r=>provokeOutrage(me,r)).join('；'); destMsg+=`；引发民愤（${oMsg}）`;
        logMsg(destMsg,'act');
        if(isRival) maybeRansack(1, bldg.owner, doRepeat); else doRepeat();
      } else { logMsg(destMsg,'act'); doRepeat(); }
    };
    const no=el('button','btn ghost','跳过，完成行动'); no.onclick=()=>{ closeModal(); consumeAction(msg); };
    m.appendChild(yes); m.appendChild(no);
  });
}
function doMovePick(id){

    // Empath's Bond（扩展）：共情已宣告时，任意星港均可弹射（不抓俘虏）

    if(G.useExpansion && leaderHas(me,'ancient') && loyalStarport && s.kind!=='gate') loyalStarport=false;

      const moved=moveShips(src,id,me,n); // 补给中性搬运，保留受损状态
      SFX.move();

      // 传说 Gate Ports（扩展）：移入对手控制且有新鲜忠诚星港的星门时，被俘获 1 密探（在消耗行动前结算）
      if(G.useExpansion && G.map[id].kind==='gate'){
        G.players.forEach(p=>{ if(p===me||!loreHas(p,'gateports')) return;
          if(controllerOf(id)!==p.color.key) return;

          if(!hasFreshSP) return;

        });

      if(willMoveFresh>0) doSprinterDrives(me,id,willMoveFresh,()=>consumeAction(moveMsg));
      else consumeAction(moveMsg); });
  }
}
function doSprinterDrives(me, fromSys, maxLeft, onDone){
  onDone=onDone||function(){};
  const col=me.color.key; const s=G.map[fromSys];
  const freshHere=Math.min(maxLeft,(s.pieces.ships[col]||0)-dmgShipsN(s,col));
  if(freshHere<=0){ onDone(); return; }
  openModal(m=>{
    m.appendChild(el('h2',null,'传说·疾驰引擎'));
    m.appendChild(el('div','hintbox',`${freshHere} 艘新鲜忠诚舰可从 ${fromSys} 再移动一次（不触发本效果）。选目标系统，或跳过。`));
    const adjs=s.neighbors.filter(nb=>!G.map[nb].outOfPlay);
    adjs.forEach(nb=>{
      const btn=el('button','btn',`移动到 ${nb}`);
      btn.style.cssText='display:block;width:100%;margin:5px 0';
      btn.onclick=()=>{ closeModal();
        openCountModal('疾驰引擎：移动舰数',1,freshHere,n=>{
          const mv=moveShips(fromSys,nb,me,n); SFX.move();
          logMsg(`${pname(G.actor)} 疾驰引擎：${mv} 艘新鲜舰 ${fromSys}→${nb}`,'act');
          render();
          if(freshHere-n>0) doSprinterDrives(me,fromSys,freshHere-n,onDone);
          else onDone();
        });
      };
      m.appendChild(btn);
    });
    const skip=el('button','btn ghost','跳过'); skip.onclick=()=>{ closeModal(); onDone(); }; m.appendChild(skip);
  });
}

// 劫掠骰条件（规则书 p.14）：①守方在本系统有建筑，OR ②守方在地图上任意系统都没有建筑
// 注：条件基于「建筑」，而非「舰船」（旧代码误用 defShipsAnywhere）
function raidAllowed(defC,sysId){
  const s=G.map[sysId];
  const defBldg=s.pieces.buildings.some(b=>b.owner===defC);
  const defBldgAnywhere=Object.values(G.map).some(x=>!x.outOfPlay&&x.pieces.buildings.some(b=>b.owner===defC));
  return defBldg||!defBldgAnywhere;
}
// 传说 Raider Exosuits（扩展）：进攻方持此卡且本系统无守方建筑、且常规规则本不允许劫掠骰时，额外解锁劫掠骰（至多 1 颗，由 openBattleDice 限制）。
function exosuitRaidEnabled(atk,defC,sysId){
  const s=G.map[sysId]; if(!s||!atk) return false;
  const noDefBldg=!s.pieces.buildings.some(b=>b.owner===defC);
  return G.useExpansion && loreHas(atk,'exosuit') && noDefBldg && !raidAllowed(defC,sysId);
}
// SVG 系统闪烁（战斗发起时红光脉冲）
function flashSystem(id){
  const g=document.querySelector(`[data-sys="${id}"].sys-node`);
  if(!g) return;
  g.classList.remove('sys-flash');
  void g.offsetWidth; // force reflow
  g.classList.add('sys-flash');
  setTimeout(()=>g.classList.remove('sys-flash'), 750);
}
// 资源获得浮动提示（在屏幕某位置漂起）
function resFloat(txt, x, y){
  const d=document.createElement('div'); d.className='res-float'; d.textContent=txt;
  d.style.left=x+'px'; d.style.top=y+'px'; document.body.appendChild(d);

// 骰子面结果 HTML（用于 3D 骰子落点展示）
function faceToHTML(face){
  const syms={hit:'⚔',bldg:'🏠',key:'🔑',self:'🔥',intercept:'🛡'};
  const parts=[];
  for(const k of ['hit','bldg','key','self','intercept']){
    const n=(face[k]||0); for(let i=0;i<n;i++) parts.push(syms[k]);
  }
  if(!parts.length) return `<span style="font-size:22px;opacity:.32;line-height:1">·</span>`;
  const sz=parts.length<=2?'17px':'13px';
  return `<span style="font-size:${sz};line-height:1.25;text-align:center">${parts.slice(0,4).join('')}</span>`;
}
function animateDice(id,defC,a){
  flashSystem(id); // 闪烁攻击目标系统
  const result=resolveBattle(id,defC,a); // 预先投骰，动画结束直接用预算结果
  SFX.roll();
  const dieList=[];
  ['skirmish','assault','raid'].forEach(dt=>{for(let i=0;i<(a[dt]||0);i++) dieList.push({type:dt,abbr:dt.slice(0,2)});});
  const dieEls=[];
  openModal(m=>{
    m.appendChild(el('h2',null,'⚔ 战斗骰'));
    const hintParts=[]; if(a.skirmish) hintParts.push(`${a.skirmish} 突袭`); if(a.assault) hintParts.push(`${a.assault} 强攻`); if(a.raid) hintParts.push(`${a.raid} 劫掠`);
    m.appendChild(el('div','hintbox',`投掷 ${hintParts.join(' + ')} 骰`));
    const box=el('div'); box.id='dice-anim';
    dieList.forEach(({type,abbr})=>{
      const d=el('div',`die3d ${abbr} rolling`); d.innerHTML='<span style="font-size:22px;opacity:.4">?</span>'; box.appendChild(d); dieEls.push(d);
    }); m.appendChild(box);
    // 结果汇总区（骰子落点后渐现）
    const summaryEl=el('div'); summaryEl.style.cssText='opacity:0;transition:opacity .4s;margin-top:6px';
    m.appendChild(summaryEl);
    // 450ms 后逐颗落点
    setTimeout(()=>{
      dieEls.forEach((d,i)=>{
        setTimeout(()=>{
          d.classList.remove('rolling'); d.classList.add('landing');
          const fi=result.faces[i];
          if(fi){ d.innerHTML=faceToHTML(fi.face);
            const hasHit=(fi.face.hit||0)+(fi.face.bldg||0)>0, blank=!Object.keys(fi.face).filter(k=>k!=='_rerolled').some(k=>fi.face[k]);
            if(hasHit) d.classList.add('glow-hit'); else if(blank) d.classList.add('glow-miss');
          }
          SFX.land();
        }, i*75);
      });
      // 骰子全部落点后 220ms 显示汇总（避免与最后一颗骰落音重叠）
      setTimeout(()=>{
        const r=result.res;
        const parts=[];
        if(r.hit>0) parts.push(`⚔ 命中 ${r.hit}`);
        if(r.bldg>0) parts.push(`🏠 建筑 ${r.bldg}`);
        if(r.key>0) parts.push(`🔑 钥匙 ${r.key}`);
        if(r.self>0) parts.push(`🔥 自伤 ${r.self}`);
        if(r.intercept>0) parts.push(`🛡 拦截 ${r.intercept}`);
        const txt=parts.length?parts.join('　'):'无效果';
        const hasHits=r.hit>0||r.bldg>0;
        summaryEl.innerHTML=`<div class="hintbox" style="text-align:center;font-size:16px;font-weight:800;letter-spacing:.5px;color:${hasHits?'#f0d080':'#8b96ad'}">${txt}</div>`;
        summaryEl.style.opacity='1';
      }, dieList.length*75+220);
    }, 450);
  });
  const landMs=450+dieList.length*75+380;
  setTimeout(()=>{ closeModal(); runBattle(id,defC,a,result); }, landMs+900);
}
// 战斗可投骰上限：参战舰船 + 星门守备(g) + 领袖 Rebel/Committed(+2，仅开扩展)
function battleMaxDice(me,s){
  const col=me.color.key;
  const gateBonus=(s.kind==='gate'&&ownsEff(me,'gatedice'))?2:0;
  const rebelBonus=(G.useExpansion&&leaderHas(me,'committed'))?2:0;
  return {max:(s.pieces.ships[col]||0)+gateBonus+rebelBonus, gateBonus, rebelBonus};
}
// 传说 Predictive Sensors（扩展）：防御时攻击者收骰前，守方可从相邻系统移入新鲜忠诚舰（可分批）
function doPredictiveSensors(sysId, defC, onDone){
  const defP=G.players.find(p=>p.color.key===defC);
  if(!defP) return onDone();
  const adjSrc=G.map[sysId].neighbors.filter(nb=>{
    const ns=G.map[nb]; if(!ns||ns.outOfPlay) return false;
    return (ns.pieces.ships[defC]||0)-dmgShipsN(ns,defC)>0;

  if(!adjSrc.length){ onDone(); return; }
  openModal(m=>{
    m.appendChild(el('h2',null,'传说·预测传感器'));
    m.appendChild(el('div','hintbox',`防御前可将相邻系统的新鲜忠诚舰移入 ${sysId}（不触发其他效果）。选源系统或跳过。`));
    adjSrc.forEach(src=>{

        openCountModal('移入战场舰数',1,fresh,n=>{

          logMsg(`${defP.name} 预测传感器：从 ${src} 移入 ${mv} 艘新鲜舰至 ${sysId}`,'act');

// 领袖 Quartermaster/Resilient（扩展）：任何有该玩家参与的战斗后，按其控制的星港数（含对手的），
// 每个修复战斗星系内 1 艘忠诚（己方）受损舰。返回修复数（供日志/测试）。
function leaderResilientRepair(p, sysId){
  if(!G.useExpansion || !leaderHas(p,'resilient')) return 0;
  const col=p.color.key; const s=G.map[sysId];
  // 该玩家控制的星港数（含对手的——只要建在你控制的系统里）
  let starports=0; for(const cid of controlledSystems(p)){ const cs=G.map[cid];
    starports+=cs.pieces.buildings.filter(b=>b.type==='starport').length; }
  let repaired=0; const d=dmgMap(s);
  for(let i=0;i<starports && (d[col]||0)>0;i++){ d[col]--; if(!d[col]) delete d[col]; repaired++; }
  return repaired;
}
// 传说 Repair Drones（扩展）：你作为攻击方战斗后，修复 1 艘忠诚（己方）进攻舰（战斗系统内）。返回修复数。
function loreRepairDrones(p, sysId){
  if(!G.useExpansion || !loreHas(p,'repairdrones')) return 0;
  const col=p.color.key; const s=G.map[sysId]; const d=dmgMap(s);
  if((d[col]||0)>0){ d[col]--; if(!d[col]) delete d[col]; return 1; }
  return 0;
}

// 洗劫议会（Ransack）：每摧毁 1 座城市，可「收纳任意 1 张含守方密探的议会卡」，卡上所有敌方密探计入战利品（非俘虏）。可放弃。
function maybeRansack(times, defC, done){
  if(times<=0 || !G.court.length){ done(); return; }
  const eligible=G.court.filter(c=>(c.agents[defC]||0)>0);
  if(!eligible.length){ done(); return; }
  const dp=G.players.find(p=>p.color.key===defC);

    m.appendChild(el('h2',null,'洗劫议会 · Ransack'));

    eligible.forEach(c=>{ const b=el('button','btn'); b.style.cssText='display:block;width:100%;margin:6px 0';
      const ags=Object.entries(c.agents).filter(([k,n])=>n>0).map(([k,n])=>`<span style="color:${(PCOLORS.find(p=>p.key===k)||{css:'#999'}).css}">${n}</span>`).join(' ');
      b.innerHTML=`<b>${c.name}</b>　<span style="opacity:.8;font-size:12px">${c.t==='vox'?'帝国之声·':''}${effKindLabel(c.eff)}</span>　密探：${ags}`;
      b.onclick=()=>{ closeModal(); ransackTake(c, defC, ()=>maybeRansack(times-1, defC, done)); }; m.appendChild(b); });
    const skip=el('button','btn ghost','放弃洗劫'); skip.onclick=()=>{ closeModal(); done(); }; m.appendChild(skip);
  });
}
// 收纳（洗劫版）：敌方密探→战利品；自己密探归还补给；Vox 立即触发；不消耗行动点，完成后调用 after()。
function ransackTake(c, defC, after){
  const me=G.players[G.actor]; const col=me.color.key; let troph=0;
  for(const k in c.agents){ if(k!==col && c.agents[k]>0){ const rp=G.players.find(p=>p.color.key===k); if(rp) rp.supply.agents+=c.agents[k]; troph+=c.agents[k]; } }
  me.trophies+=troph; me.supply.agents+=(c.agents[col]||0);
  const idx=G.court.indexOf(c); if(idx>=0){ G.court.splice(idx,1); if(G.courtDeck.length) G.court.splice(idx,0,G.courtDeck.pop()); }
  logMsg(`${pname(G.actor)} 洗劫议会：收纳「${c.name}」，敌方 ${troph} 名密探计入战利品`,'act');
  if(c.t==='vox'){ runVoxEffect(c, ()=>{ after&&after(); }); return; } // Vox 触发后续作即继续洗劫链（不再 consumeAction）
  (me.guildCards=me.guildCards||[]).push(c);
  if(c.eff&&c.eff.startsWith('cartel:')){ const rr=c.eff.split(':')[1]; logMsg(`「${c.name}」就位：此后每章计分结束时，所有对手须弃光${RESOURCES[rr].name}`,'sys'); }
  else if(c.eff==='guardian'){ logMsg('「宣誓守护者」就位：对手无法偷取你的资源与公会卡','sys'); }
  else if(c.eff==='gatedice'){ logMsg('「星门守备部队」就位：你在星门发起战斗 +2 骰','sys'); }
  else if(c.eff==='secretorder'){ logMsg('「隐秘结社」就位：宣告守护/共情时此牌点数不归零','sys'); }
  after&&after();
}
function resolveBattle(sysId,defColor,alloc){
  const s=G.map[sysId]; const atk=G.players[G.actor]; const def=G.players.find(p=>p.color.key===defColor);
  const res={hit:0,self:0,intercept:0,bldg:0,key:0};
  const faceLog=[]; // 记录每颗骰子的面结果，供动画展示
  const rollDie=(dt)=>{ const f=Object.assign({},DICE[dt].faces[Math.floor(Math.random()*6)]); faceLog.push({type:dt,face:f}); return f; };
  const addFace=(f)=>{ for(const k in f){ if(k!=='_rerolled') res[k]=(res[k]||0)+(f[k]||0); } };
  // 传说·门控前置量：进攻舰是否全新鲜（开战时）、攻方新鲜忠诚舰数（鱼雷重掷预算）、守方新鲜忠诚舰
  const lore=G.useExpansion;
  const atkTotal0=s.pieces.ships[atk.color.key]||0, atkFresh0=freshShips(s,atk.color.key);
  const defFresh0=freshShips(s,defColor);
  const skFaces=[]; const skFaceIdx=[];
  const asFaces=[]; const asFaceIdx=[]; // 强攻骰面（供寻的鱼雷重掷）
  const raFaces=[]; const raFaceIdx=[]; // 劫掠骰面（供 Corsair/Tricky 重掷）
  // 领袖 Corsair/Tricky（扩展）：进攻战斗可重掷劫掠骰，数量 ≤ 你拥有的不同资源种类数
  const trickyOn=(G.useExpansion && leaderHas(atk,'tricky'));
  // 传说 Empath's Vision（扩展）：共情已宣告期间，掷骰方可重掷任意数量骰一次（无预算）。需把三类骰都纳入数组。
  const visionOn=(lore && loreHas(atk,'empathvision') && ambitionDeclared('empath'));
  // 突袭骰始终纳入数组（游击部队重掷用）；强攻骰在鱼雷/Vision 时纳入；劫掠骰在 Tricky/Vision 时纳入
  for(const dt of ['skirmish','assault','raid']){ const n=alloc[dt]||0;
    for(let i=0;i<n;i++){ const f=rollDie(dt);
      if(dt==='skirmish'){ skFaces.push(f); skFaceIdx.push(faceLog.length-1); }
      else if(dt==='assault' && lore && (loreHas(atk,'seekertorp')||visionOn)){ asFaces.push(f); asFaceIdx.push(faceLog.length-1); }
      else if(dt==='raid' && (trickyOn||visionOn)){ raFaces.push(f); raFaceIdx.push(faceLog.length-1); }
      else addFace(f); } }
  let rerolled=0; // 游击部队：每 1 武器标志（武器资源＋武器图标公会卡）可重掷 1 颗空白游击骰（自动重掷无收益骰）
  if(ownsEff(atk,'skirmishreroll')){
    let budget=weaponIcons(atk);
    for(let i=0;i<skFaces.length && budget>0;i++){
      const f=skFaces[i]; const blank=!(f.hit||f.self||f.intercept||f.bldg||f.key);
      if(blank){ const nf=Object.assign({},DICE['skirmish'].faces[Math.floor(Math.random()*6)],{_rerolled:1}); skFaces[i]=nf; faceLog[skFaceIdx[i]].face=nf; budget--; rerolled++; }
    }
  }
  // 传说·寻的鱼雷(Seeker Torpedoes)：进攻掷骰后，每艘新鲜忠诚进攻舰可重掷至多 1 颗强攻骰。
  // 强攻骰每个有 self 的面都带 hit，故自动策略=重掷所有掷出自损面 ◯ 的骰，给玩家最大避损机会。
  let torpReroll=0;
  if(lore && loreHas(atk,'seekertorp') && asFaces.length){
    let budget=atkFresh0; // 每艘新鲜忠诚进攻舰 ≤1 颗
    for(let i=0;i<asFaces.length && budget>0;i++){
      const f=asFaces[i]; if((f.self||0)>0){
        const nf=Object.assign({},DICE['assault'].faces[Math.floor(Math.random()*6)],{_rerolled:1}); asFaces[i]=nf; faceLog[asFaceIdx[i]].face=nf; budget--; torpReroll++;
      }
    }
  }
  // 领袖 Corsair/Tricky（扩展）：进攻方重掷无收益（无钥匙且无建筑命中）的劫掠骰，预算=拥有的不同资源种类数。
  let trickyReroll=0;
  if(trickyOn && raFaces.length){
    let budget=RES_ORDER.filter(r=>(atk.res[r]||0)>0).length; // distinct 资源种类数
    for(let i=0;i<raFaces.length && budget>0;i++){
      const f=raFaces[i]; const noGain=!((f.key||0)>0 || (f.bldg||0)>0); // 仅命中 intercept 等无收益面才重掷
      if(noGain){ const nf=Object.assign({},DICE['raid'].faces[Math.floor(Math.random()*6)],{_rerolled:1}); raFaces[i]=nf; faceLog[raFaceIdx[i]].face=nf; budget--; trickyReroll++; }
    }
  }
  skFaces.forEach(addFace); asFaces.forEach(addFace); raFaces.forEach(addFace); res._rerolled=rerolled; res._torpReroll=torpReroll; res._trickyReroll=trickyReroll;
  // —— 传说·自损面修正（攻方收骰前，规则书各卡）——
  let mirrorAdd=0, signalCut=0, railgunAdd=0;
  if(lore){
    // 镜面装甲(Mirror Plating)·防御：攻击者若掷了任意强攻骰，向其加 1 个自损面 ◯
    if(def && loreHas(def,'mirror') && (alloc.assault|0)>0){ mirrorAdd=1; res.self=(res.self||0)+1; }
    // 信号破坏者(Signal Breaker)·进攻：开战时所有进攻舰新鲜 → 忽略掷出的 1 个自损面（不低于 0）
    if(loreHas(atk,'signalbreaker') && atkTotal0>0 && atkFresh0===atkTotal0 && (res.self||0)>0){ signalCut=1; res.self=Math.max(0,res.self-1); }
    // 轨道炮阵列(Railgun Arrays)·防御：攻击者收骰前若有任何新鲜忠诚防御舰 → 攻击者必受 1 击
    if(def && loreHas(def,'railgun') && defFresh0>0){ railgunAdd=1; res.self=(res.self||0)+1; }
  }
  res._mirrorAdd=mirrorAdd; res._signalCut=signalCut; res._railgunAdd=railgunAdd;
  // —— 结算顺序（规则书 p.14）：①自伤 → ②拦截（每战一次，=守方「新鲜舰」数）→ ③命中守方舰（新鲜→受损→摧毁；舰尽溢出建筑）→ ④命中建筑 → ⑤劫掠 ——
  const def0fresh=freshShips(s,defColor);                                 // 拦截基数：守方战前「新鲜舰」数
  // 领袖 Agitator/Irregular（扩展）：守方持有时，攻方掷突袭骰 → 无新鲜舰反伤；改为攻方每守方武器图标受 1 击，守方弃 1 武器资源（见 runBattle）
  const irregularOn=(G.useExpansion && def && leaderHas(def,'irregular') && (res.intercept||0)>0);
  const interLoss=(res.intercept>0 && def0fresh>0 && !irregularOn) ? def0fresh : 0;
  const irregularHits=irregularOn ? weaponIcons(def) : 0;
  const atkR=applyShipHits(sysId, atk.color.key, res.self+interLoss+irregularHits, def); // 攻方舰：新鲜→受损→摧毁；被摧毁→守方战利品
  const defR=applyShipHits(sysId, defColor, res.hit, atk);                                // 守方舰：被摧毁→攻方战利品；舰尽则 overflow 转建筑
  const bld=damageBuildings(sysId, defColor, res.bldg+defR.overflow, atk); // 摧毁建筑→攻方战利品；摧毁城市→民愤
  const stolen=0; // 劫掠改为模态框交互，此处不再自动偷取
  res._irregularHits=irregularHits;
  return {res, atkDmg:atkR.damaged, atkLost:atkR.destroyed, defDmg:defR.damaged, defKilled:defR.destroyed, bldgDestroyed:bld.destroyed, outrages:bld.outrages, stolen, interLoss, faces:faceLog};
}
// 建筑命中：新鲜→受损（翻面）；受损→摧毁（移除，归还原主补给；并计入 destroyer 战利品）。
// 摧毁【城市】→ destroyer 就该星系行星资源「引发民愤」（规则书 p.16）。返回 {destroyed, outrages:[{rtype,msg}]}。
function damageBuildings(sysId,color,n,destroyer){
  const s=G.map[sysId]; let destroyed=0; const outrages=[];
  for(let i=0;i<n;i++){
    const fresh=s.pieces.buildings.find(b=>b.owner===color&&!b.damaged);
    if(fresh){ fresh.damaged=true; continue; }
    const di=s.pieces.buildings.findIndex(b=>b.owner===color&&b.damaged);
    if(di>=0){ const b=s.pieces.buildings.splice(di,1)[0]; const o=G.players.find(p=>p.color.key===color);
      if(b.type==='city'){ if(o) o.supply.cities++;  // 自由城市(owner='free')无玩家供应可归还，跳过(防 undefined 崩溃)
        if(destroyer){ const rtypes=b._gateStation?(b._gsTypes||[]):(s.resource?[s.resource]:[]);
          for(const r of rtypes) outrages.push({rtype:r, msg:provokeOutrage(destroyer,r)}); } }
      else { if(o) o.supply.starports++; }
      destroyed++; if(destroyer) destroyer.trophies++; } else break;
  }
  return {destroyed, outrages};
}
// 引发民愤（规则书 p.16）：destroyer 弃光自己该类型的资源(归还供应)与公会卡(忠诚卡例外保留)，
// 并用密探覆盖该资源的民愤图标（已民愤则不再放密探）。被民愤的资源不能用于序幕行动（但仍可课税/计雄心）。
function provokeOutrage(player, rtype){
  if(!rtype||!player) return '';
  const parts=[];
  const rn=player.res[rtype]||0;                                   // 1) 弃光该类型资源 → 归还供应
  if(rn>0){ player.res[rtype]=0; G.resSupply[rtype]+=rn; parts.push(`弃 ${rn} ${RESOURCES[rtype].name}`); }
  const discarded=[], kept=[];                                     // 2) 弃光该类型公会卡（忠诚卡保留）
  for(const c of (player.guildCards||[]).slice()){
    if(c.icon!==rtype) continue;
    if(typeof c.eff==='string' && c.eff.startsWith('loyal:')){ kept.push(c.name); continue; }
    discardGuildCard(player, c); discarded.push(c.name);
  }
  if(discarded.length) parts.push(`弃公会卡[${discarded.join('、')}]`);
  if(kept.length) parts.push(`保留忠诚卡[${kept.join('、')}]`);
  const already=player.outraged[rtype]; player.outraged[rtype]=true; // 3) 覆盖民愤图标
  if(!already){ if(player.supply.agents>0) player.supply.agents--; parts.push('覆盖民愤图标(−1密探)'); }
  else parts.push('（该资源此前已民愤）');
  return parts.join('，');
}
function stealResource(from,to){ if(ownsEff(from,'guardian')) return null;

          G.players.forEach(p=>{ const msg=provokeOutrage(p,r); logMsg(`　${p.name}：${msg||'无可弃'}`,'sys'); });
          logMsg(`${pname(G.actor)} 揭竿而起：所有玩家就 ${RESOURCES[r].name} 爆发民愤`,'act'); done(); }; m.appendChild(b); });
      const skip=el('button','btn ghost','放弃效果'); skip.onclick=()=>{ closeModal(); done(); }; m.appendChild(skip);
    });
  } else if(c.eff==='vox_song'){
    const col=me.color.key;
    const finish=()=>{ c.agents={}; G.courtDeck.push(c); shuffle(G.courtDeck); logMsg('自由之歌：本牌洗回议会牌堆','sys'); done(); };
    const opts=[];
    for(const id in G.map){ const s=G.map[id]; if(s.outOfPlay||s.kind!=='planet'||controllerOf(id)!==col) continue;
      s.pieces.buildings.forEach(b=>{ if(b.type==='city'&&b.owner!==col) opts.push({id,owner:G.players.find(p=>p.color.key===b.owner)}); }); }
    if(!opts.length){ logMsg('自由之歌：没有你控制的对手城市，效果跳过','sys'); finish(); return; }
    openModal(m=>{ m.appendChild(el('h2',null,'自由之歌 · 取走对手城市'));
      m.appendChild(el('div','hintbox','取走 1 座你控制的对手城市归还其拥有者；若如此做可夺取先攻。'));
      opts.forEach(o=>{ const b=el('button','btn',`${o.id}（${o.owner.name} 的城市）`); b.style.cssText='display:block;width:100%;margin:6px 0';

  } else if(c.eff==='vox_struggle'){

      guilds.forEach(x=>{ x.agents={}; G.courtDeck.push(x); }); shuffle(G.courtDeck);
      if(guilds.length) logMsg(`勾心斗角：${guilds.length} 张弃置公会卡洗回议会牌堆`,'sys'); done(); };

      const skip=el('button','btn ghost','不偷取'); skip.onclick=()=>{ closeModal(); reshuffle(); }; m.appendChild(skip);

    logMsg(`「${c.name}」获得时效果需按卡面手动执行`,'sys'); done();

/* ================= 议会卡能力：序幕一次性 / 行动型 / 持续面板 =================
   正式规则中多数为「序幕阶段」能力；本简化引擎没有独立序幕，统一作为
   玩家回合内可主动激活的能力，通过行动栏「议会卡能力」面板调用。
   - 序幕一次性：免费，使用后弃置该公会卡（移入 courtDiscard）
   - 行动型：消耗 1 次行动
   - g24 文物贩子：每回合一次，不弃卡                                          */
function rivalsOf(me){ return G.players.filter(p=>p!==me); }
function ownsCardId(p,id){ return (p.guildCards||[]).some(c=>c.id===id); }
function weaponIcons(p){ return (p.res.weapon|0) + guildIcons(p,'weapon'); } // 武器标志 = 武器资源 + 武器图标公会卡（规则书 p.18）
function controlledSystems(p){ const out=[]; for(const id in G.map){ const s=G.map[id]; if(!s.outOfPlay && controllerOf(id)===p.color.key) out.push(id); } return out; }
function gatesInPlay(){ const out=[]; for(let cl=1;cl<=6;cl++){ const id='G'+cl; if(G.map[id]&&!G.map[id].outOfPlay) out.push(id); } return out; }
function stealableGuildCards(victim){ const cards=(victim.guildCards||[]); const guard=cards.find(c=>c.eff==='guardian'); if(guard) return [guard];
  let list=cards.slice();
  // 传说·守护者团结(Keeper's Solidarity)：守护已宣告期间，只要你持有与某公会卡同类型的资源，对手不能偷该卡
  if(G.useExpansion && loreHas(victim,'keepersolidarity') && ambitionDeclared('keeper')){
    list=list.filter(c=>!(c.icon && (victim.res[c.icon]||0)>0));
  }
  return list; }
// 偷取一张对手公会卡：宣誓守护者(g22)被偷时不归偷取者，而是置于议会牌堆底（规则书）。返回 true=归入偷取者麾下；false=置底。
// 议会牌堆以 .pop() 取顶 → 数组末为顶、首为底；故置底用 unshift。
function takeStolenGuildCard(opp,me,card){ const i=(opp.guildCards||[]).indexOf(card); if(i>=0) opp.guildCards.splice(i,1);
  if(card.eff==='guardian'){ card.agents={}; G.courtDeck.unshift(card); return false; }
  (me.guildCards=me.guildCards||[]).push(card); return true; }
function discardGuildCard(owner,card){
  if((card.stash|0)>0 && typeof card.eff==='string' && card.eff.startsWith('cartel:')){ const rt=card.eff.split(':')[1]; G.resSupply[rt]+=card.stash; card.stash=0; } // 垄断卡离场：堆置资源归还供应
  const arr=owner.guildCards||[]; const i=arr.indexOf(card); if(i>=0) arr.splice(i,1); G.courtDiscard.push(card); }
// 通用选择器
function pickPlayer(title,list,cb){ if(list.length===1){ cb(list[0]); return; }
  openModal(m=>{ m.appendChild(el('h2',null,title));
    list.forEach(p=>{ const b=el('button','btn',p.name); b.style.cssText='display:block;width:100%;margin:6px 0;background:'+p.color.css; b.onclick=()=>{ closeModal(); cb(p); }; m.appendChild(b); });
    const cc=el('button','btn ghost','取消'); cc.onclick=()=>closeModal(); m.appendChild(cc); }); }
function pickResource(title,types,cb){ openModal(m=>{ m.appendChild(el('h2',null,title));
    if(!types.length) m.appendChild(el('div','hintbox','无可选资源。'));
    types.forEach(r=>{ const b=el('button','btn',RESOURCES[r].name); b.style.cssText='display:block;width:100%;margin:6px 0'; b.onclick=()=>{ closeModal(); cb(r); }; m.appendChild(b); });
    const cc=el('button','btn ghost','取消'); cc.onclick=()=>closeModal(); m.appendChild(cc); }); }
function pickSystem(title,ids,cb){ openModal(m=>{ m.appendChild(el('h2',null,title));

function pickFromList(title,items,cb){ if(items.length===1){ cb(items[0].val); return; }

// 能力收尾
function finishAbility(me,card,meta){ meta=meta||{};
  if(meta.discard&&card) discardGuildCard(me,card);
  if(meta.oncePerTurn) (me._abil=me._abil||{})[meta.oncePerTurn]=true;
  if(meta.log) logMsg(meta.log,'act');
  if(meta.action) consumeAction(null); else render(); }

function abPlace3(me,card){ const ids=controlledSystems(me); if(!ids.length){ toast('你没有控制的星系'); return; }
  pickSystem('放置 3 艘星舰 · 选择你控制的星系',ids,id=>{ const n=Math.min(3,me.supply.ships); for(let k=0;k<n;k++) addShips(id,me,1);
    finishAbility(me,card,{discard:true,log:`${pname(me.idx)} 序幕「${card.name}」：在 ${id} 放置 ${n} 艘星舰，弃置该卡`}); }); }
function abFillSlots(me,card,rtype){ const SLOTS=6; let need=Math.max(0,SLOTS-totalRes(me)); let got=0,stolen=0;
  while(need>0 && G.resSupply[rtype]>0){ gainResource(me,rtype); need--; got++; }
  if(need>0){ for(const opp of rivalsOf(me)){ while(need>0 && opp.res[rtype]>0 && !ownsEff(opp,'guardian')){ opp.res[rtype]--; me.res[rtype]++; need--; got++; stolen++; } if(need<=0) break; } }
  finishAbility(me,card,{discard:true,log:`${pname(me.idx)} 序幕「${card.name}」：以${RESOURCES[rtype].name}填满空槽 +${got}${stolen?`（夺取 ${stolen}）`:''}，弃置该卡`}); }

// 垄断联盟（g03/g06）：把你的 1 个对应资源堆置于本牌——视为你所有（计入大亨），但此后不可动用/被偷/被劫/被民愤。非行动、可反复。

function abFarseerSwap(me,card){ const victims=rivalsOf(me).filter(p=>p.hand.length>0); if(!victims.length){ toast('没有有手牌的对手'); return; } if(!me.hand.length){ toast('你没有手牌可交换'); return; }

function abStealGuildCard(me,card){ const victims=rivalsOf(me).filter(p=>stealableGuildCards(p).length>0); if(!victims.length){ toast('没有可偷取的公会卡'); return; }

function abKidnap(me,card){ if(G.actionsLeft<=0){ toast('没有剩余行动'); return; } const w=weaponIcons(me); const col=me.color.key; const opts=[];
  G.court.forEach(c=>{ for(const k in c.agents){ if(k!==col && c.agents[k]>0 && c.agents[k]<w) opts.push({card:c,col:k,n:c.agents[k]}); } });

function abTrade(me,card){ if(G.actionsLeft<=0){ toast('没有剩余行动'); return; } const col=me.color.key; const opts=[];
  for(const id in G.map){ const s=G.map[id]; if(s.outOfPlay||s.kind!=='planet'||controllerOf(id)!==col) continue;
    s.pieces.buildings.forEach(b=>{ if(b.type==='city'&&b.owner!==col){ opts.push({id,owner:G.players.find(p=>p.color.key===b.owner),res:s.resource}); } }); }
  if(!opts.length){ toast('没有你控制的对手城市'); return; }
  pickFromList('交易 · 选择对手城市',opts.map(o=>({label:`${o.id}（${o.owner.name} 城市·产${RESOURCES[o.res].name}）`,val:o})),o=>{
    const giveTypes=RES_ORDER.filter(r=>me.res[r]>0 && (o.owner.res[r]||0)===0);
    if(!giveTypes.length){ toast('你没有「对方所没有的资源」可给'); return; }
    pickResource('给出一个对方没有的资源',giveTypes,gr=>{ me.res[gr]--; o.owner.res[gr]++; gainResource(me,o.res,true);
      finishAbility(me,card,{action:true,log:`${pname(me.idx)} 交易：给 ${o.owner.name} 1 ${RESOURCES[gr].name}，换得 1 ${RESOURCES[o.res].name}`}); }); }); }
